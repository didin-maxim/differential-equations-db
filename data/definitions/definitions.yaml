    },
    {
      "id": "bendixson_criterion",
      "title": "Критерий Бендиксона",
      "text": "Критерий отсутствия замкнутых траекторий: в односвязной области, где дивергенция плоского векторного поля сохраняет один знак и не равна нулю тождественно, замкнутых траекторий нет."
