{
  "definitions": [
    {
      "id": "ordinary_differential_equation",
      "title": "Обыкновенное дифференциальное уравнение",
      "text": "Уравнение, связывающее независимую переменную, неизвестную функцию одной переменной и ее производные."
    },
    {
      "id": "solution",
      "title": "Решение дифференциального уравнения",
      "text": "Функция, которая на заданном промежутке имеет нужные производные и после подстановки обращает уравнение в тождество."
    },
    {
      "id": "initial_value_problem",
      "title": "Задача Коши",
      "text": "Дифференциальное уравнение вместе с начальными условиями в одной точке."
    },
    {
      "id": "cauchy_problem",
      "title": "Задача Коши",
      "text": "Синоним initial_value_problem: дифференциальное уравнение с начальными данными в одной точке."
    },
    {
      "id": "maximal_solution",
      "title": "Максимальное решение",
      "text": "Решение задачи Коши, которое нельзя продолжить на больший промежуток без нарушения уравнения или выхода из области определения."
    },
    {
      "id": "separable_equation",
      "title": "Уравнение с разделяющимися переменными",
      "text": "Уравнение первого порядка, которое можно привести к виду g(y) dy = f(x) dx."
    },
    {
      "id": "linear_first_order_equation",
      "title": "Линейное уравнение первого порядка",
      "text": "Уравнение y' + p(x)y = q(x)."
    },
    {
      "id": "exact_equation",
      "title": "Уравнение в полных дифференциалах",
      "text": "Уравнение M(x,y) dx + N(x,y) dy = 0, для которого существует потенциал F с F_x=M и F_y=N."
    },
    {
      "id": "integrating_factor",
      "title": "Интегрирующий множитель",
      "text": "Ненулевая функция, после умножения на которую дифференциальная форма становится полной."
    },
    {
      "id": "bernoulli_equation",
      "title": "Уравнение Бернулли",
      "text": "Уравнение y' + p(x)y = q(x)y^n, которое при n != 0,1 линеаризуется заменой z = y^{1-n}."
    },
    {
      "id": "riccati_equation",
      "title": "Уравнение Риккати",
      "text": "Уравнение y' = a(x)y^2 + b(x)y + c(x). При известном частном решении сводится к линейному."
    },
    {
      "id": "linear_system",
      "title": "Линейная система",
      "text": "Система x' = A(t)x + b(t), где неизвестная x(t) векторная."
    },
    {
      "id": "fundamental_matrix",
      "title": "Фундаментальная матрица",
      "text": "Матрица, столбцы которой образуют фундаментальную систему решений однородной линейной системы."
    },
    {
      "id": "normalized_fundamental_matrix",
      "title": "Нормированная фундаментальная матрица",
      "text": "Фундаментальная матрица Phi(t,t0) однородной линейной системы, удовлетворяющая условию Phi(t0,t0)=I и переводящая начальное состояние из t0 в t."
    },
    {
      "id": "transition_matrix",
      "title": "Матрица перехода",
      "text": "Оператор Phi(t,s), который переводит значение решения однородной линейной системы в момент s в значение в момент t; для фундаментальной матрицы X он равен X(t)X(s)^{-1}."
    },
    {
      "id": "cauchy_matrix",
      "title": "Матрица Коши",
      "text": "Синоним матрицы перехода Phi(t,s) для линейной системы; используется в формуле Коши для задачи с начальным условием и правой частью."
    },
    {
      "id": "cauchy_formula_linear_system",
      "title": "Формула Коши для линейной системы",
      "text": "Представление решения \\(x'=A(t)x+b(t)\\) через матрицу перехода: \\(x(t)=\\Phi(t,t_0)x_0+\\int_{t_0}^t \\Phi(t,s)b(s)\\,ds\\)."
    },
    {
      "id": "liouville_formula_linear_system",
      "title": "Формула Лиувилля для линейной системы",
      "text": "Формула \\(\\det X(t)=\\det X(t_0)\\exp\\left(\\int_{t_0}^t \\operatorname{tr} A(s)\\,ds\\right)\\) для фундаментальной матрицы системы \\(x'=A(t)x\\)."
    },
    {
      "id": "wronskian",
      "title": "Вронскиан",
      "text": "Определитель, составленный из функций и их производных; для системы это определитель фундаментальной матрицы."
    },
    {
      "id": "matrix_exponential",
      "title": "Матричная экспонента",
      "text": "Ряд exp(At)=sum_{k>=0} A^k t^k/k!, задающий решение x'=Ax."
    },
    {
      "id": "autonomous_equation",
      "title": "Автономное уравнение",
      "text": "Уравнение, правая часть которого явно не зависит от независимой переменной."
    },
    {
      "id": "phase_line",
      "title": "Фазовая прямая",
      "text": "Прямая значений неизвестной функции для автономного уравнения y'=f(y) с отмеченными равновесиями и направлениями движения."
    },
    {
      "id": "equilibrium",
      "title": "Положение равновесия",
      "text": "Постоянное решение автономного уравнения или системы."
    },
    {
      "id": "stability",
      "title": "Устойчивость",
      "text": "Свойство решения: близкие начальные данные остаются близкими при дальнейшем движении."
    },
    {
      "id": "lyapunov_function",
      "title": "Функция Ляпунова",
      "text": "Функция, монотонность которой вдоль траекторий помогает доказывать устойчивость или отсутствие циклов."
    },
    {
      "id": "first_integral",
      "title": "Первый интеграл",
      "text": "Величина, сохраняющаяся вдоль всех решений системы."
    },
    {
      "id": "boundary_value_problem",
      "title": "Краевая задача",
      "text": "Дифференциальное уравнение с условиями в нескольких точках или на границе области."
    },
    {
      "id": "eigenvalue_problem",
      "title": "Спектральная задача",
      "text": "Краевая задача, в которой нужно найти значения параметра, допускающие нетривиальное решение."
    },
    {
      "id": "direction_field",
      "title": "Поле направлений",
      "text": "Геометрическое изображение наклона решений уравнения y'=f(x,y) в точках плоскости."
    },
    {
      "id": "lipschitz_condition",
      "title": "Условие Липшица",
      "text": "Оценка |f(x,y1)-f(x,y2)| <= L|y1-y2|, обеспечивающая единственность в задаче Коши."
    },
    {
      "id": "gronwall_inequality",
      "title": "Неравенство Гронуолла",
      "text": "Интегральная или дифференциальная оценка, позволяющая контролировать рост неизвестной функции."
    },
    {
      "id": "differential_inequality",
      "title": "Дифференциальное неравенство",
      "text": "Соотношение с производными, задающее не точное уравнение, а верхнюю, нижнюю или знаковую оценку скорости изменения функции."
    },
    {
      "id": "barrier_argument",
      "title": "Барьерный аргумент",
      "text": "Доказательство, в котором выбранная граница или вспомогательная величина не может быть пересечена решением из-за знака производной, сравнения или аргумента первого выхода."
    },
    {
      "id": "invariant_region",
      "title": "Инвариантная область",
      "text": "Область фазового пространства, из которой решение не выходит при рассматриваемом направлении времени."
    },
    {
      "id": "finite_time_blowup",
      "title": "Взрыв за конечное время",
      "text": "Ситуация, когда решение не может быть продолжено до конечного момента, обычно потому что его норма или подходящая преобразованная величина достигает предельного значения."
    },
    {
      "id": "general_solution",
      "title": "Общее решение",
      "text": "Семейство решений дифференциального уравнения, содержащее произвольные постоянные и описывающее все решения рассматриваемого класса в области, где выполнены условия применяемой теоремы."
    },
    {
      "id": "particular_solution",
      "title": "Частное решение",
      "text": "Одно конкретное решение уравнения или задачи, обычно получаемое выбором значений произвольных постоянных либо подбором для неоднородного уравнения."
    },
    {
      "id": "integral_curve",
      "title": "Интегральная кривая",
      "text": "График решения уравнения первого порядка или траектория в поле направлений; в каждой своей точке он касается заданного уравнением направления."
    },
    {
      "id": "singular_solution",
      "title": "Особое решение",
      "text": "Решение, которое не получается обычным выбором постоянных из общего решения и часто возникает как огибающая семейства интегральных кривых или как часть дискриминантного множества."
    },
    {
      "id": "discriminant_curve",
      "title": "Дискриминантная кривая неявного уравнения",
      "text": "Для неявного уравнения F(x,y,p)=0 это проекция множества F=0, F_p=0 на плоскость (x,y); на ней ветви, разрешимые относительно p, могут сливаться или менять число."
    },
    {
      "id": "linear_independence_solutions",
      "title": "Линейная независимость решений",
      "text": "Решения y_1,...,y_k линейного однородного уравнения линейно независимы на промежутке, если равенство c_1 y_1+...+c_k y_k=0 на всем промежутке возможно только при c_1=...=c_k=0."
    },
    {
      "id": "fundamental_system_solutions",
      "title": "Фундаментальная система решений",
      "text": "Набор линейно независимых решений однородного линейного уравнения или системы, число которых равно размерности пространства решений; их линейная комбинация дает общее решение однородной задачи."
    },
    {
      "id": "lyapunov_stability",
      "title": "Устойчивость по Ляпунову",
      "text": "Равновесие или решение устойчиво по Ляпунову, если для любой заданной окрестности этого движения найдется меньшая окрестность начальных данных, все решения из которой остаются в заданной окрестности при дальнейшем времени."
    },
    {
      "id": "asymptotic_stability",
      "title": "Асимптотическая устойчивость",
      "text": "Устойчивость по Ляпунову вместе с притяжением: все достаточно близкие решения не только остаются близкими, но и стремятся к данному равновесию или движению при t -> +infty."
    },
    {
      "id": "phase_trajectory",
      "title": "Фазовая траектория",
      "text": "Кривая в фазовом пространстве, образованная значениями решения автономной системы без указания параметризации временем; для равновесия траектория вырождается в точку."
    },
    {
      "id": "eigenvalue_of_boundary_value_problem",
      "title": "Собственное значение краевой задачи",
      "text": "Значение параметра в линейной однородной краевой задаче, при котором существует нетривиальное решение, удовлетворяющее всем краевым условиям."
    },
    {
      "id": "orthogonal_trajectories",
      "title": "Ортогональные траектории",
      "text": "Семейство кривых, пересекающих каждую кривую заданного семейства под прямым углом в точках пересечения."
    },
    {
      "id": "pde_characteristic_first_order",
      "title": "Характеристика уравнения первого порядка в частных производных",
      "text": "Кривая, вдоль которой линейное или близкое к нему уравнение первого порядка в частных производных сводится к обыкновенному дифференциальному уравнению для неизвестной функции или ее инварианта."
    },
    {
      "id": "functional",
      "title": "Функционал",
      "text": "Отображение, которое ставит функции число; в вариационном исчислении типичный пример имеет вид \\(J[y]=\\int_a^b F(x,y,y')\\,dx\\)."
    },
    {
      "id": "extremal",
      "title": "Экстремаль",
      "text": "Допустимая функция, удовлетворяющая необходимым уравнениям стационарности функционала, обычно уравнению Эйлера-Лагранжа и соответствующим граничным условиям."
    },
    {
      "id": "variation",
      "title": "Вариация",
      "text": "Малое допустимое изменение искомой функции, например y_epsilon=y+epsilon h; первая и вторая вариации описывают первые члены изменения функционала по epsilon."
    },
    {
      "id": "transversality_condition",
      "title": "Условие трансверсальности",
      "text": "Граничное условие вариационной задачи с подвижным или свободным концом, возникающее из зануления граничного члена первой вариации."
    },
    {
      "id": "isoperimetric_problem",
      "title": "Изопериметрическая задача",
      "text": "Вариационная задача на экстремум функционала при дополнительной интегральной связи; обычно решается введением множителя Лагранжа при этой связи."
    },
    {
      "id": "conjugate_point",
      "title": "Сопряженная точка",
      "text": "Точка c, сопряженная началу a вдоль экстремали, если уравнение Якоби имеет ненулевое решение, обращающееся в нуль в a и c."
    },
    {
      "id": "jacobi_condition",
      "title": "Условие Якоби",
      "text": "Условие отсутствия сопряженных точек на рассматриваемом интервале; вместе с условием Лежандра оно служит стандартным достаточным критерием знака второй вариации."
    },
    {
      "id": "matrix_eigenvalue",
      "title": "Собственное значение матрицы",
      "text": "Число lambda, для которого существует ненулевой вектор v такой, что Av=lambda v; в линейной системе x'=Ax оно задает экспоненциальный режим e^{lambda t}v."
    },
    {
      "id": "det_exp_trace_identity",
      "title": "Формула det exp через след",
      "text": "Для квадратной матрицы A выполнено det(e^{At})=e^{t tr A}; это постояннокоэффициентный случай формулы Лиувилля для определителя фундаментальной матрицы."
    },
    {
      "id": "variation_of_constants_system",
      "title": "Вариация постоянных для системы",
      "text": "Формула решения неоднородной линейной системы через фундаментальную матрицу: для x'=A(t)x+b(t) решение записывается как X(t)c(t), где c'(t)=X(t)^{-1}b(t)."
