      "text": "Для T-периодической однородной системы x'=A(t)x это матрица перехода за один период, обычно M=X(T) при нормировке фундаментальной матрицы X(0)=I."
    },
    {
      "id": "floquet_multiplier",
      "title": "Мультипликатор Флоке",
      "text": "Собственное значение матрицы монодромии периодической линейной системы; его модуль управляет поведением решений после повторения периодов."
    },
    {
      "id": "periodic_solution",
      "title": "Периодическое решение",
