  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим w(t)=|y(t)-z(t)|. Из интегральной формы уравнений и условия y(0)=z(0) получаем \\(w(t)\\le \\int_0^t L(s)w(s)\\,ds + \\int_0^t |r(s)|\\,ds\\). Положим \\(R(t)=\\int_0^t |r(s)|\\,ds\\) и применим интегральную форму Гронуолла: \\(w(t)\\le R(t)+\\int_0^t e^{\\int_s^t L(\\tau)\\,d\\tau}L(s)R(s)\\,ds\\). Интегрируя второе слагаемое по частям в форме dR(s)=|r(s)|ds, получаем эквивалентную оценку \\(w(t)\\le \\int_0^t e^{\\int_s^t L(\\tau)\\,d\\tau}|r(s)|\\,ds\\). Можно также проверить ее напрямую: правая часть U(t) удовлетворяет U'=L(t)U+|r(t)|, U(0)=0, а неравенство для w и сравнение с линейным уравнением дают w≤U.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    }
  ],
