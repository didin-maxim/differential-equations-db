        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f(t,y) непрерывна и удовлетворяет |f(t,u)-f(t,v)|≤L(t)|u-v| на [0,T], где L непрерывна и неотрицательна. Пусть y'=f(t,y), z'=f(t,z)+r(t), y(0)=z(0), где r непрерывна. Докажите оценку \\(|y(t)-z(t)| \\le \\int_0^t e^{\\int_s^t L(\\tau)\\,d\\tau}|r(s)|\\,ds\\).",
