  "ideas": [
    {
      "id": "idea-main",
      "title": "Ввести накопленную ошибку как новую неизвестную",
      "text": "Разность решений удовлетворяет интегральному неравенству. Чтобы получить точное ядро, удобно применить Гронуолла с переменной нижней границей или продифференцировать вспомогательную мажоранту.",
