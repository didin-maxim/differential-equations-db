        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть X(t) - фундаментальная матрица системы x'=A(t)x на [a,b]. Для заданных матрицы B и вектора c исследуйте разрешимость и единственность условия x(a)+B x(b)=c. Запишите ответ через X(a), X(b) и объясните, почему он не зависит от выбора фундаментальной матрицы.",
