  "ideas": [
    {
      "id": "idea-main",
      "title": "Сначала выразить конец через начало",
      "text": "Матрица перехода от a к b равна \\(\\Phi(b,a)=X(b)X(a)^{-1}\\). Тогда неизвестным становится только x(a), а двухточечное условие превращается в линейную алгебраическую систему.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для любого решения \\(x(t)=X(t)\\alpha\\). Поэтому \\(x(b)=X(b)X(a)^{-1}x(a)\\). Обозначим \\(\\Phi=X(b)X(a)^{-1}\\). Двухточечное условие равносильно \\((I+B\\Phi)x(a)=c\\). Значит решение существует тогда и только тогда, когда c принадлежит образу матрицы \\(I+B\\Phi\\); оно единственно тогда и только тогда, когда \\(I+B\\Phi\\) обратима. В этом случае \\(x(a)=(I+B\\Phi)^{-1}c\\), а затем \\(x(t)=X(t)X(a)^{-1}x(a)\\). Если выбрать другую фундаментальную матрицу Y(t)=X(t)C с постоянной обратимой C, то \\(Y(b)Y(a)^{-1}=X(b)C(C^{-1}X(a)^{-1})=X(b)X(a)^{-1}\\). Поэтому критерий не зависит от выбора X.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
