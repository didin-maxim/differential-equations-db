      "id": "idea-main",
      "title": "Найти правильный первый интеграл, а не решать систему",
      "text": "Производные \\(ln(1+x^2)\\) и \\(ln(1+y^2)\\) компенсируются вдоль поля. Ненулевые уровни полученного интеграла компактны и не содержат равновесий.",
      "status": "ai_checked",
