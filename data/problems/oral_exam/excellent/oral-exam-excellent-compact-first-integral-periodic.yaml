  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим \\(H(x,y)=\\ln(1+x^2)+\\ln(1+y^2)\\). Тогда \\(H'=\\frac{2x}{1+x^2}y(1+x^2)+\\frac{2y}{1+y^2}(-x(1+y^2))=2xy-2xy=0\\), то есть H - первый интеграл. Уровень H=c>0 эквивалентен \\((1+x^2)(1+y^2)=e^c\\); он компактен, симметричен и не проходит через начало. Других равновесий у системы нет: из x'=0 следует y=0, из y'=0 следует x=0. Поэтому на уровне c>0 поле нигде не обращается в нуль. Регулярный компактный уровень H=c состоит из замкнутых гладких кривых, и траектория, начавшаяся на одной такой компоненте, остается на ней. Так как скорость на этой компактной компоненте отделена от нуля, обход занимает конечное время. Вернувшись в исходную фазовую точку после обхода, решение повторяется по единственности. Значит всякое решение, кроме равновесия (0,0), периодично.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral"
      ]
    }
  ],
