        "title": "Формулировка",
        "text": "Пусть a(t) непрерывна, T-периодична, a(t)≥0 для всех t и a(t)>0 хотя бы в одной точке каждого периода. Докажите, что уравнение x''+a(t)x'+x=0 не имеет ненулевых T-периодических решений.",
