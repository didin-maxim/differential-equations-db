  "ideas": [
    {
      "id": "idea-main",
      "title": "Интеграл потери энергии за период обязан быть нулем",
      "text": "Энергия \\(E=((x')^2+x^2)/2\\) удовлетворяет \\(E'=-a(t)x'^2\\). Для периодического решения энергия в начале и конце периода одинакова, поэтому потеря энергии равна нулю и заставляет x' исчезнуть там, где есть трение.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим \\(E=((x')^2+x^2)/2\\). Тогда \\(E'=x'(x''+x)=-a(t)x'^2\\)≤0. Если x T-периодично, то E(T)=E(0), а значит \\(\\int_0^T a(t)x'(t)^2\\,dt\\)=0. Подынтегральная функция неотрицательна, поэтому \\(a(t)x'(t)^2=0\\) всюду. По условию a(t)>0 хотя бы в одной точке, а по непрерывности a>0 на некотором интервале. На этом интервале x'=0, значит x постоянно. Подстановка в уравнение дает x=0 на этом интервале. Тогда x и x' равны нулю в любой его точке; по единственности задачи Коши для линейного уравнения второго порядка решение тождественно равно нулю. Следовательно ненулевых T-периодических решений нет.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity",
        "state_vector_uniqueness"
      ]
    }
  ],
