        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть A(t) - непрерывная n x n матрица на [0,+∞), tr A(t)=0, а X(t) - фундаментальная матрица системы x'=A(t)x с X(0)=I. Может ли быть так, что каждое решение этой системы стремится к нулю при t → +∞? Ответ обоснуйте.",
