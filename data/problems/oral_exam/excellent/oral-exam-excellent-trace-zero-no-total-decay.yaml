  "ideas": [
    {
      "id": "idea-main",
      "title": "Следить не за отдельным решением, а за объемом параллелепипеда",
      "text": "Столбцы X(t) - решения с базисными начальными данными. Если все решения стремятся к нулю, все столбцы X(t) стремятся к нулю, но по формуле Лиувилля det X(t) сохраняет значение 1.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "По формуле Лиувилля для W(t)=det X(t) имеем W'(t)=tr A(t) W(t)=0. Так как X(0)=I, получаем det X(t)=1 для всех t≥0. Если бы каждое решение стремилось к нулю, то в частности к нулю стремились бы все столбцы X(t), потому что они являются решениями с начальными данными e1,...,en. Тогда все элементы X(t) стремились бы к нулю, а значит det X(t) стремился бы к 0. Это противоречит det X(t)=1. Следовательно при нулевом следе не может быть одновременного затухания всех решений.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
