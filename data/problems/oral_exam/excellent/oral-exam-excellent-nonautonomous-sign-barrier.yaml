  "ideas": [
    {
      "id": "idea-main",
      "title": "Применить единственность только там, где она действительно есть",
      "text": "Если решение с положительной стороны впервые попало в y=0, то в малой полуокрестности перед этим оно лежит в области y>0, где задача Коши единственна. Нулевое решение имеет те же данные в момент попадания, значит возникает противоречие с положительностью перед ним.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть для определенности y(t0)>0. Рассмотрим множество тех t справа от t0, до которых решение остается положительным. Если оно когда-нибудь впервые достигнет нуля в момент tau, то y(t)>0 на интервале (tau-epsilon,tau) при достаточно малом epsilon. В области y>0 правая часть локально липшицева, поэтому задача Коши с начальными данными y(tau)=0 имеет не более одного решения при движении назад из tau до tau-epsilon. Но y≡0 тоже является решением, так как f(t,0)=0. Следовательно наше решение должно совпадать с нулевым около tau слева, что противоречит y(t)>0. Значит справа от t0 знак не меняется; тот же аргумент назад по времени и для отрицательного начального значения завершает доказательство. Если решение где-то имеет ненулевое значение, оно сохраняет соответствующий знак на всей связной области существования.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
