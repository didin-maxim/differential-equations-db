        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(f(t,y)\\) непрерывна в полосе \\(I\\times\\mathbb R\\), локально липшицева по \\(y\\) в окрестности каждой точки вида \\((t,0)\\), \\(t\\in I\\), и \\(f(t,0)=0\\) для всех \\(t\\in I\\). Докажите, что решение уравнения \\(y'=f(t,y)\\), не равное тождественно нулю на своем связном интервале существования, не может менять знак.",
