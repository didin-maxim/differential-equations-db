        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f(t,y) непрерывна в полосе I x R, локально липшицева по y отдельно в областях y>0 и y<0, и f(t,0)=0 для всех t из I. Докажите, что решение уравнения y'=f(t,y), не равное тождественно нулю, не может менять знак на своем интервале существования.",
