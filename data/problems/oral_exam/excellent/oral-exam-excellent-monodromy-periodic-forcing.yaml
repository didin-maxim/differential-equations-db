        "title": "Формулировка",
        "text": "Пусть A(t) и f(t) непрерывны и T-периодичны, X' = A(t)X, X(0)=I, а 1 не является собственным значением матрицы X(T). Докажите, что система x'=A(t)x+f(t) имеет ровно одно T-периодическое решение.",
