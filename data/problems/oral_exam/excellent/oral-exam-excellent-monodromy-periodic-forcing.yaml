  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "По формуле вариации постоянных решение с начальным значением x_0 имеет вид x(t)=X(t)x_0+X(t) \\(\\int_0^t\\) X(s)^(-1)f(s) ds. Условие T-периодичности сначала требует x(T)=x_0, то есть (I-X(T))x_0=X(T) \\(\\int_0^T\\) X(s)^(-1)f(s) ds. Поскольку 1 не является собственным значением X(T), матрица I-X(T) обратима, и начальное значение x_0 определяется единственно. Полученное решение удовлетворяет x(T)=x(0). Из T-периодичности A и f следует, что функции x(t+T) и x(t) решают одну и ту же задачу Коши в момент 0: обе имеют значение x_0. По единственности они совпадают, значит решение действительно T-периодично на всей прямой. Единственность периодического решения также следует из единственности найденного x_0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
