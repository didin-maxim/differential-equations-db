  "ideas": [
    {
      "id": "idea-main",
      "title": "Периодичность стала условием на начальную точку",
      "text": "Формула вариации постоянных выражает x(T) через x(0). Условие x(T)=x(0) дает линейную систему с матрицей I-X(T), обратимой из-за отсутствия мультипликатора 1.",
      "status": "ai_checked",
      "standard_idea_ids": [
