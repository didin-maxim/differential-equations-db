        "title": "Формулировка",
        "text": "Пусть p,q непрерывны на интервале I, а y1 - решение уравнения y''+p(x)y'+q(x)y=0, нигде не обращающееся в нуль на I. Постройте второе решение, линейно независимое с y1, не решая уравнение заново.",
