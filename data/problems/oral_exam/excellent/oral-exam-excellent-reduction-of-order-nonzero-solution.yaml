  "ideas": [
    {
      "id": "idea-main",
      "title": "Искать не y, а отношение y/y1",
      "text": "Подстановка y=y1 v зануляет члены без производных v, потому что y1 уже является решением. Для w=v' остается линейное уравнение первого порядка.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
        "wronskian_liouville"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Ищем y=y1 v. Тогда y'=y1'v+y1v', y''=y1''v+2y1'v'+y1v''. После подстановки в y''+py'+qy=0 члены с v сокращаются, потому что y1''+py1'+qy1=0. Остается y1 v''+(2y1'+p y1)v'=0. Для w=v' получаем w'+(2y1'/y1+p)w=0. Поэтому w=C exp(-int p dx)/y1^2. Берем C=1 и фиксированную точку x0 из I: v(x)=int_{x0}^x exp(-int_{x0}^s p(t)dt)/y1(s)^2 ds. Тогда y2(x)=y1(x)v(x) является решением. Его отношение к y1 равно v, а v'=w не равно нулю, поэтому y2/y1 не постоянно и y1,y2 линейно независимы.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
        "wronskian_liouville"
      ]
    }
