  "ideas": [
    {
      "id": "idea-main",
      "title": "Сначала сделать нужную комбинацию, потом умножить на решение",
      "text": "Условие на значения в концах означает, что есть нетривиальная линейная комбинация \\(y_1,y_2\\), зануляющаяся в a и b. Для такого решения интегрирование y(y''+qy)=0 дает сумму неотрицательных членов.",
      "status": "ai_checked",
