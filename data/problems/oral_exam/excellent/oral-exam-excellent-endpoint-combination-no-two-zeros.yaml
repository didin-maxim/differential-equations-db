  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть y(a)=y(b)=0 и y''+qy=0. Умножим уравнение на y и проинтегрируем: \\(0=\\int_a^b y y''\\,dx+\\int_a^b qy^2\\,dx\\). Интегрирование по частям дает \\(\\int_a^b y y''\\,dx=[yy']_a^b-\\int_a^b (y')^2\\,dx=-\\int_a^b (y')^2\\,dx\\). Значит \\(\\int_a^b (y')^2\\,dx-\\int_a^b qy^2\\,dx=0\\). Так как q≤0, обе части подынтегральной суммы \\((y')^2\\) и \\(-qy^2\\) неотрицательны, поэтому y'=0 на [a,b]. Следовательно y постоянно, а из y(a)=0 получаем y≡0. Теперь пусть \\(y_1(a)y_2(b)-y_2(a)y_1(b)=0\\). Тогда векторы \\((y_1(a),y_2(a))\\) и \\((y_1(b),y_2(b))\\) линейно зависимы, поэтому найдутся не все нулевые \\(\\alpha,\\beta\\) такие, что \\(\\alpha y_1(a)+\\beta y_2(a)=0\\) и \\(\\alpha y_1(b)+\\beta y_2(b)=0\\). Комбинация \\(y=\\alpha y_1+\\beta y_2\\) решает то же уравнение и имеет два нуля, значит y≡0. Это и есть линейная зависимость \\(y_1,y_2\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
  ],
