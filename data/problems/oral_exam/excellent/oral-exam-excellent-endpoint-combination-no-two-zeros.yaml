        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть q непрерывна на [a,b] и q(x)≤0. Докажите, что уравнение y''+q(x)y=0 не имеет ненулевого решения с y(a)=y(b)=0. Затем примените это так: если \\(y_1,y_2\\) - два решения и \\(y_1(a)y_2(b)-y_2(a)y_1(b)=0\\), то \\(y_1,y_2\\) линейно зависимы.",
