  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим v=x'. Тогда система имеет вид x'=v, v'=-x-x^3. Вдоль решений сохраняется H(x,v)=v^2/2+x^2/2+x^4/4, потому что H'=v(-x-x^3)+(x+x^3)v=0. Для ненулевого решения энергия E>0. Уровень H=E компактен и задается формулой v=+-sqrt(2E-x^2-x^4/2), где x лежит между двумя конечными поворотными точками -a и a. На этом уровне нет равновесий: равновесие системы только (0,0), оно имеет энергию 0. Поэтому траектория с E>0 движется по всей замкнутой овальной кривой уровня. Время одного обхода конечно: например половина периода равна \\(\\int_{-a}^a\\) dx/sqrt(2E-x^2-x^4/2), а около поворотных точек знаменатель имеет обычную корневую особенность, дающую сходящийся интеграл. После одного обхода фазовая точка (x,v) возвращается в исходное положение; по единственности дальнейшее движение повторяется. Значит x(t) периодична.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral"
      ]
    }
