      "id": "idea-main",
      "title": "Энергия задает компактную замкнутую фазовую кривую",
      "text": "У осциллятора сохраняется H=v^2/2+x^2/2+x^4/4. Ненулевой уровень энергии является замкнутой кривой в фазовой плоскости без равновесий; движение по такой кривой возвращается в исходную точку.",
