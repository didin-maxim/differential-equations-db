  "ideas": [
    {
      "id": "idea-main",
      "title": "Спектр заменить производной нормы",
      "text": "В неавтономной системе мгновенный спектр сам по себе не управляет фундаментальной матрицей. Управляет знак производной квадрата нормы, то есть симметрическая часть матрицы.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity",
        "counterexample_varying_eigendirections"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Возьмем V(x)=|x|^2. Вдоль решения x'=A(t)x имеем V'=x'^T x+x^T x'=x^T(A(t)^T+A(t))x<=-2alpha|x|^2=-2alpha V. Значит (e^{2alpha(t-t0)}V(t))'<=0, откуда V(t)<=e^{-2alpha(t-t0)}V(t0). Извлекая корень, получаем |x(t)|<=e^{-alpha(t-t0)}|x(t0)|. Это доказательство использует не собственные значения A(t), а логарифмическую производную евклидовой нормы. В несимметрическом неавтономном случае отрицательные мгновенные собственные значения не запрещают рост, потому что большие неортогональные сдвиги и меняющиеся направления могут разгонять фундаментальную матрицу.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
