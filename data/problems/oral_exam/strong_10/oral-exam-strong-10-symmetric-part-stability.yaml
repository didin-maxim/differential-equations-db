        "title": "Задача для сильного студента",
        "text": "Пусть A(t) - непрерывная вещественная матрица и для некоторого alpha>0 при всех t и всех x выполнено x^T(A(t)+A(t)^T)x<=-2alpha|x|^2. Доказать, что нулевое решение системы x'=A(t)x экспоненциально устойчиво: |x(t)|<=e^{-alpha(t-t0)}|x(t0)| при t>=t0. Объяснить, почему это утверждение не является просто спектральным критерием по мгновенным собственным значениям A(t).",
