    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим z(x)=sin(x-a). Тогда z''+z=0, z(a)=0, z'(a)=1, z>0 на (a,a+π). Предположим, что y не имеет нулей на (a,a+π]. Так как y'(a)>0, вблизи a функция y положительна; значит y>0 на всем (a,a+π]. Рассмотрим F=y'z-yz'. Тогда F'=y''z-yz''=(-q y)z-y(-z)=(1-q)yz≤0. При x=a имеем F(a)=0. Следовательно F(a+π)≤0. Но z(a+π)=0 и z'(a+π)=-1, поэтому F(a+π)=y(a+π)>0. Получили противоречие. Значит первый нуль y действительно появляется не позже точки a+π.",
      "status": "ai_checked",
