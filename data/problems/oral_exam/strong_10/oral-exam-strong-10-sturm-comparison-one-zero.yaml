        "title": "Задача для сильного студента",
        "text": "Пусть q непрерывна на [a,a+π], q(x)≥1, а y - решение y''+q(x)y=0 с y(a)=0, y'(a)>0. Доказать, что у y есть нуль на интервале (a,a+π]. Нельзя ссылаться на теорему Штурма без доказательства; нужно провести сравнение напрямую.",
