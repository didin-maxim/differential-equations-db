      "id": "idea-main",
      "title": "Интегральное тождество для вронскиана с sin(x-a)",
      "text": "Если y не зануляется до a+π, то y положительно. Сравнение с z=sin(x-a) превращает q≥1 в знак производной смешанного вронскиана и дает противоречие на правом конце.",
      "status": "ai_checked",
      "standard_idea_ids": [
