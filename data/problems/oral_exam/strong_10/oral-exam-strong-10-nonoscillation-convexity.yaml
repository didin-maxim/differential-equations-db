        "id": "stmt-original",
        "title": "Задача для сильного студента",
        "text": "Пусть a(x) непрерывна и a(x)>=0 на интервале I. Доказать, что ненулевое решение уравнения y''=a(x)y не может иметь две различные точки нуля на I.",
        "source_ids": [
