        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Между соседними нулями знак фиксирован, а выпуклость не того направления",
      "text": "Если взять два соседних нуля, решение между ними не меняет знак. На положительной дуге оно выпукло и не может лежать выше нулевой хорды; на отрицательной дуге аналогично после смены знака.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Предположим, что у ненулевого решения есть два нуля. Тогда среди нулей можно выбрать соседние c<d так, что y не обращается в нуль на (c,d). На этом интервале y имеет постоянный знак. Если y>0 на (c,d), то y''=a(x)y>=0, то есть y выпукла. Выпуклая функция на [c,d] лежит не выше хорды, соединяющей значения на концах; эта хорда равна нулю, значит y(x)<=0 внутри, противоречие с y>0. Если y<0, применяем тот же аргумент к -y: функция -y положительна, а (-y)''=a(x)(-y)>=0, потому что -y>0 и y''=a y. Снова противоречие. Остается только случай, когда нуль не изолирован; тогда есть предельная точка нулей, и по непрерывности y и y' в этой точке равны нулю, после чего единственность линейной задачи Коши дает тождественный ноль. Итак, ненулевое решение имеет не более одного нуля.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument",
        "state_vector_uniqueness"
      ]
    }
  ],
