      "id": "idea-main",
      "title": "Сохранить произведение 1+x^2 и 1+y^2",
      "text": "Логарифмическая производная выражения (1+x^2)(1+y^2) сокращается. Уровни этого интеграла компактны, а поле на ненулевом уровне нигде не обращается в нуль, поэтому движение по каждой компоненте уровня замыкается.",
