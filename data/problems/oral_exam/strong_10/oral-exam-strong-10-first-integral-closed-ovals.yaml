  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Вычислим производную H=(1+x^2)(1+y^2) вдоль решений. Удобнее взять логарифм: d/dt ln H = 2x x'/(1+x^2)+2y y'/(1+y^2)=2xy-2xy=0. Значит H является первым интегралом. Если начальная точка не равна нулю, то C=H>1, и траектория лежит на множестве (1+x^2)(1+y^2)=C. Это множество ограничено и замкнуто, а значит компактно; поэтому решение не может уйти на бесконечность и по стандартной теореме продолжения определено для всех t. На уровне C>1 градиент H не равен нулю одновременно с полем: равновесие системы только (0,0), но оно лежит на уровне C=1. Следовательно уровень C>1 является гладкой замкнутой кривой, а векторное поле нигде на ней не зануляется и всюду направлено по касательной. Выбрав точку на этой кривой, решение движется по ней с непрерывной ненулевой скоростью. Время одного обхода конечно, потому что скорость на компактной кривой имеет положительный минимум. После одного обхода решение возвращается в начальную точку, и по единственности дальнейшее движение периодически повторяется.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral",
        "logarithmic_derivative"
      ]
    }
