  "ideas": [
    {
      "id": "idea-main",
      "title": "Отношение v/u монотонно",
      "text": "У уравнения без первой производной вронскиан постоянен. Поэтому (v/u)'=W(u,v)/u^2 имеет постоянный ненулевой знак, и отношение не может иметь два нуля.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Так как u и v решают одно и то же уравнение y''+p(x)y=0, их вронскиан W=u v'-u' v удовлетворяет W'=u v''-u'' v=u(-p v)-(-p u)v=0. Значит W постоянен. Линейная независимость u и v дает W != 0. Поскольку u не обращается в нуль, функция r=v/u корректно определена на I, и r'=(v'u-vu')/u^2=W/u^2. Знаменатель положителен, а W имеет постоянный ненулевой знак, следовательно r строго монотонна. Нули v совпадают с нулями r, потому что u нигде не равна нулю. Строго монотонная функция не может иметь два различных нуля, поэтому у v на I не более одного нуля.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
