        "title": "Задача для сильного студента",
        "text": "Пусть p(x) непрерывна на интервале I, u - ненулевое решение уравнения y''+p(x)y=0, причем u не обращается в нуль на I. Доказать, что любое решение v, линейно независимое с u, имеет на I не более одного нуля.",
