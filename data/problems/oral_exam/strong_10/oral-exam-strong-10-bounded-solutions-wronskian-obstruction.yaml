        "id": "stmt-original",
        "title": "Задача для сильного студента",
        "text": "Пусть q непрерывна на [0,+infty), а u и v - линейно независимые решения уравнения y''+q(t)y=0. Может ли одновременно выполняться: u и v ограничены на [0,+infty), u'(t)->0 и v'(t)->0 при t->+infty? Дать доказательный ответ.",
        "source_ids": [
          "src-mipt-oral-exam-model-tasks"
        ],
