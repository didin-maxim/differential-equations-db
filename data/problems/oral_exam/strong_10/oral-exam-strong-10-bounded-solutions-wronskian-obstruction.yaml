  "ideas": [
    {
      "id": "idea-main",
      "title": "Предельное поведение конфликтует с постоянным вронскианом",
      "text": "Уравнение без y' сохраняет вронскиан. Если решения ограничены, а их производные стремятся к нулю, то выражение u v'-u' v стремится к нулю, хотя для независимой пары оно постоянно и ненулево.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Нет, такое невозможно. Для двух решений уравнения y''+q(t)y=0 вронскиан W=u v'-u'v постоянен, потому что W'=u v''-u''v=u(-qv)-(-qu)v=0. Линейная независимость u и v означает W != 0. С другой стороны, из ограниченности u и v существуют числа M_u,M_v такие, что |u(t)|<=M_u и |v(t)|<=M_v. Тогда |W|<=M_u|v'(t)|+M_v|u'(t)|. По условию правая часть стремится к нулю при t->+infty, значит W=0. Это противоречит линейной независимости. Следовательно, хотя отдельные ограниченные решения с малой производной возможны, фундаментальная пара не может вести себя так одновременно.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
  ],
