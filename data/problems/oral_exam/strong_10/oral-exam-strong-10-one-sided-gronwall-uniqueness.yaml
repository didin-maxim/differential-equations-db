        "title": "Задача для сильного студента",
        "text": "Пусть f(t,y) непрерывна и на полосе \\(|t-t_0|\\)≤a, \\(|y-y_0|\\)≤b удовлетворяет условию (f(t,u)-f(t,v))(u-v)≤\\(L(u-v)^2\\) для всех u,v из этой полосы. Доказать, что задача Коши y'=f(t,y), \\(y(t_0)=y_0\\) имеет не более одного решения, пока графики решений остаются в полосе. Объяснить, почему это условие слабее обычной липшицевости по y.",
