  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть \\(y_1\\) и \\(y_2\\) - два решения с одним начальным условием на общем промежутке, где они остаются в указанной полосе. Положим \\(w=y_1-y_2\\) и \\(z=w^2\\). Тогда \\(z(t_0)=0\\), а в каждой точке дифференцируемости z имеем \\(z'=2w(f(t,y_1)-f(t,y_2))\\)≤\\(2Lw^2=2Lz\\). Если промежуток рассматривается вправо от \\(t_0\\), то из интегральной формы этого неравенства следует z(t)≤\\(2L\\int_{t_0}^t z(s)\\,ds\\) при L≥0; при L<0 тем более z'≤0 при z≥0 и \\(z(t_0)=0\\). По Гронуоллу z=0, значит \\(y_1=y_2\\). Для левой полуокрестности аргумент повторяется после замены времени s=-t. Условие слабее обычной липшицевости: из |f(t,u)-f(t,v)|≤K|u-v| сразу следует одностороннее условие с L=K, но обратное неверно, потому что требуется контролировать только проекцию разности правых частей на направление u-v.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    }
