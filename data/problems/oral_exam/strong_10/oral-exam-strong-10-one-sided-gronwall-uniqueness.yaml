  "ideas": [
    {
      "id": "idea-main",
      "title": "Оценивать квадрат разности, а не модуль правой части",
      "text": "Обычная липшицевость заменяется дифференциальным неравенством для \\(z=(y_1-y_2)^2\\). После этого неравенство Гронуолла зануляет z при нулевом начальном значении.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
