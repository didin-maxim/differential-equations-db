  "ideas": [
    {
      "id": "idea-main",
      "title": "Площадь параллелограмма решений сохраняется",
      "text": "Формула Лиувилля при нулевом следе дает постоянный определитель фундаментальной матрицы. Две колонки, стремящиеся к нулю, заставили бы площадь стремиться к нулю, что невозможно.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "По формуле Лиувилля W(t)=det X(t) удовлетворяет W'=tr A(t) W. Так как tr A(t)=0, получаем W(t)=W(0) для всех t≥0. По условию W(0) ≠ 0, поэтому определитель фундаментальной матрицы никогда не стремится к нулю. Если бы обе колонки X(t) стремились к нулевому вектору, то все четыре элемента матрицы X(t) стремились бы к нулю, а значит det X(t) тоже стремился бы к нулю. Противоречие. Геометрически след равен мгновенной скорости изменения ориентированной площади: при нулевом следе линейный поток сохраняет площадь параллелограмма, натянутого на два независимых решения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
