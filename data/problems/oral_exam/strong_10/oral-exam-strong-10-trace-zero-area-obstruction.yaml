        "title": "Задача для сильного студента",
        "text": "Пусть A(t) - непрерывная матрица 2 на 2 на [0,+∞), tr A(t)=0, и X(t) - фундаментальная матрица системы x'=A(t)x с det X(0) ≠ 0. Доказать, что не могут обе колонки X(t) стремиться к нулю при t→+∞. Сформулировать геометрический смысл результата.",
        "source_ids": [
          "src-mipt-oral-exam-model-tasks"
        ],
