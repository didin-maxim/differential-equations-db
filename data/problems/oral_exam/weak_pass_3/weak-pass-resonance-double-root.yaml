      "id": "idea-main",
      "title": "Учесть кратность резонанса",
      "text": "Оператор равен (D-1)^2, а e^x уже входит в однородное решение с кратностью два. Поэтому частное решение ищут в виде A x^2 e^x.",
      "status": "ai_checked",
