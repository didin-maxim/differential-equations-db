  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристический многочлен r^2-2r+1=(r-1)^2, поэтому y_h=(C1+C2x)e^x. Правая часть e^x совпадает с однородным решением, причем корень r=1 имеет кратность 2, значит пробный вид нужно умножить на x^2: y_p=A x^2 e^x. Удобно писать y=e^x u. Тогда (D-1)y=e^x u', а (D-1)^2y=e^x u''. Для u=A x^2 получаем u''=2A, значит левая часть равна 2A e^x. Приравнивая к e^x, получаем A=1/2. Ответ: y=(C1+C2x)e^x + (x^2/2)e^x.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "resonance_ansatz"
      ]
    }
