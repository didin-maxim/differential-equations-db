  "ideas": [
    {
      "id": "idea-main",
      "title": "Применить формулу Лиувилля или единственность",
      "text": "Для линейного однородного уравнения второго порядка вронскиан либо нигде не обращается в нуль у фундаментальной пары, либо равен нулю всюду. Нуль в одной точке означает зависимость начальных векторов.",
      "status": "ai_checked",
