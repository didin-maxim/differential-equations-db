        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(y_1\\) и \\(y_2\\) - два решения уравнения \\(y''+p(x)y'+q(x)y=0\\) на интервале \\(I\\), где \\(p\\) и \\(q\\) непрерывны. Если \\(W(y_1,y_2)(x_0)=0\\) в одной точке \\(x_0\\in I\\), могут ли \\(y_1\\) и \\(y_2\\) быть линейно независимыми на \\(I\\)? Обосновать ответ.",
