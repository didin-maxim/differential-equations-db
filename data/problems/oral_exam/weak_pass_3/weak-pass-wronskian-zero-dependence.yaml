        "title": "Формулировка",
        "text": "Пусть y1 и y2 - два решения уравнения y''+p(x)y'+q(x)y=0 на интервале I, где p и q непрерывны. Если W(y1,y2)(x0)=0 в одной точке x0 из I, могут ли y1 и y2 быть линейно независимыми на I? Обосновать ответ.",
