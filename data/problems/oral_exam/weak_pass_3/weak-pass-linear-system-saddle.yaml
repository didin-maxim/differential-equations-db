      "id": "sol-main",
      "title": "Решение",
      "text": "Равновесие находится из -x=0 и 2y=0, то есть это точка (0,0). Система уже диагональна, поэтому x(t)=x0 e^{-t}, y(t)=y0 e^{2t}. Если y0=0, траектория идет к нулю вдоль оси x. Но при любом сколь угодно малом y0 != 0 величина |y(t)|=|y0|e^{2t} со временем становится большой. Значит для любого малого шара вокруг нуля можно выбрать начальную точку внутри него, которая позже выйдет из заданной окрестности. Нулевое равновесие неустойчиво; по фазовому портрету это седло.",
