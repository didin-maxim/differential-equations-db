      "id": "sol-main",
      "title": "Решение",
      "text": "Это линейное уравнение y' + p(x)y = q(x) с p=2. Интегрирующий множитель равен \\(e^{2x}\\). После умножения получаем \\((e^{2x}y)'=e^x\\). Интегрируя, имеем \\(e^{2x}y=e^x+C\\), то есть \\(y=e^{-x}+C e^{-2x}\\). Из y(0)=0 следует 1+C=0, значит C=-1. Ответ: \\(y=e^{-x}-e^{-2x}\\). Разделение переменных напрямую не подходит, потому что \\(y'=e^{-x}-2y\\) не является произведением функции x на функцию y.",
      "status": "ai_checked",
