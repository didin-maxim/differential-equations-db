      "id": "idea-main",
      "title": "Кратный корень не меняет знак",
      "text": "На фазовой прямой важно не только найти нули правой части, но и проверить знак на промежутках. Квадрат \\((y-1)^2\\) не меняет знак при переходе через y=1.",
      "status": "ai_checked",
