  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Равновесия: y=-1 и y=1. На интервале (-∞,-1) множитель y+1 отрицателен, а \\((y-1)^2\\) положителен, значит y'<0. На (-1,1) имеем y'>0. На (1,+∞) снова y'>0. Поэтому около y=-1 стрелки слева направлены влево, а справа вправо: траектории расходятся от -1, это неустойчивое равновесие. Около y=1 стрелки с обеих сторон направлены вправо: слева решения подходят к 1, а справа уходят от 1. Поэтому y=1 устойчиво только с одной стороны и не является устойчивым по Ляпунову равновесием.",
      "status": "ai_checked",
