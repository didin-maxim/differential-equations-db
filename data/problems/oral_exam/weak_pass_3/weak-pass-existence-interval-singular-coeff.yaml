      "id": "idea-main",
      "title": "Сначала посмотреть область определения",
      "text": "Коэффициент 1/(x-1) разрывен при x=1, поэтому интервал задачи Коши, содержащий \\(x_0=0\\), не должен пересекать эту точку. Явная формула не отменяет область исходного уравнения.",
      "status": "ai_checked",
