        "title": "Формулировка",
        "text": "Для задачи Коши y' = y/(x-1), y(0)=2 указать максимальный интервал по x, на котором стандартная теорема для линейного уравнения гарантирует единственное решение. Найти это решение и объяснить, почему точку x=1 нельзя просто включить в ответ.",
