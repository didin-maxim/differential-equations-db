  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Уравнение линейно и имеет коэффициент 1/(x-1), непрерывный на интервалах (-∞,1) и (1,+∞). Начальная точка \\(x_0=0\\) лежит в (-∞,1), значит стандартная теорема дает единственное решение именно на этом максимальном интервале непрерывности коэффициентов. Решение находится разделением или линейной формулой: y'/y = 1/(x-1), поэтому ln|y|=ln|x-1|+C и y=C(x-1). Из y(0)=2 получаем C=-2, то есть y=2(1-x) на (-∞,1). Хотя формула имеет значение 0 при x=1, исходная правая часть y/(x-1) в этой точке не определена, поэтому x=1 не входит в интервал решения данного уравнения.",
      "status": "ai_checked",
