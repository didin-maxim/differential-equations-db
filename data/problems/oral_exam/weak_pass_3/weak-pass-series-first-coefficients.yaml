        "title": "Формулировка",
        "text": "Для решения задачи \\(y''+xy=0\\), \\(y(0)=1\\), \\(y'(0)=0\\) в виде степенного ряда \\(y=\\sum_{n\\ge0} a_n x^n\\) найти коэффициенты \\(a_0,a_1,a_2,a_3,a_4\\). Нужно показать, откуда берется рекурсия.",
