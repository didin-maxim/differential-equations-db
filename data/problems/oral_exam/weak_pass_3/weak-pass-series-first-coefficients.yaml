  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Начальные условия дают a0=y(0)=1 и a1=y'(0)=0. Имеем y''=sum_{n>=0} (n+2)(n+1)a_{n+2}x^n, а xy=sum_{n>=1} a_{n-1}x^n. Из коэффициента при x^0 получаем 2a2=0, значит a2=0. Для n>=1 равенство коэффициентов дает (n+2)(n+1)a_{n+2}+a_{n-1}=0. При n=1: 6a3+a0=0, значит a3=-1/6. При n=2: 12a4+a1=0, значит a4=0. Поэтому первые коэффициенты: a0=1, a1=0, a2=0, a3=-1/6, a4=0.",
      "status": "ai_checked",
