        "title": "Формулировка",
        "text": "Для решения задачи y''+xy=0, y(0)=1, y'(0)=0 в виде степенного ряда y=sum_{n>=0} a_n x^n найти коэффициенты a0, a1, a2, a3, a4. Нужно показать, откуда берется рекурсия.",
