      "id": "sol-main",
      "title": "Решение",
      "text": "Начальные условия дают \\(a_0=y(0)=1\\) и \\(a_1=y'(0)=0\\). Имеем \\(y''=\\sum_{n\\ge0} (n+2)(n+1)a_{n+2}x^n\\), а \\(xy=\\sum_{n\\ge1} a_{n-1}x^n\\). Из коэффициента при \\(x^0\\) получаем \\(2a_2=0\\), значит \\(a_2=0\\). Для \\(n\\ge1\\) равенство коэффициентов дает \\((n+2)(n+1)a_{n+2}+a_{n-1}=0\\). При \\(n=1\\): \\(6a_3+a_0=0\\), значит \\(a_3=-1/6\\). При \\(n=2\\): \\(12a_4+a_1=0\\), значит \\(a_4=0\\). Поэтому первые коэффициенты: \\(a_0=1\\), \\(a_1=0\\), \\(a_2=0\\), \\(a_3=-1/6\\), \\(a_4=0\\).",
      "status": "ai_checked",
