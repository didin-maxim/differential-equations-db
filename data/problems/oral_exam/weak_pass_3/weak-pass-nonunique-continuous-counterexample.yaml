  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Непрерывности мало для единственности",
      "text": "Нужно предъявить правую часть без липшицевости по y в начальной точке. Тогда нулевое решение может сосуществовать с решением, которое некоторое время выходит из равновесия.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Утверждение неверно. Возьмем задачу \\(y'=3|y|^{2/3}\\), \\(y(0)=0\\). Правая часть непрерывна по \\(y\\), но не липшицева около \\(y=0\\). Одно решение - \\(y(x)=0\\). Другое решение задается формулой \\(y(x)=0\\) при \\(x\\le0\\) и \\(y(x)=x^3\\) при \\(x\\ge0\\). Эта функция имеет непрерывную производную: слева и справа в нуле производная равна 0. При \\(x<0\\) обе части уравнения равны 0, при \\(x>0\\) имеем \\(y'=3x^2\\) и \\(3|y|^{2/3}=3|x^3|^{2/3}=3x^2\\). В точке \\(x=0\\) равенство тоже верно. Значит одна и та же задача Коши имеет по крайней мере два локальных решения.",
      "status": "ai_checked"
    }
  ],
