        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Верно ли утверждение: если f(x,y) непрерывна около начальной точки, то задача Коши y'=f(x,y), \\(y(x_0)=y_0\\) имеет единственное локальное решение? Дать короткий контрпример с двумя разными решениями одной задачи Коши.",
        "source_ids": [
          "src-mipt-oral-exam-model-tasks"
        ],
