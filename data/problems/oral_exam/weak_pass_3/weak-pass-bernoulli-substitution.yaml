      "id": "sol-main",
      "title": "Решение",
      "text": "При y(0)=1 решение сначала не равно нулю, поэтому можно делить на \\(y^2\\). Делим уравнение \\(y'-y=xy^2\\) на \\(y^2\\): \\(y'/y^2-1/y=x\\). Положим z=1/y, тогда \\(z'=-y'/y^2\\), и получаем -z' - z = x, то есть z' + z = -x. Умножаем на \\(e^{x}\\): \\((e^x z)'=-x e^x\\). После интегрирования \\(z=1-x+C e^{-x}\\). Из z(0)=1 следует C=0. Поэтому \\(y=1/(1-x)\\) на интервале, где знаменатель не обращается в нуль; максимальный интервал через 0 равен (-∞,1).",
      "status": "ai_checked",
