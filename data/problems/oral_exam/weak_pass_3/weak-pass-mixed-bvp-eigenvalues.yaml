  "ideas": [
    {
      "id": "idea-main",
      "title": "Разобрать знак спектрального параметра",
      "text": "Для постоянных коэффициентов форма решения зависит от знака \\lambda. Нетривиальное решение появляется только при положительном \\lambda и условии зануления косинуса на правом конце.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть \\(\\lambda=\\mu^2>0\\). Тогда y=A cos(\\mu x)+B sin(\\mu x). Условие y'(0)=0 дает B \\mu=0, значит B=0. Условие y(π/2)=0 дает A cos(\\mu π/2)=0. Для нетривиального решения A ≠ 0, поэтому cos(\\mu π/2)=0, то есть \\mu=1,3,5,... и \\(\\lambda=(2k+1)^2\\), k=0,1,2,.... Если \\lambda=0, то y=Ax+B, из y'(0)=A=0 и y(π/2)=B=0 получаем только нулевое решение. Если \\(\\lambda=-\\mu^2<0\\), то y=A cosh(\\mu x)+B sinh(\\mu x); условие y'(0)=B \\mu=0 дает B=0, а y(π/2)=A cosh(\\mu π/2)=0 дает A=0. Значит других собственных значений нет.",
      "status": "ai_checked"
    }
  ],
