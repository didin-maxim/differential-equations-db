        "title": "Формулировка",
        "text": "Найти все значения \\lambda, при которых задача y''+\\lambda y=0, y'(0)=0, y(π/2)=0 имеет нетривиальное решение. В решении отдельно разобрать случаи \\lambda>0, \\lambda=0 и \\lambda<0.",
