  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Здесь M(x,y)=2xy+cos x, N(x,y)=x^2+e^y. Имеем M_y=2x и N_x=2x, значит на всей плоскости форма полная. Ищем F_x=M: интегрируя по x, получаем F=x^2y+sin x+phi(y). Тогда F_y=x^2+phi'(y) должно равняться x^2+e^y, откуда phi'(y)=e^y и phi(y)=e^y. Поэтому потенциал можно взять F=x^2y+sin x+e^y, а общий интеграл имеет вид x^2y+sin x+e^y=C.",
      "status": "ai_checked",
