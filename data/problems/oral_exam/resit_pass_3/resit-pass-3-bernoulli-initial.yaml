      "id": "sol-main",
      "title": "Решение",
      "text": "Так как y(0)=1/2, решение не равно нулю около 0. Делим на \\(y^2\\) и кладем z=1/y. Тогда \\(y'/y^2+1/y=1\\), то есть -z'+z=1, или z'-z=-1. Решаем линейное уравнение: \\(z=1+C e^x\\). Из z(0)=2 получаем C=1. Поэтому \\(y=1/(1+e^x)\\).",
      "status": "ai_checked",
