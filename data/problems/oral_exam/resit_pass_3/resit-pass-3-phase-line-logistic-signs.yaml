      "title": "Решение",
      "text": "Равновесия задаются y(1-y)=0, то есть y=0 и y=1. При y<0 правая часть отрицательна, на (0,1) положительна, при y>1 отрицательна. Поэтому стрелки направлены от 0 и к 1: равновесие y=0 неустойчиво, а y=1 устойчиво. Если y(0)=2, решение убывает и, не пересекая равновесие y=1, стремится к 1 при t → +∞.",
