      "id": "sol-main",
      "title": "Решение",
      "text": "Здесь p(x)=1, поэтому интегрирующий множитель равен \\(e^{x}\\). После умножения получаем (\\(e^{x}\\) y)'=\\(e^{2x}\\). Интегрируем: \\(e^{x}\\) y=\\(e^{2x}\\)/2+C, значит y=\\(e^{x/2+Ce}\\)^{-x}. Условие y(0)=0 дает 1/2+C=0, то есть C=-1/2. Ответ: y=(\\(e^{x-}\\)\\(e^{-x}\\))/2.",
