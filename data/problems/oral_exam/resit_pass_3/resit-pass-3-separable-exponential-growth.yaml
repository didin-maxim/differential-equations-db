      "title": "Решение",
      "text": "Так как y(0)=2, искомое решение не равно нулю около 0. Делим на y: y'/y=x. Интегрируя, получаем ln|y|=x^2/2+C. Значит y=C\\(e^{x^2/2}\\). Из y(0)=2 следует C=2. Ответ: y=2\\(e^{x^2/2}\\).",
