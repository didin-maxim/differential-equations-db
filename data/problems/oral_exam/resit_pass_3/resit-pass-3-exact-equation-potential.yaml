      "title": "Решение",
      "text": "Здесь M=2x+y, N=x+2y. Имеем M_y=1 и N_x=1, значит форма полная. Интегрируем M по x: F=x^2+xy+phi(y). Тогда F_y=x+phi'(y) должно равняться x+2y, поэтому phi'(y)=2y и phi(y)=y^2. Ответ в неявном виде: x^2+xy+y^2=C.",
