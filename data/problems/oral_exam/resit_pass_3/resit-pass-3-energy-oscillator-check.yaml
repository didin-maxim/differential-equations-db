      "text": "Дифференцируем E по t: E'=x'x''+xx'=x'(x''+x). На решениях x''+x=0, поэтому E'=0. Значит E постоянно вдоль каждого решения. При x(0)=1 и x'(0)=0 получаем E(0)=0^2/2+1^2/2=1/2, значит E(t)=1/2 для всех t.",
