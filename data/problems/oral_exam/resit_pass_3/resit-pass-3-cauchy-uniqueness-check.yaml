      "id": "sol-main",
      "title": "Решение",
      "text": "Функция \\(f(y)=\\sqrt{|y|}\\) непрерывна, но не удовлетворяет условию Липшица по \\(y\\) около 0: отношение \\(|\\sqrt{h}-0|/|h|=1/\\sqrt{h}\\) не ограничено при \\(h\\to0+\\). Поэтому теорема Пикара-Линделефа о единственности не применяется. Одно решение: \\(y(t)=0\\). Второе решение при \\(t\\ge0\\): \\(y(t)=t^2/4\\), потому что \\(y'=t/2\\) и \\(\\sqrt y=t/2\\). Продолжая его нулем при \\(t\\le0\\), получаем решение в окрестности нуля.",
      "status": "ai_checked",
      "standard_idea_ids": [
