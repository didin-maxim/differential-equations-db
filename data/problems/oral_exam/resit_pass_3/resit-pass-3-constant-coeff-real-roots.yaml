      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристическое уравнение r^2-1=0 имеет корни r=1 и r=-1. Поэтому y=C1e^x+C2e^{-x}. Из y(0)=0 получаем C1+C2=0. Производная y'=C1e^x-C2e^{-x}, и условие y'(0)=1 дает C1-C2=1. Отсюда C1=1/2, C2=-1/2. Ответ: y=(e^x-e^{-x})/2.",
      "status": "ai_checked",
