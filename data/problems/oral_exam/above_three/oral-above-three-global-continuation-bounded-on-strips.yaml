  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Правая часть гладкая по y и непрерывна по t, поэтому локальное решение единственно. Рассмотрим любой конечный отрезок [a,b]. На нем |y'|<=1+b_*^2, где b_*=max(|a|,|b|), потому что |sin y|<=1. Значит пока решение существует внутри [a,b], его значения удовлетворяют |y(t)-y(t0)|<=(1+b_*^2)|t-t0|. Поэтому граф решения на любом конечном подотрезке остается в ограниченной полосе и не может покинуть все компакты за конечное время. По критерию продолжения максимальное решение не имеет конечного правого или левого конца. Следовательно оно определено на всей R.",
