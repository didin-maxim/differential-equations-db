  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пишем y=xv(x), тогда y'=v+xv'. Правая часть равна 1/v+v. Получаем v+xv'=v+1/v, значит xv'=1/v. Умножая на v и разделяя переменные, имеем v dv=dx/x. Поэтому v^2/2=ln x+C на x>0. Возвращаясь к y, получаем y^2/x^2=2 ln x+C1, то есть y=±x sqrt(C1+2 ln x) на тех промежутках, где выражение под корнем положительно; также знак фиксируется на каждом промежутке решения, потому что исходное уравнение не определено при y=0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "separate_variables"
      ]
    }
