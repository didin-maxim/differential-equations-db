      "id": "idea-liouville-area",
      "title": "Площадь равна модулю определителя",
      "text": "Формула Лиувилля говорит, что определитель фундаментальной матрицы умножается на exp integral tr A.",
      "status": "ai_checked",
      "standard_idea_ids": [
