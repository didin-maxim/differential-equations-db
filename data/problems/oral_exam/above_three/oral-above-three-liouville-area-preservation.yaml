  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Поместим два решения в столбцы матрицы Z(t). Тогда Z'=A(t)Z, а площадь соответствующего ориентированного параллелограмма равна det Z(t), с точностью до знака для обычной площади. По формуле Лиувилля (det Z)'=tr A(t) det Z. Так как tr A(t)=0, получаем det Z(t)=det Z(t_0). Следовательно обычная площадь сохраняется: S(t)=S0. Если начальные решения зависимы, то S0=0 и утверждение также означает, что зависимость сохраняется.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
