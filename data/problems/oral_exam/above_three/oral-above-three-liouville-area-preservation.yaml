        "title": "Формулировка",
        "text": "Для системы x'=A(t)x в R^2 известно, что tr A(t)=0. Два решения в момент t_0 образуют параллелограмм площади S0. Что можно сказать о площади соответствующего параллелограмма в момент t?",
