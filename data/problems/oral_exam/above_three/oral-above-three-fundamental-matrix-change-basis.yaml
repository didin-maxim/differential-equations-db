        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть X(t) - фундаментальная матрица системы x'=A(t)x и X(t0)=I. Если Y(t) - другая фундаментальная матрица той же системы, выразить Y(t) через X(t) и Y(t0). Объяснить, что это значит для решения с начальным условием x(t0)=v.",
