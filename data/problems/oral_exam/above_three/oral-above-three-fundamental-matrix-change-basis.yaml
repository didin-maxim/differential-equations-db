  "ideas": [
    {
      "id": "idea-basis",
      "title": "Фундаментальная матрица задает базис решений",
      "text": "Две фундаментальные матрицы отличаются постоянной невырожденной матрицей, то есть выбором базиса в пространстве решений.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Каждый столбец Y является решением системы, а столбцы X образуют базис пространства решений. Поэтому Y(t)=X(t)C с постоянной матрицей C. Подставляя t=t0 и используя X(t0)=I, получаем C=Y(t0), значит Y(t)=X(t)Y(t0). Для задачи Коши x(t0)=v решение равно x(t)=X(t)v: нормированная фундаментальная матрица переносит начальный вектор из момента t0 в момент t. Если вместо X дана ненормированная матрица Y, то x(t)=Y(t)Y(t0)^{-1}v.",
      "status": "ai_checked"
    }
  ],
