  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим y=xv(x). Тогда y'=v+xv', y''=2v'+xv''. Подстановка дает x^2(2v'+xv'')-2x(v+xv')+2xv=x^3v''. Следовательно v''=0, откуда v=C1+C2x. Поэтому y=C1x+C2x^2. Два решения x и x^2 линейно независимы на x>0, поскольку их вронскиан равен x^2, так что найдено все общее решение.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
  ],
