  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Одно решение задается формулой y0(t)=0. Для любого a>=0 зададим ya(t)=0 при t<=a и ya(t)=(t-a)^3 при t>=a. При t>a имеем ya'=3(t-a)^2, а 3|ya|^{2/3}=3|(t-a)^3|^{2/3}=3(t-a)^2. При t<a обе части равны нулю. В точке t=a производная слева и справа равна 0, так что функция действительно является решением. В частности, при a=0 получаем y=t^3 для t>=0, отличное от нулевого решения и удовлетворяющее y(0)=0. Теорема Пикара-Линделёфа не применяется, потому что f(y)=3|y|^{2/3} не является липшицевой по y около нуля: отношение |f(y)-f(0)|/|y-0|=3|y|^{-1/3} неограниченно.",
      "status": "ai_checked"
    }
  ],
