  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Равновесия задаются y^2(1-y)=0, то есть y=0 и y=1. При y<0 правая часть положительна, при 0<y<1 тоже положительна, а при y>1 отрицательна. Значит слева от 0 стрелки направлены к 0, а справа от 0 - от 0 к 1. Поэтому y=0 устойчиво только с левой стороны и не является устойчивым по Ляпунову в обычном двухстороннем смысле. В точке y=1 стрелки направлены к равновесию с обеих сторон, значит это асимптотически устойчивое равновесие.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "phase_line_signs"
      ]
    }
