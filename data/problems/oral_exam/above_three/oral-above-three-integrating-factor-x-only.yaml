  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Здесь M=2xy+y, N=x^2. Имеем M_y=2x+1 и N_x=2x, поэтому (M_y-N_x)/N=1/x^2 зависит только от x. Значит можно взять mu(x)=exp(integral x^{-2}dx)=exp(-1/x). После умножения получаем точную форму. Потенциал удобно восстанавливать из F_y=mu N=e^{-1/x}x^2: отсюда F=e^{-1/x}x^2y+phi(x). Тогда F_x=e^{-1/x}(2x+1)y+phi'(x), что совпадает с mu M при phi'=0. Поэтому общий интеграл задается равенством x^2 y e^{-1/x}=C на промежутках, где x не обращается в нуль.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "find_potential"
      ]
    }
