  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Так как X'=AX, имеем A=X'X^{-1}. Здесь X(t)=e^t(I+tN), где N=[[0,1],[0,0]] и N^2=0. Тогда X'=e^t(I+tN)+e^tN=e^t(I+N+tN), а X^{-1}=e^{-t}(I-tN). Поэтому A=(I+N+tN)(I-tN)=I+N, поскольку N^2=0 и члены с tN сокращаются. Значит A=[[1,1],[0,1]]. Это та же жорданова клетка, для которой exp(At)=e^t(I+tN).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
