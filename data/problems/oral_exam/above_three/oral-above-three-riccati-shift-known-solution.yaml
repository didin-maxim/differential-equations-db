    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Функция y0=x действительно является решением, потому что y0'=1 и (y0-x)^2+1=1. Положим y=x+1/u. Тогда y'=1-u'/u^2, а правая часть равна 1+1/u^2. После сокращения единиц получаем -u'=1, то есть u=C-x. Поэтому все решения, отличные от y=x на рассматриваемом промежутке, имеют вид y=x+1/(C-x). Отдельно сохраняется частное решение y=x, которое не получается при конечном u.",
      "status": "ai_checked",
      "standard_idea_ids": [
