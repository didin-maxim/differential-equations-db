  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнивать удобнее обратные величины",
      "text": "Положительность y позволяет дифференцировать 1/y. Неравенство y' <= y^2 превращается в линейную нижнюю оценку для 1/y.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Так как y>0, можно рассмотреть z=1/y. Тогда z'=-y'/y^2. Из y'<=y^2 следует z'>=-1. Интегрируя от 0 до t, получаем z(t)>=z(0)-t=2-t. При t<2 правая часть положительна, поэтому 1/y(t)>=2-t и, значит, y(t)<=1/(2-t). Это ровно сравнение с решением u'=u^2, u(0)=1/2, для которого u(t)=1/(2-t).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
