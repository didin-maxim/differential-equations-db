        "id": "stmt-original",
        "title": "Устная задача",
        "text": "Пусть y(t)>0 на [0,T] и y'(t) <= y(t)^2, y(0)=1/2. Доказать, что при 0 <= t < min(T,2) выполнено y(t) <= 1/(2-t).",
