  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из второго уравнения y'=y и y(0)=1 получаем \\(y=e^t\\). Тогда первое уравнение имеет вид \\(x'-x=e^t\\). Умножая на \\(e^{-t}\\), получаем \\((x e^{-t})'=1\\). Значит \\(x e^{-t}=t+C\\), а из x(0)=0 следует C=0. Поэтому \\(x=t e^t\\), \\(y=e^t\\). Матрица системы равна [[1,1],[0,1]], это жорданова клетка с собственным значением 1, и именно ее нильпотентная часть порождает множитель t.",
      "status": "ai_checked",
