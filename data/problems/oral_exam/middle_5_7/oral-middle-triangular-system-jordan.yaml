      "title": "Сначала нижняя строка, затем линейное уравнение для верхней",
      "text": "Треугольная система решается последовательно. Совпадающие собственные значения и ненулевой внедиагональный элемент дают множитель \\(t e^t\\).",
      "status": "ai_checked",
