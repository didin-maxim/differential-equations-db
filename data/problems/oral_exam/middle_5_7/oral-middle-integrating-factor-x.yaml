  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Здесь M=xy^2+1, N=y. Имеем M_y=2xy и N_x=0, поэтому (M_y-N_x)/N=2x зависит только от x. Значит можно взять μ(x)=exp(∫2x dx)=e^(x^2). После умножения получаем форму e^(x^2)(xy^2+1) dx + e^(x^2)y dy. Ищем потенциал F. Из F_y=e^(x^2)y следует F=(1/2)e^(x^2)y^2+φ(x). Тогда F_x=xe^(x^2)y^2+φ'(x), и сравнение с e^(x^2)(xy^2+1) дает φ'(x)=e^(x^2). Поэтому общий интеграл: (1/2)e^(x^2)y^2 + int_0^x e^(s^2) ds = C.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "find_potential"
      ]
    }
