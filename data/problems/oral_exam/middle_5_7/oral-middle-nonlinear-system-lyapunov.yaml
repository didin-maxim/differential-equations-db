  "ideas": [
    {
      "id": "idea-main",
      "title": "Квадратичная функция Ляпунова поглощает малые нелинейные члены",
      "text": "Для V=x^2+y^2 линейная часть дает строго отрицательную производную, а смешанные члены третьего порядка малы в достаточно малой окрестности нуля.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Возьмем V=x^2+y^2. Тогда вдоль решений V'=2x(-x+y^2)+2y(-2y+xy)=-2x^2-4y^2+4xy^2. В области |x|<=1/4 имеем |4xy^2|<=y^2, поэтому V'<=-2x^2-3y^2<0 вне нуля. Значит в достаточно малой окрестности функция V строго убывает вдоль ненулевых траекторий. Отсюда нулевое решение локально устойчиво и даже локально асимптотически устойчиво.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
