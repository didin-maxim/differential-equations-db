    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Решение y=0 подходит. На промежутке, где y не обращается в нуль, положим z=y^(-2). Делим уравнение на y^3: y'/y^3 + (1/x)y^(-2)=x. Так как z'=-2y'/y^3, получаем z' - (2/x)z = -2x. Интегрирующий множитель равен x^(-2), поэтому (z x^(-2))'=-2/x. Значит z/x^2=C-2 ln x, то есть z=x^2(C-2 ln x). Возвращаясь к y, получаем y=±1/(x sqrt(C-2 ln x)) на тех промежутках, где выражение под корнем положительно, а также отдельное решение y=0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
