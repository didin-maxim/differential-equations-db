  "ideas": [
    {
      "id": "idea-main",
      "title": "Кратный корень не меняет знак правой части",
      "text": "Знак y(y-1)^2 совпадает со знаком y вне точки y=1. Поэтому около y=1 стрелки направлены в одну сторону, а не к равновесию с двух сторон.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "phase_line_signs"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Равновесия задаются нулями правой части: y=0 и y=1. На интервале (-infty,0) имеем y'<0, на (0,1) имеем y'>0, на (1,infty) снова y'>0. Значит около y=0 стрелки слева уходят от нуля, а справа уходят вправо от нуля; равновесие y=0 неустойчиво. Около y=1 слева стрелки направлены к 1, а справа направлены от 1. Поэтому y=1 устойчиво только с левой стороны и не является устойчивым по Ляпунову: начальное значение чуть больше 1 сразу уходит вправо от равновесия.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "phase_line_signs"
      ]
    }
