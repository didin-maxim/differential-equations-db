  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Проверка: (1/x)'=-1/x^2, а (1/x)^2-2/x^2=-1/x^2. Положим y=1/x+1/u. Тогда y'=-1/x^2-u'/u^2, а правая часть равна (1/x+1/u)^2-2/x^2=-1/x^2+2/(xu)+1/u^2. После сокращения -1/x^2 и умножения на u^2 получаем -u'=2u/x+1, то есть u'+(2/x)u=-1. Умножаем на x^2: (x^2u)'=-x^2. Поэтому x^2u=C-x^3/3, u=C/x^2-x/3. Итак, y=1/x+1/(C/x^2-x/3) на промежутках, где знаменатель не нулевой. Отдельное частное решение y=1/x также остается в ответе.",
