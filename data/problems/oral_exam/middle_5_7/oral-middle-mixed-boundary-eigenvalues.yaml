      "id": "idea-main",
      "title": "Увидеть резонанс и проверить условие разрешимости",
      "text": "Однородная задача y''+y=0 с теми же краевыми условиями имеет ненулевое решение cos x. Для самосопряженного оператора правая часть должна быть ортогональна ядру; здесь интеграл от cos x на [0,π/2] не равен нулю.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "series_recursion"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Предположим, что решение y существует. Умножим уравнение y''+y=1 на cos x и проинтегрируем по [0,π/2]. Слева интегрированием по частям получаем ∫(y''+y)cos x dx = [y' cos x + y sin x]_0^{π/2}. При краевых условиях y'(0)=0 и y(π/2)=0 эта граничная часть равна 0. Справа же ∫_0^{π/2} cos x dx = 1. Противоречие. Однородная задача имеет решение cos x, поэтому это ровно резонанс: правая часть не ортогональна собственному решению.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "series_recursion"
      ]
    }
