        "integrating_factor_linear"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Умножим уравнение на e^(-2x). Тогда (e^(-2x)y)'=1. Интегрируя, получаем e^(-2x)y=x+C, то есть y=e^(2x)(x+C). Из условия y(0)=0 следует C=0. Поэтому y=x e^(2x). Множитель x появляется потому, что правая часть e^(2x) имеет тот же экспоненциальный множитель, что и однородное решение; после снятия этого множителя остается постоянная правая часть.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
