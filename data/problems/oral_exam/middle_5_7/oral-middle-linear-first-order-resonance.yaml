      "id": "idea-main",
      "title": "Интегрирующий множитель убирает однородный рост",
      "text": "Умножение на e^(-2x) превращает левую часть в производную e^(-2x)y. Правая часть после этого становится единицей, поэтому интегрирование дает линейный множитель x.",
      "status": "ai_checked",
