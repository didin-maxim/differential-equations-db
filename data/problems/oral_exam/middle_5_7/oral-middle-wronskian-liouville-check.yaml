  "ideas": [
    {
      "id": "idea-main",
      "title": "Формула Лиувилля следит только за коэффициентом при y'",
      "text": "Для уравнения y''+p(x)y'+q(x)y=0 вронскиан удовлетворяет W'=-p(x)W. Поэтому конкретный вид q(x) не нужен.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Здесь p(x)=2x, поэтому по формуле Лиувилля W'=-2xW. Отсюда (ln |W|)'=-2x на промежутках, где W не обращается в нуль, и с учетом W(0)=2 получаем \\(W(x)=2e^{-x^2}\\). В частности W(1)=2/e, это не нуль. Значит при x=1 значения и производные решений не дают нулевого вронскиана, и сами решения не могут стать линейно зависимыми.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
