        "id": "stmt-original",
        "title": "Устная задача",
        "text": "Две функции \\(y_1,y_2\\) являются решениями уравнения y''+2x y'+q(x)y=0 на всей прямой, причем их вронскиан W(0)=2. Найти W(x) и решить, могут ли эти решения стать линейно зависимыми при x=1.",
