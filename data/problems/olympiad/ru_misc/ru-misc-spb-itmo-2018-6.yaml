  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Обозначим \\(E(x) = y(x)^2 + y'(x)^2.\\)Умножая уравнение на \\(2y',\\) получаем\\(2y'y'' + 2(2x + \\cos x)y'^2 + 2yy' = 0,\\)то есть\\(E'(x) = -2(2x + \\cos x)y'(x)^2.\\)Для \\(x \\ge 0\\) коэффициент \\(2x + \\cos x\\) положителен: функция \\(2x + \\cos x\\) возрастает на \\([0,+\\infty),\\) потому что ее производная \\(2 - \\sin x \\ge 1,\\) и в нуле равна 1. Следовательно \\(E'(x) \\le 0\\) при \\(x \\ge 0,\\) и \\(E(x) \\le E(0)\\) на правой полуоси. Для \\(x \\le -1\\) имеем \\(2x + \\cos x \\le 2x + 1 \\le -1,\\) значит \\(E'(x) \\ge 0.\\) Поэтому при движении слева направо энергия возрастает на \\((-\\infty,-1],\\) а значит для \\(x \\le -1\\) выполнено \\(E(x) \\le E(-1).\\) На компактном отрезке [-1,0] функция E непрерывна и потому ограничена. Итак, E ограничена на всей прямой. Отсюда |y(x)| \\(\\le \\sqrt{E(x)},\\) значит y ограничена.",
      "status": "ai_checked"
    }
  ],
