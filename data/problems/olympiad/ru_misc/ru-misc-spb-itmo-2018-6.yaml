      "id": "idea-main",
      "title": "Построить энергию\\(y^2 + (y')^2\\)",
      "text": "Умножение на \\(2y'\\) дает производную энергии. Коэффициент при\\((y')^2\\)имеет нужный знак на правом хвосте и противоположный знак на левом хвосте, поэтому энергия не может расти к бесконечностям.",
      "status": "ai_checked",
      "standard_idea_ids": [
