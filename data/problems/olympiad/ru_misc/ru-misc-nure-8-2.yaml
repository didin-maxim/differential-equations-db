  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Пусть y - решение на R. Так как y' = 1/(1 + x^2 + y^2) > 0, функция y монотонно возрастает. Кроме того, для всех x выполнено 0 < y'(x) ≤ 1/(1 + x^2). Если x ≥ 0, то 0 ≤ y(x) - y(0) = \\(\\int_0^x\\) y'(t) dt ≤ \\(\\int_0^x\\) dt/(1 + t^2) ≤ π/2. Если x ≤ 0, то 0 ≤ y(0) - y(x) = \\(\\int_x^0\\) y'(t) dt ≤ \\(\\int_x^0\\) dt/(1 + t^2) ≤ π/2. Значит y(0) - π/2 ≤ y(x) ≤ y(0) + π/2 для всех x, и решение ограничено.",
      "status": "ai_checked"
    }
  ],
