  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Так как cos x ≥ -1, знаменатель 4 + t^4 + cos x не меньше 3 + t^4, а значит 0 < dx/dt ≤ 1/(1 + t^4). Для любых t_1 < t_2 по формуле Ньютона-Лейбница получаем \\(0 ≤ x(t_2) - x(t_1) = \\int_{t_1}^{t_2} x'(t)\\,dt ≤ \\int_{t_1}^{t_2} dt/(1 + t^4) ≤ \\int_{-∞}^{+∞} dt/(1 + t^4)\\). Последний интеграл сходится, поэтому любые два значения решения отличаются не более чем на одну и ту же конечную константу. Следовательно множество значений x(t) имеет конечный диаметр, и решение ограничено.",
      "status": "ai_checked"
    }
  ],
