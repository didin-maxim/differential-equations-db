  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Вычислим интеграл по переменной t. При u = \\(e^{t}\\) получаем du = \\(e^{t}\\) dt и integral \\(e^{t/}\\)(1 + 2\\(e^{t}\\)) dt = (1/2) ln(1 + 2\\(e^{t}\\)). Поэтому (1/2) ln((1 + 2\\(e^{y'(x)}\\))/3) = (1/2) ln x. Так как рассматривается решение около x = 1, имеем x > 0, и отсюда 1 + 2\\(e^{y'}\\) = 3x. Следовательно \\(e^{y'}\\) = (3x - 1)/2 и y'(x) = ln((3x - 1)/2), где x > 1/3 на интервале решения, содержащем точку 1. Интегрируя, получаем y(x) = ((3x - 1)/3)(ln((3x - 1)/2) - 1) + C. При x = 1 первое слагаемое равно -2/3, поэтому из условия y(1) = -2/3 следует C = 0. Ответ: y(x) = ((3x - 1)/3)(ln((3x - 1)/2) - 1) на x > 1/3.",
      "status": "ai_checked"
    }
  ],
