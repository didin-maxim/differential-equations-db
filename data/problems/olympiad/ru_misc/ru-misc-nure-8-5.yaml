  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Предположим, что решение существует на всем (0,3) и соответствует начальному условию y(0) = 0. Для x > 0 имеем y'(x) = y(x)^2 + x > 0, поэтому y(x) > 0. Положим z(x) = arctan y(x). Тогда 0 < z(x) < pi/2 и z' = y'/(1 + y^2) = (y^2 + x)/(1 + y^2). Так как y = tan z, получаем z' = sin^2 z + x cos^2 z. При x >= 1 отсюда z' >= sin^2 z + cos^2 z = 1. Поэтому для любого x из [1,3) выполнено z(x) >= z(1) + x - 1 > x - 1. Берем, например, x = 2.9. Тогда z(2.9) > 1.9 > pi/2, что противоречит неравенству z < pi/2. Следовательно такого решения на всем интервале (0,3) не существует.",
      "status": "ai_checked"
    }
  ],
