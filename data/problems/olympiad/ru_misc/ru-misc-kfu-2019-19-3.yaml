      "id": "idea-main",
      "title": "Дифференцировать отраженное условие",
      "text": "Условие с аргументом -x повышает гладкость функции: правая часть f(-x) уже C^1. После дифференцирования получается линейное уравнение f'' + f = 0, а исходное условие отбирает одну фазу.",
