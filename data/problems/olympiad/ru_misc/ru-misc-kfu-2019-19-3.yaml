  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из f'(x) = f(-x) следует, что f' является C^1-функцией, значит f дважды дифференцируема. Дифференцируя равенство, получаем f''(x) = -f'(-x). Подставляя исходное условие в точке -x, имеем f'(-x) = f(x), поэтому f''(x) = -f(x). Следовательно f(x) = A cos x + B sin x. Теперь используем исходное условие: f'(x) = -A sin x + B cos x, а f(-x) = A cos x - B sin x. Сравнение коэффициентов при sin x и cos x дает B = A. Так как f не тождественно нулевая, A != 0, и f(x) = A(cos x + sin x) = sqrt(2) A sin(x + pi/4). Поэтому все нули имеют вид x = pi n - pi/4, где n - любое целое число.",
      "status": "ai_checked"
    }
  ],
