  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Запишем уравнение как \\((D - 1)^2 y = e^{-\\)|x|}\\). При x > 0 имеем правую часть \\(e^{-x}.\\) Частное решение ищем в виде \\(Ae^{-x}\\); тогда \\((D - 1)^2(Ae^{-x}) = 4Ae^{-x},\\) значит \\(A = 1/4.\\) Общее решение на x > 0 равно \\(e^{-x}/4 + (C1 + C2 x)e^{x}.\\) Ограниченность при \\(x \\to +\\infty\\) требует \\(C1 = C2 = 0,\\) поэтому \\(y = e^{-x}/4\\) на правой полуоси. При x < 0 правая часть равна \\(e^{x}.\\) Для \\(y = e^{x} u(x)\\) оператор\\((D - 1)^2\\)дает \\(e^{x}u''(x),\\) поэтому можно взять\\(u = x^2/2.\\)Общее решение слева имеет вид \\(y = e^{x}(A + Bx + x^2/2).\\) Из непрерывности y в нуле получаем \\(A = 1/4.\\) Производная слева равна \\(e^{x}(A + Bx + x^2/2 + B + x),\\) поэтому \\(y'(0-) = A + B.\\) Справа \\(y'(0+) = -1/4,\\) следовательно \\(B = -1/2.\\) Искомое решение: \\(y(x) = e^{x}(1/4 - x/2 + x^2/2)\\) при \\(x \\le 0\\) и \\(y(x) = e^{-x}/4\\) при \\(x \\ge 0.\\) Прямая подстановка на каждой полуоси и совпадение \\(y, y'\\) в нуле завершают проверку.",
      "status": "ai_checked"
    }
  ],
