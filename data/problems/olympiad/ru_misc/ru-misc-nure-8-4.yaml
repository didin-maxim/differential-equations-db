  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Так как \\((y' - xy)' = y'' - y - xy',\\) исходное уравнение равносильно \\((y' - xy)' = 0.\\) Значит \\(y' - xy = C1.\\) Это линейное уравнение первого порядка. Умножим его на \\(e^{-x^2/2}\\): \\((y e^{-x^2/2})' = C1 e^{-x^2/2}.\\) Интегрируя от 0 до x, получаем \\(y(x)e^{-x^2/2} = C1 \\int_0^x e^{-t^2/2}\\,dt + C2.\\) Поэтому общее решение имеет вид \\(y(x) = e^{x^2/2}(C2 + C1 \\int_0^x e^{-t^2/2}\\,dt).\\) Здесь C1 и C2 - произвольные вещественные константы.",
      "status": "ai_checked"
    }
  ],
