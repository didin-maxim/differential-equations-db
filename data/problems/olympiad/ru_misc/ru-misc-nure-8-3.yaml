  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Работаем на интервале, где p и q достаточно гладкие, а искомые решения линейно независимы. Если y1(x0) = 0, то y2 = y1^2 имеет в x0 нулевые значение и производную, а значит для линейного уравнения y2 было бы тождественно нулевым; это невозможно. Поэтому y1 не обращается в нуль. Обозначим r = y1'/y1. Подстановка y1 в уравнение дает r' + r^2 + pr + q = 0. Подстановка y1^2 дает 2r' + 4r^2 + 2pr + q = 0. Вычитая удвоенное первое равенство из второго, получаем 2r^2 - q = 0, то есть q = 2r^2. Линейная независимость y1 и y1^2 требует r != 0, поэтому q > 0. Из первого равенства следует r' + 3r^2 + pr = 0. Беря ветвь r = sqrt(q/2) или r = -sqrt(q/2), получаем условие p = -r'/r - 3r. Эквивалентно, для выбранного знака должно выполняться q' + 2pq + 6qr = 0, где r^2 = q/2. В частности для ветви r = sqrt(q/2) это q' + 2pq + 3sqrt(2) q^{3/2} = 0; для противоположной ветви знак последнего слагаемого меняется. Обратно, если q > 0 и для одной из ветвей r = ±sqrt(q/2) выполнено r' + 3r^2 + pr = 0, то y1 = exp(integral r dx) и y2 = y1^2 = exp(integral 2r dx) удовлетворяют исходному уравнению. Их отношение y2/y1 = y1 непостоянно, так как r != 0, значит решения линейно независимы.",
      "status": "ai_checked"
    }
  ],
