      "id": "idea-main",
      "title": "Исключить логарифмическую производную",
      "text": "Если y и y^2 являются решениями, то вычитание двух подстановок дает связь между q и r = y'/y. Затем исходное уравнение выражает p через r и r', что дает условие на p и q.",
