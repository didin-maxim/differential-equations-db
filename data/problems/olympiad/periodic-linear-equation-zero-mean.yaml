        "title": "Формулировка",
        "text": "Пусть p(t) непрерывна и T-периодична, а \\(\\int_0^T\\) p(t)dt=0. Найти условие на q(t), при котором y'+p(t)y=q(t) имеет T-периодическое решение.",
