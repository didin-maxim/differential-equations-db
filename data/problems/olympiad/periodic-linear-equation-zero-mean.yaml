  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть μ(t)=\\(e^{∫_0^t p}\\). Из условия μ(T)=1. Тогда (μy)'=μq. Для T-периодического y необходимо μ(T)y(T)-μ(0)y(0)=\\(\\int_0^T\\) μq dt, левая часть равна нулю. Значит необходимо \\(\\int_0^T\\) μ(t)q(t)dt=0. Если это выполнено, выбираем произвольное y(0); формула на один период дает y(T)=y(0), а затем решение продолжается периодически.",
      "status": "ai_checked"
    }
  ],
