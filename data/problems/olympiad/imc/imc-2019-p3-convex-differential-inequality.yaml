        "title": "Формулировка",
        "text": "Пусть f:(-1,1)→R дважды дифференцируема и для всех x∈(-1,1) выполнено 2f'(x)+x f''(x)≥1. Докажите, что \\(\\(\\int_(-1)^1\\)\\) x f(x) dx ≥ 1/3.",
