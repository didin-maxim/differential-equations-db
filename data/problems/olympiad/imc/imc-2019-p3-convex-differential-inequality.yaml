  "ideas": [
    {
      "id": "idea-main",
      "title": "Узнать вторую производную выпуклой функции",
      "text": "Неравенство становится условием g''≥0 для g(x)=x f(x)-x^2/2. Выпуклая функция лежит выше касательной, а линейный член исчезает при интегрировании по симметричному отрезку.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function",
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим g(x)=x f(x)-x^2/2. Тогда g''(x)=2f'(x)+x f''(x)-1≥0, поэтому g выпукла на (-1,1). Для выпуклой дифференцируемой функции производная монотонна, значит g(x)≥g(0)+g'(0)x для всех x∈(-1,1): при x>0 это следует из интегрирования неравенства g'(t)≥g'(0), а при x<0 - из g'(t)≤g'(0) на [x,0]. Здесь g(0)=0, поэтому g(x)≥g'(0)x. Следовательно x f(x)=g(x)+x^2/2≥g'(0)x+x^2/2. Интегрируя от -1 до 1, получаем \\(\\(\\int_(-1)^1\\)\\) x f(x) dx ≥ g'(0)\\(\\(\\int_(-1)^1\\)\\) x dx + (1/2)\\(\\(\\int_(-1)^1\\)\\) x^2 dx = 0 + 1/3.",
      "status": "ai_checked"
    }
  ],
