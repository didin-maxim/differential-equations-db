        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть n∈N, а вещественная функция f имеет n+1 производных в каждой точке R. Докажите, что для любых a<b, для которых ln((f(b)+f'(b)+...+f^(n)(b))/(f(a)+f'(a)+...+f^(n)(a)))=b-a, существует точка c∈(a,b), такая что f^(n+1)(c)=f(c). Здесь ln означает натуральный логарифм.",
        "source_ids": [
          "src-imc-official"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "ordinary_differential_equation",
          "integrating_factor"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Свернуть сумму производных в одну производную",
      "text": "Сумма f+f'+...+f^(n) после умножения на e^(-x) имеет производную (f^(n+1)-f)e^(-x). Условие с логарифмом ровно говорит, что значения этой вспомогательной функции на концах равны, поэтому остается применить теорему Ролля.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "rolle_on_transformed_expression",
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим S(x)=f(x)+f'(x)+...+f^(n)(x) и рассмотрим g(x)=S(x)e^(-x). Из условия ln(S(b)/S(a))=b-a следует S(b)/S(a)=e^(b-a), поэтому S(b)e^(-b)=S(a)e^(-a), то есть g(a)=g(b). Функция g дифференцируема на (a,b), поскольку f имеет n+1 производных. По теореме Ролля найдется c∈(a,b), для которого g'(c)=0. Но g'(x)=(S'(x)-S(x))e^(-x)=(f^(n+1)(x)-f(x))e^(-x), так как все промежуточные производные сокращаются. Так как e^(-c)≠0, из g'(c)=0 получаем f^(n+1)(c)=f(c).",
      "status": "ai_checked"
    }
  ],
