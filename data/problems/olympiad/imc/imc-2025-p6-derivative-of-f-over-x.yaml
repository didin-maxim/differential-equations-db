      "id": "idea-main",
      "title": "Выразить левую часть через производную отношения",
      "text": "Равенство f-xf'=k эквивалентно нулю производной функции (f-k)/x. На концах эта функция равна нулю, поэтому теорема Ролля сразу дает нужную точку.",
      "status": "ai_checked",
