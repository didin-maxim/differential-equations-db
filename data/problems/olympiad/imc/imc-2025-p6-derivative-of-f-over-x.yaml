      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим функцию h(x)=(f(x)-k)/x на отрезке [a,b]. Она непрерывна на [a,b] и дифференцируема на (a,b), поскольку a>0 и f непрерывно дифференцируема. Кроме того, h(a)=h(b)=0, так как f(a)=f(b)=k. По теореме Ролля существует ξ∈(a,b), для которого h'(ξ)=0. Вычислим h'(x)=(x f'(x)-f(x)+k)/x^2. Значит x f'(ξ)-f(ξ)+k=0, откуда f(ξ)-ξ f'(ξ)=k. В терминах линейных уравнений это тот же интегрирующий множитель 1/x для уравнения f'-(1/x)f=-k/x.",
      "status": "ai_checked"
    }
  ],
