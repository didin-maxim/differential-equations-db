        "title": "Формулировка",
        "text": "Пусть f:(0,∞)→R непрерывно дифференцируема, а b>a>0 и f(a)=f(b)=k. Докажите, что существует точка ξ∈(a,b), такая что f(ξ)-ξ f'(ξ)=k.",
