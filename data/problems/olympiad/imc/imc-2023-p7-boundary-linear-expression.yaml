  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить с модельным решением линейного уравнения",
      "text": "Модель h(x)=(\\(e^{x-1}\\))/(e-1) удовлетворяет тем же краевым условиям и имеет постоянное h'-h. Для произвольной f разность f-h умножается на \\(e^{-x}\\), после чего Ролль дает точку, где f'-f=h'-h.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear",
        "rolle_on_transformed_expression"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим h(x)=(\\(e^{x-1}\\))/(e-1). Тогда h(0)=0, h(1)=1 и h'(x)-h(x)=1/(e-1) для всех x. Поэтому если требуемое свойство верно для всех f∈V, то оно верно и для f=h; из h(ξ)+α=h'(ξ) следует α=h'(ξ)-h(ξ)=1/(e-1). Осталось доказать, что это значение действительно подходит. Возьмем произвольную f∈V и положим q(x)=\\(e^{-x}\\)(f(x)-h(x)). Функция q непрерывна на [0,1], дифференцируема на (0,1), а q(0)=q(1)=0. По теореме Ролля существует ξ∈(0,1), для которого q'(ξ)=0. Но q'(x)=\\(e^{-x}\\)((f'(x)-f(x))-(h'(x)-h(x))). Значит f'(ξ)-f(ξ)=h'(ξ)-h(ξ)=1/(e-1), то есть f'(ξ)=f(ξ)+1/(e-1). Следовательно единственное подходящее значение α равно 1/(e-1).",
      "status": "ai_checked"
    }
  ],
