        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть V - множество всех непрерывных функций f:[0,1]→R, дифференцируемых на (0,1), таких что f(0)=0 и f(1)=1. Найдите все α∈R, для которых для каждой f∈V существует ξ∈(0,1), такое что f(ξ)+α=f'(ξ).",
