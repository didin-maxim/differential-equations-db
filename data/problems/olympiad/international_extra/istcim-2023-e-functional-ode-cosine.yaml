        "title": "Формулировка",
        "text": "Найти все дифференцируемые функции f:\\(R\\to R,\\) для которых при всех x,y выполнены \\(f(x-y)-f(x+y)=2f(x+1)f(y+1)\\) и\\(f(x)^2+f(x+1)^2=1.\\)",
