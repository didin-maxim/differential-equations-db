  "ideas": [
    {
      "id": "idea-main",
      "title": "Повторить элементарную оценку второго порядка",
      "text": "Если периодическая\\(C^2-\\)функция имеет нуль, то ее максимум отстоит от некоторого нуля не дальше L/2, а формула Тейлора дает множитель\\(L^2/8.\\)Затем ту же оценку применяют к\\(f'', f^(4), ...\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument",
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Докажем базовую лемму: если\\(u - C^2-\\)периодическая функция периода L и у нее есть нуль, то max |u\\(|\\le(L^2/8) max|\\)\\(u''\\)|. Пусть |u| достигает максимума в\\(x_0\\); заменив u на -u, можно считать\\(u(x_0)=M\\ge0.\\) У функции есть нули, повторяющиеся с периодом L, поэтому на окружности длины L от\\(x_0\\)до ближайшего нуля a расстояние не больше L/2. В точке максимума\\(u'(x_0)=0,\\)и формула Тейлора между\\(x_0\\)и a дает\\(0=u(a)=M+u''(\\xi)(a-x_0)^2/2\\)для некоторого \\(\\xi.\\) Значит \\(M\\le(L^2/8)max\\)\\(|u''|\\). Теперь применим лемму последовательно к\\(u=f, f'', f^(4), ..., f^(2n-2).\\) Для f нуль есть по условию. Для каждой следующей четной производной нуль тоже есть: ее интеграл за период равен нулю, так что непрерывная периодическая функция либо тождественно нулевая, либо меняет знак. Получаем цепочку max\\(|f^(2j)|\\) \\(\\le(L^2/8) max\\)\\(|f^(2j+2)|\\) для \\(j=0,...,n-1.\\) Перемножая эти оценки, получаем требуемое неравенство.",
      "status": "ai_checked"
    }
  ],
