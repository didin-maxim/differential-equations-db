        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(f:\\mathbb R\\to\\mathbb R\\) является \\(2n\\) раз непрерывно дифференцируемой периодической функцией с периодом \\(L\\) и имеет хотя бы один нуль. Доказать оценку \\(\\max_{\\mathbb R}|f|\\le (L^2/8)^n\\max_{\\mathbb R}|f^{(2n)}|\\).",
