      "id": "idea-main",
      "title": "Сравнить параметры как решения ОДУ",
      "text": "Обе стороны как функции t удовлетворяют одному неоднородному уравнению y''+y=1/t. Их разность решает гармоническое однородное ОДУ и стремится к нулю при t->infty, значит тождественно равна нулю.",
