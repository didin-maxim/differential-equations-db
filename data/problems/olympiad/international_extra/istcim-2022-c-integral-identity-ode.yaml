  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим F(t)=int_0^infty e^(-tx)/(1+x^2) dx и G(t)=int_0^infty sin x/(t+x) dx. Для t>0 допустимо дифференцировать под знаком интеграла на компактных промежутках по t: экспоненциальный множитель контролирует F, а для G производные по t оцениваются степенями (t+x)^(-1). Тогда F''(t)=int_0^infty x^2 e^(-tx)/(1+x^2) dx = int_0^infty e^(-tx) dx - F(t)=1/t-F(t). Для G имеем G'(t)=-int_0^infty sin x/(t+x)^2 dx, G''(t)=2int_0^infty sin x/(t+x)^3 dx. Интегрируя по частям дважды, получаем G''(t)=1/t-G(t). Значит H=F-G удовлетворяет H''+H=0. Общее решение H(t)=A cos t+B sin t. При t->infty оба исходных интеграла стремятся к нулю: для F это следует из мажорирования e^(-tx), а для G - из интегрирования по частям или стандартной оценки осциллирующего интеграла Дирихле. Поэтому H(t)->0. Но ненулевое A cos t+B sin t предела при бесконечности не имеет, следовательно A=B=0 и F=G для всех t>0.",
      "status": "ai_checked"
    }
  ],
