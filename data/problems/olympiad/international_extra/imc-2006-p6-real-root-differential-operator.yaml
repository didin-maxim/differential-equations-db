  "ideas": [
    {
      "id": "idea-main",
      "title": "Факторизовать дифференциальный оператор",
      "text": "Если A имеет вещественные корни, оператор A(D) раскладывается в произведение операторов D-c. Каждый множитель убирается теоремой Ролля после экспоненциального множителя; обратное направление строится из решения линейного ОДУ с комплексным корнем.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "rolle_on_transformed_expression",
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Запишем A(D)=a0 I+a1 D+...+an D^n. Сначала пусть все корни A вещественны. Для линейного множителя D-c используется следующий вариант Ролля: если f обращается в нуль в двух точках, то для \\(g(x)=e^{-cx}f(x)\\) найдется точка, где g'=0, то есть f'-cf=0. Если A(x)=(x-c)B(x), то из нулей f в x_0,...,xn получаем точки y_0∈(x_0,x_1),...,y_{n-1}∈(x_{n-1},xn), где h=f'-cf равна нулю. По индукции для B(D) и функции h найдется xi с B(D)h(xi)=0, то есть A(D)f(xi)=0. Обратное направление: пусть у A есть невещестенный корень u+iv, v≠0. Тогда линейное ОДУ A(D)g=0 имеет вещественное решение \\(g(x)=e^{ux}\\sin(vx)\\) с бесконечно многими нулями. Пусть k - минимальный индекс с ak≠0. Для достаточно малого eps функция f(x)=g(x)+eps x^k сохраняет n+1 простых нулей на подходящем большом промежутке, но \\(A(D)f=A(D)g+eps A(D)x^k=eps\\,ak\\,k!\\) не обращается в нуль. Это противоречит требуемому свойству. Следовательно, комплексных корней быть не может.",
      "status": "ai_checked"
    }
  ],
