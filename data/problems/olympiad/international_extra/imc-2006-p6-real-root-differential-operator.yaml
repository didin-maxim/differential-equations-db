        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть A(x)=a0+a1 x+...+an x^n - вещественный многочлен степени n. Доказать, что все его корни вещественны тогда и только тогда, когда для любых x_0<...<xn и любой n раз дифференцируемой функции f, обращающейся в нуль в этих n+1 точках, найдется xi∈(x_0,xn) с a0 f(xi)+a1 f'(xi)+...+an f^(n)(xi)=0.",
