        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(A(x)=a_0+a_1x+\\cdots+a_nx^n\\) — вещественный многочлен степени \\(n\\). Доказать, что все его корни вещественны тогда и только тогда, когда для любых \\(x_0<\\cdots<x_n\\) и любой \\(n\\) раз дифференцируемой функции \\(f\\), обращающейся в нуль в этих \\(n+1\\) точках, найдется \\(\\xi\\in(x_0,x_n)\\), для которой \\(a_0 f(\\xi)+a_1 f'(\\xi)+\\cdots+a_n f^{(n)}(\\xi)=0\\).",
        "source_ids": [
