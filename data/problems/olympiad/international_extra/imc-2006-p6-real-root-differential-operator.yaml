  "ideas": [
    {
      "id": "idea-main",
      "title": "Факторизовать дифференциальный оператор",
      "text": "Если A имеет вещественные корни, оператор A(D) раскладывается в произведение операторов D-c. Каждый множитель убирается теоремой Ролля после экспоненциального множителя; обратное направление строится из решения линейного ОДУ с комплексным корнем.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "rolle_on_transformed_expression",
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Запишем \\(A(D)=a_0 I+a_1D+\\cdots+a_nD^n\\). Сначала пусть все корни \\(A\\) вещественны. Для линейного множителя \\(D-c\\) используется следующий вариант Ролля: если \\(f\\) обращается в нуль в двух точках, то для \\(g(x)=e^{-cx}f(x)\\) найдется точка, где \\(g'=0\\), то есть \\(f'-cf=0\\). Если \\(A(x)=(x-c)B(x)\\), то из нулей \\(f\\) в \\(x_0,\\ldots,x_n\\) получаем точки \\(y_0\\in(x_0,x_1),\\ldots,y_{n-1}\\in(x_{n-1},x_n)\\), где \\(h=f'-cf\\) равна нулю. По индукции для \\(B(D)\\) и функции \\(h\\) найдется \\(\\xi\\) с \\(B(D)h(\\xi)=0\\), то есть \\(A(D)f(\\xi)=0\\). Обратное направление: пусть у \\(A\\) есть невещественный корень \\(u+iv\\), \\(v\\ne0\\). Тогда линейное ОДУ \\(A(D)g=0\\) имеет вещественное решение \\(g(x)=e^{ux}\\sin(vx)\\) с бесконечно многими нулями. Пусть \\(k\\) — минимальный индекс с \\(a_k\\ne0\\). Для достаточно малого \\(\\varepsilon\\) функция \\(f(x)=g(x)+\\varepsilon x^k\\) сохраняет \\(n+1\\) простых нулей на подходящем большом промежутке, но \\(A(D)f=A(D)g+\\varepsilon A(D)x^k=\\varepsilon a_k k!\\) не обращается в нуль. Это противоречит требуемому свойству. Следовательно, комплексных корней быть не может.",
      "status": "ai_checked"
    }
  ],
