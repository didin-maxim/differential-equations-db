        "title": "Формулировка",
        "text": "Пусть y(x) - решение задачи Коши \\(y'=\\ln(y/x)\\) при \\(x>0, y>0, y(1)=2018,\\) рассматриваемое на своем максимальном положительном интервале существования. Сколько положительных x удовлетворяют \\(y(x)=2000\\)?",
