  "ideas": [
    {
      "id": "idea-main",
      "title": "Использовать знак \\(y'\\) и строгую вогнутость",
      "text": "Замена \\(u=y/x\\) и \\(s=\\ln x\\) превращает задачу в автономное уравнение\\(u_s=\\ln u-u.\\)Отсюда u монотонно проходит через 1, значит y сначала растет, потом убывает; левый хвост отделяется от уровня 2000 интегральной оценкой.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "phase_line_signs",
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим \\(s=\\ln x\\) и \\(u(s)=y(e^{s})/e^{s}.\\) Тогда\\(y=xu, y'=u+u_s,\\)поэтому уравнение становится\\(u_s=\\ln u-u.\\)Для всех u>0 выполнено \\(\\ln u-u<0,\\) значит u строго убывает по s. При \\(s=0\\) имеем \\(u=2018.\\) При движении вправо u убывает и единственный раз проходит через 1; после этого за конечное время достигает 0, потому что \\(\\int_0^1 du/(u-\\ln u)<\\infty.\\) Следовательно\\(, y'=\\ln u\\) положительна до единственной точки m, где \\(u=1,\\) и отрицательна после нее; функция y сначала растет от \\(y(1)=2018\\) до значения больше 2018, затем убывает к 0 на правом конце максимального интервала. Поэтому справа от m уровень 2000 пересекается ровно один раз. Осталось исключить левое пересечение. Если 0<x<1, то s<0, u(s)>2018, значит \\(y'=\\ln u>0,\\) и потому y(x)<2018. Тогда \\(y'(x)=\\ln(y/x)<\\ln 2018-\\ln x.\\) Отсюда \\(y(x)=2018-\\int_x^1 y'(t)\\,dt > 2018-\\int_0^1 (\\ln 2018-\\ln t)\\,dt = 2017-\\ln 2018 > 2000.\\) Значит на (0,1) решений \\(y=2000\\) нет. Ответ: одно положительное x.",
      "status": "ai_checked"
    }
  ],
