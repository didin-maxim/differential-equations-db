        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Функция y(x), x∈[0,+∞), удовлетворяет дифференциальному уравнению \\(y'=e^{-xy}\\). Доказать, что существует \\(\\lim_(x→+∞)y(x)\\) и этот предел принадлежит (0,+∞).",
        "source_ids": [
          "src-yagtu-student-olympiad-collection"
        ],
