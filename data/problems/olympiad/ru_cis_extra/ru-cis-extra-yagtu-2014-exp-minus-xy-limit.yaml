          "solution"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Дождаться положительности и доминировать экспонентой",
      "text": "Решение строго возрастает. Если оно еще неположительно, то y'≥1 и оно быстро становится положительным; после этого y≥m>0, а значит y'≤\\(e^{-mx}\\), что интегрируемо на бесконечности.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Всегда \\(y'=e^{-xy}>0\\), поэтому y возрастает. Если y(0)>0, положим a=0 и m=y(0). Если y(0)≤0, то пока y(x)≤0 при x≥0, имеем -xy≥0 и потому \\(y'(x)=e^{-xy}≥1\\). Значит за время не больше -y(0)+1 решение станет положительным; выберем точку a, где m=y(a)>0. Для всех x≥a по монотонности y(x)≥m, поэтому \\(0<y'(x)=e^{-xy(x)}≤e^{-mx}\\). Интеграл \\(\\int_a^∞ e^{-mx}\\,dx\\) сходится, следовательно \\(y(x)=y(a)+\\int_a^x y'(t)\\,dt\\) монотонно возрастает и ограничена сверху числом \\(y(a)+\\int_a^∞ e^{-mt}\\,dt\\). Поэтому существует конечный предел L. Так как y(x)≥m при x≥a, имеем L≥m>0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
