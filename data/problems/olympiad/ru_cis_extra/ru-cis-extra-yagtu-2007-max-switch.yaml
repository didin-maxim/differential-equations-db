        "title": "Формулировка",
        "text": "Найти решение \\(y=y(x), x\\)∈\\([0,+\\infty),\\) дифференциального уравнения \\(y'=max{x, y/(x+1)},\\) удовлетворяющее начальному условию \\(y(0)=1.\\)",
