  "ideas": [
    {
      "id": "idea-main",
      "title": "Найти точку переключения ветвей",
      "text": "Сначала больше дробь y/(x+1), поэтому решается линейное уравнение \\(y'=y/(x+1).\\) Полученное \\(y=x+1\\) показывает, что ветви сравниваются при \\(x=1\\); дальше работает ветвь \\(y'=x.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "В точке \\(x=0\\) имеем \\(max{0,1}=1,\\) поэтому естественно начать с ветви \\(y'=y/(x+1).\\) Ее решение при \\(y(0)=1\\) равно \\(y=x+1.\\) Для него \\(y/(x+1)=1,\\) и эта ветвь действительно не меньше x ровно при \\(0\\lex\\le1.\\) В точке \\(x=1\\) получаем \\(y(1)=2\\) и обе ветви равны 1. Для \\(x\\ge1\\) пробуем ветвь \\(y'=x.\\) Из \\(y(1)=2\\) выходит\\(y=x^2/2+3/2.\\)Проверим условие выбора ветви: \\(x\\gey/(x+1)\\) равносильно \\(2x(x+1)\\gex^2+3,\\)то есть \\((x-1)(x+3)\\ge0,\\) что верно при \\(x\\ge1.\\) Поэтому искомое решение: \\(y=x+1\\) при \\(0\\lex\\le1\\) и\\(y=(x^2+3)/2\\)при \\(x\\ge1.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
  ],
