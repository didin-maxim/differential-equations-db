          "ordinary_differential_equation"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Убрать младшие производные экспоненциальным множителем",
      "text": "Оператор f-9f'+27f''-27f''' равен -27 e^{x/3}(D-1/3)^3 f, а (D-1/3) становится обычной производной после умножения f на e^{-x/3}. Дальше трижды применяется теорема Ролля.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "rolle_on_transformed_expression"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим g(x)=e^{-x/3}f(x). Нули g совпадают с нулями f, поэтому у g есть не менее пяти различных нулей. По теореме Ролля у g' есть не менее четырех нулей, у g'' - не менее трех, а у g''' - не менее двух различных нулей. Осталось связать g''' с выражением из условия. Так как (D-1/3)f=e^{x/3}g', то (D-1/3)^3 f=e^{x/3}g'''. Раскрывая куб, получаем -27(D-1/3)^3 f=f-9f'+27f''-27f'''. Следовательно эта функция равна -27e^{x/3}g''' и имеет все нули g''', в частности не менее двух различных вещественных корней.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "rolle_on_transformed_expression"
      ]
    }
  ],
