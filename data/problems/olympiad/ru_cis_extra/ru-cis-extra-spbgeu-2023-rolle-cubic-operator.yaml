        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f:R->R - трижды дифференцируемая функция такая, что f имеет не менее пяти различных вещественных корней. Докажите, что функция f-9f'+27f''-27f''' имеет не менее двух различных вещественных корней.",
