        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Найти решение y(x), \\(x\\in\\mathbb R\\), дифференциального уравнения \\(y'(x)=y(x/2),\\) удовлетворяющее начальному условию\\(y(0)=y_0.\\)Доказать, что это уравнение не имеет ограниченных на всей числовой прямой решений, отличных от \\(y=0.\\)",
