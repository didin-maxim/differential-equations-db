  "ideas": [
    {
      "id": "idea-main",
      "title": "Развернуть решение в ряд от начального значения",
      "text": "Аргумент x/2 ближе к нулю, поэтому начальное значение y(0) рекурсивно задает все производные в нуле. Получается целая функция с положительными коэффициентами при\\(y_0>0\\); это сразу запрещает нетривиальную ограниченность.",
      "status": "ai_checked",
