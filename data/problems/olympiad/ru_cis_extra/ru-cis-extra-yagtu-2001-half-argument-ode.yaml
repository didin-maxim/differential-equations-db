        "series_recursion"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из уравнения последовательно следует гладкость решения. Дифференцируя n раз равенство \\(y'(x)=y(x/2),\\) получаем\\(y^(n+1)(x)=2^(-n)y^(n)(x/2).\\)При \\(x=0\\) это дает рекурсию\\(a_(n+1)=2^(-n)a n\\) для\\(a n=y^(n)(0),\\)откуда\\(a n=y_0/2^(n(n-1)/2).\\) Поэтому кандидат имеет вид \\(y(x)=y_0 \\sum_{n=0}^\\infty x^n/(n\\)! \\(2^{n(n-1)/2}).\\) Ряд сходится при всех x, его можно почленно дифференцировать, и после сдвига индекса получается \\(y'(x)=y_0 \\sum_{n=0}^\\infty (x/2)^n/(n\\)! \\(2^{n(n-1)/2})=y(x/2).\\) Значит это решение задачи Коши. Если \\(y_0>0,\\)то при \\(x\\ge0\\) все члены ряда неотрицательны и \\(y(x)\\ge y_0(1+x),\\) так что решение не ограничено. Если \\(y_0<0,\\)то -y имеет тот же вид с положительным начальным значением и также не ограничена. Остается\\(y_0=0,\\)когда y тождественно равно нулю.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "series_recursion"
      ]
    }
  ],
