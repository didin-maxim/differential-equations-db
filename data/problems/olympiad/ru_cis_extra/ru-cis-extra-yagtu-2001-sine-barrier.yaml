  "ideas": [
    {
      "id": "idea-main",
      "title": "Сложить x и y",
      "text": "Для u=x+y синус исчезает из нижней оценки: u'=1+x-sin u≥x. Интегрирование дает параболическую нижнюю оценку, минимум которой равен 1/2.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument",
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим u(x)=x+y(x). Тогда u(0)=1 и u'=1+y'=1+x-sin(x+y)=1+x-sin u. Так как sin u≤1, имеем u'(x)≥x для всех x≥0. Интегрируя от 0 до x, получаем u(x)≥1+x^2/2. Следовательно y(x)=u(x)-x≥1+x^2/2-x=1/2+(x-1)^2/2≥1/2.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument",
        "differentiate_auxiliary_function"
      ]
    }
  ],
