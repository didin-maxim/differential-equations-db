        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть y(x) - решение дифференциального уравнения y'=x-sin(x+y), удовлетворяющее начальному условию y(0)=1. Доказать, что при x≥0 выполнено y(x)≥1/2.",
