  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Так как \\(f(0)=0,\\) имеем \\(f'(0)=f(0)=0.\\) Функция \\(y(x)=f(x)\\) как решение уравнения \\(y'=f(y)\\) с начальным условием \\(y(0)=0\\) совпадает с постоянным решением y≡0, потому что правая часть f(y) является\\(C^1\\)и потому локально липшицева. Значит \\(f(x)=0\\) для всех x из области решения, то есть на всей прямой. Ограниченность здесь лишняя, но помогает увидеть, что глобальность не является проблемой.",
      "status": "ai_checked"
    }
  ],
