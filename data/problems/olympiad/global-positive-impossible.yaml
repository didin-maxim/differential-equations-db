  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Так как (arctan y)'=y'/(1+y^2)≥1, то arctan y(t)≥arctan y(0)+t при t>0. Правая часть превысит π/2 за конечное время, что невозможно для arctan y. Значит вперед решение не продолжается бесконечно.",
      "status": "ai_checked"
    }
