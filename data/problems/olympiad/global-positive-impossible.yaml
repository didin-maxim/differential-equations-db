      "id": "sol-main",
      "title": "Решение",
      "text": "Так как\\((arctan y)'=y'/(1+y^2)\\ge1,\\) то \\(\\arctan y(t)\\ge \\arctan y(0)+t\\) при t>0. Правая часть превысит \\(\\pi/2\\) за конечное время, что невозможно для arctan y. Значит вперед решение не продолжается бесконечно.",
      "status": "ai_checked"
