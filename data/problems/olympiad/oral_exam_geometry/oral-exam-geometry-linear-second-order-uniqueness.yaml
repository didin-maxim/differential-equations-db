        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Из a(x0) != 0 и непрерывности a следует, что на некотором интервале I вокруг x0 функция a не обращается в нуль. На I уравнение равносильно системе u'=A(x)u для u=(y,y'), где A(x)=[[0,1],[-c(x)/a(x),-b(x)/a(x)]]. Матрица A непрерывна на I, поэтому линейная задача Коши для этой системы единственна. Если два решения исходного уравнения имеют одинаковые y(x0) и y'(x0), то соответствующие векторы u имеют одинаковое начальное значение, а значит совпадают на некоторой окрестности x0. Следовательно, совпадают и сами функции y.",
