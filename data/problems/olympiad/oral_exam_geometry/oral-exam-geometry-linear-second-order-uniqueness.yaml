        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть a,b,c непрерывны в окрестности x0 и a(x0) != 0. Тогда для уравнения a(x)y''+b(x)y'+c(x)y=0 задача Коши y(x0)=y0, y'(x0)=v0 имеет не более одного локального решения. В частности, если два решения имеют в x0 одинаковые значение и производную, то они совпадают в некоторой окрестности x0.",
