  "ideas": [
    {
      "id": "idea-main",
      "title": "Свести к нормальной системе первого порядка",
      "text": "Так как a(x0) != 0 и a непрерывна, в малой окрестности x0 можно разделить на a(x) и перейти к системе для вектора (y,y'). Непрерывность коэффициентов дает стандартную единственность линейной системы.",
      "status": "ai_checked",
