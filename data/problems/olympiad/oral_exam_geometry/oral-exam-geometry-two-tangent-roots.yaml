  "ideas": [
    {
      "id": "idea-main",
      "title": "Касательные из A являются новыми линейными решениями",
      "text": "Любая прямая через A является графиком функции, пропорциональной данному линейному решению, значит тоже является решением. Если такая прямая касается второго решения в точке T, то при\\(a(x_T)\\ne 0\\) единственность задачи Коши заставила бы второе решение совпасть с этой прямой около T. Поэтому\\(a(x_T)=0.\\)",
      "status": "ai_checked",
