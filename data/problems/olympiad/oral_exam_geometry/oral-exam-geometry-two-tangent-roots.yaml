        "id": "stmt-original",
        "title": "Устная геометрическая задача",
        "text": "Дано линейное однородное уравнение второго порядка \\(a(x)y''+b(x)y'+c(x)y=0,\\) где a,b,c непрерывны. На рисунке изображены графики двух его решений. Одно из решений является линейной функцией и пересекает ось x в точке A. По рисунку видно, что из точки A к графику второго решения можно провести две касательные. С помощью линейки построить два корня уравнения \\(a(x)=0.\\)",
