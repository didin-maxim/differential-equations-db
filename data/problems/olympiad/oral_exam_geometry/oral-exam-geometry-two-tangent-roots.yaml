  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть l(x) - данное линейное решение, а\\(A=(x_A,0) -\\)точка его пересечения с осью x. Так как l не является нулевой функцией\\(, l(x)=m(x-x_A)\\)с \\(m \\ne 0.\\) Поэтому график любой невертикальной прямой, проходящей через A, имеет вид\\(y=k(x-x_A)=(k/m)l(x),\\)то есть задает решение того же однородного линейного уравнения. Проведем из A две касательные к графику второго решения u и обозначим точки касания через\\(T1=(x_1,u(x_1))\\)и\\(T2=(x_2,u(x_2)).\\)Каждая из этих касательных является графиком некоторого решения, пропорционального l. В точке Ti это линейное решение и u имеют одинаковые значение и производную, потому что прямая касается графика u. Если бы \\(a(\\xi)\\) было отлично от нуля, то в окрестности \\(\\xi\\) уравнение можно было бы разделить на a(x) и применить единственность задачи Коши для линейного уравнения второго порядка. Тогда u совпало бы с касательной хотя бы локально, что противоречит рисунку: второй график в точке касания не является той прямой. Значит\\(a(x_1)=0\\)и\\(a(x_2)=0.\\)Построение поэтому такое: линейкой провести две касательные из A ко второму графику, отметить точки касания T1,T2 и взять их абсциссы на оси x; эти две точки оси x и есть построенные корни уравнения \\(a(x)=0.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "graphical_tangent_cauchy_uniqueness",
        "state_vector_uniqueness"
      ]
    }
  ],
