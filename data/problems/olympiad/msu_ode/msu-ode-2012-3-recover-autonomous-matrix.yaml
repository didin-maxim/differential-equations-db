    {
      "id": "idea-main",
      "title": "Экспонента на базисе",
      "text": "Из x(0)=e_1 и x'(0)=Ae_1=e_2 известен первый столбец A. Условие e^A e_1=-2e_1 вместе с коммутированием A и e^A заставляет e^A=-2I.",
