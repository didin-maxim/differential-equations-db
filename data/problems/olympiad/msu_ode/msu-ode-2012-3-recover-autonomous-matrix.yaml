  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим e_1=(1,0)^T, e_2=(0,1)^T. Из x(0)=e_1 и x'(0)=Ae_1=e_2 следует, что первый столбец A равен e_2, то есть A=[[0,a],[1,b]]. Далее x(1)=e^A e_1=-2e_1. Так как A коммутирует с e^A, получаем e^A e_2=e^A A e_1=A e^A e_1=-2Ae_1=-2e_2. Значит e^A=-2I. Собственные значения вещественной матрицы A должны быть ln 2 +/- i(2k+1)pi. Поэтому b=tr A=2 ln 2, а det A=(ln 2)^2+(2k+1)^2 pi^2. Но det A=-a, значит a=-((ln 2)^2+(2k+1)^2 pi^2). Итак, все решения задачи задаются матрицами A_k=[[0,-((ln 2)^2+(2k+1)^2 pi^2)],[1,2 ln 2]], k=0,1,2,... . Для такой матрицы A_k-ln2 I имеет квадрат -((2k+1)^2 pi^2)I, поэтому e^{A_k}=2(cos((2k+1)pi)I+sin((2k+1)pi)((A_k-ln2 I)/((2k+1)pi)))=-2I, и условия действительно выполнены.",
      "status": "ai_checked"
    }
  ],
