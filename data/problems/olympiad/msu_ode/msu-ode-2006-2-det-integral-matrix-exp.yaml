        "id": "stmt-original",
        "title": "МГУ ОДУ 2006, задача 2",
        "text": "Найдите производную порядка n по параметру a в точке a=0 выражения \\(\\det(\\int_0^a e^{At}\\,dt)\\), где A - произвольная обратимая матрица размерности n.",
        "source_ids": [
          "src-msu-ode-olympiad"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "matrix_exponential"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Главный член при a=0",
      "text": "Интеграл матричной экспоненты равен aI+O(a^2); значит определитель начинается с a^n, и n-я производная определяется только этим главным членом.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "По ряду для матричной экспоненты \\(e^{At}=I+At+O(t^2)\\). Поэтому \\(\\int_0^a e^{At}\\,dt=aI+(a^2/2)A+O(a^3)=a(I+(a/2)A+O(a^2))\\). Следовательно, \\(\\det(\\int_0^a e^{At}\\,dt)=a^n \\det(I+(a/2)A+O(a^2))=a^n(1+O(a))\\). Коэффициент при a^n равен 1, поэтому n-я производная в точке a=0 равна n!.",
      "status": "ai_checked"
    },
    {
      "id": "sol-alt",
      "title": "Через обратимость A",
      "text": "Так как A обратима, \\(\\int_0^a e^{At}\\,dt=A^{-1}(e^{aA}-I)\\). Но \\(e^{aA}-I=aA+O(a^2)\\), откуда снова \\(A^{-1}(e^{aA}-I)=aI+O(a^2)\\). Значит \\(\\det(A^{-1}(e^{aA}-I))=a^n+O(a^{n+1})\\), и искомая производная равна n!.",
      "status": "ai_checked"
    }
  ],
