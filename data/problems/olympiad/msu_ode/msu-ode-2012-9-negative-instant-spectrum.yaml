  "solutions": [
    {
      "id": "sol-main",
      "title": "Контрпример",
      "text": "Нет в обоих пунктах. Рассмотрим систему x_1'=-x_1+e^{2t}x_2, x_2'=-x_2. Здесь A(t)=[[-1,e^{2t}],[0,-1]] непрерывна на R, и оба ее собственных значения равны -1 при любом t. Возьмем начальные данные x_1(0)=0, x_2(0)=epsilon. Тогда x_2(t)=epsilon e^{-t}. Первое уравнение дает (e^t x_1(t))'=epsilon e^{2t}, поэтому x_1(t)=epsilon(e^t-e^{-t})/2. При любом сколь угодно малом epsilon>0 решение неограниченно растет при t->+infty. Следовательно, нулевое решение не является устойчивым по Ляпунову, а значит тем более не является асимптотически устойчивым.",
      "status": "ai_checked"
    }
  ],
