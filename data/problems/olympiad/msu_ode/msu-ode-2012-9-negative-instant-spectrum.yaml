        "title": "МГУ ОДУ 2012, задача 9",
        "text": "Все собственные значения матрицы A(t), непрерывно зависящей от t, действительны и не превосходят -1 при всех t из R. Следует ли отсюда, что нулевое решение линейной неавтономной системы x'=A(t)x а) асимптотически устойчиво; б) устойчиво?",
