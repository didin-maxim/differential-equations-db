      "id": "idea-main",
      "title": "Ненормальность и меняющиеся направления",
      "text": "В неавтономной системе мгновенные собственные значения не контролируют фундаментальную матрицу. Уже треугольная система с большой наддиагональю имеет спектр {-1}, но растущие решения.",
