  "ideas": [
    {
      "id": "idea-main",
      "title": "Множитель зависит от первого интеграла",
      "text": "После умножения на известный множитель форма становится dPhi. Новый множитель отличается от старого на функцию, постоянную вдоль уровней Phi.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear",
        "find_potential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Так как mu - интегрирующий множитель, локально mu(Mdx+Ndy)=dPhi. Пусть nu - другой интегрирующий множитель. Запишем nu=F mu. Тогда nu(Mdx+Ndy)=F dPhi должна быть полной формой. Но d(F dPhi)=dF wedge dPhi, значит необходимо и достаточно dF wedge dPhi=0. Это означает, что F постоянно на связных кусках уровней Phi, то есть локально F=H(Phi) для некоторой C^1-функции H. Поэтому все интегрирующие множители имеют вид nu(x,y)=H(Phi(x,y)) mu(x,y), где H выбрана так, чтобы nu была допустимым ненулевым C^1-множителем на рассматриваемой области. Обратно, для любой такой H форма H(Phi)dPhi полна, поскольку H(Phi)dPhi=dK(Phi), где K'=H.",
      "status": "ai_checked"
    }
  ],
