        "id": "stmt-original",
        "title": "МГУ ОДУ 2008, задача 11",
        "text": "Пусть mu in C^1(G) - интегрирующий множитель для уравнения M(x,y)dx+N(x,y)dy=0, M,N in C^1(G), а Phi(x,y)=C - общее решение соответствующего уравнения в полных дифференциалах mu M dx+mu N dy=0. Какой формулой задаются все остальные интегрирующие множители исходного уравнения?",
        "source_ids": [
          "src-msu-ode-olympiad"
        ],
