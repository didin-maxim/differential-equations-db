      "title": "Линейная комбинация производных",
      "text": "Для производной или другой линейной комбинации ответ отличается: можно взять гладкое ненулевое y без нулей, но с производной, имеющей бесконечно много нулей, и затем построить линейное уравнение с этим y как решением.",
