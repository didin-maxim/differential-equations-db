  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "а) Нет. Если у y бесконечно много нулей на [0,1], то они имеют предельную точку t_0 in [0,1]. По непрерывности y(t_0)=0. Между соседними нулями y есть нуль y'; выбирая последовательность нулей, стремящуюся к t_0, получаем y'(t_0)=0. Повторяя этот аргумент с y', y'', ..., y^{(n-1)}, получаем y(t_0)=y'(t_0)=...=y^{(n-1)}(t_0)=0. Линейное уравнение с непрерывными коэффициентами эквивалентно линейной системе первого порядка с непрерывной матрицей, поэтому задача Коши единственна; следовательно, y тождественно равно нулю. Это противоречит условию. б) Да. Достаточно построить пример уже для выбранного n>1. Пусть phi(t)=e^{-1/t^2} sin(1/t^2) при t>0 и phi(0)=0, а y(t)=1+integral_0^t phi(s)ds. Тогда y гладкая и положительна на [0,1], но y'=phi имеет бесконечно много нулей t_k=1/sqrt(k pi), стремящихся к 0. Положим a_1=...=a_{n-1}=0 и a_n(t)=-y^{(n)}(t)/y(t). Эта функция непрерывна, потому что y>0 и y гладкая. Тогда y является ненулевым решением уравнения y^{(n)}+a_n(t)y=0, а нетривиальная линейная комбинация, равная y', имеет бесконечно много нулей на [0,1].",
      "status": "ai_checked"
    }
  ],
