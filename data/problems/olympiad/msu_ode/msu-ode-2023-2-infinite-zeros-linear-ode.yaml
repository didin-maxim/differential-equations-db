      "title": "Накопление нулей самого решения",
      "text": "Если нули y на отрезке бесконечны, у них есть предельная точка. Повторяя теорему Ролля, получаем нулевые начальные данные для y,y',...,y^{(n-1)}, а единственность линейной задачи Коши дает y=0.",
