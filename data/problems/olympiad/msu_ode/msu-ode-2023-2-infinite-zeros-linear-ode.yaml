        "title": "МГУ ОДУ 2023, задача 2",
        "text": "Существует ли при K=[0,1] и n>1 такое уравнение y^{(n)}+a_1(t)y^{(n-1)}+...+a_n(t)y=0, t из K, a_1,...,a_n принадлежат C(K), что для некоторого его ненулевого решения y при t из K имеет бесконечное число нулей: а) сама функция y(t); б) некоторая нетривиальная линейная комбинация C_1 y^{(n-1)}(t)+...+C_n y(t)?",
