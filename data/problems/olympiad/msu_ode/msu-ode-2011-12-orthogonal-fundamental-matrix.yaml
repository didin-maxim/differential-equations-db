      {
        "id": "stmt-original",
        "title": "МГУ ОДУ 2011, задача 12",
        "text": "Известно, что некоторая фундаментальная матрица системы \\(x'=A(t)x, x\\) из \\(\\mathbb R^n, t\\) из R, при всяком t из R ортогональна. Верно ли, что при всяком t из R матрица A(t) кососимметрична?",
        "source_ids": [
          "src-msu-ode-olympiad"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "linear_system",
          "fundamental_matrix"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Дифференцирование ортогональности",
      "text": "Фундаментальная матрица X удовлетворяет \\(X'=AX\\) и\\(X^{-1}=X^T.\\) Дифференцирование\\(X^T X=I\\)сразу дает кососимметричность\\(X'X^T=A.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Да. Пусть X(t) - указанная фундаментальная матрица. Тогда\\(X'=A_X\\)и, поскольку X ортогональна\\(, X^{-1}=X^T.\\) Значит\\(A=X'X^{-1}=X'X^T.\\) Из равенства\\(X^T X=I\\)после дифференцирования получаем\\(X'^T X+X^T X'=0.\\) Умножая это равенство слева на X и справа на\\(X^T,\\)имеем\\(X X'^T+X'X^T=0.\\) Но\\((X'X^T)^T=X X'^T,\\)поэтому\\(A^T=-A.\\)Следовательно, A(t) кососимметрична при каждом t.",
      "status": "ai_checked"
    }
  ],
