  "ideas": [
    {
      "id": "idea-main",
      "title": "Замена независимой переменной и энергия",
      "text": "Коэффициент \\(e^{t}\\) удобно превратить в квадрат новой переменной \\(s=2e^{t/2}\\); после этого уравнение принимает вид \\(u''+(1/s)u'+u=0,\\) где стандартная энергия\\(u'^2+u^2\\) убывает.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity",
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим \\(s=2e^{t/2}\\) и \\(x(t)=u(s).\\) Тогда \\(ds/dt=s/2,\\) поэтому\\(x'=(s/2)u_s, x''=(s^2/4)u_{ss}+(s/4)u_s,\\)а \\(e^{t}=s^2/4.\\) Исходное уравнение превращается при \\(s\\ge2\\) в\\(u_{ss}+(1/s)u_s+u=0.\\)Умножим его на\\(u_s\\):\\((1/2(u_s^2+u^2))'=-(1/s)u_s^2\\le0.\\) Следовательно\\(, u_s^2(s)+u^2(s)\\)не превосходит своего значения при \\(s=2.\\) В частности, |u(s)| ограничена при \\(s\\ge2.\\) Так как \\(t\\ge0\\) соответствует \\(s\\ge2,\\) функция \\(x(t)=u(2e^{t/2})\\) ограничена на\\(R_+.\\)",
      "status": "ai_checked"
    }
  ],
