      "id": "sol-main",
      "title": "Решение",
      "text": "Условие y''≥0 означает выпуклость y. Граф выпуклой функции лежит не выше хорды между двумя точками графика. Хорда между (0,0) и (1,0) совпадает с осью Ox. Поэтому y(x)≤0 для 0≤x≤1.",
