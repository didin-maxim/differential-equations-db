        "title": "МГУ ОДУ 2022, задача 2",
        "text": "При каких значениях \\(\\mu\\) нулевое решение уравнения\\(y'=y(\\mu-y^2 \\sin(1/y))\\)устойчиво по Ляпунову, асимптотически устойчиво? При \\(y=0\\) правая часть доопределена нулем.",
