  "ideas": [
    {
      "id": "idea-linear-dominates",
      "title": "Линейный член доминирует при \\(\\mu\\) не равно 0",
      "text": "Так как\\(y^2 \\sin(1/y)\\)стремится к 0, знак \\(y'/y\\) около нуля определяется \\(\\mu,\\) если \\(\\mu\\) не равно 0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "phase_line_signs"
      ]
    },
    {
      "id": "idea-equilibria",
      "title": "При \\(\\mu=0\\) есть равновесия, накапливающиеся к нулю",
      "text": "Нули \\(\\sin(1/y)\\) дают неподвижные точки сколь угодно близко к нулю: это сохраняет устойчивость, но запрещает асимптотическую устойчивость.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "phase_line_signs"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Если \\(\\mu<0,\\) то для достаточно малых y имеем\\(\\mu-y^2 \\sin(1/y)<\\mu/2<0,\\)поэтому на правой полуоси y убывает к 0, а на левой растет к 0; нуль асимптотически устойчив. Если \\(\\mu>0,\\) то около нуля знак \\(y'\\) совпадает со знаком y, значит нуль неустойчив. Пусть теперь \\(\\mu=0.\\) Тогда \\(y'=-y^3 \\sin(1/y).\\)Точки\\(y_k=1/(\\pi k)\\) являются равновесиями и накапливаются к нулю. Между соседними равновесиями траектория не может выйти за границы интервала, поэтому при достаточно малом начальном y она остается сколь угодно близко к нулю: нуль устойчив по Ляпунову. Но асимптотической устойчивости нет, так как ненулевые равновесия\\(y_k\\)не стремятся к нулю при \\(t\\to+\\infty.\\) Итак, устойчивость при \\(\\mu\\le0,\\) асимптотическая устойчивость при \\(\\mu<0.\\)",
      "status": "ai_checked"
    }
  ],
