        "separate_variables"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Нет. Если в некоторый момент y≥0, то y'=-y-1≤-1, поэтому при движении вперед решение за конечное время попадает в область y<0. В области y<0 уравнение имеет вид y'=y-1, откуда \\(y(t)=1+Ce^{t}\\), причем C<0. Такое решение при движении назад достигает y=0 в конечный момент t_0=ln(-1/C). Значит любое максимальное решение имеет конечный левый конец: его нельзя продолжить на всю прямую. Следовательно, решения, определенного на всей R, не существует.",
      "status": "ai_checked"
    }
  ],
