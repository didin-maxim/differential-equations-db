      "id": "idea-backward-crossing",
      "title": "Посмотреть на отрицательную область назад по времени",
      "text": "В области y<0 уравнение линейно: y'=y-1. Любое отрицательное решение при движении назад за конечное время достигает нуля, а после этого продолжение в прошлое несовместимо с той же ветвью.",
      "status": "ai_checked",
      "standard_idea_ids": [
