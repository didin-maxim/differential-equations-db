  "ideas": [
    {
      "id": "idea-transverse-clock",
      "title": "Добавить невырожденные часы",
      "text": "В плоскости можно сделать одну координату временем, а во второй оставить обычную пеановскую неединственность; векторное поле при этом нигде не обращается в ноль.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Нет. Рассмотрим автономную систему x'=1, y'=2 sqrt(|y|). Векторное поле непрерывно и нигде не равно нулю, потому что первая компонента всегда равна 1. Но через точку (0,0) проходят разные решения: например x=t, y=0 и, для любого c>=0, решение x=t, y=0 при t<=c, y=(t-c)^2 при t>=c. Все они имеют одно и то же начальное значение при t=0, если c=0 дает немедленный выход, а c>0 - задержанный выход после движения вдоль оси. Значит в R^2 ненулевость непрерывного поля не гарантирует единственность.",
      "status": "ai_checked"
    }
  ],
