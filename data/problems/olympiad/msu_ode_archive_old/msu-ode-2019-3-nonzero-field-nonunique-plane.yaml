        "id": "stmt-original",
        "title": "МГУ ОДУ 2019, задача 3",
        "text": "Для n=1 верно: если правая часть уравнения x'=f(x), x из R^n, непрерывна и не принимает нулевых значений, то все пространство R^n состоит из точек существования и единственности. Распространяется ли это утверждение на случай n=2? Ответ обосновать.",
        "source_ids": [
          "src-msu-ode-olympiad"
        ],
