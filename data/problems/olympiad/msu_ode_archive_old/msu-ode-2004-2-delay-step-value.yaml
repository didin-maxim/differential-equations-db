        "id": "stmt-original",
        "title": "МГУ ОДУ 2004, задача 2",
        "text": "Пусть абсолютно непрерывная функция u(t) удовлетворяет почти всюду уравнению \\(u'(t)+u(t-1)=0\\) на [0,3] и \\(u(t)=1\\) на [-1,0]. Найдите u(3).",
        "source_ids": [
          "src-msu-ode-olympiad"
        ],
