        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-steps",
      "title": "Метод шагов",
      "text": "На каждом следующем отрезке длины 1 правая часть уже известна с предыдущего отрезка, поэтому уравнение становится обычным интегрированием.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "На [0,1] имеем \\(u'(t)=-u(t-1)=-1,\\) поэтому \\(u(t)=1-t.\\) На [1,2] получаем \\(u'(t)=-u(t-1)=t-2\\) и, так как\\(u(1)=0, u(t)=t^2/2-2t+3/2.\\)На [2,3] уже\\(u'(t)=-u(t-1)=-(t^2/2-3t+4).\\)Поскольку \\(u(2)=-1/2,\\) получаем\\(u(3)=-1/2+integral 2^3(-t^2/2+3t-4)dt=-1/2+1/3=-1/6.\\)",
      "status": "ai_checked"
    }
  ],
