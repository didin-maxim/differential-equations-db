        "id": "stmt-original",
        "title": "МГУ ОДУ 2009, задача 2",
        "text": "Пусть \\(\\lambda 1<\\lambda 2<\\lambda 3<... -\\) произвольная неограниченная последовательность чисел. Может ли она быть последовательностью нулей некоторого решения какого-либо уравнения \\(x''+a(t)x=0,\\) где a(t) - гладкая функция?",
        "source_ids": [
