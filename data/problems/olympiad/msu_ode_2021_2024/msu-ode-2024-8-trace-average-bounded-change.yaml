        "id": "stmt-original",
        "title": "МГУ ОДУ 2024, задача 8",
        "text": "Матрица системы x'=A(t)x, t≥0, непрерывна и удовлетворяет \\(\\lim_{t→∞} (1/t)\\int_0^t \\operatorname{tr} A(\\tau)\\,d\\tau = 0\\). Пусть L(t) непрерывно дифференцируема, невырождена и sup_{t≥0}(|L(t)|+|L(t)^{-1}|)<∞. Чему может быть равен \\(\\lim_{t→∞} (1/t)\\int_0^t \\operatorname{tr} B(\\tau)\\,d\\tau\\), где B=L^{-1}AL-L^{-1}L'?",
