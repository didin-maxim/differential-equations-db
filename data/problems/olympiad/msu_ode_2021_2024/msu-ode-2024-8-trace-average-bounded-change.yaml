  "ideas": [
    {
      "id": "idea-main",
      "title": "Формула Лиувилля и ограниченный множитель",
      "text": "Средний след - это средний логарифмический рост определителя фундаментальной матрицы. Замена Y=L^{-1}X меняет определитель только на ограниченный множитель det L^{-1}.",
      "status": "source_solution_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть X(t) - фундаментальная матрица системы x'=A(t)x. По формуле Лиувилля \\(\\det X(t)=\\det X(0)e^{\\int_0^t \\operatorname{tr} A(\\tau)\\,d\\tau}\\), поэтому из условия следует \\(\\lim_{t→∞} t^{-1} \\ln|\\det X(t)|=0\\). Для системы z'=B(t)z фундаментальная матрица имеет вид Y(t)=L(t)^{-1}X(t), потому что замена x=L(t)z дает z'=L^{-1}ALz-L^{-1}L'z. Так как L и L^{-1} равномерно ограничены и L невырождена, величина ln|det L(t)^{-1}| ограничена сверху и снизу с точностью до константы, не влияющей на деление на t. Следовательно, \\(\\lim_{t→∞} t^{-1} \\ln|\\det Y(t)|=0\\). Снова применяя формулу Лиувилля, получаем \\(\\lim_{t→∞} (1/t)\\int_0^t \\operatorname{tr} B(\\tau)\\,d\\tau=0\\).",
      "status": "source_solution_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
  ],
