  "ideas": [
    {
      "id": "idea-main",
      "title": "Подобрать множитель одной переменной",
      "text": "После деления формы на x появляется полный дифференциал\\(d(\\sin(x^2 y)+\\ln\\)|x|). При этом надо отдельно вернуть вертикальное решение \\(x=0,\\) потерянное при делении.",
      "status": "source_solution_checked",
      "standard_idea_ids": [
        "find_potential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "На области \\(x\\ne 0\\) умножим уравнение на \\(\\mu(x)=1/x.\\) Получим форму \\(((1/x)+2xy\\,\\cos(x^{2}y))\\,dx+x^{2}\\cos(x^{2}y)\\,dy.\\) Это полный дифференциал функции \\(F(x,y)=\\ln\\)|x|\\(+\\sin(x^{2}y),\\) потому что \\(F_x=1/x+2xy\\,\\cos(x^{2}y), F_y=x^{2}\\cos(x^{2}y).\\) Поэтому регулярные интегральные кривые задаются равенством \\(\\sin(x^{2}y)+\\ln\\)|x|\\(=C.\\) При умножении на \\(1/x\\) мы исключили прямую \\(x=0\\); в исходной дифференциальной форме при \\(x=0\\) остается \\(dx=0,\\) так что \\(x=0\\) также является решением.",
      "status": "source_solution_checked",
      "standard_idea_ids": [
        "find_potential"
      ]
    }
  ],
