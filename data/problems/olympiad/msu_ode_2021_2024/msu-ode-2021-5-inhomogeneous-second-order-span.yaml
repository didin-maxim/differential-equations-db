      ]
    },
    {
      "id": "idea-wronskian",
      "title": "Вронскиан трех решений связан с правой частью",
      "text": "Для трех решений\\(y_p,y_p+u,y_p+v\\)третьего порядка вронскиан равен f(t)W(u,v) с точностью до знака. Если f имеет нули, эти три функции не могут быть фундаментальной системой нормированного однородного уравнения третьего порядка с непрерывными коэффициентами.",
