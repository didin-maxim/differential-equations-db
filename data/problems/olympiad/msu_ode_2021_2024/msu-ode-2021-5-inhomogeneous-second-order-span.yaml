      "id": "idea-main",
      "title": "Аффинная плоскость решений",
      "text": "Множество решений неоднородного уравнения имеет вид\\(y_p+V,\\)где V - двумерное пространство решений однородного уравнения. Поэтому линейная оболочка имеет размерность 2 или 3.",
      "status": "ai_checked",
