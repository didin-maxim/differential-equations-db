        "title": "МГУ ОДУ 2021, задача 5",
        "text": "Рассматривается уравнение \\(y''+p(t)y'+q(t)y=f(t),\\) где\\(p,q,f in C^1(R).\\)а) Какое наибольшее число k линейно независимых решений может иметь это уравнение? б) Одинаково ли это число для разных троек p,q,f? в) Обязательно ли линейно независимые решения из такого набора служат решениями некоторого линейного однородного уравнения k-го порядка с непрерывными на R коэффициентами?",
