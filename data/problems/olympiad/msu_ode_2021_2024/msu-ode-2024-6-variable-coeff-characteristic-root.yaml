        "id": "stmt-original",
        "title": "МГУ ОДУ 2024, задача 6",
        "text": "Какие свойства линейных однородных дифференциальных уравнений с постоянными коэффициентами переносятся на уравнения с переменными коэффициентами и характеристическим многочленом \\(L(\\lambda,t)\\): а) если \\(L(\\lambda,t)\\) при каждом \\(t\\) имеет корень \\(\\lambda=\\lambda_0\\), то \\(y=e^{\\lambda_0 t}\\) является решением, и обратно; б) если этот корень имеет кратность \\(k>1\\) при каждом \\(t\\), то \\(y=t^{k-1}e^{\\lambda_0 t}\\) является решением; в) если \\(y=t^{k-1}e^{\\lambda_0 t}\\) является решением при целом \\(k>1\\), то \\(\\lambda_0\\) является корнем \\(L(\\lambda,t)\\) кратности \\(k\\) при каждом \\(t\\)?",
