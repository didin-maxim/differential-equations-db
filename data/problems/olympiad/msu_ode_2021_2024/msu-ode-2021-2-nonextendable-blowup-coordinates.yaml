  "ideas": [
    {
      "id": "idea-a",
      "title": "Ограниченность позволила бы продолжить решение",
      "text": "Если траектория остается в компактной части фазового пространства при t->0+, то непрерывность правой части дает ограниченность производной и конечный предел, откуда решение продолжается.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    },
    {
      "id": "idea-b",
      "title": "Норма может расти при вращающемся направлении",
      "text": "Из |x(t)|->infty не следует, что одна фиксированная координата стремится к бесконечности по модулю: направление может бесконечно вращаться.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "а) Да. Если |x(t)| не стремится к бесконечности при t->0+, то найдутся t_n->0+ с x(t_n) в некотором шаре. На компактном цилиндре [0,t_1] times B_R правая часть ограничена. Тогда на участках траектории, пока она остается в чуть большем шаре, x равномерно липшицева по t; стандартный критерий продолжения дает конечный предел подпоследовательностей и возможность продолжить решение к t=0, что противоречит непродолжаемости. б) Нет. Можно задать гладкую кривую x(t)=t^{-1}(cos(1/t), sin(1/t)) при t>0. Ее норма стремится к бесконечности, но каждая координата имеет сколь угодно большие нули. Продлив вектор скорости x'(t) до непрерывного поля f(t,x) в окрестности этой непересекающейся кривой, а затем на все R^3, получаем систему, для которой данная кривая является решением. Поэтому ни |x_1(t)|, ни |x_2(t)| не обязаны иметь предел +infty.",
      "status": "ai_checked"
    }
  ],
