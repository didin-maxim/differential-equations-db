        "title": "МГУ ОДУ 2021, задача 2",
        "text": "Пусть x:(0,infty)->R^2 - непродолжаемое решение системы x'=f(t,x), x=(x_1,x_2)^T, f in C(R^{1+2}). Верно ли, что при t->+0 выполнено: а) |x(t)|->infty; б) хотя бы для одного i из {1,2} выполнено |x_i(t)|->infty?",
