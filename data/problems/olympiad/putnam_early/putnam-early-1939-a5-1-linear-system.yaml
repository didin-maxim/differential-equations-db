      "id": "sol-main",
      "title": "Решение через исключение y",
      "text": "Из первого уравнения y=x'-x+3. Дифференцируя x'=x+y-3, получаем x''=x'+y'. Подставляя y'=-2x+3y+1 и выражение для y, имеем x''=x'-2x+3(x'-x+3)+1, то есть x''-4x'+5x=10. Общее решение: x=2+\\(e^{2t}\\)(A sin t+B cos t). Условие x(0)=0 дает B=-2. Далее y=x'-x+3. Для x'=\\(e^{2t}\\)((2A-B) sin t+(A+2B) cos t) получаем y=1+\\(e^{2t}\\)((A+2) sin t+(A-2) cos t). Условие y(0)=0 дает 1+A-2=0, значит A=1. Поэтому x(t)=2+\\(e^{2t}\\) sin t-2\\(e^{2t}\\) cos t, y(t)=1+3\\(e^{2t}\\) sin t-\\(e^{2t}\\) cos t.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
