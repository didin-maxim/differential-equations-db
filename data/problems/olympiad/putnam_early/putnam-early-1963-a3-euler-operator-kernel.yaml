        "title": "Формулировка",
        "text": "Пусть D=d/dx и E=xD(xD-1)(xD-2)...(xD-n). Найти представление решения уравнения Ey=f(x) с условиями y(1)=y'(1)=...=y^{(n)}(1)=0 в виде интеграла от f, где f непрерывна.",
