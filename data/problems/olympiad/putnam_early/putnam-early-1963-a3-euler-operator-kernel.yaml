      "id": "idea-main",
      "title": "Свернуть оператор Эйлера",
      "text": "Тождество xD(xD-1)...(xD-n)y=x^{n+1}y^{(n+1)} сводит задачу к формуле Тейлора с интегральным остатком.",
      "status": "ai_checked",
