  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Докажем по индукции тождество (xD-m)(x^m y^{(m)})=x^{m+1}y^{(m+1)}. Действительно, xD(x^m y^{(m)})-m x^m y^{(m)}=m x^m y^{(m)}+x^{m+1}y^{(m+1)}-m x^m y^{(m)}. Последовательное применение при m=0,1,...,n дает Ey=x^{n+1}y^{(n+1)}. Поэтому y^{(n+1)}(t)=f(t)/t^{n+1} на промежутке, не проходящем через 0. Условия в точке 1 зануляют полиномиальную часть формулы Тейлора, и остается интегральный остаток: y(x)=1/n! \\(\\int_1^x\\) (x-t)^n f(t)/t^{n+1} dt. Дифференцирование этого выражения n+1 раз возвращает f(x)/x^{n+1}, а первые n производных в x=1 равны нулю, так что формула удовлетворяет всем условиям.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
