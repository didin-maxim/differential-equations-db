        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f,g непрерывны на [0,∞), a решает a'+fa=g, a(0)=c, а b удовлетворяет b'+fb≥g и b(0)=c. Доказать, что b(x)≥a(x). Затем вывести для малых x представление решения y'+fy=y^2, y(0)=d, через максимум по непрерывным u(t): y(x)=max [d \\(e^{-h(x)}\\)-\\(\\int_0^x\\) \\(e^{-(h(x)-h(t))}\\)u(t)^2 dt], где h(t)=\\(\\int_0^t(f(s)-2u(s))ds\\).",
