  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим F(x)=\\(\\int_0^x\\) f(t)dt. Тогда (a\\(e^{F}\\))'=g\\(e^{F}\\), а (b\\(e^{F}\\))'=(b'+fb)\\(e^{F}\\)≥g\\(e^{F}\\). Так как a\\(e^{F}\\) и b\\(e^{F}\\) равны при x=0, интегрирование дает b\\(e^{F}\\)≥a\\(e^{F}\\), следовательно b≥a. Для второй части зафиксируем непрерывную u и положим h(x)=\\(\\int_0^x(f(t)-2u(t))dt\\), z=y\\(e^{h}\\). Из (y-u)^2≥0 следует y^2-2uy≥-u^2. Поэтому z'=(y'+(f-2u)y)\\(e^{h}\\)=(y^2-2uy)\\(e^{h}\\)≥-u^2\\(e^{h}\\). Интегрируя от 0 до x, получаем y(x)≥d \\(e^{-h(x)}\\)-\\(\\int_0^x\\) \\(e^{-(h(x)-h(t))}\\)u(t)^2dt. Это верно для каждого u. Если же взять u(t)=y(t) на промежутке существования решения, то (y-u)^2=0 и все неравенства становятся равенствами. Значит y(x) равен максимуму указанных выражений по всем непрерывным u.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear",
        "comparison_argument"
      ]
    }
