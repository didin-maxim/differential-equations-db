      "id": "idea-main",
      "title": "Интегрирующий множитель и квадрат",
      "text": "Первая часть следует после умножения на \\(e^{int f}\\); во второй часть квадрат (y-u)^2≥0 превращает Риккати в семейство линейных нижних оценок.",
