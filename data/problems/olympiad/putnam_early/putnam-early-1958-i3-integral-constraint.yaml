  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим C=int_0^1 u(s) ds. Тогда u'-u=C и u(0)=1, откуда u(t)=(1+C)e^t-C. Интегрируя это выражение от 0 до 1, получаем C=(1+C)(e-1)-C. Значит C(3-e)=e-1, то есть C=(e-1)/(3-e). Поэтому 1+C=2/(3-e), и окончательно u(t)=(2e^t-(e-1))/(3-e). Прямая подстановка в уравнение и вычисление интеграла подтверждают, что это выражение действительно удовлетворяет обоим условиям.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
