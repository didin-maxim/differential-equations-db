        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(y(0)=0, y'(0)=1\\) и \\((x^2+9)y''+(x^2+4)y=0.\\) Доказать, что \\(y(x)=0\\) для некоторого x из промежутка \\([\\sqrt{63/53} \\pi, 3\\pi/2].\\)",
