  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить с двумя синусами",
      "text": "Интегральное тождество для \\(y''z-yz''\\) дает сначала существование нуля до \\(3\\pi/2,\\) а затем запрещает нуль до \\(\\sqrt{63/53}\\pi.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение сравнением",
      "text": "Перепишем уравнение как \\(y''+Q(x)y=0,\\) где\\(Q=(x^2+4)/(x^2+9).\\) Сначала сравним с \\(z''+(4/9)z=0, z(0)=0, z'(0)=1,\\) то есть \\(z=(3/2)\\sin(2x/3).\\) На \\((0,3\\pi/2)\\) имеем Q>4/9 и z>0. Тождество \\((y'z-yz')'=(y''z-yz'')=(4/9-Q)yz.\\) Если y не имеет нулей на \\((0,3\\pi/2),\\) то y>0 там из-за \\(y'(0)=1.\\) Интегрируя от 0 до \\(3\\pi/2,\\) получаем слева \\(2y(3\\pi/2)/3\\ge0,\\) а справа строго отрицательный интеграл, противоречие. Значит нуль есть до \\(3\\pi/2.\\) Теперь положим \\(k=\\sqrt{63/53}\\pi\\) и сравним с \\(w''+(53/63)w=0, w(0)=0, w'(0)=1.\\) Так как \\(\\pi^2<10,\\)на \\([0,3\\pi/2]\\) выполнено Q<53/63, а w>0 на (0,k). Если \\(h\\le k -\\) первый положительный нуль y, то y>0 на \\((0,h), y(h)=0, y'(h)\\le0.\\) Интегрирование тождества \\((w'y-wy')'=(w''y-wy'')=(Q-53/63)wy\\) от 0 до h дает левую часть \\(-w(h)y'(h)\\ge0,\\) тогда как правая часть отрицательна. Противоречие. Поэтому первый нуль лежит в \\((k,3\\pi/2),\\) что доказывает требуемое.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
