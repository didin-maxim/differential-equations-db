        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Частица движется в пространстве по системе x'=yz, y'=zx, z'=xy. Доказать: если две начальные координаты равны нулю, частица неподвижна; при (x(0),y(0),z(0))=(1,1,0) имеем (sec t,sec t,tan t); при (1,1,-1) имеем (1/(1+t),1/(1+t),-1/(1+t)); если хотя бы две начальные координаты ненулевые, то частица уходит на бесконечность за конечное время в будущем или пришла с бесконечности за конечное время в прошлом.",
