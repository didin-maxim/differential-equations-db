  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Если две координаты в начальный момент нулевые, то правая часть системы равна нулю, и нулевые две координаты вместе с третьей постоянной дают решение; по единственности оно единственно. Две указанные формулы проверяются прямой подстановкой: для (sec t,sec t,tan t) производные равны sec t tan t, sec t tan t, sec^2 t, а правые части совпадают; для (1/(1+t),1/(1+t),-1/(1+t)) все три равенства также выполняются. Для последней части заметим, что xx'=yy'=zz'=xyz. Поэтому (y^2-x^2)'=0 и (z^2-x^2)'=0. Если хотя бы две начальные координаты ненулевые, выберем координату, модуль которой в начальный момент не больше модулей двух остальных, и назовем ее x; после перестановки имеем y^2=x^2+A, z^2=x^2+B с A,B≥0, причем не оба множителя зануляются. На промежутке с фиксированными знаками y,z получаем x'=yz=+-sqrt((x^2+A)(x^2+B)). Если знак плюс, то время роста от x_0 до бесконечности равно \\(\\int_{x_0}^{∞} dx/\\sqrt{(x^2+A)(x^2+B)}\\), и этот интеграл сходится, потому что подынтегральная функция ведет себя как 1/x^2. Значит бесконечность достигается за конечное будущее время. При знаке минус тот же аргумент применяется назад по времени. Следовательно траектория либо уйдет на бесконечность в будущем, либо пришла с нее в прошлом.",
