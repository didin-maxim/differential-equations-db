        "title": "Формулировка",
        "text": "В некоторый момент точки A, T, B лежат на одной вертикали: A на 50 футов выше T, а T на 100 футов выше B. T летит горизонтально с постоянной скоростью. A летит с постоянной скоростью прямо к B, а B летит с удвоенной скоростью T прямо к T. Точки A и B достигают T одновременно. Найти расстояния, пройденные A, B, T, и скорость A.",
