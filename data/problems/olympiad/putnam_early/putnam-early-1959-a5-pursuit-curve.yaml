      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим общую задачу: цель движется горизонтально со скоростью v, преследователь стартует на вертикальном расстоянии a и имеет скорость kv, k>1. Пусть x - вертикальное расстояние до цели, y - горизонтальное смещение цели от начального положения, причем в момент старта \\(x=a, y=0.\\) Направление движения преследователя указывает на цель, поэтому \\(y'=(y-vt)/x,\\) где штрих означает производную по x вдоль траектории. Кроме того, из скорости преследователя и \\(dx/dt<0\\) имеем \\(kv/(-dx/dt)=\\sqrt{1+(y')^2}.\\) Дифференцируя \\(y'=(y-vt)/x\\) по x, получаем \\(xy''=-v/(dx/dt).\\) Следовательно \\(kxy''=\\sqrt{1+(y')^2}.\\) Интегрирование дает \\(\\ln(y'+\\sqrt{1+(y')^2})=(1/k)\\ln(x/a),\\) потому что при \\(x=a\\) имеем \\(y'=0.\\) Значит \\(2y'=(x/a)^{1/k}-(x/a)^{-1/k}.\\) Еще одно интегрирование с \\(y(a)=0\\) дает при \\(x=0\\) горизонтальный путь цели \\(y=ak/(k^2-1).\\) Для B имеем \\(a=100\\) и \\(k=2,\\) значит T проходит 200/3 фута, а B - 400/3 фута. Для A имеем \\(a=50\\) и тот же путь цели 200/3, поэтому \\(200/3=50k/(k^2-1),\\) откуда \\(4k^2-3k-4=0\\) и \\(k=(3+\\sqrt{73})/8.\\) Поэтому A проходит \\(k*(200/3)=25(3+\\sqrt{73})/3\\) фута, а его скорость равна \\((3+\\sqrt{73})/8\\) скоростей T.",
