  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим z=x+iy. Тогда первая строка плюс i, умноженное на вторую, дает z''-iz'+6z=0. Характеристическое уравнение lambda^2-ilambda+6=0 имеет корни 3i и -2i, поэтому z=Ae^{3it}+Be^{-2it}. Условия x'(0)=y'(0)=0 означают z'(0)=0, то есть 3iA-2iB=0 и B=3A/2. Следовательно, с точностью до поворота и масштаба x=A cos 3t+B cos 2t, y=A sin 3t-B sin 2t, где B=3A/2. Гипоциклоида, образованная окружностью радиуса R внутри окружности радиуса cR, имеет параметризацию x=(c-1)R cos bt+R cos((c-1)bt), y=(c-1)R sin bt-R sin((c-1)bt), возможно после отражения оси y. Сравнение частот 3 и 2 дает два описания одной и той же кривой: либо c-1=2/3, то есть радиус неподвижной окружности равен (5/3)R, либо после отражения c-1=3/2, то есть неподвижный радиус равен (5/2)R. Итак, для каждой траектории катящаяся окружность может иметь радиус 3/5 или 2/5 радиуса неподвижной окружности; эквивалентно неподвижный радиус равен 5R/3 или 5R/2.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "complexify_linear_system"
      ]
    }
  ],
