        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Доказать, что графики в плоскости (x,y) всех решений системы x''+y'+6x=0, y''-x'+6y=0 с условиями x'(0)=y'(0)=0 являются гипоциклоидами. Найти радиус неподвижной окружности и возможные радиусы катящихся окружностей.",
