      "id": "sol-main",
      "title": "Доказательство ограниченности сверху и неограниченности снизу",
      "text": "Выберем X так, что x^3+kx>0 при x>X. Если бы после X были два соседних нуля a<b, то на (a,b) функция y имела бы постоянный знак. При y>0 на этом промежутке было бы y''=(x^3+kx)y>0, но положительная функция с нулями на концах должна где-то иметь y''<0. При y<0 получается симметричное противоречие: y''<0, хотя отрицательная дуга с нулями на концах должна где-то иметь y''>0. Значит выше X нулей не более одного. Теперь предположим, что нули ограничены снизу. Тогда левее некоторой точки y не обращается в нуль и имеет постоянный знак. Выберем T так, что при t>T выполнено (-t)^3+k(-t)<-2, и положим Y(t)=y(-t), если y>0 слева, или Y(t)=-y(-t), если y<0 слева. Тогда Y(t)>0 при t>T и Y''(t)=((-t)^3+k(-t))Y(t)<-2Y(t). Для r=Y'/Y имеем r'=Y''/Y-r^2<-2-r^2. Поэтому d/dt arctan(r/sqrt(2))=r'/(sqrt(2)(1+r^2/2))<-sqrt(2). Но arctan(r/sqrt(2)) всегда лежит между -π/2 и π/2, а на достаточно длинном промежутке длины больше π/sqrt(2) такое строгое убывание невозможно. Противоречие показывает, что нули не могут быть ограничены снизу.",
