        "title": "Формулировка",
        "text": "Рассмотрим семейство интегральных кривых уравнения y'+p(x)y=q(x), где p(k) != 0. Доказать, что все касательные к этим кривым в точках пересечения с прямой x=k проходят через одну точку, не зависящую от выбранной кривой.",
