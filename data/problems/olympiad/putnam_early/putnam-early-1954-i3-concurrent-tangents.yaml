  "ideas": [
    {
      "id": "idea-main",
      "title": "Параметризовать кривую значением в x=k",
      "text": "Наклон в точке x=k выражается через высоту h=y(k); после записи уравнения касательной зависимость от h исчезает в одной фиксированной точке.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть интегральная кривая проходит через точку (k,h). Из уравнения следует, что ее наклон в этой точке равен q(k)-p(k)h. Поэтому касательная имеет вид Y-h=(q(k)-p(k)h)(X-k). Проверим точку P_k=(k+1/p(k), q(k)/p(k)). Для нее левая часть равна q(k)/p(k)-h, а правая равна (q(k)-p(k)h)/p(k)=q(k)/p(k)-h. Значит каждая такая касательная проходит через P_k; эта точка зависит только от k, p(k), q(k), но не от выбранной интегральной кривой.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
