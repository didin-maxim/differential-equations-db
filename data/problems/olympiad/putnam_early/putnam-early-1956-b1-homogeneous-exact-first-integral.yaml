        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Дифференциальное уравнение a(x,y) dx+b(x,y) dy=0 является точным и однородным: a и b - однородные многочлены одной степени, причем a_y=b_x. Доказать, что вдоль любого решения y=y(x) выполнено xa(x,y)+yb(x,y)=c для некоторой константы c.",
