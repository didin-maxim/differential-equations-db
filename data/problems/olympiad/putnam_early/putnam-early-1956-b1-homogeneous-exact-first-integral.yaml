  "ideas": [
    {
      "id": "idea-main",
      "title": "Дифференцировать xa+yb",
      "text": "Точность позволяет переставить смешанные производные, а однородность по Эйлеру превращает оставшиеся члены в кратное исходной формы.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "find_potential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть степень однородных многочленов a и b равна m. Рассмотрим F=xa+yb. Тогда dF=a dx+b dy+x(a_x dx+a_y dy)+y(b_x dx+b_y dy). Из точности a_y=b_x, поэтому коэффициент при dx в добавке равен xa_x+ya_y, а коэффициент при dy равен xb_x+yb_y. По формуле Эйлера для однородных функций xa_x+ya_y=ma и xb_x+yb_y=mb. Следовательно dF=(m+1)(a dx+b dy). Вдоль решения исходная форма a dx+b dy обращается в нуль, значит dF=0 вдоль этой кривой. Поэтому xa(x,y)+yb(x,y)=F=c на каждом связном куске решения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "find_potential"
      ]
    }
