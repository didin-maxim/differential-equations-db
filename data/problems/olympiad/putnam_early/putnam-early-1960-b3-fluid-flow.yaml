  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть r^2=x^2+y^2. Тогда (r^2)'=2xx'+2yy'=2x(y+2x(1-r^2))+2y(-x)=4x^2(1-r^2). Поэтому окружность r=1 инвариантна; внутри нее r не убывает, а вне ее r не возрастает, причем изменение радиуса прекращается только при x=0 или r=1. На самой окружности поле равно (y,-x), то есть движение идет по окружности. Для любой траектории с r<1 радиус стремится к 1, иначе при r<=1-epsilon за каждое прохождение через области с |x| отделенным от нуля радиус увеличивался бы на фиксированную величину; снаружи получается такое же стремление к r=1. Около начала отбросим кубические члены: x'=y+2x, y'=-x. Характеристическое уравнение для матрицы [[2,1],[-1,0]] равно (lambda-1)^2=0, а собственное направление задается y=-x. Поэтому локально траектории имеют вид, соответствующий решению x=(at+b)e^t, y=(-at+a-b)e^t: они касаются направления y=-x и выглядят как S-образные кривые около неустойчивого вырожденного узла. При t -> +infty все ненулевые частицы, не лежащие в начале, приближаются к единичной окружности и затем асимптотически вращаются вдоль предельного цикла.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
