        "id": "stmt-original",
        "title": "Формулировка",
        "text": "На интервале I пусть\\(y_1\\) и \\(y_2 -\\)линейно независимые положительные решения уравнения \\(y''=f(x)y,\\) где f непрерывна. Доказать, что существует положительная константа c такая, что\\(z=c \\sqrt{y_1 y_2}\\)удовлетворяет\\(z''+1/z^3=f(x)z.\\)Ясно указать, как c зависит от\\(y_1\\) и \\(y_2.\\)",
        "source_ids": [
          "src-putnam-archive"
        ],
        "status": "source_solution_checked",
