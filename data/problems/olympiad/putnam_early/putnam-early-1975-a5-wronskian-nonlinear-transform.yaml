  "ideas": [
    {
      "id": "idea-main",
      "title": "Использовать постоянный Вронскиан",
      "text": "Так как в уравнении нет y', вронскиан постоянен; дифференцирование z^2=c^2 y1 y2 выражает остаточный член через квадрат Вронскиана.",
      "status": "ai_checked",
