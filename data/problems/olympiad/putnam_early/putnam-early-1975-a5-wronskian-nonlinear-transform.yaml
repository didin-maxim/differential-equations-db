  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть W=y1 y2'-y1' y2. Тогда W'=y1 y2''-y1'' y2=f y1 y2-f y1 y2=0, так что W - постоянная. Линейная независимость дает W!=0. Возьмем z=c sqrt(y1y2) и обозначим alpha=c^2/2, тогда z^2=2alpha y1y2. Дифференцируя, получаем zz'=alpha(y1y2'+y1'y2). Еще раз: zz''+(z')^2=alpha(y1y2''+2y1'y2'+y1''y2)=fz^2+2alpha y1'y2'. Умножим на z^2 и заменим (zz')^2 по первой формуле: z^3z''+alpha^2(y1y2'+y1'y2)^2=fz^4+4alpha^2 y1y2y1'y2'. Перенося, получаем z^3z''+alpha^2(y1y2'-y1'y2)^2=fz^4, то есть z^3z''+alpha^2 W^2=fz^4. Чтобы получить z''+1/z^3=fz, нужно alpha^2 W^2=1. Значит alpha=1/|W| и c=sqrt(2/|W|). Эта константа положительна и зависит только от постоянного Вронскиана пары y1,y2.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
