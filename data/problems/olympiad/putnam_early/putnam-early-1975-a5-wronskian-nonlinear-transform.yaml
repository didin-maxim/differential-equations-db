  "ideas": [
    {
      "id": "idea-main",
      "title": "Использовать постоянный Вронскиан",
      "text": "Так как в уравнении нет \\(y',\\) вронскиан постоянен; дифференцирование\\(z^2=c^2 y_1 y_2\\)выражает остаточный член через квадрат Вронскиана.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть\\(W=y_1 y_2'-y_1'y_2.\\)Тогда \\(W'=y_1 y_2''-y_1''y_2=f y_1 y_2-f y_1 y_2=0,\\)так что W - постоянная. Линейная независимость дает \\(W\\ne0.\\) Возьмем \\(z=c \\sqrt{y_1y_2}\\) и обозначим\\(\\alpha=c^2/2,\\)тогда\\(z^2=2\\alpha y_1y_2\\)Дифференцируя, получаем\\(zz'=\\alpha(y_1y_2'+y_1'y_2)\\)Еще раз:\\(zz''+(z')^2=\\alpha(y_1y_2''+2y_1'y_2'+y_1''y_2)=fz^2+2\\alpha y_1'y_2'\\)Умножим на\\(z^2\\)и заменим\\((zz')^2\\)по первой формуле:\\(z^3z''+\\alpha^2(y_1y_2'+y_1'y_2)^2=fz^4+4\\alpha^2 y_1y_2y_1'y_2'\\)Перенося, получаем\\(z^3z''+\\alpha^2(y_1y_2'-y_1'y_2)^2=fz^4\\) то есть\\(z^3z''+\\alpha^2 W^2=fz^4.\\) Чтобы получить\\(z''+1/z^3=fz,\\)нужно\\(\\alpha^2 W^2=1.\\) Значит \\(\\alpha=1/|W|\\) и \\(c=\\sqrt{2/|W|}\\). Эта константа положительна и зависит только от постоянного Вронскиана пары\\(y_1,y_2.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
  ],
