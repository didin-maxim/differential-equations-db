        "title": "Формулировка",
        "text": "На интервале I пусть y1 и y2 - линейно независимые положительные решения уравнения y''=f(x)y, где f непрерывна. Доказать, что существует положительная константа c такая, что z=c sqrt(y1 y2) удовлетворяет z''+1/z^3=f(x)z. Ясно указать, как c зависит от y1 и y2.",
