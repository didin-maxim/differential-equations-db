        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть u(t) непрерывна, а x(t), y(t) решают\\(x'=-2y+u(t), y'=-2x+u(t), x(0)=x_0, y(0)=y_0.\\)Доказать, что при\\(x_0\\ne y_0\\)решение никогда не проходит через (0,0). Если\\(x_0=y_0,\\)то для любого T>0 можно выбрать u(t), чтобы \\(x(T)=y(T)=0.\\)",
