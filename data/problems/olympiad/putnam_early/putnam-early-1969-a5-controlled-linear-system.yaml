  "ideas": [
    {
      "id": "idea-main",
      "title": "Вычесть координаты",
      "text": "Разность x-y не зависит от управления и удовлетворяет простому уравнению \\(z'=2z\\); при равных координатах остается одно управляемое линейное уравнение.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference",
        "integrating_factor_linear"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим \\(z=x-y.\\) Тогда \\(z'=x'-y'=2x-2y=2z,\\) значит \\(z(t)=(x_0-y_0)e^{2t}.\\) Если\\(x_0\\ne y_0,\\)то z(t) никогда не равно нулю, а в точке (0,0) было бы \\(z=0\\); поэтому попадание в начало невозможно при любом управлении. Пусть теперь\\(x_0=y_0=k.\\)Тогда \\(z(0)=0\\) и \\(z(t)=0\\) для всех t, то есть \\(x=y.\\) Система сводится к \\(x'+2x=u(t), x(0)=k.\\) Для заданного T>0 возьмем \\(u(t)=-(k/T)e^{-2t}.\\) Тогда \\((e^{2t}x)'=e^{2t}u=-k/T,\\) откуда \\(e^{2t}x(t)=k-kt/T\\) и \\(x(t)=k(1-t/T)e^{-2t}.\\) При \\(t=T\\) получаем \\(x(T)=0,\\) а так как \\(y=x,\\) также \\(y(T)=0.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference",
        "integrating_factor_linear"
      ]
    }
  ],
