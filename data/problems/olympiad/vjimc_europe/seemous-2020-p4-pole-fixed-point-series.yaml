  "ideas": [
    {
      "id": "idea-main",
      "title": "Перевернуть функцию около полюса",
      "text": "Условие f'/f^2→1 означает, что (1/f)'→-1 около a слева. Поэтому f(a-y) ведет себя как 1/y, а уравнение f(a-y_n)=nT+a-y_n дает y_n порядка 1/n.",
      "status": "ai_checked",
      "standard_idea_ids": [
