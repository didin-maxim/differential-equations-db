        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Существование x_n следует из f(nT)=0 и f(x)→+∞ при x→nT+a слева. Если бы было два корня f(x)=x на одном таком интервале, то по Роллю для g=f-x нашлась бы точка, где g'=f'-1=0, что противоречит f'>1. Положим x_n=nT+a-y_n. Так как f строго возрастает и f(x_n)=x_n→∞, получаем y_n→0. Далее (1/f)'=-f'/f^2 → -1 при x→a-. Отсюда 1/f(a-y)~y при y→0+, то есть f(a-y)~1/y. По периодичности f(x_n)=f(a-y_n), а по определению f(x_n)=x_n=nT+a-y_n. Следовательно y_n(nT+a-y_n)→1, в частности y_n~1/(nT), и ряд ∑ y_n расходится. Наконец f дифференцируема в 0 и f(0)=0, значит f(x)=O(x) при x→0+. Поэтому z_n=\\(\\(\\int_0^{y_n}\\)\\) f(x)dx=O(y_n^2)=O(1/n^2), и ряд ∑ z_n сходится.",
      "status": "source_solution_checked",
