        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть 0<a<T, D=R\\{kT+a: k∈Z}, а f:D→R является T-периодической дифференцируемой функцией. Известно, что f'>1 на (0,a), f(0)=0, \\(\\lim_{x→a-}\\) f(x)=+∞ и \\(\\lim_{x→a-}\\) f'(x)/f(x)^2=1. Для каждого n≥1 пусть x_n - единственное решение f(x)=x в (nT,nT+a), y_n=nT+a-x_n, z_n=\\(\\(\\int_0^{y_n}\\)\\) f(x)dx. Докажите, что y_n→0, и исследуйте сходимость рядов ∑ y_n и ∑ z_n.",
