  "ideas": [
    {
      "id": "idea-main",
      "title": "Сумма ряда удовлетворяет линейному уравнению",
      "text": "После доказательства равномерной сходимости можно дифференцировать сумму почленно: \\(F'=F+f0.\\) Дальше задача становится обычным линейным уравнением первого порядка.",
      "status": "ai_checked",
      "standard_idea_ids": [
