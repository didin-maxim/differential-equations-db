      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть \\(M=\\max_{[0,1]} |f_0|\\). Индукцией из определения получаем \\(|f_n(x)|\\le Mx^n/n!\\), значит \\(\\sum f_n\\) сходится равномерно на \\([0,1]\\). Кроме того, \\(f_n'=f_{n-1}\\), поэтому ряд производных \\(\\sum_{n\\ge1} f_n'=\\sum_{n\\ge0} f_n\\) также сходится равномерно: к уже доказанной сходимости добавляется один член \\(f_0\\). Обозначим \\(F=\\sum_{n\\ge1} f_n\\). Тогда \\(F(0)=0\\) и \\(F'=f_0+F\\). Умножая на \\(e^{-x}\\), получаем \\((e^{-x}F(x))'=e^{-x}f_0(x)\\). Интегрирование от 0 до \\(x\\) дает \\(F(x)=e^{x}\\int_0^x f_0(t)e^{-t}\\,dt\\).",
      "status": "source_solution_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
  ],
