        "title": "Формулировка",
        "text": "Пусть \\(f_0\\) непрерывна на \\([0,1]\\), а \\(f_n(x)=\\int_0^x f_{n-1}(t)\\,dt\\) для \\(n\\ge1\\). Докажите равномерную сходимость ряда \\(\\sum_{n=1}^\\infty f_n\\) на \\([0,1]\\) и найдите его сумму.",
