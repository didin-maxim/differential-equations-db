        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Существует ли такое дифференциальное уравнение первого порядка \\(F(x,y,y')=0,\\) что для любой точки\\((x_0,y_0)\\in\\mathbb R^2\\)задача Коши\\(F(x,y,y')=0, y(x_0)=y_0\\)имеет ровно один миллион решений? Обоснуйте ответ.",
        "source_ids": [
          "src-innopolis-math-olympiad"
        ],
        "status": "source_statement_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "ordinary_differential_equation",
          "initial_value_problem",
          "solution"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Сделать миллион регулярных наклонов",
      "text": "Неявное уравнение может быть произведением независимых регулярных ветвей по \\(y'.\\) Если ветви \\(y'=k\\) имеют разные постоянные наклоны, то через каждую точку проходит ровно по одной прямой каждого наклона, и они никогда не склеиваются.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Да, существует. Возьмем \\(F(x,y,p)=\\prod_{k=1}^{10^6}(p-k)\\), то есть уравнение \\(\\prod_{k=1}^{10^6}(y'-k)=0\\). Любое его\\(C^1-\\)решение на интервале должно в каждой точке иметь производную из множества\\({1,2,...,10^6}.\\)Так как производная непрерывна, а это множество дискретно, на любом связном интервале выбран один и тот же k; значит решение имеет вид \\(y=kx+C.\\) Через точку\\((x_0,y_0)\\)для каждого k проходит ровно одна такая прямая:\\(y=y_0+k(x-x_0).\\)Эти\\(10^6\\)прямых попарно различны, потому что их наклоны различны. Следовательно, задача Коши имеет ровно один миллион решений.",
      "status": "ai_checked"
    }
  ],
