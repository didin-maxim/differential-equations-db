  "ideas": [
    {
      "id": "idea-main",
      "title": "После выхода за диагональ использовать обратную функцию",
      "text": "Из f'=f(f)>0 следует монотонность. Как только f(x)>x+1, обратная функция h=f^{-1} удовлетворяет h'=1/f и растет не быстрее логарифма; это заставляет f расти не медленнее экспоненты, а затем уравнение f'=f(f) дает конечный взрыв.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Предположим, что такая f существует. Тогда f'(x)=f(f(x))>0, так что f строго возрастает. Сначала покажем, что f(x)-x становится больше 1. Если бы f была ограничена, то она имела бы конечный предел L>0, а тогда f'(x)=f(f(x)) стремилась бы к f(L)>0, что противоречит сходимости f. Значит f неограничена. Если на некотором хвосте было бы f'(x)<=1, то для неограниченного множества y=f(x) выполнялось бы f(y)=f'(x)<=1; но при больших y по возрастанию f(y)>1. Противоречие. Поэтому найдется x1 с f'(x1)>1. Так как f' возрастает на [x1,∞), получаем f(x)-x->∞; в частности, есть X, после которого f(x)>x+1. Рассмотрим обратную функцию h=f^{-1} на хвосте области значений. Для y достаточно большого h'(y)=1/f(y)<1/(y+1), поскольку y также лежит на хвосте и f(y)>y+1. Интегрируя, получаем h(y)<=C+ln(y+1). Подставляя y=f(x), имеем x=h(f(x))<=C+ln(f(x)+1), то есть f(x)>=c e^x на некотором хвосте. Тогда f'(x)=f(f(x))>=c exp(f(x)) для всех достаточно больших x. Но из y'=c exp(y) следует конечный взрыв: производная exp(-f(x)) равна -f'(x)exp(-f(x)) и на хвосте не превосходит отрицательной постоянной. Это невозможно для функции, заданной на всем R_+. Следовательно, такой f не существует.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
