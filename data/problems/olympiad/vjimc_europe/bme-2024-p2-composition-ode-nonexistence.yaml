        "title": "Формулировка",
        "text": "Пусть f:R_+->R_+ дифференцируема. Может ли выполняться равенство f'=f∘f? Сначала покажите, что в таком случае существовала бы точка x0>0, для которой f(x0)-x0>1, а затем докажите невозможность такого уравнения.",
