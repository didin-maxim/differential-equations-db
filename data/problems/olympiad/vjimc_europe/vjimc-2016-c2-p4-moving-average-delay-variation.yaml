  "ideas": [
    {
      "id": "idea-main",
      "title": "Отслеживать осцилляцию на единичных окнах",
      "text": "Дифференцирование превращает условие в уравнение с запаздыванием \\(f'(x)=f(x)-f(x-1).\\) Если на каждом окне [n,n+1] взять максимум, минимум и размах, то уравнение среднего заставляет максимумы убывать, минимумы возрастать, а размах количественно затухать.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function",
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из условия получаем для \\(x>1\\) равенство \\(f'(x)=f(x)-f(x-1)\\). Обозначим \\(A_n=\\max_{[n,n+1]} f\\), \\(B_n=\\min_{[n,n+1]} f\\) и \\(d_n=A_n-B_n\\). Если бы \\(A_n>A_{n-1}\\), то в первой точке \\(m\\in[n,n+1]\\), где \\(f(m)=A_n\\), среднее \\(\\int_{m-1}^m f(t)\\,dt\\) было бы строго меньше \\(A_n\\), что противоречит равенству \\(f(m)=\\int_{m-1}^m f(t)\\,dt\\). Значит, \\(A_n\\le A_{n-1}\\); тот же довод для \\(-f\\) дает \\(B_n\\ge B_{n-1}\\), поэтому \\(d_n\\) невозрастает. Кроме того, на \\([n+1,n+2]\\) имеем \\(|f'|\\le d_n\\), так что достаточно доказать суммируемость \\(d_n\\). Официальное решение делает это количественно. Так как график на \\([n,n+1]\\) обязан соединить уровни \\(A_n\\) и \\(B_n\\) при наклоне не больше \\(d_{n-1}\\), среднее на этом окне не превосходит \\(A_n-d_n^2/(2d_{n-1})\\). Повторяя этот барьер на двух следующих окнах, получают \\(A_{n+2}\\le A_n-d_n^5/(128d_{n-1}^4)\\), а применением той же оценки к \\(-f\\) получают \\(B_{n+2}\\ge B_n+d_n^5/(128d_{n-1}^4)\\). Поэтому \\(d_{n+2}\\le d_n-d_n^5/(64d_{n-1}^4)\\). Деление на \\(d_n\\) и монотонность \\(d_n\\) дают \\(d_{n+2}/d_{n-2}\\le63/64\\) для каждой из четырех подпоследовательностей по модулю 4. Следовательно, \\(\\sum d_n\\) сходится. Наконец, \\(\\int_1^\\infty |f'|\\,dx\\le\\sum_{n\\ge1} d_{n-1}<\\infty\\).",
      "status": "source_solution_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
