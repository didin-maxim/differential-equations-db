        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(f:[0,\\infty)\\to\\mathbb R\\) непрерывно дифференцируема и для всех \\(x\\ge1\\) выполнено \\(f(x)=\\int_{x-1}^x f(t)\\,dt\\). Докажите, что \\(f\\) имеет ограниченную вариацию на \\([1,\\infty)\\), то есть \\(\\int_1^\\infty |f'(x)|\\,dx<\\infty\\).",
