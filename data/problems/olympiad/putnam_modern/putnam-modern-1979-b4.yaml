  "ideas": [
    {
      "id": "idea-main",
      "title": "Угадать инвариантное двумерное пространство",
      "text": "Хотя коэффициенты не постоянны, оператор сохраняет \\(\\operatorname{span}(e^{3x}, x+x^2)\\); после этого неоднородная задача сводится к двум константам.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Прямая подстановка дает \\(F(e^{3x})=0\\): коэффициент при \\(e^{3x}\\) равен\\(9(3x^2+x-1)-3(9x^2+9x-2)+(18x+3)=0.\\) Также\\(F(x+x^2)=0,\\)потому что \\(y'=1+2x, y''=2,\\) и после раскрытия скобок все степени x сокращаются. Эти два решения линейно независимы, поэтому общее решение однородного уравнения имеет вид \\(Ae^{3x}+B(x+x^2).\\) Для неоднородного уравнения подходит частное решение \\(y=2,\\) так как \\(F(2)=2(18x+3)=36x+6.\\) Следовательно\\(, f(x)=2+Ae^{3x}+B(x+x^2).\\) Условие \\(f(0)=1\\) дает \\(A=-1.\\) Далее \\(f(-1)-2=-e^{-3},\\) а \\(f(1)-6=-e^3+2B-4.\\) Из \\((-e^{-3})(-e^3+2B-4)=1\\) получаем \\(B=2.\\) Тогда \\(f(-2)=6-e^{-6}, f(2)=14-e^{6},\\) поэтому искомое соотношение: \\((f(-2)-6)(f(2)-14)=1.\\)",
      "status": "ai_checked"
    }
  ],
