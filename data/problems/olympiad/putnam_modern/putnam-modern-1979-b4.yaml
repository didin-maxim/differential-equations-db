        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть\\(F(y)=(3x^2+x-1)y''-(9x^2+9x-2)y'+(18x+3)y. (a)\\) Найти нетривиальное решение \\(F(y)=0. (b)\\) Пусть \\(y=f(x) -\\) решение \\(F(y)=6(6x+1),\\) для которого \\(f(0)=1\\) и \\((f(-1)-2)(f(1)-6)=1.\\) Найти соотношение вида \\((f(-2)-a)(f(2)-b)=c.\\)",
        "source_ids": [
          "src-putnam-archive"
        ],
        "status": "ai_checked",
