  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Вынести e^x",
      "text": "Условие f'>f означает, что e^(-x)f(x) строго возрастает; порог k=1 проверяется ограниченным возрастающим множителем.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть h(x)=e^(-x)f(x). Тогда h'(x)=e^(-x)(f'(x)-f(x))>0, то есть h положительна и строго возрастает. Если k<1, то для любого фиксированного x0 и всех x>x0 имеем h(x)>=h(x0)>0, поэтому f(x)/e^(kx)=h(x)e^((1-k)x)>=h(x0)e^((1-k)x) стремится к бесконечности. Значит при достаточно больших x выполнено f(x)>e^(kx). Для k>=1 свойство неверно. Возьмем h(x)=1/2+arctan(x)/pi; тогда 0<h(x)<1 и h'(x)>0 на всей прямой. Функция f=e^x h положительна и удовлетворяет f'>f. При k=1 имеем f(x)<e^x для всех x, а при k>1 тем более f(x)/e^(kx)=h(x)e^((1-k)x) стремится к 0. Следовательно, искомое множество равно (-infty,1).",
      "status": "ai_checked"
    }
  ],
