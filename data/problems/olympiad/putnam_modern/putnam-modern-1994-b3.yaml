        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Найти все действительные k со следующим свойством: для любой положительной дифференцируемой функции f, удовлетворяющей f'(x)>f(x) при всех x, существует N такое, что f(x)>e^(kx) для всех x>N.",
