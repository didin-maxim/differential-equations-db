  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из исходного равенства после замены x на a/x получаем f'(x)=a/(x f(a/x)), то есть f(a/x)=a/(x f'(x)). Дифференцируем это тождество: левая часть равна -(a/x^2)f'(a/x), а правая равна -a(f'(x)+x f''(x))/(x f'(x))^2. Используя f'(a/x)=x/f(x), получаем x(f')^2=f(f'+xf''). Перепишем это как (x f')'=x(f')^2/f. Положим \\(x=e^{u}\\) и \\(F(u)=\\ln f(e^{u})\\). Тогда f'=f F'/x, а равенство превращается в F''=0. Значит F(u)=cu+d и f(x)=C x^c, где C>0. Подстановка в исходное условие дает C c (a/x)^(c-1)=x/(C x^c), то есть C^2 c a^(c-1)=1. Поэтому c>0. Если c≠1, для любого C>0 можно выбрать a=(1/(C^2 c))^(1/(c-1)); если c=1, необходимо и достаточно C=1. Ответ: f(x)=C x^c при c>0, c≠1, C>0, а также отдельный случай f(x)=x.",
      "status": "ai_checked"
    }
  ],
