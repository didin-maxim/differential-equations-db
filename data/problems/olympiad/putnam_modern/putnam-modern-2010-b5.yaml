  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Ответ: не существует. Предположим обратное. Так как f строго возрастает, f'(x)≥0, а из f'(x)=f(f(x)) следует, что f' тоже строго возрастает: при y>x имеем f(y)>f(x), значит f'(y)=f(f(y))>f(f(x))=f'(x). На самом деле f'>0 всюду, иначе возрастающая функция f' имела бы нуль и не могла бы быть строго возрастающей и неотрицательной на всей прямой. Дифференцируя f'=f(f(x)), получаем f''(x)=f'(f(x))f'(x)>0. Кроме того, f'' возрастает как произведение положительных возрастающих функций. Выберем M и alpha>0 так, что f''(x)>4alpha при x≥M. Тогда для больших x получаем f(x)≥f(M)+f'(M)(x-M)+2alpha(x-M)^2, в частности существует M'>M такое, что f(x)≥alpha x^2 при x≥M'. Выберем T настолько большим, что T≥M' и alpha T^2≥M'. Тогда при x≥T имеем f(x)≥M' и потому f'(x)=f(f(x))≥alpha f(x)^2. Интегрируя на [T,2T], получаем 1/f(T)-1/f(2T)=\\(\\int_T^{2T}\\) f'(t)/f(t)^2 dt ≥ alpha T. Левая часть не превосходит 1/f(T) и стремится к 0 при T→∞, а правая часть стремится к бесконечности. Противоречие.",
      "status": "ai_checked"
    }
  ],
