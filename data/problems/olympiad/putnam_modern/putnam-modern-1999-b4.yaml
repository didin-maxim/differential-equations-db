        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f - действительная функция с непрерывной третьей производной, причем f(x), f'(x), f''(x), f'''(x) положительны для всех x. Предположим, что f'''(x)≤f(x) для всех x. Доказать, что f'(x)<2f(x) для всех x.",
