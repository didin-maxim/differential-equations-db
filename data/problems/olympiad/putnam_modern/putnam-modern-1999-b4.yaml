  "ideas": [
    {
      "id": "idea-main",
      "title": "Смотреть назад по прямой",
      "text": "Положительность на всей прямой запрещает слишком большие производные: иначе квадратичная оценка назад дала бы отрицательные значения.",
      "status": "ai_checked",
