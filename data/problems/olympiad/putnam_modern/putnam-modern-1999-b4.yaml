  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Зафиксируем x. Так как f'''>0, функция f'' возрастает. Для t>0 формула Тейлора с интегральным остатком и оценка f''(x-s)≤f''(x) при 0≤s≤t дают f(x-t)≤f(x)-t f'(x)+t^2 f''(x)/2. Левая часть положительна, значит квадратный трехчлен f(x)-t f'(x)+t^2 f''(x)/2 положителен при всех t>0; отсюда (f')^2≤2ff''. Далее из f'''≤f и возрастания f получаем для 0≤s≤t оценку f'''(x-s)≤f(x). Поэтому f''(x-s)≥f''(x)-s f(x), и тогда \\(f'(x)> \\int_{x-t}^x f''(u)\\,du ≥ t f''(x)-t^2 f(x)/2\\). Максимизируя правую часть по t, берем t=f''(x)/f(x) и получаем (f'')^2<2ff'. Обозначим a=f'/f и b=f''/f. Две оценки дают a^2≤2b и b^2<2a. Следовательно, a^4≤4b^2<8a, то есть a^3<8. Так как a>0, получаем a<2, а значит f'(x)<2f(x). Точка x была произвольной.",
      "status": "ai_checked"
    }
  ],
