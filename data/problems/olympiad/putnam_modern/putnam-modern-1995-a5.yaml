    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Взять левый собственный функционал",
      "text": "У матрицы с положительным следом есть собственное значение с положительной действительной частью; соответствующая линейная комбинация координат не может одновременно затухать и быть ненулевым решением y'=lambda y.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим X=(x_1,...,x_n)^T и A=(a_ij). Так как все диагональные элементы положительны, tr A>0. Сумма действительных частей всех комплексных собственных значений A равна tr A, поэтому у A, а значит и у A^T, есть собственное значение lambda с Re lambda>0. Пусть v - соответствующий ненулевой левый собственный вектор: A^T v=lambda v. Тогда y(t)=v^T X(t) удовлетворяет y'=v^T AX=(A^T v)^T X=lambda y, откуда y(t)=C e^(lambda t). С другой стороны, все координаты X(t) стремятся к нулю, значит y(t)->0. При Re lambda>0 это возможно только при C=0, то есть v^T X(t)=0 для всех t. Если v комплексный, берем ненулевую действительную или мнимую часть этого тождества. Получается нетривиальная действительная линейная комбинация функций x_i, равная нулю тождественно. Следовательно, функции x_1,...,x_n обязательно линейно зависимы.",
      "status": "ai_checked"
    }
  ],
