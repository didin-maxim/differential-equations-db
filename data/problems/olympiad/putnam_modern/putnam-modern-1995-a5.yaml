        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть x_1(t),...,x_n(t) - дифференцируемые действительнозначные функции, удовлетворяющие системе x_i' = a_i1 x_1 + ... + a_in x_n с постоянными a_ij>0. Предположим, что x_i(t)->0 при t->infty для всех i. Обязательно ли функции x_1,...,x_n линейно зависимы?",
        "source_ids": [
          "src-putnam-archive"
        ],
        "status": "ai_checked",
        "self_contained": {
