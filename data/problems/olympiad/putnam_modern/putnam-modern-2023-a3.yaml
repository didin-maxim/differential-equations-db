  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пример f(x)=cos x, g(x)=sin x показывает, что r=pi/2 достижимо: f(0)=1, g(0)=0, |f'|=|g|, |g'|=|f| и f(pi/2)=0. Докажем, что меньшего r быть не может. Пусть f(r)=0 и пусть s - первая точка из (0,r], где f(s)=0. На [0,s) имеем f>0. Кроме того, g(s) не может равняться нулю: если f(s)=g(s)=0, то для x<=s из интегральных неравенств |f(x)|<=int_x^s |g(t)| dt и |g(x)|<=int_x^s |f(t)| dt следует по неравенству Гронуолла назад, что f и g тождественно равны нулю на [0,s], противоречие с f(0)>0. Поэтому угол theta(x)=atan(g(x)/f(x)) стремится при x->s- к pi/2 или -pi/2. Для x<s вычисляем theta'=(f g'-g f')/(f^2+g^2), откуда |theta'|<=(|f||g'|+|g||f'|)/(f^2+g^2)<=1. Значит |theta(s-)-theta(0)|<=s. Так как theta(0)=0, а |theta(s-)|=pi/2, получаем s>=pi/2 и тем более r>=pi/2. Ответ: r=pi/2.",
      "status": "ai_checked"
    }
  ],
