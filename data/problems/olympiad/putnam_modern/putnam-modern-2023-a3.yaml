        "title": "Формулировка",
        "text": "Определить наименьшее положительное r, для которого существуют дифференцируемые функции f:R->R и g:R->R, удовлетворяющие f(0)>0, g(0)=0, |f'(x)|<=|g(x)| для всех x, |g'(x)|<=|f(x)| для всех x и f(r)=0.",
