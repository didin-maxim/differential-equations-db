        "title": "Формулировка",
        "text": "Найти все действительнозначные непрерывно дифференцируемые функции f на всей прямой, такие что для всех x выполнено \\(f(x)^2 = \\int_0^x (f(t)^2+f'(t)^2)\\,dt + 1990.\\)",
