  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Подставляя \\(x=0,\\) получаем\\(f(0)^2=1990.\\)Дифференцируем исходное тождество:\\(2ff'=f^2+(f')^2.\\)Это равносильно\\((f'-f)^2=0,\\)значит \\(f'=f\\) на всей прямой. Поэтому \\(f(x)=Ce^{x}.\\) Из\\(f(0)^2=1990\\)следует \\(C=\\)±sqrt(1990). Проверка: для \\(f=Ce^{x}\\) имеем \\(f^2+(f')^2=2C^2e^{2x}, \\int_0^x 2C^2e^{2t}\\,dt = C^2(e^{2x}-1),\\) и после добавления\\(1990=C^2\\)получается \\(C^2e^{2x}=f(x)^2.\\) Ответ: \\(f(x)=\\sqrt{1990}e^{x}\\) и \\(f(x)=-\\sqrt{1990}e^{x}.\\)",
      "status": "ai_checked"
    }
  ],
