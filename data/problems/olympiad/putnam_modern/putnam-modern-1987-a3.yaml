        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Для всех действительных \\(x\\) функция \\(y=f(x)\\) удовлетворяет \\(y''-2y'+y=2e^{x}\\). (a) Если \\(f(x)>0\\) при всех \\(x\\), обязано ли быть \\(f'(x)>0\\) при всех \\(x\\)? (b) Если \\(f'(x)>0\\) при всех \\(x\\), обязано ли быть \\(f(x)>0\\) при всех \\(x\\)?",
        "source_ids": [
          "src-putnam-archive"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "ordinary_differential_equation"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Снять экспоненту",
      "text": "Замена \\(f=e^{x} q\\) превращает оператор (D-1)^2 в обычную вторую производную q''.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "resonance_ansatz"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим \\(f(x)=e^{x}q(x)\\). Тогда \\(f''-2f'+f=e^{x}q''\\), откуда \\(q''=2\\) и \\(q(x)=x^2+ax+b\\). Поэтому \\(f'(x)=e^{x}(q+q')=e^{x}(x^2+(a+2)x+a+b)\\). В пункте (a) ответ отрицательный: при \\(q=x^2+1/4\\) имеем \\(f=e^{x}(x^2+1/4)>0\\) для всех \\(x\\), но \\(f'(-1)=e^{-1}(1-2+1/4)<0\\). В пункте (b) ответ положительный. Условие \\(f'>0\\) равносильно положительности квадратичного трехчлена \\(r(x)=x^2+(a+2)x+a+b\\) для всех \\(x\\). Его дискриминант отрицателен: \\((a+2)^2-4(a+b)<0\\), то есть \\(b>a^2/4+1\\). Тогда минимум \\(q\\) равен \\(b-a^2/4\\) и он больше 1, значит \\(q(x)>0\\) для всех \\(x\\). Так как \\(e^{x}>0\\), получаем \\(f(x)>0\\) для всех \\(x\\).",
      "status": "ai_checked"
    }
  ],
