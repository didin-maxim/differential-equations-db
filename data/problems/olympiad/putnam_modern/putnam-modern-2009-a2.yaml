        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Функции f,g,h дифференцируемы в некотором открытом интервале вокруг 0 и удовлетворяют f'=2f^2gh+1/(gh), f(0)=1; g'=fg^2h+4/(fh), g(0)=1; h'=3fgh^2+1/(fg), h(0)=1. Найти явную формулу для f(x), верную в некотором открытом интервале вокруг 0.",
