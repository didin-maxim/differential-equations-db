  "ideas": [
    {
      "id": "idea-main",
      "title": "Свернуть систему в одно произведение",
      "text": "Для k=fgh сумма логарифмических производных дает автономное уравнение k'=6k^2+6, после чего f находится интегрированием f'/f.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference",
        "separate_variables"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим k=fgh. Умножая первое уравнение на gh, второе на fh, третье на fg и складывая, получаем k'=6k^2+6, причем k(0)=1. Следовательно, arctan k=6x+π/4 и k(x)=tan(6x+π/4) в достаточно малой окрестности нуля. Из первого уравнения после деления на f получаем f'/f=2k+1/k=2tan(6x+π/4)+cot(6x+π/4). Интегрируя, имеем ln f = (1/6)(-2 ln cos(6x+π/4)+ln sin(6x+π/4))+C. Условие f(0)=1 дает \\(e^{C}\\)=2^(-1/12). Поэтому f(x)=2^(-1/12)(sin(6x+π/4)/cos^2(6x+π/4))^(1/6), где берется окрестность нуля, на которой синус и косинус положительны.",
      "status": "ai_checked"
    }
  ],
