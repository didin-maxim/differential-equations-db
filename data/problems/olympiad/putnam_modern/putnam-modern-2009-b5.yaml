        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Зажать решение между двумя прямыми барьерами",
      "text": "Функции x+f и x-f монотонны и уходят на бесконечность; затем |f|<x, f становится монотонной, а конечный предел противоречит правой части ОДУ.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть p=x+f. Тогда p'=1+f'. Если f/x=u, то f'=(1-u^2)/(1+x^2u^2), поэтому p'=1+(1-u^2)/(1+x^2u^2). При x>1 это положительно: числитель после приведения равен 2+(x^2-1)u^2. Значит p возрастает. Он не может иметь конечный предел L, потому что тогда u=f/x=(p-x)/x -> -1, а формула для p' дала бы p'->1, несовместимо с сходимостью возрастающей функции. Следовательно, x+f(x)->infty. Теперь рассмотрим q=x-f. Имеем q'=1-f'=1-(1-u^2)/(1+x^2u^2)=u^2(x^2+1)/(1+x^2u^2)>=0. Если бы q имела конечный предел, то u=(x-q)/x -> 1 и из формулы следовало бы q'->1, что снова несовместимо со сходимостью возрастающей функции. Значит x-f(x)->infty. Поэтому для достаточно больших x имеем -x<f(x)<x, а значит f'(x)>0. Отсюда f имеет конечный или бесконечный предел L. Если L конечен, то f(x)/x->0, и из уравнения следует f'(x)->1/(1+L^2)>0. Тогда f растет хотя бы линейно на хвосте, что противоречит конечности L. Значит L=+infty.",
      "status": "ai_checked"
    }
  ],
