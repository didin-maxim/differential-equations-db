        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f:(1,infty)->R - дифференцируемая функция, такая что f'(x)=(x^2-f(x)^2)/(x^2(f(x)^2+1)) для всех x>1. Доказать, что lim_{x->infty} f(x)=infty.",
