        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Распространенная ошибка в дифференцировании состоит в записи (fg)'=f'g'. Пусть f(x)=\\(e^{x^2}\\). Определить с доказательством, существуют ли открытый интервал (a,b) и ненулевая функция g на нем, для которых это ошибочное правило верно при всех x из (a,b).",
        "source_ids": [
          "src-putnam-archive"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "linear_first_order_equation"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Превратить ошибку в линейное уравнение",
      "text": "После подстановки f=\\(e^{x^2}\\) условие становится уравнением первого порядка для g; особая точка x=1/2 только ограничивает интервал.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear",
        "separate_variables"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Имеем (fg)'=\\(e^{x^2}\\)g'+2x \\(e^{x^2}\\)g, а f'g'=2x \\(e^{x^2}\\)g'. После деления на \\(e^{x^2}\\) получаем (1-2x)g'+2xg=0. На любом интервале, не содержащем 1/2, это уравнение разделяется: g'/g=2x/(2x-1)=1+1/(2x-1). Поэтому g(x)=C \\(e^{x}\\) sqrt(|2x-1|). Например, на интервале (1/2,+∞) функция g(x)=\\(e^{x}\\) sqrt(2x-1) дифференцируема, нигде не равна нулю и удовлетворяет полученному уравнению. Следовательно, требуемые интервал и функция существуют.",
      "status": "ai_checked"
    }
  ],
