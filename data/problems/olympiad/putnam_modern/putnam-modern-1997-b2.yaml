        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f - дважды дифференцируемая действительнозначная функция, удовлетворяющая f(x)+f''(x)=-x g(x) f'(x), где g(x)≥0 для всех действительных x. Доказать, что |f(x)| ограничена.",
        "source_ids": [
          "src-putnam-archive"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "ordinary_differential_equation"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Энергия осциллятора с демпфированием",
      "text": "Для E=f^2+(f')^2 производная имеет знак, направленный к x=0, поэтому энергия не превосходит E(0) с обеих сторон.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим E(x)=f(x)^2+f'(x)^2. Тогда E'=2ff'+2f'f''=2f'(f+f'')=-2x g(x)(f'(x))^2. При x≥0 имеем E'≤0, значит E(x)≤E(0). При x≤0 имеем E'≥0; двигаясь от x к 0, получаем снова E(x)≤E(0). Следовательно, для всех x выполнено f(x)^2≤E(x)≤E(0), и потому |f(x)|≤sqrt(E(0)).",
      "status": "ai_checked"
    }
  ],
