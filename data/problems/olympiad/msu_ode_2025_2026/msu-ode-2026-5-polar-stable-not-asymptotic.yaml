        "title": "МГУ ОДУ 2026, задача 5",
        "text": "На плоскости задана автономная система с нулевым решением, которая при rho>0 в полярных координатах имеет вид phi'=rho^2(2+cos phi), rho'=rho^3 sin(1/rho). Является ли нулевое решение устойчивым, а если да, то асимптотически ли?",
        "source_ids": [
          "src-msu-ode-olympiad"
        ],
        "status": "source_statement_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
