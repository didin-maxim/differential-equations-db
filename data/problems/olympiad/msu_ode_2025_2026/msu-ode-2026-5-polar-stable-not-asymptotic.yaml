  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Искать инвариантные окружности rho=const",
      "text": "Радиальное уравнение не зависит от phi. Нули sin(1/rho) дают окружности rho=1/(π k), которые не пересекаются траекториями и накапливаются к нулю.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "radial_limit_cycle_stability"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Нули радиальной скорости имеют вид rho_k=1/(π k), k=1,2,... Эти окружности инвариантны, а phi'=rho^2(2+cos phi)>0, так что на них движение непостоянное. Для любого epsilon>0 можно выбрать k так, что rho_k<epsilon, и взять delta=rho_k. Если rho(0)<delta, траектория не может пересечь инвариантную окружность rho=rho_k, поэтому остается внутри круга радиуса epsilon. Значит, нулевое решение устойчиво по Ляпунову. Оно не является асимптотически устойчивым: если rho(0)=rho_k, то rho(t)=rho_k для всех t, и траектория не стремится к нулю.",
      "status": "ai_checked"
    }
  ],
