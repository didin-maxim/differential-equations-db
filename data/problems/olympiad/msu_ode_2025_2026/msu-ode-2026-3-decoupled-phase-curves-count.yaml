        "title": "МГУ ОДУ 2026, задача 3",
        "text": "Сколько фазовых кривых системы x'=x^3-4x+3, y'=y^2026-1 имеют вид: а) точки; б) луча, параллельного одной из осей координат; в) интервала, параллельного одной из осей координат? Ответы обоснуйте.",
