  "ideas": [
    {
      "id": "idea-main",
      "title": "Разделить фазовые прямые x и y",
      "text": "Горизонтальная фазовая кривая появляется при y'=0, вертикальная - при x'=0, а точка - при одновременном выполнении обоих условий.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "phase_line_signs"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Уравнение x^3-4x+3=0 имеет три вещественных корня: x=1 и x=(-1±sqrt(13))/2. Уравнение y^2026-1=0 имеет единственный вещественный корень y=1. Поэтому точек равновесия 3. На прямой y=1 горизонтальные фазовые кривые идут по компонентам прямой x с удаленными тремя равновесиями: две внешние компоненты являются лучами, две внутренние - интервалами. На каждой из трех вертикальных прямых x=x_* с x^3-4x+3=0 уравнение для y имеет равновесие y=1, поэтому получаются два вертикальных луча: y<1 и y>1. Итого: точек 3, лучей 2+3*2=8, интервалов 2.",
      "status": "ai_checked"
    }
  ],
