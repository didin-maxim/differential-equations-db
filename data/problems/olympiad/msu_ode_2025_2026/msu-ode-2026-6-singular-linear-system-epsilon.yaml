        "id": "stmt-original",
        "title": "МГУ ОДУ 2026, задача 6",
        "text": "Рассмотрим систему x'=y+z, y'=x-z, epsilon z'=x-y. а) При каких epsilon∈R система имеет непостоянные периодические решения? б) При каких epsilon,a∈R система имеет решения с начальными условиями x(0)=y(0)=1, z(0)=a, и сколько таких решений? в) Дифференцируемо ли по epsilon при epsilon=0 решение с начальными условиями x(0)=y(0)=1, z(0)=0? Если да, найдите ∂x/∂epsilon при epsilon=0.",
