      "id": "idea-main",
      "title": "Разделить сумму и разность x,y",
      "text": "Переменные u=x+y и v=x-y отделяют регулярную моду u'=u от сингулярной пары v,z. Для пункта в) начальные данные v(0)=z(0)=0 сразу убивают сингулярный слой.",
