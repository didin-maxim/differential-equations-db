  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "При epsilon≠0 матрица системы имеет характеристический многочлен (lambda-1)(lambda^2+lambda-2/epsilon). В частности, eigenvalue lambda=1 есть всегда, а оставшаяся пара не может быть чисто мнимой: если она комплексная, ее вещественная часть равна -1/2. Поэтому непостоянных периодических решений нет. При epsilon=0 система превращается в дифференциально-алгебраическую: x=y, затем из x'=y+z и y'=x-z получаем z=0 и x'=x. Поэтому в пункте б) при epsilon≠0 и любом a существует ровно одно решение, а при epsilon=0 решение существует ровно при a=0 и тоже единственно. Для пункта в) положим u=x+y, v=x-y. Тогда u'=u, v'=-v+2z, epsilon z'=v. При начальных данных u(0)=2, v(0)=0, z(0)=0 имеем v=z=0, u=2\\(e^{t}\\) при всех epsilon, включая epsilon=0. Значит x=\\(e^{t}\\) не зависит от epsilon и ∂x/∂epsilon|_{epsilon=0}=0.",
      "status": "ai_checked"
    }
  ],
