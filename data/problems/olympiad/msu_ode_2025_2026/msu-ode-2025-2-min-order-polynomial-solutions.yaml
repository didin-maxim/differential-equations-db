      {
        "id": "stmt-original",
        "title": "МГУ ОДУ 2025, задача 2",
        "text": "Какой наименьший порядок может иметь линейное однородное уравнение, среди решений которого есть функции y_1(x)=x^2+1, y_2(x)=1-x, y_3(x)=x^2+3x-2, y_4(x)=2x^2+x+1? Приведите пример такого уравнения.",
        "source_ids": [
          "src-msu-ode-olympiad"
        ],
        "status": "source_statement_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "ordinary_differential_equation",
          "solution"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Посчитать размерность линейной оболочки решений",
      "text": "Пространство решений линейного однородного уравнения n-го порядка имеет размерность не больше n. Данные четыре функции лежат в пространстве квадратичных многочленов, и среди них есть три линейно независимые.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Все четыре функции являются квадратичными многочленами, поэтому они являются решениями уравнения y'''=0. Значит, порядок 3 достаточен. Покажем, что меньший порядок невозможен. В координатах относительно базиса 1,x,x^2 функции y_1,y_2,y_3 имеют векторы (1,0,1), (1,-1,0), (-2,3,1). Их определитель равен -2, поэтому эти три функции линейно независимы. Пространство решений линейного однородного уравнения второго порядка не может содержать три линейно независимых решения. Следовательно, минимальный порядок равен 3.",
      "status": "ai_checked"
    }
  ],
