  "ideas": [
    {
      "id": "idea-main",
      "title": "Дифференцировать обратную матрицу",
      "text": "Если A(t) невырождена, то\\((A^{-1})'=-A^{-1}A'A^{-1}=-I.\\)Поэтому \\(A^{-1}(t)\\)обязана быть линейной функцией C-tI.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть A(t) невырождена и \\(A'=A^2.\\)Тогда \\((A^{-1})'=-A^{-1}A'A^{-1}=-I,\\)значит\\(A^{-1}(t)=C-tI.\\)Нужно выбрать вещественную матрицу C так, чтобы C-tI была невырождена при всех \\(t\\in\\mathbb R\\). Это возможно: возьмем \\(C=[[0,-1],[1,0]].\\) Тогда \\(det(C-tI)=t^2+1>0.\\)Поэтому \\(A(t)=(C-tI)^{-1}\\)определена на всей прямой, невырождена и удовлетворяет\\(A'=A^2.\\)",
      "status": "ai_checked"
    }
  ],
