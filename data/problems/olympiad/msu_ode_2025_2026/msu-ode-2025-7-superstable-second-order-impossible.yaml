      {
        "id": "stmt-original",
        "title": "МГУ ОДУ 2025, задача 7",
        "text": "Уравнение y''=f(t,y,y'), где f∈C^1(R^3) и f(t,0,0)=0, назовем суперустойчивым, если для любого epsilon>0 существует delta>0 такое, что любое решение, удовлетворяющее |y(0)|<delta, удовлетворяет |y(t)|<epsilon при всех t>=0. Существует ли суперустойчивое уравнение?",
        "source_ids": [
          "src-msu-ode-olympiad"
        ],
        "status": "source_statement_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "stability",
          "initial_value_problem"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Проверить недостающую начальную скорость",
      "text": "Условие ограничивает только y(0), но не y'(0). Для уравнения второго порядка через точку y(0)=0 можно пустить решение с произвольно большой начальной скоростью.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Нет. Зафиксируем epsilon>0. Какое бы delta ни было выбрано, начальное условие y(0)=0 удовлетворяет |y(0)|<delta. Возьмем решение задачи Коши с y(0)=0 и y'(0)=v. Так как f∈C^1, решение локально существует и y(t)=vt+O(t^2) при t->0. Выбирая |v| достаточно большим, получаем |y(t)|>epsilon уже при малом положительном t. Следовательно, требуемое свойство невозможно ни для какого f.",
      "status": "ai_checked"
    }
  ],
