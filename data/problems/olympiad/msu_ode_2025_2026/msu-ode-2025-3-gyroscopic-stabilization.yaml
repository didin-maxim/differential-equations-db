        "id": "stmt-original",
        "title": "МГУ ОДУ 2025, задача 3",
        "text": "Рассмотрим линейную систему на плоскости с матрицей A=[[1,a],[-a,-d]], где d>0. При a=0 нулевое решение неустойчиво. Для каких d>0 существуют такие a∈R, при которых нулевое решение асимптотически устойчиво?",
        "source_ids": [
          "src-msu-ode-olympiad"
        ],
        "status": "source_statement_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "linear_system",
          "stability"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Использовать след и определитель двумерной матрицы",
      "text": "Для вещественной матрицы 2x2 асимптотическая устойчивость эквивалентна условиям tr A<0 и det A>0.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Здесь tr A=1-d, det A=a^2-d. Нулевое решение двумерной линейной автономной системы асимптотически устойчиво тогда и только тогда, когда tr A<0 и det A>0. Поэтому нужно и достаточно, чтобы d>1 и a^2>d. Если d>1, можно взять, например, a=sqrt(d+1). Если 0<d<=1, след неотрицателен при любом a, поэтому асимптотической устойчивости быть не может.",
      "status": "ai_checked"
    }
  ],
