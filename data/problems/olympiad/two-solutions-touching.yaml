  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть общий интервал существования связен и \\(y_1(x_0)=y_2(x_0).\\) В точке совпадения обе функции решают одну и ту же задачу Коши с начальными данными \\((x_0,y_1(x_0))\\in D.\\) По локальной единственности они совпадают в некоторой окрестности этой точки. Множество точек общего интервала, до которых совпадение уже продолжено, одновременно открыто и замкнуто относительно связного интервала: продолжение вправо и влево снова следует из единственности в точках графика, лежащих в \\(D.\\) Поэтому совпадение глобально на общем интервале.",
      "status": "ai_checked"
    }
