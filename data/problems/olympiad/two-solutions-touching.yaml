        "title": "Формулировка",
        "text": "Пусть \\(f(x,y)\\) непрерывна в области \\(D\\subset\\mathbb R^2\\) и локально липшицева по \\(y.\\) Доказать: если два решения \\(y_1,y_2\\) уравнения \\(y'=f(x,y),\\) графики которых лежат в \\(D,\\) совпали в одной точке общего интервала существования, то они совпадают на всем этом общем интервале.",
