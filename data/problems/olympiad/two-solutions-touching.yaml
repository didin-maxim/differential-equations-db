      "title": "Решение",
      "text": "В точке совпадения обе функции решают одну и ту же задачу Коши. По локальной единственности они совпадают в некоторой окрестности этой точки. Множество точек общего интервала, до которых совпадение уже продолжено, одновременно открыто и замкнуто относительно связного интервала: продолжение вправо и влево снова следует из единственности. Поэтому совпадение глобально на общем интервале.",
