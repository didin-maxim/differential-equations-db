      "title": "Решение",
      "text": "Если траектория периодична с периодом T, то точка через время T возвращается в исходное положение, значит V принимает то же значение. Но вдоль непостоянной траектории V строго убывает, поэтому V(t+T)<V(t). Противоречие.",
