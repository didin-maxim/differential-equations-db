  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Подставляем y''=\\(\\sum_{n≥0}(n+2)(n+1)a_{n+2}x^n\\), xy=\\(\\sum_{n≥1}a_{n-1}x^n\\). При x^0 получаем 2a2=0. При n≥1: (n+2)(n+1)a_{n+2}=a_{n-1}. Значит a2=0, а каждый коэффициент через три шага выражается через предыдущий.",
      "status": "ai_checked"
    }
