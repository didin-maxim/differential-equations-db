      "id": "sol-main",
      "title": "Решение",
      "text": "Ищем y=x^r. Получаем r(r-1)+r-α^2=r^2-α^2=0. Если α≠0, решения x^α и x^{-α}. Если α=0, корень r=0 кратный, и второе решение ln x. Это простейший образец индикаторного уравнения метода Фробениуса.",
