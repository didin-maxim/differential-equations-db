      "text": "Равновесия: 0,1,2. Знак f(y)=y(1-y)(y-2): на (-∞,0) положителен, на (0,1) отрицателен, на (1,2) положителен, на (2,∞) отрицателен. Стрелки направлены к 0 с обеих сторон, от 1 с обеих сторон и к 2 с обеих сторон. Поэтому 0 и 2 асимптотически устойчивы, 1 неустойчиво.",
