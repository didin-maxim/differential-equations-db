  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пока \\(y>0\\), имеем \\((1/y)'=-y'/y^2\\) \\(\\le -1\\). Интегрируя, получаем \\(1/y(t)\\le 1/y_0-t\\). При \\(t>1/y_0\\) правая часть отрицательна, что невозможно для положительного \\(y(t)\\). Следовательно решение должно перестать существовать не позже момента \\(1/y_0\\).",
      "status": "ai_checked"
    }
  ],
