      "id": "sol-main",
      "title": "Решение",
      "text": "Ищем \\(H=dx-c\\ln x+by-a\\ln y\\). Тогда \\(H_x=d-c/x\\), \\(H_y=b-a/y\\). Производная вдоль решений равна \\((d-c/x)x(a-by)+(b-a/y)y(-c+dx)=(dx-c)(a-by)+(by-a)(-c+dx)=0\\). Значит H сохраняется.",
      "status": "ai_checked"
    }
