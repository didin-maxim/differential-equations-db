      "id": "sol-main",
      "title": "Доказательство",
      "text": "Предположим, что есть простая замкнутая траектория Γ, ограничивающая область Ω. Поток поля через Γ в направлении внешней нормали равен нулю, потому что поле в каждой точке Γ направлено по касательной к траектории. По формуле Грина этот поток равен ∫\\(\\(\\int_Ω\\)\\) (P_x+Q_y)dA. Но подынтегральная функция имеет один знак и не тождественно равна нулю, поэтому интеграл не может быть нулем. Противоречие.",
      "status": "ai_checked"
    }
  ],
