      "id": "sol-main",
      "title": "Решение",
      "text": "Возьмем V=x^2+y^2. Тогда V'=2x(-x+y^3)+2y(-y)=-2x^2-2y^2+2xy^3. При достаточно малых |y| имеем |2xy^3|≤x^2+y^2, например в малой окрестности нуля. Тогда V'≤-(x^2+y^2)<0 вне нуля. Поэтому нуль устойчив и даже асимптотически устойчив локально.",
      "status": "ai_checked"
    }
