      "id": "sol-main",
      "title": "Доказательство",
      "text": "Постоянная функция y≡a является решением с начальными данными y(t)=a в любой точке t. Если другое решение в момент t1 приняло значение a, то оно и постоянное решение имели бы одни и те же начальные данные в t1. По единственности они совпали бы в окрестности t1, а затем на всем общем промежутке, что противоречит y(x0)>a.",
