        "title": "Формулировка",
        "text": "Пусть \\(y'=f(y)\\), функция \\(f\\) непрерывно дифференцируема в окрестности точки \\(a\\), причем \\(f(a)=0\\). Доказать, что если решение \\(y:I\\to\\mathbb R\\) в некоторый момент \\(x_0\\in I\\) удовлетворяет \\(y(x_0)>a\\), то не существует конечного момента \\(t_1\\in I\\), для которого \\(y(t_1)=a\\).",
