  "ideas": [
    {
      "id": "idea-main",
      "title": "Качественный инвариант или знак",
      "text": "Равновесное решение \\(y\\equiv a\\) уже проходит через точку \\(a\\). Если другое решение достигло бы \\(a\\) в конечный момент своего интервала существования, то через данные \\(y(t_1)=a\\) проходили бы два разных решения одной задачи Коши, что запрещено локальной единственностью.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    },
    {
      "id": "idea-system",
      "title": "Системный вариант",
      "text": "Для автономной системы \\(x'=f(x)\\) в области \\(U\\subset\\mathbb R^n\\) тот же аргумент работает при локальной липшицевости \\(f\\) в окрестности \\(a\\in U\\): стационарная точка \\(a\\) задает постоянную траекторию \\(x\\equiv a\\), и никакое непостоянное решение \\(x:I\\to U\\) не может достигнуть ее в конечный момент \\(t_1\\in I\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Постоянная функция \\(y\\equiv a\\) является решением, потому что \\(f(a)=0\\). Предположим, что рассматриваемое решение \\(y:I\\to\\mathbb R\\) в конечный момент \\(t_1\\in I\\) приняло значение \\(a\\). Тогда в момент \\(t_1\\) оно и постоянное решение имеют одни и те же начальные данные \\(y(t_1)=a\\). Так как \\(f\\) непрерывно дифференцируема в окрестности \\(a\\), правая часть локально липшицева, и задача Коши имеет единственное локальное решение. Значит наше решение совпадает с \\(y\\equiv a\\) в некоторой окрестности \\(t_1\\), а затем по продолжению совпадения - на всей связной компоненте общего интервала существования, содержащей \\(x_0\\) и \\(t_1\\). Это противоречит условию \\(y(x_0)>a\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ],
      "definition_ids": [
        "lipschitz_condition",
        "equilibrium"
      ]
    },
    {
      "id": "sol-system-corollary",
      "title": "Следствие для автономной системы",
      "text": "Пусть \\(U\\subset\\mathbb R^n\\), \\(x'=f(x)\\), где \\(f:U\\to\\mathbb R^n\\) локально липшицева в окрестности стационарной точки \\(a\\in U\\), то есть \\(f(a)=0\\). Если решение \\(x:I\\to U\\) в конечный момент \\(t_1\\in I\\) достигло \\(a\\), то оно имеет те же начальные данные \\(x(t_1)=a\\), что и постоянное решение \\(x\\equiv a\\). По локальной единственности эти решения совпадают около \\(t_1\\), а затем на всей связной компоненте общего интервала существования. Поэтому решение, которое достигает \\(a\\) за конечное время, является равновесным; непостоянная траектория стационарной точки за конечное время не достигает.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ],
