        "energy_monotonicity"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим E(x)=y'(x)^2+e^(1/x)y(x)^2. Тогда E'=2y'y''+2e^(1/x)yy'-(e^(1/x)/x^2)y^2. Из уравнения y''=-e^(1/x)y первые два слагаемых сокращаются, и остается E'=-(e^(1/x)/x^2)y^2<=0. Значит E(x)<=E(1)=y'(1)^2+e y(1)^2 для всех x>=1. С другой стороны, e^(1/x)y(x)^2<=E(x). Поэтому e^(1/x)y(x)^2<=y'(1)^2+e y(1)^2. После извлечения корня получаем требуемую оценку для |y(x)|.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
  ],
