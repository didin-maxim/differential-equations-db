  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Коэффициент q(x)=3-2x-x^2 равен 4-(x+1)^2. Поэтому q<0 на (-∞,-3) и на (1,∞), а на [-3,1] выполнено q≤4. На каждом из внешних промежутков у решения не может быть двух нулей: если y(a)=y(b)=0 и y не меняет знак на (a,b), то при y>0 имеем y''=-qy>0, но положительная дуга с нулями на концах должна иметь внутренний максимум с y''≤0; случай y<0 аналогичен после замены y на -y. Значит снаружи всего не более одного нуля слева и одного справа. Пусть теперь a<b - соседние нули внутри [-3,1]. Умножая уравнение на y и интегрируя по частям, получаем ∫_a^b (y')^2 dx=∫_a^b qy^2 dx≤4∫_a^b y^2 dx. По неравенству Виртингера для функции с нулевыми концами ∫ y^2 dx≤((b-a)^2/π^2)∫(y')^2 dx. Так как решение нетривиально, сокращение дает b-a≥π/2. Длина отрезка [-3,1] равна 4, а три промежутка между четырьмя нулями имели бы суммарную длину не меньше 3pi/2>4. Поэтому внутри [-3,1] не более трех нулей. Итого не более 1+3+1=5 нулей на всей прямой.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
