      "id": "idea-main",
      "title": "Уравнение Эйлера и квадрат второй вариации",
      "text": "Смешанный член не мешает: уравнение Эйлера сводится к уравнению Эйлера-Коши, а во второй вариации смешанный член интегрируется по частям.",
      "status": "ai_checked"
