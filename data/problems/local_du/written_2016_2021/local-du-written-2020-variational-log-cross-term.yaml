  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для \\(F=6y^2+8xyy'+x^2(y')^2-4y\\ln x+(1-2x)y'+1/x\\) имеем \\(F_y=12y+8xy'-4\\ln x\\) и \\(F_{y'}=8xy+2x^2y'+1-2x.\\) Уравнение Эйлера \\(F_y-\\frac{d}{dx}F_{y'}=0\\) дает \\(x^2y''+2xy'-2y+2\\ln x-1=0.\\) Частное решение равно \\(\\ln x,\\) а однородная часть является уравнением Эйлера-Коши с показателями 1 и -2. Поэтому \\(y=C_1x+C_2/x^2+\\ln x.\\) Из условий \\(C_1+C_2=7\\) и \\(2C_1+C_2/4=0,\\) откуда \\(C_1=-1, C_2=8.\\) Единственная допустимая экстремаль: \\(y=\\ln x-x+8/x^2.\\) Для проверки характера экстремума рассмотрим вариацию \\(h\\) с \\(h(1)=h(2)=0.\\) Квадратичная часть приращения равна \\(\\int_1^2 [6h^2+8xhh'+x^2(h')^2]\\,dx.\\) Так как \\(\\int 8xhh'\\,dx=[4xh^2]_1^2-\\int 4h^2\\,dx,\\) получаем \\(\\int_1^2 [x^2(h')^2+2h^2]\\,dx>0\\) для \\(h\\) не равной нулю. Следовательно экстремаль дает строгий минимум.",
      "status": "ai_checked"
    }
  ],
