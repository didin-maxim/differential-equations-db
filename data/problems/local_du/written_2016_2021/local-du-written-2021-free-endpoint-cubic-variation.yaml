  "ideas": [
    {
      "id": "idea-main",
      "title": "Натуральное граничное условие",
      "text": "Отсутствие условия на y(2) добавляет трансверсальное условие F_{y'}(2)=0, которое убивает все ненулевые решения уравнения Эйлера.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Здесь F=(y')^3/x^2 не зависит от y, поэтому уравнение Эйлера имеет первый интеграл F_{y'}=3(y')^2/x^2=C. На промежутке это означает y'=kx с постоянным k, и потому y=kx^2/2+C0. Так как значение y(2) не закреплено, при вариации появляется натуральное граничное условие F_{y'}(2)=0. Оно дает 3(y'(2))^2/4=0, значит k=0. Из y(1)=1 получаем единственную допустимую экстремаль y=1. При этом функционал кубический по y': для вариаций h с h(1)=0 значения ∫(h')^3/x^2 dx меняют знак при замене h на -h. Поэтому найденная стационарная кривая не является строгим минимумом или максимумом в обычном смысле; это вырожденная экстремаль, определенная уравнением Эйлера и натуральным условием.",
      "status": "ai_checked"
    }
  ],
