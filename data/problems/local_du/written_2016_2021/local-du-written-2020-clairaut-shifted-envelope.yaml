  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим p=y'. Уравнение имеет вид y=(x-1)p-p^2. Дифференцируем по x: p=p+(x-1)p'-2pp'. Поэтому (x-1-2p)p'=0. Если p'=0, то p=C и получаем семейство прямых y=C(x-1)-C^2. Если x-1-2p=0, то p=(x-1)/2. Тогда y'=p дает y=(x-1)^2/4+C, а подстановка в исходное уравнение оставляет только C=0. Значит особая интегральная кривая: y=(x-1)^2/4. Она является огибающей семейства прямых, потому что исключение C из y=C(x-1)-C^2 и x-1-2C=0 дает ту же параболу.",
      "status": "ai_checked"
    }
  ],
