        "title": "Формулировка",
        "text": "Пусть \\(e^{tA}=e^t[[1+2t,4t],[-t,1-2t]].\\) Найти вронскиан W(t) решений системы \\(x'=Ax\\) при \\(W(0)=1.\\) Найти первые интегралы этой системы, определенные на всей плоскости.",
