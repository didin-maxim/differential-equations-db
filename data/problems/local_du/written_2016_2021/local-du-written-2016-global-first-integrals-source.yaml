        "wronskian_liouville"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Запишем \\(e^{tA}=e^t(I+tN),\\) где \\(N=[[2,4],[-1,-2]].\\) У этой матрицы \\(tr N=0\\) и \\(N^2=0,\\)поэтому \\(det(I+tN)=1.\\) Следовательно \\(\\det e^{tA}=e^{2t},\\) и при \\(W(0)=1\\) получаем \\(W(t)=e^{2t}.\\) Кроме того\\(, A=I+N\\) имеет единственное собственное значение 1, то есть нуль является неустойчивым узлом-источником для прямого времени. Для любого начального\\(x_0\\)решение \\(x(t)=e^{tA}x_0\\) стремится к 0 при \\(t\\to-\\infty,\\) потому что \\(e^t(I+tN)x_0 \\to0.\\) Если F - первый интеграл, определенный и непрерывный на всей плоскости, то \\(F(x_0)=F(e^{tA}x_0)\\) для всех t. Переходя к пределу \\(t\\to-\\infty,\\) получаем\\(F(x_0)=F(0).\\)Значит все глобальные непрерывные первые интегралы этой системы постоянны. В частности, нет нетривиального первого интеграла, непрерывного на всей плоскости.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential",
        "wronskian_liouville"
      ]
    }
  ],
