      "id": "idea-main",
      "title": "Определитель потока и предел к равновесию",
      "text": "Вронскиан читается как \\(\\det e^{tA}.\\) А требование глобальности первого интеграла принципиально: для источника все траектории при обратном времени приходят к нулю.",
      "status": "ai_checked",
      "standard_idea_ids": [
