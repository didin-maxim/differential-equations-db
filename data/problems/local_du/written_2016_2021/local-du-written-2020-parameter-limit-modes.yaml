        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Выяснить, при каких a из R для любых двух решений y_1,y_2 уравнения y'''-2(a^2+2a+1)y'=(a-1)\\(e^{x}\\) sin x существует конечный предел \\(\\lim_{x→+∞}\\) (y_1(x)-y_2(x))/x^2.",
