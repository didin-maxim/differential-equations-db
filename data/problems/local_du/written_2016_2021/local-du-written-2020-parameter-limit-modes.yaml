  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Правая часть исчезает в разности",
      "text": "Свойство для любых двух решений зависит только от однородного уравнения для их разности и от наличия растущей экспоненциальной моды.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть z=y_1-y_2. Тогда z удовлетворяет однородному уравнению z'''-2(a+1)^2z'=0; правая часть исходного уравнения роли не играет. Характеристический многочлен равен r(r^2-2(a+1)^2). Если a≠-1, то есть положительный корень r=sqrt(2)|a+1|, и среди разностей решений есть z=\\(e^{rx}\\). Для него z/x^2 стремится к бесконечности, поэтому требуемое свойство не выполнено. Если a=-1, то уравнение для разности превращается в z'''=0, и всякая разность имеет вид z=C0+C1x+C2x^2. Тогда z(x)/x^2 стремится к C2. Следовательно единственное значение параметра: a=-1.",
      "status": "ai_checked"
    }
  ],
