        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить струи двух решений",
      "text": "Низкие порядки запрещены не только совпадением начальных данных, но и тем, что C1-правая часть локально липшицева по фазовым переменным.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для n=1 нужно было бы иметь f(x,x)=1 и f(x,sin x)=cos x. При x->0 расстояние между точками (x,x) и (x,sin x) равно |x-sin x|~|x|^3/6, а разность предписанных значений равна 1-cos x~x^2/2. C1-функция локально липшицева, поэтому такая разность не может быть больше константы, умноженной на расстояние; противоречие. Для n=2 надо иметь f(x,x,1)=0 и f(x,sin x,cos x)=-sin x. Расстояние между фазовыми точками имеет порядок x^2 из-за координаты 1-cos x, а разность значений имеет порядок x; отношение этих величин неограниченно при x->0, что снова противоречит локальной липшицевости C1-функции. Для n=3 в точке x=0 совпадают начальные данные y=0, y'=1, y''=0, но третьи производные равны 0 для y=x и -1 для y=sin x; однозначная правая часть f(0,0,1,0) не может принять два значения. Порядок 4 уже возможен: уравнение y^(4)=-y'' имеет C1, даже линейную, правую часть. Для y=x обе части равны 0, а для y=sin x имеем y^(4)=sin x и -y''=sin x. Следовательно минимальный порядок равен 4.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
