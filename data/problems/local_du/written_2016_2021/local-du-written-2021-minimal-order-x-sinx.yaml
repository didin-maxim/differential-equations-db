        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Какой наименьший возможный порядок может иметь уравнение y^(n)=f(x,y,y',...,y^(n-1)) с непрерывно дифференцируемой всюду функцией f, имеющее решения y1=x и y2=sin x? Составить такое уравнение.",
