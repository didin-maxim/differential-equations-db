        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Если q>=mu^2 на каждом из отрезков [ak,ak+pi/mu] и эти отрезки уходят вправо без общих внутренних точек, то по следствию Штурма всякое ненулевое решение имеет нуль на каждом таком отрезке, если только оно уже не имеет нуль на границе. Так как отрезков бесконечно много и они уходят к бесконечности, нулей бесконечно много. Если q<=0 на [X,+infty), то предыдущее штурмовское следствие запрещает двум различным нулям ненулевого решения лежать на этом хвосте. Поэтому у каждого ненулевого решения на хвосте не более одного нуля, и уравнение неосциллирует.",
