        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Для уравнения y''+q(x)y=0 на [x0,+infty), q непрерывна, уравнение называется осциллирующим, если всякое ненулевое решение имеет бесконечно много нулей, уходящих к +infty; иначе оно неосциллирующее. Если для некоторого mu>0 на бесконечной последовательности непересекающихся отрезков длины pi/mu выполнено q>=mu^2, то уравнение осциллирует. Если q<=0 начиная с некоторого места, то уравнение неосциллирует.",
