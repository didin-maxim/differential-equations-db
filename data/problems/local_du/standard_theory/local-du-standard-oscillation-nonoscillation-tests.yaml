  "ideas": [
    {
      "id": "idea-main",
      "title": "Перенести локальное сравнение на бесконечный хвост",
      "text": "Локальное появление нуля на каждом достаточно далеком эталонном отрезке дает бесконечность нулей; запрет двух нулей при q<=0 дает неосцилляцию.",
      "status": "ai_checked",
