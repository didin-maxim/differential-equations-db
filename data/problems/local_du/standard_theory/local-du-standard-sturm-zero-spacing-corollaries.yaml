        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть q непрерывна и y - ненулевое решение y''+q(x)y=0. Если q(x)>=mu^2>0 на [a,a+pi/mu], то y имеет нуль на этом отрезке, если только не рассматривается специальный случай с нулем на границе. Если q(x)<=mu^2 на промежутке между двумя соседними нулями alpha<beta решения y, то beta-alpha>=pi/mu. В частности, при q<=0 ненулевое решение имеет на интервале не более одного нуля.",
