  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Первое утверждение применяет сравнение Штурма к u=sin(mu(x-a)), у которого соседние нули a и a+pi/mu, и к уравнению с коэффициентом q>=mu^2: всякое ненулевое решение второго уравнения имеет нуль между этими нулями или на границе в предельном случае. Для второго утверждения рассуждаем от противного. Если у y есть соседние нули alpha<beta и beta-alpha<pi/mu, то можно выбрать решение z''+mu^2z=0 с нулями alpha и alpha+pi/mu; на [alpha,beta] это уравнение имеет больший или равный коэффициент, чем q. Сравнение Штурма в обратной форме говорит, что решение с большим коэффициентом должно иметь нуль между соседними нулями y; но синусоидальное z не имеет нулей на (alpha,beta), противоречие. При q<=0 наличие двух соседних нулей у y сравнивается с решением z=1 уравнения z''=0: из q<=0 следует 0>=q, и теорема сравнения заставила бы z иметь нуль между ними, что невозможно.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
