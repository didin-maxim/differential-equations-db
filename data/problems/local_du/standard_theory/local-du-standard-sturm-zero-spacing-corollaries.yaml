  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить с синусом или с единицей",
      "text": "Уравнение z''+mu^2 z=0 задает эталонное расстояние pi/mu между соседними нулями, а уравнение z''=0 дает запрет двух нулей при q<=0.",
      "status": "ai_checked",
