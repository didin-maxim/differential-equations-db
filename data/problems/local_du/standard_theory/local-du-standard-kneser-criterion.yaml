        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить с эйлеровским критическим значением",
      "text": "Модель\\(y''+c x^{-2} y=0\\)осциллирует при c>1/4 и имеет положительное степенное решение при c<1/4; сравнение Штурма переносит оба свойства.",
      "status": "ai_checked",
