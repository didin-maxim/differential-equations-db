      ]
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Для модельного уравнения\\(y''+(c/x^2)y=0\\)ищем\\(y=x^\\alpha.\\)Получаем \\(\\alpha(\\alpha-1)+c=0.\\) Если c>1/4, то \\(\\alpha=1/2 +- i \\beta, \\beta=sqrt(c-1/4),\\) и действительное решение \\(sqrt(x) \\sin(\\beta \\ln x)\\) имеет бесконечно много нулей, уходящих к бесконечности. Если c<1/4, есть положительное решение\\(x^\\alpha\\)на всем хвосте. Пусть\\(liminf x^2q(x)>1/4.\\)Выберем c>1/4 и X1 так, что \\(q(x)\\ge c/x^2\\)при \\(x\\ge X1.\\) Между соседними нулями осциллирующего модельного решения по сравнению Штурма всякое ненулевое решение исходного уравнения имеет нуль; таких промежутков бесконечно много, значит исходное уравнение осциллирует. Пусть\\(limsup x^2q(x)<1/4.\\)Выберем c<1/4 и X1 так, что \\(q(x)\\le c/x^2\\)при \\(x\\ge X1.\\) Если бы некоторое ненулевое решение исходного уравнения имело два соседних нуля \\(\\alpha<\\beta\\) на этом хвосте, то сравнение Штурма с большим коэффициентом\\(c/x^2\\)заставило бы каждое решение модельного уравнения иметь нуль на \\((\\alpha,\\beta).\\) Но положительное степенное решение модели нулей не имеет. Противоречие. Поэтому на хвосте у каждого решения не более одного нуля, то есть уравнение неосциллирует.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
