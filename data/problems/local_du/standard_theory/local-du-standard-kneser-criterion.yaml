        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть q непрерывна на \\([X,+\\infty).\\) Если \\(liminf {x\\to\\infty} x^2 q(x)>1/4,\\)то уравнение \\(y''+q(x)y=0\\) осциллирует. Если \\(limsup {x\\to\\infty} x^2 q(x)<1/4,\\)то уравнение неосциллирует. Критическое значение 1/4 задается модельным уравнением Эйлера\\(y''+(c/x^2)y=0.\\)",
        "source_ids": [
          "src-local-du-8-program-or-exam"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
