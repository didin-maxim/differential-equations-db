        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(F=F(x,y,y')\\) имеет непрерывные нужные производные, а \\(y\\) дает локальный экстремум функционала \\(J[y]=\\int_a^b F(x,y,y')\\,dx\\) среди \\(C^1\\)-кривых с закрепленными концами \\(y(a)=A\\), \\(y(b)=B\\). Тогда \\(y\\) удовлетворяет уравнению Эйлера-Лагранжа \\(F_y-\\frac{d}{dx}F_{y'}=0\\) на \\((a,b)\\).",
        "source_ids": [
          "src-local-du-8-program-or-exam"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "boundary_value_problem"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Занулить первую вариацию",
      "text": "Для вариаций h с h(a)=h(b)=0 производная J[y+epsilon h] по epsilon при нуле равна нулю; интегрирование по частям переносит производную с h'.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Возьмем гладкую вариацию \\(y_\\varepsilon=y+\\varepsilon h\\), где \\(h(a)=h(b)=0\\). Функция \\(\\varphi(\\varepsilon)=J[y_\\varepsilon]\\) имеет экстремум при \\(\\varepsilon=0\\), значит \\(\\varphi'(0)=0\\). Дифференцируя под интегралом, получаем \\(0=\\int_a^b (F_y h+F_{y'}h')\\,dx\\). Интегрируем второй член по частям: \\(\\int F_{y'}h'\\,dx=[F_{y'}h]_a^b-\\int \\frac{d}{dx}F_{y'}\\,h\\,dx\\). Граничный член равен нулю, поэтому \\(\\int_a^b (F_y-\\frac{d}{dx}F_{y'})h\\,dx=0\\) для всех гладких \\(h\\) с компактной поддержкой в \\((a,b)\\). По основной лемме вариационного исчисления подынтегральная функция равна нулю.",
      "status": "ai_checked"
    }
  ],
