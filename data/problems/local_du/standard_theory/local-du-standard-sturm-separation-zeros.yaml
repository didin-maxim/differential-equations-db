  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Пусть a<b - соседние нули y1. По лемме о простоте нулей y1 не обращается в нуль на (a,b), а y1'(a) и y1'(b) имеют противоположные знаки. Вронскиан W=y1y2'-y1'y2 постоянен и ненулев, потому что решения независимы. На (a,b) имеем (y2/y1)'=W/y1^2, значит отношение строго монотонно и может иметь не более одного нуля. При x->a+ знаменатель y1 стремится к 0 со знаком y1'(a), а числитель y2(a) не равен нулю, иначе W(a)=0. При x->b- знаменатель y1 стремится к 0 со знаком y1'(b), противоположным знаку y1'(a), а числитель y2(b) также не равен нулю. Поэтому отношение y2/y1 имеет на концах промежутка бесконечные пределы разных знаков и по непрерывности обращается в нуль ровно один раз. Это ровно один нуль y2 между a и b. Для промежутка между соседними нулями y2 тот же довод применяется к отношению y1/y2.",
