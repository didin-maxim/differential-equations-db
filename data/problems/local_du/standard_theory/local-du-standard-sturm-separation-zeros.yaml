        "text": "Пусть q непрерывна на интервале I, а\\(y_1,y_2 -\\)линейно независимые решения уравнения \\(y''+q(x)y=0.\\) Тогда между любыми двумя соседними нулями\\(y_1\\)лежит ровно один нуль\\(y_2,\\)и наоборот.",
