  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Пусть a<b - соседние нули\\(y_1.\\)По лемме о простоте нулей\\(y_1\\)не обращается в нуль на (a,b), а\\(y_1'(a)\\)и\\(y_1'(b)\\)имеют противоположные знаки. Вронскиан\\(W=y1y2'-y_1'y_2\\)постоянен и ненулев, потому что решения независимы. На (a,b) имеем\\((y_2/y_1)'=W/y_1^2,\\) значит отношение строго монотонно и может иметь не более одного нуля. При \\(x\\toa+\\) знаменатель\\(y_1\\)стремится к 0 со знаком\\(y_1'(a),\\)а числитель\\(y_2(a)\\)не равен нулю, иначе \\(W(a)=0.\\) При \\(x\\tob-\\) знаменатель\\(y_1\\)стремится к 0 со знаком\\(y_1'(b),\\)противоположным знаку\\(y_1'(a),\\)а числитель\\(y_2(b)\\)также не равен нулю. Поэтому отношение\\(y_2/y_1\\)имеет на концах промежутка бесконечные пределы разных знаков и по непрерывности обращается в нуль ровно один раз. Это ровно один нуль\\(y_2\\)между a и b. Для промежутка между соседними нулями\\(y_2\\)тот же довод применяется к отношению\\(y_1/y_2.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
