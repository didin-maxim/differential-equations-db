    {
      "id": "idea-main",
      "title": "Посмотреть на вторую вариацию",
      "text": "Локализованные вариации дают знак коэффициента при (h')^2, а уравнение Якоби описывает вырождение квадратичной формы второй вариации.",
      "status": "ai_checked"
