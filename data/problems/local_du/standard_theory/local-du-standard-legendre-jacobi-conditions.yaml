  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Вторая вариация на вариациях h(a)=h(b)=0 имеет вид delta^2J[h]=int_a^b (P h'^2+2Qhh'+R h^2) dx, где P=F_{y'y'}, Q=F_{yy'}, R=F_{yy} вычислены вдоль экстремали. Если в точке P<0, можно взять вариацию, сосредоточенную в малой окрестности этой точки и быстро меняющуюся внутри нее; главный вклад P h'^2 делает вторую вариацию отрицательной, что противоречит минимуму. Это дает условие Лежандра P>=0. При P>0 интегрирование смешанного члена приводит к самосопряженной квадратичной форме. Ее вырождение на подотрезке [a,c] эквивалентно существованию ненулевого решения уравнения Якоби с h(a)=h(c)=0; такая точка c называется сопряженной. Если сопряженных точек на (a,b] нет, стандартное тождество Якоби переписывает вторую вариацию как интеграл положительного квадрата с положительным множителем P, поэтому она положительна на ненулевых h. Тогда экстремаль дает слабый минимум. Подробная проверка тождества Якоби является обычным шагом курса и сводится к интегрированию по частям в самосопряженном уравнении.",
      "status": "ai_checked"
    }
  ],
