        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть y - гладкая экстремаль функционала int_a^b F(x,y,y') dx с закрепленными концами. Необходимое условие слабого минимума: F_{y'y'}(x,y,y')>=0 на [a,b] (условие Лежандра). Если F_{y'y'}>0, то вторая вариация задает уравнение Якоби; отсутствие сопряженных точек к a на (a,b] является стандартным достаточным условием положительности второй вариации и слабого минимума в простейшей задаче.",
