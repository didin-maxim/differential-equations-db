  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Дифференцируем\\(W=y_1 y_2'-y_1'y_2\\):\\(W'=y_1 y_2''-y_1''y_2.\\)Из уравнения \\(y''=-py'-qy\\) получаем\\(W'=y_1(-py2'-qy2)-(-py1'-qy1)y_2=-p(y1y2'-y_1'y_2)=-pW.\\)Интегрирование линейного уравнения для W дает указанную формулу. Если\\(W(x_0)=0,\\)то W тождественно нулевой; если\\(W(x_0)\\ne0,\\) то экспонента не обращается в нуль. Если\\(y(x_0)=y'(x_0)=0,\\)то y и нулевое решение имеют одинаковые начальные данные, поэтому по единственности линейной задачи Коши \\(y=0.\\) Поэтому у ненулевого решения не может быть кратного нуля. Если бы нули ненулевого решения накапливались в точке\\(x_0\\)из I, то по непрерывности\\(y(x_0)=0,\\)а из предела разностных отношений также\\(y'(x_0)=0\\); это невозможно. Значит нули изолированы.",
