        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(p,q\\) непрерывны на \\(I.\\) Для двух решений уравнения \\(y''+p(x)y'+q(x)y=0\\) их вронскиан \\(W=y_1y_2'-y_1'y_2\\) удовлетворяет \\(W'=-pW\\) и потому \\(W(x)=W(x_0)\\exp\\left(-\\int_{x_0}^x p(s)\\,ds\\right).\\) Следовательно \\(W\\) либо тождественно равен нулю, либо нигде не равен нулю. В частности, если решение \\(y\\) имеет \\(y(x_0)=y'(x_0)=0,\\) то \\(y\\) тождественно равно нулю, а всякий нуль ненулевого решения прост или изолирован.",
