  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Не убивать граничный член",
      "text": "При свободном конце вариация h на этом конце произвольна, поэтому граничный член после интегрирования по частям дает дополнительное условие.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Первая вариация равна \\(\\\\int_a^b (F_y h+F_{y'}h')\\,dx\\). После интегрирования по частям получаем \\(\\\\int_a^b (F_y-\\frac{d}{dx}F_{y'})h\\,dx+[F_{y'}h]_a^b\\). Из произвольности вариаций внутри интервала следует уравнение Эйлера-Лагранжа. Если \\(y(a)\\) закреплено, то \\(h(a)=0\\). Если \\(y(b)\\) свободно, то \\(h(b)\\) произвольно, и оставшийся граничный член \\(F_{y'}(b)h(b)\\) обязан обращаться в нуль для всех \\(h(b)\\); значит \\(F_{y'}(b)=0\\). При свободном левом конце \\(h(a)\\) произвольно, а вклад равен \\(-F_{y'}(a)h(a)\\), поэтому \\(F_{y'}(a)=0\\). Если конец ограничен кривой или поверхностью, разрешенные значения \\(h\\) на конце не произвольны, а касательны к ограничению; зануление граничной формы на этих допустимых направлениях и есть условие трансверсальности.",
      "status": "ai_checked"
    }
  ],
