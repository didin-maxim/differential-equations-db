        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Для функционала \\(J[y]=\\\\int_a^b F(x,y,y')\\,dx\\) экстремаль со свободным значением \\(y(b)\\) и закрепленным \\(y(a)\\) удовлетворяет, кроме уравнения Эйлера-Лагранжа, естественному условию \\(F_{y'}(b,y(b),y'(b))=0\\). Если свободны оба значения \\(y(a),y(b)\\), то также \\(F_{y'}(a,y(a),y'(a))=0\\). Если конец лежит на заданной кривой, соответствующее условие заменяется стандартным условием трансверсальности.",
        "source_ids": [
