  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Необходимость следует из формулы Грина. Если \\(L[y]=f\\) и \\(L[\\varphi]=0,\\) то \\(\\int_a^b f\\varphi\\,dx=\\int_a^b (L[y]\\varphi-yL[\\varphi])\\,dx.\\) Правая часть равна \\([p(\\varphi y'-y\\varphi')]_a^b\\) и обращается в нуль для самосопряженных однородных граничных условий. Значит \\(f\\) ортогональна всем \\(\\varphi\\) из ядра. Для достаточности можно записать задачу в конечномерных координатах через фундаментальные решения и параметры начальных данных: граничные условия дают линейную систему на параметры. При резонансе матрица этой системы вырождена, а условие ортогональности к ядру сопряженной системы является обычным условием совместности линейной системы. В самосопряженном случае это ровно найденная ортогональность к решениям \\(L[\\varphi]=0.\\) Если \\(y_0 -\\) одно решение, то \\(y_0+\\varphi\\) также решение для любого \\(\\varphi\\) из ядра, а разность двух решений лежит в ядре.",
