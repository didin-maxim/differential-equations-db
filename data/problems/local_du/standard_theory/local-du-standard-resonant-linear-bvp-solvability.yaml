        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Рассмотрим самосопряженную краевую задачу \\(L[y]=f\\) на \\([a,b]\\) с однородными граничными условиями, где \\(L[y]=-(p y')'+r y, p>0,\\) а граничные условия убивают краевой член формулы Грина. Если однородная задача \\(L[y]=0\\) имеет ненулевые решения, то неоднородная задача разрешима тогда и только тогда, когда \\(\\int_a^b f(x)\\varphi(x)\\,dx=0\\) для всякого решения \\(\\varphi\\) однородной задачи. В случае одномерного ядра это одно условие ортогональности; решение, если существует, определено с точностью до добавления \\(C\\varphi.\\)",
