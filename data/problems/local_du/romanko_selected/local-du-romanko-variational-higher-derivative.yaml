  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для \\(F=(y')^2+(y'')^2\\) уравнение Эйлера-Пуассона имеет вид \\(-d(2y')/dx+d^2(2y'')/dx^2=0,\\) то есть \\(y''''-y''=0.\\) Общее решение: \\(y=C_1+C_2x+C_3e^x+C_4e^{-x}.\\) Условия \\(y(0)=0\\) и \\(y'(0)=0\\) дают \\(C_1+C_3+C_4=0\\) и \\(C_2+C_3-C_4=0.\\) Удобно заметить, что функция \\(y=e^x-x-1\\) удовлетворяет всем четырем условиям: \\(y(0)=0, y'(0)=0, y(1)=e-2, y'(1)=e-1\\); единственность решения линейной краевой задачи для найденной системы констант дает единственную допустимую экстремаль. Для любого допустимого приращения \\(h\\) с \\(h(0)=h'(0)=h(1)=h'(1)=0\\) имеем \\(J(y+h)-J(y)=2\\int (y'h'+y''h'')\\,dx+\\int ((h')^2+(h'')^2)\\,dx.\\) Линейный член равен нулю на экстремали после двукратного интегрирования по частям и использования нулевых краевых данных \\(h,h'.\\) Оставшаяся квадратичная часть положительна для \\(h\\) не равной константе, а из \\(h(0)=h(1)=0\\) такая константа только нулевая. Следовательно, экстремаль дает строгий минимум.",
      "status": "ai_checked"
    }
  ],
