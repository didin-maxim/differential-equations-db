      "id": "idea-main",
      "title": "Использовать уравнение Эйлера-Пуассона",
      "text": "Для функционала от \\(y'\\) и \\(y''\\) стационарность дает уравнение четвертого порядка. Здесь оно линейно и сразу выделяет экспоненту \\(e^{x}\\) по заданным краевым данным.",
      "status": "ai_checked",
