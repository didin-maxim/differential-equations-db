        "title": "Формулировка",
        "text": "Найти экстремаль функционала \\(J(y)=\\int_0^1[(y')^2+(y'')^2]\\,dx\\) при условиях \\(y(0)=0, y'(0)=0, y(1)=e-2, y'(1)=e-1,\\) и определить характер экстремума.",
