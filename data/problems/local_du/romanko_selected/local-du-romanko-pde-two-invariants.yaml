  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристическая система имеет вид\\(dx/(xy)=dy/(2x^2y+y^2)=dz/[-x-2x^2z-yz].\\)Из первых двух уравнений получаем\\(dy/dx=2x+y/x,\\) то есть для \\(w=y/x\\) имеем \\(y=xw, y'=w+xw'=2x+w,\\) поэтому \\(w'=2\\) и w-2x постоянно. В удобной нормировке первый инвариант можно взять \\(I1=y/x-x.\\) Прямой проверкой по характеристическому полю также получаем \\(I2=x+yz\\): его производная равна\\(xy+y[-x-2x^2z-yz]+z(2x^2y+y^2)=0.\\)Поэтому общее решение \\(v=F(I1,I2).\\) На начальной поверхности \\(2x+yz=0\\) имеем \\(I2=x+yz=-x,\\) значит \\(x=-I2.\\) Кроме того \\(I1=y/x-x,\\) откуда \\(y/x=I1+x=I1-I2.\\) Начальное условие \\(v=y/x\\) задает \\(F(I1,I2)=I1-I2.\\) Следовательно \\(v=I1-I2=y/x-x-(x+yz)=y/x-2x-yz.\\)",
      "status": "ai_checked"
    }
  ],
