      "id": "idea-main",
      "title": "Разделить систему уравнений Эйлера по компонентам",
      "text": "Функционал диагонален по y1 и y2, но это все равно задача на векторную экстремаль: одна компонента дает уравнение Эйлера-Коши, другая - линейную функцию.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для y1 уравнение Эйлера дает 12y1-d/dx(2x^2y1')=0, то есть x^2y1''+2xy1'-6y1=0. Это уравнение Эйлера-Коши с показателями 2 и -3, поэтому y1=C1x^2+C2x^{-3}. Условия y1(1)=1, y1(2)=4 дают C1+C2=1 и 4C1+C2/8=4, откуда C1=1, C2=0, так что y1=x^2. Для y2 имеем -d/dx(2y2')=0, значит y2=C3x+C4; из условий получаем y2=x. Проверка минимума не требует отдельного спектрального анализа: для допустимых вариаций h1,h2 с нулевыми концами вторая вариация равна ∫_1^2[6h1^2+x^2(h1')^2+(h2')^2]dx, она положительна для ненулевой пары. Следовательно, найденная пара (x^2,x) дает строгий минимум.",
      "status": "ai_checked"
    }
  ],
