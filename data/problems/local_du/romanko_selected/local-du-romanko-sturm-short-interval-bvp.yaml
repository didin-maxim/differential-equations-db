  "ideas": [
    {
      "id": "idea-main",
      "title": "Запретить нулевое попадание сравнением с постоянным коэффициентом",
      "text": "Нетривиальное решение однородной задачи не может иметь два нуля на таком коротком отрезке: иначе сравнение Штурма заставило бы каждое решение \\(z''+p_*z=0\\) иметь нуль внутри отрезка, что неверно при длине меньше \\(\\pi/\\sqrt{p_*}\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument",
        "shooting_parameter"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Сначала докажем единственность. Пусть \\(u\\) решает однородную краевую задачу \\(u''+p(x)u=0\\), \\(u(a)=u(b)=0\\). Если \\(u\\) не тождественно равно нулю, то между \\(a\\) и \\(b\\) у него есть пара соседних нулей \\(\\alpha<\\beta\\), причем \\(\\beta-\\alpha \\le b-a < \\pi/\\sqrt{p_*}\\). По сравнению Штурма с уравнением \\(z''+p_*z=0\\) всякое ненулевое решение этого уравнения должно иметь нуль на \\((\\alpha,\\beta)\\). Но можно взять решение, положительное на всем \\([\\alpha,\\beta]\\), например \\(z(x)=\\cos(\\sqrt{p_*}(x-m))\\) при \\(m=(\\alpha+\\beta)/2\\): из-за длины меньше \\(\\pi/\\sqrt{p_*}\\) аргумент остается в интервале длины меньше \\(\\pi\\), и нуля нет. Противоречие, значит \\(u\\) тождественно равно нулю. Для существования зафиксируем решение \\(y_0\\) неоднородной задачи Коши \\(y_0(a)=A\\), \\(y_0'(a)=0\\) и решение \\(v\\) однородной задачи Коши \\(v(a)=0\\), \\(v'(a)=1\\). Все решения с левым краевым условием имеют вид \\(y=y_0+cv\\). Если бы \\(v(b)=0\\), то \\(v\\) было бы ненулевым решением однородной краевой задачи с нулевыми концами, что уже исключено. Поэтому \\(v(b)\\ne 0\\), и единственный выбор \\(c=(B-y_0(b))/v(b)\\) дает правое краевое условие.",
      "status": "ai_checked"
    }
  ],
