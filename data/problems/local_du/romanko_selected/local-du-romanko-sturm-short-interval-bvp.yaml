        "title": "Формулировка",
        "text": "Пусть \\(p\\) непрерывна на \\([a,b]\\), \\(p_* = \\max p(x) > 0\\), и \\(b-a < \\pi/\\sqrt{p_*}\\). Доказать, что для любых \\(A\\), \\(B\\) и любой непрерывной \\(f\\) краевая задача \\(y''+p(x)y=f(x)\\), \\(y(a)=A\\), \\(y(b)=B\\) имеет единственное решение.",
