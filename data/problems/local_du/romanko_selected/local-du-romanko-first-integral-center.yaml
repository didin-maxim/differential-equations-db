      "title": "Найти положительный первый интеграл с изолированным минимумом",
      "text": "Логарифмические производные подсказывают H=ln(1+x^2)+ln(1+y^2). Его малые уровни - замкнутые овалы вокруг начала, а поле на них не зануляется.",
