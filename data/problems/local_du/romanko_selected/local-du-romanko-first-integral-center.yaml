  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим H(x,y)=ln(1+x^2)+ln(1+y^2). Тогда вдоль решений H' = 2x x'/(1+x^2)+2y y'/(1+y^2) = 2x[-y(1+x^2)]/(1+x^2)+2y[x(1+y^2)]/(1+y^2)=0. Значит H - первый интеграл. В точке (0,0) функция H имеет строгий изолированный минимум, а при малых c>0 линии H=c являются гладкими замкнутыми овалами, близкими к окружностям x^2+y^2=c. На таком овале правые части системы не обращаются одновременно в нуль: из x'=-y(1+x^2)=0 и y'=x(1+y^2)=0 следует x=y=0, а эта точка не лежит на уровне c>0. Поэтому малая траектория не может сойти с своего овала и, двигаясь по компактной гладкой кривой без остановок, периодически обходит его. Следовательно, равновесие является центром.",
      "status": "ai_checked"
    }
  ],
