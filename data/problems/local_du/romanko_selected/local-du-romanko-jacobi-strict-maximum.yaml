      "id": "idea-main",
      "title": "Проверить Лежандра и отсутствие сопряженной точки",
      "text": "Уравнение Якоби совпадает с h''+h=0. До π/2 нет второго нуля решения с h(0)=0, поэтому отрицательный знак при (y')^2 дает строгий слабый максимум.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Уравнение Эйлера для \\(F=y^2-(y')^2\\) имеет вид \\(2y-\\frac{d}{dx}(-2y')=0\\), то есть \\(y''+y=0\\). С краевыми условиями получаем единственную допустимую экстремаль \\(y=\\sin x\\). Усиленное условие Лежандра имеет отрицательный знак: \\(F_{y'y'}=-2<0\\). Уравнение Якоби для второй вариации здесь то же самое: \\(h''+h=0\\), \\(h(0)=0\\). Его нетривиальные решения имеют вид \\(C\\sin x\\) и не имеют нулей на \\((0,\\pi/2]\\). Значит до правого конца нет сопряженной точки. По достаточному условию Лежандра-Якоби при \\(F_{y'y'}<0\\) экстремаль дает строгий слабый локальный максимум. Это также видно напрямую: для допустимой вариации \\(h\\) с \\(h(0)=h(\\pi/2)=0\\) приращение квадратично и равно \\(\\int_0^{\\pi/2}(h^2-(h')^2)\\,dx\\). Неравенство Виртингера на отрезке длины \\(\\pi/2\\) дает \\(\\int h^2\\,dx\\le (1/4)\\int (h')^2\\,dx<\\int (h')^2\\,dx\\) для \\(h\\) не равной нулю, так что приращение отрицательно.",
      "status": "ai_checked"
    }
  ],
