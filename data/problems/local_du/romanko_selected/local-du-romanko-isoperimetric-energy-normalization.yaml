  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Введем множитель Лагранжа для связи ∫y^2dx=1 и рассмотрим ∫[(y')^2+lambda y^2]dx. Уравнение Эйлера дает -2y''+2lambda y=0, то есть -y''=-lambda y. С условиями Дирихле ненулевые решения на [0,pi] имеют вид sin nx, а соответствующие значения -lambda равны n^2. Минимум энергии должен соответствовать наименьшему собственному значению n^2=1. Нормировка дает y=±sqrt(2/pi) sin x, потому что ∫_0^pi sin^2 x dx=pi/2. Для любой допустимой y с рядом Фурье y=Σ a_n sin nx имеем ∫y^2dx=(pi/2)Σa_n^2=1, а ∫(y')^2dx=(pi/2)Σn^2a_n^2 >= (pi/2)Σa_n^2=1. Равенство возможно только при одной первой гармонике. Значит минимум равен 1 и достигается на указанных двух функциях.",
      "status": "ai_checked"
    }
  ],
