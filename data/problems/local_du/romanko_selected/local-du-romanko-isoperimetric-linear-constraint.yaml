  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим расширенный функционал ∫_0^pi[(y')^2+lambda y cos x]dx. Его уравнение Эйлера: -2y''+lambda cos x=0, то есть y''=(lambda/2)cos x. Общее решение имеет вид y=-(lambda/2)cos x+C1x+C2. Из y(0)=1 получаем C2=1+lambda/2, а из y(pi)=-1 получаем C1=(-2-lambda)/pi. Интегральная связь дает -lambda pi/4-2C1=pi/2, потому что ∫_0^pi cos^2 x dx=pi/2 и ∫_0^pi x cos x dx=-2. Подстановка C1=(-2-lambda)/pi дает lambda=-2, затем C1=0, C2=0, и y=cos x. Для любой допустимой вариации h с h(0)=h(pi)=0 и ∫h cos x dx=0 приращение функционала после использования уравнения Эйлера равно ∫_0^pi(h')^2dx, поскольку линейный член зануляется с учетом связи. Эта величина положительна для h не равной нулю, значит y=cos x дает строгий минимум на классе с заданной связью.",
      "status": "ai_checked"
    }
