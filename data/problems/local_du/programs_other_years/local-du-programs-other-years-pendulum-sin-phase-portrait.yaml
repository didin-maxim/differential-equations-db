      "id": "sol-main",
      "title": "Решение и описание портрета",
      "text": "Особые точки задаются условиями \\(y=0\\) и \\(\\sin x=0,\\) то есть это \\((k \\pi,0), k in Z.\\) Линеаризация имеет матрицу \\([[0,1],[\\cos x,0]].\\) В точках \\((2m \\pi,0)\\) получаем собственные значения 1 и -1, значит это седла. В точках \\(((2m+1)\\pi,0)\\) получаем собственные значения +/- i; тип уточняется первым интегралом. Проверим энергию\\(H(x,y)=y^2/2+\\cos x\\): вдоль решений\\(H'=y_y'-\\sin x_x'=y \\sin x-\\sin x_y=0.\\)Поэтому траектории лежат на уровнях \\(H=c.\\) Минимумы H находятся в точках \\(((2m+1)\\pi,0),\\) где \\(H=-1\\); в окрестности таких точек уровни -1<c<1 являются замкнутыми овалами, значит это центры. Уровень \\(c=1\\) проходит через седла \\((2m \\pi,0)\\) и образует сепаратрисы: \\(y=+/-sqrt(2(1-\\cos x))=+/-2\\)|\\(\\sin(x/2)\\)|, которые соединяют соседние седла. При c>1 имеем\\(y^2=2(c-\\cos x)>0\\)для всех x, поэтому на каждом таком уровне есть две незамкнутые ветви: верхняя с y>0 и нижняя с y<0; они соответствуют вращательному движению вправо и влево. Итак, глобальный портрет \\(2\\pi-\\)периодичен по x: седла в четных кратных \\(\\pi,\\) центры в нечетных кратных \\(\\pi,\\) вокруг центров замкнутые овалы, между ними сепаратрисные петли уровня \\(H=1,\\) а вне сепаратрис идут две семьи проходящих траекторий с постоянным знаком y.",
