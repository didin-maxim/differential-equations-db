  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Правая часть f(x,y)=x-y^2 гладкая, поэтому локальное решение единственно и может быть продолжено, пока на конечном отрезке времени не уходит на бесконечность. Покажем априорные оценки справа от x=1. Сразу после начальной точки y'(1)=1, так что решение становится положительным. Более точно, оно не может попасть в область y<0 при x≥1: если бы это случилось, то в первой точке перехода tau имели бы y(tau)=0 и при входе в отрицательную область производная должна была бы быть ≤0, но из уравнения y'(tau)=tau>0. Значит y(x)≥0 на всем правом максимальном промежутке существования. Тогда y'=x-y^2≤x. Интегрируя от 1 до x, получаем y(x)≤\\(\\int_1^x\\) t dt=(x^2-1)/2. Следовательно на каждом конечном отрезке [1,T] решение, пока существует, лежит в компактной полосе 0≤y≤(T^2-1)/2. По критерию продолжения для гладкого уравнения правый конец максимального интервала не может быть конечным. Поэтому решение продолжается на весь промежуток [1,+∞).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
