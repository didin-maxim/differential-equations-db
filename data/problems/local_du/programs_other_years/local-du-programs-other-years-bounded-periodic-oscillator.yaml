  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассматриваем решения на всей вещественной прямой. Если a не равно 1, то частное решение можно взять в виде\\(y_p=\\sin x/(a-1),\\)потому что\\((D^2+a)(\\sin x)=(a-1)\\sin x.\\)При \\(a=1\\) возникает резонанс:\\(y_p=-(x \\cos x)/2,\\)и этот линейно растущий член нельзя уничтожить добавлением \\(C \\cos x+D \\sin x.\\) Поэтому при \\(a=1\\) ограниченных решений нет. Если a>0 и a не равно 1, все однородные решения \\(C \\cos(\\sqrt{a}x)+D \\sin(\\sqrt{a}x)\\) ограничены, значит ограниченные решения есть. Если \\(a=0,\\) общее решение \\(y=-\\sin x+Cx+D\\); ограниченные решения есть при \\(C=0.\\) Если a<0, пусть\\(a=-\\beta^2.\\)Тогда общее решение \\(y=\\sin x/(a-1)+C e^{\\beta x}+D e^{-\\beta x},\\) и ограниченность на всей R требует \\(C=D=0\\); одно ограниченное решение все равно есть. Итак, хотя бы одно ограниченное решение существует для всех a кроме \\(a=1.\\) Для периодических решений: при a<0 экспоненциальные однородные добавки не периодичны, поэтому остается ровно одно периодическое решение \\(y=\\sin x/(a-1).\\) При \\(a=0\\) периодических решений бесконечно много: \\(-\\sin x+D.\\) При \\(a=1\\) периодических решений нет из-за резонансного члена. При a>0, a не равно 1, частное решение периодично; однородные добавки периодичны одновременно с \\(\\sin x\\) тогда и только тогда, когда \\sqrt{a} рационально. Если \\sqrt{a} рационально, периодических решений бесконечно много; если \\sqrt{a} иррационально, ненулевая добавка \\(C \\cos(\\sqrt{a}x)+D \\sin(\\sqrt{a}x)\\) не может иметь общий период с \\(\\sin x,\\) и ровно одно периодическое решение равно \\(\\sin x/(a-1).\\) Ответ: ограниченные решения есть при \\(a \\ne 1\\); ровно одно периодическое решение есть при a<0 или при a>0 и \\sqrt{a} irrational.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "resonance_ansatz"
      ]
    }
