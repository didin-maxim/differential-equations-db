  "ideas": [
    {
      "id": "idea-main",
      "title": "Проверить, характеристическая ли начальная кривая",
      "text": "Инвариант характеристик равен 3x-2y. Данные на характеристике либо задают только одно значение произвольной функции, либо противоречат постоянству вдоль характеристики; данные на нехарактеристической прямой задают функцию полностью.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристическое поле имеет направление (2,3), поэтому вдоль характеристик dy/dx=3/2. Величина 3x-2y постоянна, так что общее решение имеет вид u(x,y)=F(3x-2y), где F - произвольная функция одной переменной. Прямая 3x-2y=5 сама является характеристикой. В пункте а) условие означает только F(5)=10, поэтому решений бесконечно много: любая F с таким значением подходит. В пункте б) на той же характеристике значение решения должно быть постоянным, но \\(e^{x}\\) меняется вдоль прямой 3x-2y=5; значит, решения нет. В пункте в) прямая x=0 не характеристическая: на ней 3x-2y=-2y, поэтому F(-2y)=sin y. При s=-2y получаем F(s)=sin(-s/2)=-sin(s/2), и единственное решение равно u(x,y)=-sin((3x-2y)/2)=sin(y-3x/2).",
      "status": "ai_checked"
    }
  ],
