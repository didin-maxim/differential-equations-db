        "title": "Формулировка",
        "text": "Найти общее решение уравнения 2u_x+3u_y=0. Затем разобрать задачи Коши: а) u=10 на прямой 3x-2y=5; б) u=\\(e^{x}\\) на прямой 3x-2y=5; в) u=sin y на прямой x=0. Объяснить, почему ответы в трех случаях имеют разный характер.",
