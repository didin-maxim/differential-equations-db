        "title": "Формулировка",
        "text": "Исследовать на экстремум при всех вещественных a функционал \\(J[y]=\\int_0^{\\pi/2}((y')^2-a y^2)\\,dx\\) при условиях y(0)=0, y(π/2)=0.",
