  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить с первым собственным значением",
      "text": "Функционал уже квадратичен. Его знак определяется не уравнением Эйлера-Лагранжа само по себе, а неравенством Пуанкаре и первым собственным значением задачи Дирихле на отрезке.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Функционал квадратичен, поэтому y=0 всегда стационарная функция. Для любой допустимой h с нулевыми концами имеем J[h]=∫((h')^2-a h^2)dx. На отрезке [0,π/2] первое собственное значение задачи -h''=lambda h, h(0)=h(π/2)=0 равно 4, и неравенство Пуанкаре дает ∫(h')^2 dx ≥ 4∫h^2 dx, причем равенство достигается только на h=C sin 2x. Если a<4, то J[h] ≥ (4-a)∫h^2 dx >0 для h не равной нулю, значит y=0 - строгий минимум. Если a=4, то J[h]≥0, а на h=C sin 2x значение равно нулю; значит минимум есть, но он нестрогий, и все функции C sin 2x дают то же минимальное значение. Если a>4, то на h=C sin 2x получаем J[h]=(4-a)C^2∫sin^2 2x dx, что стремится к -∞ при |C|→∞. При этом на достаточно высоких синусоидальных модах значение положительно, поэтому стационарные функции, возникающие при a=4n^2, n≥2, являются седловыми, а экстремума нет. Итак: при a<4 строгий минимум, при a=4 нестрогий минимум, при a>4 экстремума нет.",
      "status": "ai_checked"
    }
  ],
