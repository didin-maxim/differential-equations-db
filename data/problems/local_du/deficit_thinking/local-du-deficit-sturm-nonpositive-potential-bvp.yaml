  "ideas": [
    {
      "id": "idea-main",
      "title": "Энергетическая проверка однородной краевой задачи",
      "text": "Достаточно показать, что однородная задача с нулевыми краями имеет только нулевое решение. Умножение на решение превращает это в знаковое интегральное тождество.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть \\(z -\\) решение однородной краевой задачи \\(z''+q(x)z=0, z(x_1)=z(x_2)=0.\\) Умножим уравнение на \\(z\\) и проинтегрируем по отрезку между \\(x_1\\) и \\(x_2.\\) После интегрирования по частям граничный член \\(z'z\\) на концах равен нулю, поэтому \\(-\\int (z')^2\\,dx+\\int qz^2\\,dx=0,\\) то есть \\(\\int (z')^2\\,dx=\\int qz^2\\,dx.\\) Левая часть неотрицательна, а правая неположительна, значит обе равны нулю. Тогда \\(z'\\) тождественно равно нулю, а из \\(z(x_1)=0\\) следует \\(z\\) тождественно равно нулю. Значит, однородная краевая задача имеет только нулевое решение. Теперь зафиксируем решение \\(y_0\\) задачи Коши \\(y_0(x_1)=a, y_0'(x_1)=0\\) и решение \\(v\\) задачи Коши \\(v(x_1)=0, v'(x_1)=1.\\) Любое решение с первым краевым условием имеет вид \\(y=y_0+cv.\\) Если бы \\(v(x_2)=0,\\) то \\(v\\) было бы ненулевым решением однородной краевой задачи с нулевыми краями, что невозможно. Поэтому \\(v(x_2)\\ne 0,\\) и единственный выбор \\(c=(b-y_0(x_2))/v(x_2)\\) дает \\(y(x_2)=b.\\) Существование и единственность доказаны.",
      "status": "ai_checked"
    }
  ],
