      "id": "idea-main",
      "title": "Энергетическая проверка однородной краевой задачи",
      "text": "Достаточно показать, что однородная задача с нулевыми краями имеет только нулевое решение. Умножение на решение превращает это в знаковое интегральное тождество.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть z - решение однородной краевой задачи z''+q(x)z=0, z(x1)=z(x2)=0. Умножим уравнение на z и проинтегрируем по отрезку между x1 и x2. После интегрирования по частям граничный член z'z на концах равен нулю, поэтому -∫(z')^2 dx+∫qz^2 dx=0, то есть ∫(z')^2 dx=∫qz^2 dx. Левая часть неотрицательна, а правая неположительна, значит обе равны нулю. Тогда z' тождественно равно нулю, а из z(x1)=0 следует z тождественно равно нулю. Значит, однородная краевая задача имеет только нулевое решение. Теперь зафиксируем решение y0 задачи Коши y0(x1)=a, y0'(x1)=0 и решение v задачи Коши v(x1)=0, v'(x1)=1. Любое решение с первым краевым условием имеет вид y=y0+cv. Если бы v(x2)=0, то v было бы ненулевым решением однородной краевой задачи с нулевыми краями, что невозможно. Поэтому v(x2) != 0, и единственный выбор c=(b-y0(x2))/v(x2) дает y(x2)=b. Существование и единственность доказаны.",
      "status": "ai_checked"
    }
  ],
