        "title": "Формулировка",
        "text": "Пусть q непрерывна на всей действительной оси и q(x) <= 0. Доказать, что краевая задача y''+q(x)y=0, y(x1)=a, y(x2)=b при любых a, b и x1 != x2 имеет решение и это решение единственно.",
