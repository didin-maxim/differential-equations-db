  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Уберем первую производную стандартной заменой y=u \\(e^{-1/2 integral 2x^2 dx}\\)=u \\(e^{-x^3/3}\\). Нули y и u совпадают, потому что множитель \\(e^{-x^3/3}\\) нигде не равен нулю. Для уравнения y''+p y'+r y=0 новая функция u удовлетворяет u''+(r-p'/2-p^2/4)u=0. Здесь p=2x^2, r=2x+1, поэтому r-p'/2-p^2/4=(2x+1)-2x-x^4=1-x^4. Значит нужно оценить число нулей ненулевого решения u''+(1-x^4)u=0. На лучах (-∞,-1] и [1,+∞) коэффициент 1-x^4 неположителен. На любом промежутке между двумя соседними нулями на таком луче u имеет постоянный знак; если u>0, то u''=(x^4-1)u≥0, то есть положительная выпуклая функция должна лежать не выше нулевой хорды, противоречие. Случай u<0 сводится к -u. Поэтому на каждом из двух внешних лучей не более одного нуля. На отрезке [-1,1] коэффициент 1-x^4≤1. По сравнению Штурма с z''+z=0 расстояние между двумя соседними нулями решения уравнения u''+(1-x^4)u=0 не может быть меньше π: иначе решение z=sin(x-alpha) уравнения с большим коэффициентом 1 должно было бы иметь нуль между двумя нулями u на интервале длины меньше π, что невозможно для синуса. Длина [-1,1] равна 2<π, значит внутри этого отрезка не может быть двух нулей. Итак, всего возможно не более одного нуля слева от [-1,1], не более одного нуля на [-1,1] и не более одного нуля справа. Поэтому у исходного нетривиального решения y не более трех нулей на всей действительной оси.",
