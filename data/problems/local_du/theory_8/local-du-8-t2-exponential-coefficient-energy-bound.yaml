  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Положим a(x)=exp(2/(x+1)). Тогда a(x)>0 и a'(x)=-(2/(x+1)^2)a(x)<=0 при x>=0. Рассмотрим E(x)=y'(x)^2+a(x)y(x)^2. Дифференцируя вдоль решения, получаем E'=2y'y''+a'y^2+2ayy'=2y'(-ay)+a'y^2+2ayy'=a'y^2<=0. Следовательно E(x)<=E(0). Из начальных условий E(0)=0^2+exp(2)·1^2=e^2. Так как a(x)y(x)^2<=E(x), имеем |y(x)|<=sqrt(E(x)/a(x))<=sqrt(e^2/exp(2/(x+1)))=exp(1-1/(x+1))=exp(x/(x+1)). Это и требовалось доказать.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
  ],
