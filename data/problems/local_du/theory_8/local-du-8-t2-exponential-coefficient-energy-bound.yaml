      "id": "idea-main",
      "title": "Убывающая энергия с переменным коэффициентом",
      "text": "Для уравнения y''+a(x)y=0 с положительным убывающим a(x) энергия E=y'^2+a(x)y^2 убывает, потому что E'=a'(x)y^2<=0. Здесь a(x)=exp(2/(x+1)).",
