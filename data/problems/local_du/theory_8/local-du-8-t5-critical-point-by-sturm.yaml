  "ideas": [
    {
      "id": "idea-main",
      "title": "На отрезке длины больше 2pi есть два нуля",
      "text": "Коэффициент 2+cos 3x не меньше 1. По сравнению Штурма решение имеет нуль на каждом промежутке между соседними нулями синуса длины π. На [-1,6] помещаются два таких промежутка, а между двумя нулями решения по Роллю есть нуль производной.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Если y тождественно равно нулю, утверждение немедленно верно. Пусть y - ненулевое решение. Обозначим Q(x)=2+cos 3x. Тогда Q(x)≥1 для всех x. Применим теорему сравнения Штурма к уравнениям y''+Q(x)y=0 и z''+z=0. Так как Q≥1, между любыми двумя соседними нулями решения z уравнения с коэффициентом 1 у решения y есть хотя бы один нуль. Возьмем z_1(x)=sin(x+1). Его соседние нули находятся в точках -1 и -1+π, значит у y есть нуль в интервале (-1,-1+π). Возьмем следующий промежуток между нулями того же синуса: (-1+π,-1+2pi). Он также целиком лежит в [-1,6], потому что -1+2pi<6. Поэтому у y есть еще один нуль в этом втором интервале. Эти два нуля различны. По теореме Ролля между ними существует точка xi, в которой y'(xi)=0. Она лежит внутри [-1,6], что и требовалось.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
