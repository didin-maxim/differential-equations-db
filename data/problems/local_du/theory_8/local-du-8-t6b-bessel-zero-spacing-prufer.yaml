  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Как в пункте 6a, положим y=x^(-1/2)u. Тогда нули y и u совпадают, а u удовлетворяет уравнению u''+Q(x)u=0 с Q(x)=1-(nu^2-1/4)/x^2. По пункту 6a нули образуют неограниченную последовательность x_n -> +infty. Для больших x коэффициент Q положителен. Введем угол Прюфера: выберем непрерывную функцию theta так, что u=rho sin theta, u'=rho cos theta, rho=sqrt(u^2+u'^2)>0. Здесь rho не обращается в нуль, потому что иначе u и u' одновременно равны нулю, и по единственности u было бы нулевым решением. Дифференцируя угол, получаем theta'=(u'^2-u u'')/(u^2+u'^2)=(u'^2+Q u^2)/(u^2+u'^2)=cos^2 theta+Q sin^2 theta. Следовательно |theta'-1|=|Q-1| sin^2 theta<=|Q-1|. Так как Q(x)->1, для любого epsilon in (0,1) найдется R, что при x>=R выполнено 1-epsilon<=theta'(x)<=1+epsilon. Нули u соответствуют значениям theta, кратным pi; соседние нули отличаются изменением угла ровно на pi, потому что theta строго возрастает на хвосте. Поэтому для достаточно больших n, когда x_n>=R, имеем pi=integral_{x_n}^{x_{n+1}} theta'(x) dx. Отсюда (1-epsilon)(x_{n+1}-x_n)<=pi<=(1+epsilon)(x_{n+1}-x_n). Значит pi/(1+epsilon)<=x_{n+1}-x_n<=pi/(1-epsilon). Переходя к пределу при n->infty, а затем устремляя epsilon к нулю, получаем x_{n+1}-x_n -> pi.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "angle_comparison"
      ]
    }
  ],
