  "ideas": [
    {
      "id": "idea-main",
      "title": "Смешанный вронскиан меняется монотонно",
      "text": "Если u и v не имеют нулей внутри промежутка, знак производной W=u'v-uv' определяется разностью Q2-Q1, а значения W на концах имеют противоположный порядок.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant",
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Так как a и b - соседние нули u, внутри (a,b) функция u имеет постоянный знак. Умножив u на -1 при необходимости, считаем u>0 на (a,b); тогда u'(a)>0 и u'(b)<0. Предположим, что некоторое ненулевое решение v уравнения v''+Q2 v=0 не имеет нулей на (a,b). Умножив v на -1 при необходимости, считаем v>0 на (a,b). Если v обращается в нуль в a или b, чуть сдвигаем конец рассуждения внутрь и затем переходим к пределу; для простоты сначала считаем v(a),v(b)>0. Рассмотрим W=u'v-uv'. Тогда W'=u''v-u v''=(-Q1 u)v-u(-Q2 v)=(Q2-Q1)uv>=0, то есть W неубывает. Но W(a)=u'(a)v(a)>0, а W(b)=u'(b)v(b)<0. Неубывающая функция не может перейти от положительного значения к отрицательному; противоречие. Если нуль v был на одном из концов, предельный вариант дает W(a)>=0 и W(b)<=0, причем при отсутствии внутреннего нуля равенство во всех шагах возможно только когда Q1=Q2 на промежутке и v пропорционально u. Значит во всех невырожденных случаях v имеет нуль внутри (a,b).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant",
        "comparison_argument"
      ]
    }
  ],
