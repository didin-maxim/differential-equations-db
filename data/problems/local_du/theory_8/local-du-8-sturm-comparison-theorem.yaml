        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть Q1,Q2 непрерывны на [a,b] и Q2(x)>=Q1(x). Если u - ненулевое решение u''+Q1(x)u=0 с соседними нулями a и b, то всякое ненулевое решение v''+Q2(x)v=0 имеет нуль на (a,b), кроме вырожденного случая совпадающих коэффициентов и пропорциональных решений.",
