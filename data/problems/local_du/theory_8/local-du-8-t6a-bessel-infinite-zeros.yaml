        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Делим уравнение на x^2: y''+(1/x)y'+(1-nu^2/x^2)y=0. Положим y=x^(-1/2)u. Это ненулевой множитель на (0,+infty), поэтому нули y и u совпадают. Стандартный пересчет для устранения первой производной дает u''+Q(x)u=0, где Q(x)=1-(nu^2-1/4)/x^2. Так как Q(x)->1 при x->+infty, существует R такое, что Q(x)>=1/4 при x>=R. Рассмотрим любые промежутки [R+2pi k, R+2pi(k+1)]. Функция z_k(x)=sin((x-R-2pi k)/2) решает z''+(1/4)z=0 и имеет соседние нули на концах такого промежутка. По теореме сравнения Штурма, поскольку Q>=1/4, каждое ненулевое решение u''+Q u=0 имеет хотя бы один нуль между соседними нулями z_k. Эти промежутки попарно не пересекаются, поэтому у u, а значит и у y, бесконечно много нулей на (0,+infty).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
