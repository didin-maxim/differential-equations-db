        "title": "Задача 6a из первого задания",
        "text": "Доказать, что любое нетривиальное решение уравнения Бесселя x^2 y'' + x y' + (x^2 - nu^2)y = 0, nu = const, имеет бесконечное число нулей на промежутке (0,+infty).",
