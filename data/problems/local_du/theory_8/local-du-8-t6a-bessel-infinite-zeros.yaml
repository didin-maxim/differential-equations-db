  "ideas": [
    {
      "id": "idea-main",
      "title": "Свести к уравнению с коэффициентом, стремящимся к 1",
      "text": "Замена y=x^(-1/2)u убирает первую производную и дает u''+(1-(nu^2-1/4)/x^2)u=0. Для больших x коэффициент больше 1/4, поэтому сравнение Штурма с sin(x/2) дает нуль на бесконечной последовательности промежутков.",
      "status": "ai_checked",
