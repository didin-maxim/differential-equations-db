  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение через сравнение Штурма",
      "text": "Сначала докажем ключевой факт: всякое ненулевое решение однородного уравнения \\(y''+q(x)y=0\\) имеет не более одного нуля. Это прямое применение теоремы сравнения Штурма в форме: если \\(Q2\\ge Q1\\) на \\([\\alpha,\\beta]\\) и u - ненулевое решение \\(u''+Q1 u=0\\) с двумя соседними нулями \\(\\alpha\\) и \\(\\beta,\\) то всякое ненулевое решение \\(v''+Q2 v=0\\) имеет нуль на \\((\\alpha,\\beta).\\) Здесь \\(Q1=q\\) и \\(Q2=0.\\) Если бы u имело два соседних нуля \\(\\alpha<\\beta,\\) то решение \\(v(x)=1\\) уравнения \\(v''+0\\)·\\(v=0\\) должно было бы иметь нуль между \\(\\alpha\\) и \\(\\beta,\\) что невозможно. Значит второй нуль у ненулевого решения невозможен. Теперь докажем единственность краевой задачи. Если\\(y_1\\)и\\(y_2\\)имеют одинаковые значения в\\(x_1\\)и\\(x_2,\\)то\\(w=y_1-y_2\\)решает \\(w''+q w=0\\) и\\(w(x_1)=w(x_2)=0.\\)При\\(x_1\\ne x_2\\)это два нуля, поэтому w тождественно равно нулю; решения совпадают. Для существования пусть, для определенности\\(, x_1<x_2.\\)Возьмем решения v,u задач Коши\\(v(x_1)=1, v'(x_1)=0\\)и\\(u(x_1)=0, u'(x_1)=1.\\)Они существуют на всей прямой, потому что уравнение линейное с непрерывным коэффициентом. По ключевому факту u не может иметь второго нуля, значит\\(u(x_2)\\ne0.\\) Тогда функция\\(y(x)=a v(x)+B_u(x),\\)где\\(B=(b-a v(x_2))/u(x_2),\\)удовлетворяет уравнению и условиям\\(y(x_1)=a, y(x_2)=b.\\)Существование и единственность доказаны.",
      "status": "ai_checked",
