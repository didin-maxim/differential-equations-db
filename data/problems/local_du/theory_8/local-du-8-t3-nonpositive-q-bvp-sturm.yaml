  "ideas": [
    {
      "id": "idea-main",
      "title": "Штурм запрещает два нуля у ненулевого решения",
      "text": "Так как \\(q\\le0,\\) уравнение \\(z''=0\\) имеет больший коэффициент, чем \\(y''+q y=0.\\) Если бы решение первого уравнения имело два нуля, теорема сравнения Штурма заставила бы любую ненулевую аффинную функцию иметь нуль между ними, что невозможно.",
      "status": "ai_checked",
