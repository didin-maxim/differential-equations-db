        "title": "Задача 3 из первого задания",
        "text": "Пусть функция q(x) непрерывна на всей действительной оси и \\(q(x)\\le0.\\) Доказать, что краевая задача\\(y''+q(x)y=0, y(x_1)=a, y(x_2)=b,\\)при любых a,b и\\(x_1\\ne x_2\\)имеет решение и это решение единственно.",
