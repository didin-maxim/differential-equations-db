  "ideas": [
    {
      "id": "idea-main",
      "title": "Вронскиан по формуле Лиувилля равен C/x",
      "text": "После деления на x^2 коэффициент при y' равен 1/x, поэтому вронскиан любой пары решений имеет вид C/x. Ограниченность обеих функций и их первых производных у нуля заставляет этот вронскиан быть ограниченным, значит C=0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Рассмотрим два произвольных решения y1,y2 на интервале (0,epsilon). При x>0 уравнение можно записать в нормальном виде y''+(1/x)y'+(1-nu^2/x^2)y=0. Для вронскиана W=y1 y2' - y1' y2 формула Лиувилля дает W'=-(1/x)W, откуда W(x)=C/x. Если y1,y2 и их первые производные ограничены при x -> 0+, то произведения y1 y2' и y1' y2 ограничены, следовательно W тоже ограничен в некоторой проколотой окрестности нуля. Но C/x ограничен при x -> 0+ только при C=0. Значит W тождественно равен нулю. Для линейного уравнения второго порядка это означает линейную зависимость y1 и y2: в любой точке x0>0 их начальные векторы (y1(x0),y1'(x0)) и (y2(x0),y2'(x0)) линейно зависимы, а единственность задачи Коши продолжает эту зависимость на весь интервал. Поэтому двух линейно независимых решений с указанной ограниченностью быть не может.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
  ],
