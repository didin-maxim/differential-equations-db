        "title": "Задача 1 из первого задания",
        "text": "Доказать, что уравнение Бесселя x^2 y'' + x y' + (x^2 - nu^2)y = 0, где nu = const, на (0,+infty) не может иметь двух линейно независимых решений, ограниченных в окрестности нуля вместе со своими первыми производными.",
