  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Разность\\(h=y_1-y_2=x^2-\\cos 2x\\) решает соответствующее однородное уравнение. Поэтому\\(y_2+C_h\\)снова является решением исходного неоднородного уравнения. При \\(x=\\pi/4\\) имеем\\(y_2=0\\)и \\(h=\\pi^2/16,\\)так что выбор \\(C=16\\) дает\\(y_3=16x^2-15\\cos 2x\\) и\\(y_3(\\pi/4)=\\pi^2.\\)Таких решений бесконечно много: пространство решений однородного уравнения второго порядка двумерно, а условие значения в одной точке задает одну линейную связь; оно не может занулить все направления, потому что \\(h(\\pi/4)\\) не равно нулю. Для пункта б предположим, что\\(y_4=2x^2+1\\) тоже решение. Тогда\\(h1=y_4-y_1=x^2+1\\) и\\(h2=y_1-y_2=x^2-\\cos 2x\\) были бы двумя решениями однородного уравнения. Их значения в нуле: \\(h1(0)=1, h1'(0)=0, h2(0)=-1, h2'(0)=0,\\) поэтому \\(W(0)=0.\\) По теореме о вронскиане для линейного уравнения второго порядка они должны быть линейно зависимы на всей прямой. Но\\(x^2+1\\)не является постоянным множителем\\(x^2-\\cos 2x.\\)Противоречие; такого решения\\(y_4\\)быть не может.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
  ],
