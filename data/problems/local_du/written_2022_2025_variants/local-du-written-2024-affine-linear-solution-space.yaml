        "title": "ДУ В 24, задача 8",
        "text": "Известно, что\\(y_1=x^2\\) и\\(y_2=\\cos 2x -\\)решения уравнения \\(y''+p(x)y'+q(x)y=f(x),\\) где p,q,f непрерывно дифференцируемы на всей прямой. а) Найдите хотя бы одно решение\\(y_3\\)с\\(y_3(\\pi/4)=\\pi^2.\\)Сколько существует таких решений и почему? б) Может ли это уравнение иметь решение\\(y_4=2x^2+1\\)?",
