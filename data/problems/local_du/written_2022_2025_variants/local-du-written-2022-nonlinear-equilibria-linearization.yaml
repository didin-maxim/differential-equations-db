  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из \\(e^{2x-y}-1=0\\) получаем \\(y=2x.\\) Условие\\(sh(8x-7y-4x^2+3xy)=0\\)дает\\(8x-7y-4x^2+3xy=0,\\)а после подстановки \\(y=2x\\): \\(2x(x-3)=0.\\) Значит равновесия: (0,0) и (3,6). Матрица Якоби равна \\([[cosh(g)(8-8x+3y), cosh(g)(-7+3x)], [2e^{2x-y}, -e^{2x-y}]],\\) где\\(g=8x-7y-4x^2+3xy.\\)В обоих равновесиях \\(\\cosh(g)=e^{2x-y}=1.\\) В точке (0,0) получаем \\([[8,-7],[2,-1]], tr=7, det=6,\\) собственные значения 6 и 1: это неустойчивый узел. В точке (3,6) получаем \\([[2,2],[2,-1]], tr=1, det=-6,\\) собственные значения 3 и -2: это седло.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
