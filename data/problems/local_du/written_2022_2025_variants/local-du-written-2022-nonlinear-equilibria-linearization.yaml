  "ideas": [
    {
      "id": "idea-main",
      "title": "Сначала решить алгебру равновесий",
      "text": "В равновесии аргумент sh равен нулю, а экспонента равна единице. После этого типы читаются по собственным значениям матрицы Якоби.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
