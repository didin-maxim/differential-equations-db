        "title": "ДУ В 22, задача 1",
        "text": "Найдите все положения равновесия системы\\(x' = sh(8x-7y-4x^2+3xy),y'=e^{2x-y}-1,\\) определите их тип и нарисуйте траектории соответствующих линеаризованных систем.",
