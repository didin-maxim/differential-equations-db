  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "В окрестности начальной точки \\(p=y'\\) не равен нулю, и можно считать \\(p=p(y).\\) Тогда \\(y''=p dp/dy.\\) Уравнение становится\\(2yp dp/dy+2yp^4=p^2.\\) Делим на\\(p^4\\)и кладем\\(w=p^{-2}.\\)Так как\\(w_y=-2p^{-3}p_y,\\)получаем\\(-y_w y+2y=w,\\)то есть\\(w_y+w/y=2.\\)Следовательно\\(, (yw)'=2y\\) и\\(yw=y^2+C.\\)При \\(y=1, p=1\\) имеем \\(w=1,\\) значит \\(C=0.\\) Поэтому\\(p^{-2}=y\\)и, с учетом \\(p(1)=1, y'=1/sqrt(y).\\) Интегрируя, получаем\\((2/3)y^{3/2}=x+C.\\)Из \\(y(1)=1\\) следует \\(C=-1/3,\\) значит\\(y^{3/2}=(3x-1)/2.\\)Ответ:\\(y(x)=((3x-1)/2)^{2/3}\\)на правой ветви, содержащей \\(x=1.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
