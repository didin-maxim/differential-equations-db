  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для \\(F=(y')^2-y^2+4yy'+4y\\sin x+\\sin(x^2)\\) имеем \\(F_y=-2y+4y'+4\\sin x\\), \\(F_{y'}=2y'+4y\\). Уравнение Эйлера дает \\(y''+y=2\\sin x\\). Так как правая граница свободна, естественное условие: \\(F_{y'}(\\pi/2)=0\\), то есть \\(y'(\\pi/2)+2y(\\pi/2)=0\\). Общее решение уравнения Эйлера: \\(y=C_1\\cos x+C_2\\sin x-x\\cos x\\). Условие \\(y(0)=\\pi/2\\) дает \\(C_1=\\pi/2\\). В точке \\(\\pi/2\\) имеем \\(y(\\pi/2)=C_2\\) и \\(y'(\\pi/2)=0\\), поэтому \\(C_2=0\\). Экстремаль: \\(y=(\\pi/2-x)\\cos x\\). Вторая вариация равна \\(Q(\\eta)=\\int_0^{\\pi/2}((\\eta')^2-\\eta^2+4\\eta\\eta')\\,dx\\) при \\(\\eta(0)=0\\). Так как \\(\\int 4\\eta\\eta'=2\\eta(\\pi/2)^2\\), а по неравенству Виртингера для \\(\\eta(0)=0\\) на \\([0,\\pi/2]\\) выполнено \\(\\int \\eta^2\\le \\int (\\eta')^2\\), получаем \\(Q(\\eta)\\ge 2\\eta(\\pi/2)^2\\), причем равенство в первой части возможно только для \\(\\eta=C\\sin x\\), тогда \\(Q=2C^2\\). Следовательно \\(Q>0\\) для ненулевых вариаций, и экстремаль дает строгий минимум.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "resonance_ansatz",
        "shooting_parameter"
      ]
    }
  ],
