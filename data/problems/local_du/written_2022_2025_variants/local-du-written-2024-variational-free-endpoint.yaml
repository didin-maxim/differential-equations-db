      "id": "idea-main",
      "title": "Добавить естественное граничное условие",
      "text": "Правый конец не закреплен, поэтому кроме уравнения Эйлера нужно условие \\(F_{y'}(\\pi/2)=0\\). После этого экстремаль находится из резонансного уравнения \\(y''+y=2\\sin x\\).",
