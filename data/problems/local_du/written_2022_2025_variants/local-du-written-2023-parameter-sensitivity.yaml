    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "При mu=0 уравнение имеет вид y'+(2/x)y=1/x^2, поэтому (x^2y)'=1. Из y(1,0)=1 получаем y_0(x)=1/x. Обозначим z=partial_mu y|_{mu=0}. Дифференцируя x^2y'=-2xy+(1+mu x^2y^2)^{-1} по mu и подставляя mu=0, y_0=1/x, получаем x^2z'=-2xz-x^2y0^2=-2xz-1. Начальное условие: z(1)=1. Значит z'+(2/x)z=-1/x^2, или (x^2z)'=-1. Отсюда x^2z=-x+C, а из z(1)=1 следует C=2. Итак, partial y/partial mu при mu=0 равна z(x)=(2-x)/x^2.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
