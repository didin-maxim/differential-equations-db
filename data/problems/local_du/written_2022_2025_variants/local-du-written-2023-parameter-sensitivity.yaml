      "id": "idea-main",
      "title": "Продифференцировать задачу Коши",
      "text": "При mu=0 сначала находится базовое решение. Производная z=partial_mu y затем удовлетворяет линейной задаче Коши, полученной дифференцированием исходного уравнения.",
      "status": "ai_checked",
