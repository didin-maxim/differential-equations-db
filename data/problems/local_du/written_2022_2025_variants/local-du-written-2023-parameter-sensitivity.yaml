        "title": "ДУ_В_23, задача 9",
        "text": "Функция y=y(x,mu) - решение задачи Коши x^2 y'=-2xy+1/(1+mu x^2 y^2), y|_{x=1}=mu+1. Найдите partial y/partial mu при mu=0.",
