      "id": "idea-main",
      "title": "Найти первые интегралы характеристик",
      "text": "Характеристическая система\\(dx/x=dy/(2y)=dz/x\\) дает два инварианта; данные на плоскости \\(x=y\\) выражают произвольную функцию через них.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристики удовлетворяют\\(dx/ds=x,dy/ds=2y, dz/ds=x.\\) Из\\(dy/dx=2y/x\\) получаем первый интеграл\\(I1=y/x^2.\\)Из\\(dz/dx=1\\) получаем \\(I2=z-x.\\) Поэтому общее решение имеет вид\\(u=\\Phi(y/x^2,z-x).\\)На начальной поверхности \\(x=y\\) имеем \\(I1=1/x\\) и \\(I2=z-x,\\) а заданное значение \\(u=(x-z)/x=-(z-x)/x=-I1 I2.\\) Следовательно\\(, \\Phi(I1,I2)=-I1 I2,\\) и решение задачи Коши равно\\(u(x,y,z)=-(y/x^2)(z-x)=y(x-z)/x^2.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ]
    }
  ],
