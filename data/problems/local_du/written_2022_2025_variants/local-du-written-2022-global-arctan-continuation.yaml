  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Функция f(x,y)=arctg(x^3y) гладкая на всей плоскости, поэтому локальная задача Коши имеет единственное решение и оно продолжается до тех пор, пока график не уходит на бесконечность за конечное x. Но |y'|=|arctg(x^3y)|≤π/2. Следовательно, на любом отрезке [0,a), лежащем в области существования, выполнено |y(x)+1|≤π x/2, то есть y остается ограниченной при x<a<∞. Тогда стандартная теорема продолжения позволяет продолжить решение за точку a. Поэтому правый конец максимального промежутка не может быть конечным, и решение определено для всех x>0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
