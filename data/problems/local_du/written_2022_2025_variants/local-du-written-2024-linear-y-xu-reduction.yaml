  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим y=xu. Тогда y'=u+xu', y''=2u'+xu''. После подстановки члены с u сокращаются, и остается x^3u''-x^2(x^2+1)u'=x^5, то есть x u''-(x^2+1)u'=x^3. Для v=u' получаем v'-(x+1/x)v=x^2. Интегрирующий множитель равен \\(e^{-x^2/2}/x\\), поэтому \\((v e^{-x^2/2}/x)'=x e^{-x^2/2}\\). Интегрируя, имеем \\(v=-x+C x e^{x^2/2}\\). Значит \\(u=-x^2/2+C e^{x^2/2}+D\\). Поэтому общее решение: \\(y(x)=C x e^{x^2/2}+D x-x^3/2\\), x>0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
  ],
