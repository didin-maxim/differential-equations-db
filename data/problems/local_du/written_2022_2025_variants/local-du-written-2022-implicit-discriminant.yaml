  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим p=y' и q=p+alpha. Тогда F(y,p)=(2q^2+2q+1)e^{2p}-4y. Дискриминантное множество находится из F=0 и F_p=0. Так как F_p=e^{2p}(4q+2+2(2q^2+2q+1))=4e^{2p}(q+1)^2, получаем q=-1, то есть p=-alpha-1. При этом 2q^2+2q+1=1, поэтому y=e^{2p}/4=e^{-2alpha-2}/4. Чтобы эта горизонтальная прямая сама была решением, ее наклон должен быть p=0. Но на дискриминанте p=-alpha-1, следовательно требуется alpha=-1. При alpha=-1 дискриминантная прямая y=1/4 действительно удовлетворяет исходному уравнению с y'=0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
