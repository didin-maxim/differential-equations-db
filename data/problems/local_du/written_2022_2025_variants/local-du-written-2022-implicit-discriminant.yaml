        "title": "ДУ_В_22, задача 7",
        "text": "Для уравнения (2(y'+alpha)^2+2(y'+alpha)+1)e^(2y')-4y=0: а) при произвольном alpha in R найдите дискриминантное множество; б) выясните, при каких alpha дискриминантное множество содержит решение уравнения.",
