  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим t=1/x^2 и y(x)=Y(t). Тогда y'=-2x^{-3}Y_t, y''=6x^{-4}Y_t+4x^{-6}Y_{tt}. Поэтому x^6y''+3x^5y'=4Y_{tt}. Уравнение превращается в 4Y_{tt}-4Y=4, то есть Y_{tt}-Y=1. Его общее решение \\(Y=C_1e^t+C_2e^{-t}-1\\). Возвращаясь к x, получаем \\(y(x)=C_1e^{1/x^2}+C_2e^{-1/x^2}-1\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
