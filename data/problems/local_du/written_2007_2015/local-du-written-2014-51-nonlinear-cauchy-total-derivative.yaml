      "id": "idea-main",
      "title": "Свернуть\\(y_y''+(y')^2\\)",
      "text": "Выражение\\(y_y''+(y')^2\\)равно \\((yy')'.\\) После замены \\(v=yy'\\) получается линейное уравнение \\(xv'-v=0.\\)",
      "status": "ai_checked",
