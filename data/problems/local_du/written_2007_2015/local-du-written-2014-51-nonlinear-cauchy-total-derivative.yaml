  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Перепишем уравнение как \\(x(yy')'-yy'=0.\\) Положим \\(v=yy'.\\) Тогда \\(xv'-v=0,\\) откуда \\(v=Cx.\\) Значит \\(yy'=Cx,\\) то есть\\((y^2)'=2Cx.\\)Интегрируя, получаем\\(y^2=Cx^2+D.\\) Из начальных условий \\(v(1)=y(1)y'(1)=4,\\) поэтому \\(C=4.\\) Далее\\(y(1)^2=16=4+D,\\)значит \\(D=12.\\) В окрестности \\(x=1\\) решение положительно, поэтому выбираем положительную ветвь:\\(y=2\\sqrt{x^2+3}.\\)Она действительно удовлетворяет \\(y(1)=4\\) и \\(y'(1)=1.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
