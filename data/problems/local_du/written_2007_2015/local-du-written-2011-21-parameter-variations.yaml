  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "При alpha=0 задача y'=y-y^2, y(0)=0 имеет решение y0=0. Обозначим z=partial y/partial alpha при alpha=0. Дифференцируя уравнение по alpha, получаем z'=(1-x)+(1-2y0)z=1-x+z, z(0)=0. Тогда z'-z=1-x, и после умножения на e^{-x}: (e^{-x}z)'=e^{-x}(1-x). Интеграл от 0 до x равен xe^{-x}, поэтому z=x. Теперь w=partial^2 y/partial alpha^2 при alpha=0. Второе дифференцирование дает w'=w-2z^2, w(0)=0, то есть w'-w=-2x^2. Следовательно, (e^{-x}w)'=-2x^2e^{-x}. Интегрируя от 0 до x, получаем e^{-x}w=2(x^2+2x+2)e^{-x}-4. Значит w=2x^2+4x+4-4e^x.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
