      "id": "idea-main",
      "title": "Уравнение Эйлера и естественное краевое условие",
      "text": "Так как правый конец свободен, кроме уравнения Эйлера-Лагранжа появляется условие \\(F_{y'}(1)=0\\). Вторую вариацию удобно упростить интегрированием смешанного члена.",
