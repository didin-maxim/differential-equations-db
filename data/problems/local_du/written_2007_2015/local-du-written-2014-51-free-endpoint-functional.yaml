  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для \\(F=(y')^2+y^2+2(x-1)yy'-2y'\\cos(\\pi x)\\) имеем \\(F_y=2y+2(x-1)y'\\), \\(F_{y'}=2y'+2(x-1)y-2\\cos(\\pi x)\\). Уравнение Эйлера \\(F_y-\\frac{d}{dx}F_{y'}=0\\) дает \\(y''=-\\pi\\sin(\\pi x)\\). Левый конец закреплен: \\(y(0)=0\\). На свободном правом конце выполняется естественное условие \\(F_{y'}(1)=0\\), то есть \\(2y'(1)-2\\cos\\pi=0\\), откуда \\(y'(1)=-1\\). Интегрируя \\(y''=-\\pi\\sin(\\pi x)\\), получаем \\(y'=\\cos(\\pi x)+C\\), \\(y=\\sin(\\pi x)/\\pi+Cx+D\\). Из \\(y(0)=0\\) и \\(y'(1)=-1\\) следует \\(D=0\\), \\(C=0\\). Экстремаль единственна: \\(y=\\sin(\\pi x)/\\pi\\). Вторая вариация на вариациях \\(\\eta\\) с \\(\\eta(0)=0\\) равна \\(\\\\int_0^1 ((\\eta')^2+\\eta^2+2(x-1)\\eta\\eta')\\,dx\\). Смешанный член равен \\(\\\\int_0^1 (x-1)(\\eta^2)'\\,dx=-\\\\int_0^1 \\eta^2\\,dx\\), потому что \\(\\eta(0)=0\\) и множитель \\(x-1\\) зануляется при \\(x=1\\). Поэтому \\(\\delta^2J=\\\\int_0^1 (\\eta')^2\\,dx>0\\) для ненулевой допустимой \\(\\eta\\). Значит найденная экстремаль дает строгий минимум, максимума нет.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "shooting_parameter"
      ]
    }
  ],
