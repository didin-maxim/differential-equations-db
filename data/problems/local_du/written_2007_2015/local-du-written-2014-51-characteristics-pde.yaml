  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристическая система имеет вид dx/ds=xz, dy/ds=yz, dz/ds=x-x^2-y^2, du/ds=0. Из первых двух уравнений d(y/x)/ds=0, значит k=y/x - первый интеграл. При фиксированном k имеем y=kx, поэтому dz/dx=(x-x^2-y^2)/(xz)=(1-(1+k^2)x)/z. Тогда d(z^2)/dx=2(1-(1+k^2)x), откуда z^2-2x+(1+k^2)x^2=const. Так как (1+k^2)x^2=x^2+y^2, второй интеграл равен I=z^2-2x+x^2+y^2. Общее решение: u=Phi(y/x, I). На начальной поверхности x^2+y^2=1 задано u=z^2-2x+1, то есть u=I. Поэтому Phi(k,I)=I, и решение задачи Коши равно u=z^2-2x+x^2+y^2.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ]
    }
