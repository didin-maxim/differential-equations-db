  "ideas": [
    {
      "id": "idea-main",
      "title": "Разобрать жорданову структуру",
      "text": "Для lambda=0 геометрическая кратность равна единице: нужен собственный вектор v и присоединенный вектор w с Aw=v. Тогда вклад этой клетки равен C1 v + C2(tv+w).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть A=[[4,-5,2],[5,-7,3],[6,-9,4]]. Для lambda=0 решаем Av=0 и получаем v=(1,2,3). Так как нулевое собственное значение имеет алгебраическую кратность два, ищем присоединенный вектор w из Aw=v; например w=(0,1,3). Для lambda=1 решаем (A-I)q=0 и получаем q=(1,1,1). Поэтому общее действительное решение имеет вид (x,y,z)^T=C1(1,2,3)^T+C2(t(1,2,3)^T+(0,1,3)^T)+C3 e^t(1,1,1)^T. Прямая проверка: A(1,2,3)^T=0, A(0,1,3)^T=(1,2,3)^T, A(1,1,1)^T=(1,1,1)^T.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
