  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из \\(\\ln(1+2x+y)=0\\) получаем \\(y=-2x.\\) Второе условие дает\\(4x-y+y^2=0,\\)то есть после подстановки\\(6x+4x^2=0.\\)Поэтому равновесия: (0,0) и (-3/2,3). Якобиан равен\\([[2/(1+2x+y), 1/(1+2x+y)], [4/\\sqrt{1-s^2}, (-1+2y)/\\sqrt{1-s^2}]],\\) где\\(s=4x-y+y^2.\\)В обоих равновесиях \\(1+2x+y=1\\) и \\(s=0.\\) В точке (0,0) получаем \\(A0=[[2,1],[4,-1]], det A0=-6,\\) собственные значения 3 и -2: это седло. Его направления: для \\(\\lambda=3\\) имеем \\(y=x,\\) для \\(\\lambda=-2\\) имеем \\(y=-4x.\\) В точке (-3/2,3) матрица \\(A1=[[2,1],[4,5]],\\) ее собственные значения 1 и 6 положительны: это неустойчивый узел. В локальных координатах \\(X=x+3/2, Y=y-3\\) направления задаются \\(Y=-X\\) для \\(\\lambda=1\\) и \\(Y=4X\\) для \\(\\lambda=6.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "phase_line_signs"
      ]
    }
  ],
