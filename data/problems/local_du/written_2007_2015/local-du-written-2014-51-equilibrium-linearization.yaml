      "id": "idea-main",
      "title": "Сначала равновесия, затем матрицы Якоби",
      "text": "В равновесии аргументы \\(\\ln\\) и arcsin дают нули: \\(y=-2x\\) и \\(4x-y+y^2=0.\\)Характер определяется собственными значениями матрицы линеаризации.",
      "status": "ai_checked",
