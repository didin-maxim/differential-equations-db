        "title": "МФТИ ДУ, письменный экзамен 2007-2008, круг 2, билет 81, задача 9",
        "text": "Доказать, что любое решение уравнения y''+(2+cos 3x)y=0 имеет хотя бы один нуль на отрезке [-1,3].",
