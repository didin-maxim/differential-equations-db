  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить с уравнением z''+z=0",
      "text": "Так как 2+cos 3x ≥ 1, на любом промежутке длины π решение не может сохранять знак: иначе лагранжево тождество с z=sin(x+1) дает противоречие.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "angle_comparison"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим подотрезок [a,b]=[-1,-1+π], который лежит в [-1,3]. Пусть z=sin(x+1); тогда z(a)=z(b)=0, z>0 на (a,b), z''+z=0. Обозначим q(x)=2+cos 3x, тогда q≥1. Предположим, что ненулевое решение y не имеет нулей на [a,b]. Умножив при необходимости на -1, считаем y>0. Лагранжево тождество дает (y'z-yz')'=y''z-yz''=(1-q)yz≤0. Интегрируя от a до b, получаем [y'z-yz']_a^b≤0. Но z(a)=z(b)=0, z'(a)=1, z'(b)=-1, поэтому левая часть равна y(b)+y(a)>0. Противоречие. Значит у каждого ненулевого решения есть нуль на [a,b], а значит и на [-1,3]. Нулевое решение имеет нули во всех точках.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "angle_comparison"
      ]
    }
