      "id": "idea-main",
      "title": "Характеристический многочлен и подбор частного решения",
      "text": "Оператор равен\\(D(D+2)^2.\\)Для правой части\\(\\cos^2 x\\)сначала раскрываем\\(\\cos^2 x=(1+\\cos 2x)/2,\\)затем подбираем полиномиальный и тригонометрический частные ответы.",
      "status": "ai_checked",
