  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Однородное уравнение имеет характеристический многочлен\\(r(r+2)^2,\\)поэтому \\(y_h=C_1+(C_2+C_3x)e^{-2x}.\\) Так как\\(\\cos^2 x=(1+\\cos 2x)/2,\\)для полиномиальной части 2x+1/2 ищем\\(y_p=ax^2+bx.\\) Тогда \\(y'=2ax+b, y''=2a, y'''=0\\) и \\(y'''+4y''+4y'=8ax+8a+4b.\\) Отсюда \\(a=1/4, b=-3/8.\\) Для \\((1/2)\\cos 2x\\) оператор\\(D(D+2)^2\\)на \\(e^{2ix}\\) умножает на\\((2i)(2+2i)^2=-16,\\)значит частное решение равно \\(-(1/32)\\cos 2x.\\) Итак, все решения: \\(y=C_1+(C_2+C_3x)e^{-2x}+x^2/4-3x/8-(1/32)\\cos 2x.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "resonance_ansatz"
      ]
    }
  ],
