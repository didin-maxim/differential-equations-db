  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Сначала заметим, что y=x^m e^{lambda x} в однородном уравнении дает условия lambda(lambda-1)=0, m=3. Значит естественно положить y=x^3v. Тогда y'=3x^2v+x^3v', y''=6xv+6x^2v'+x^3v''. После подстановки все члены с v сокращаются, а левая часть равна x^5(v''-v'). Поэтому v''-v'=e^{3x}. Обозначая w=v', получаем w'-w=e^{3x}. Отсюда w=C e^x+e^{3x}/2, v=C1+C2e^x+e^{3x}/6. Следовательно, общее решение исходного уравнения: y=x^3(C1+C2e^x+e^{3x}/6), x>0.",
      "status": "ai_checked",
