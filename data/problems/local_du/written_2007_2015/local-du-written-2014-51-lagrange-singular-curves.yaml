  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим p=y'. Из 2y(p+2)=xp^2 при p≠-2 получаем y=x f(p), где f(p)=p^2/(2(p+2)). Дифференцируя y=xf(p) по x, имеем p=f(p)+x f'(p) dp/dx. Здесь f'(p)=p(p+4)/(2(p+2)^2), а p-f(p)=p(p+4)/(2(p+2)). Поэтому для регулярной ветви dx/dp=x/(p+2). Отсюда x=C(p+2), y=Cp^2/2. Исключая p, получаем семейство парабол y=(x-2C)^2/(2C), C≠0. Особые решения соответствуют p=f(p), то есть p=0 или p=-4: это y=0 и y=-4x. Они являются огибающими найденного семейства: из y=x^2/(2C)-2x+2C условие d/dC=0 дает C=±x/2 и соответственно y=0, y=-4x.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
