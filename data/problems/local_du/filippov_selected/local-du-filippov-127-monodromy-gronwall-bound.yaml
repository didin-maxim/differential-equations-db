  "ideas": [
    {
      "id": "idea-main",
      "title": "Оценить оператор монодромии по росту решений",
      "text": "Если решение стартует с единичного вектора, то его норма удовлетворяет интегральному неравенству |x(t)\\(|\\le1+\\int|\\)|A(s)|| |x(s)| ds. Гронуолл дает норму оператора за период, а собственные значения не больше операторной нормы.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть \\(X(t)\\) — фундаментальная матрица с \\(X(0)=I\\). Для решения \\(x(t)=X(t)x_0\\) имеем \\(x(t)=x_0+\\int_0^t A(s)x(s)\\,ds\\), поэтому \\(|x(t)|\\le |x_0|+\\int_0^t a|x(s)|\\,ds\\). По неравенству Гронуолла \\(|x(t)|\\le e^{at}|x_0|\\) при \\(0\\le t\\le T\\). Следовательно, операторная норма монодромии \\(X(T)\\) не превосходит \\(e^{aT}\\). Мультипликаторы — это собственные значения \\(X(T)\\), а модуль любого собственного значения не превосходит операторной нормы матрицы. Значит, все их модули не превосходят \\(e^{aT}\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    }
  ],
