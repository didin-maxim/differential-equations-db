        "title": "Филиппов, задача 127* из раздела теоретических вопросов",
        "text": "Пусть матрица A(t) имеет период T и ||A(t)||\\(\\le a\\) при всех t. Доказать, что для системы \\(x'=A(t)x\\) модули мультипликаторов не превосходят \\(e^{aT}.\\)",
