        "id": "stmt-original",
        "title": "Филиппов, задача 1166",
        "text": "Пусть phi1(t,x,y)=C1 и phi2(t,x,y)=C2 являются первыми интегралами системы dx/dt=f1(t,x,y), dy/dt=f2(t,x,y); функции f1, f2 и первые производные phi1, phi2 по x,y непрерывны. Пусть в пространстве t,x,y поверхности phi1=1 и phi2=2 имеют только одну общую линию. Доказать, что эта линия является интегральной кривой данной системы.",
