  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Возьмем любую точку общей линии и выпустим из нее решение системы. По локальной теореме существования оно существует хотя бы на малом интервале. Так как phi1 и phi2 - первые интегралы, вдоль этого решения значения phi1 и phi2 сохраняются. В начальный момент они равны соответственно 1 и 2, значит вся траектория лежит в пересечении поверхностей phi1=1 и phi2=2. По условию это пересечение имеет только одну общую линию, поэтому построенная интегральная кривая лежит на ней. Через каждую точку линии векторное поле тем самым задает касательное направление к линии; значит вся линия является интегральной кривой системы, с возможной перепараметризацией по t.",
