  "ideas": [
    {
      "id": "idea-main",
      "title": "Интегралы сохраняют пересечение уровней",
      "text": "Решение, начатое в точке общей линии, остается сразу на двух поверхностях уровня. Если их пересечение состоит только из этой линии, траектория не может уйти с нее.",
