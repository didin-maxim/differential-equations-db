        "title": "Филиппов, задача 239*",
      "text": "Пусть на всей плоскости \\((x,y)\\) функции \\(f(x,y)\\) и \\(f_y'(x,y)\\) непрерывны и \\(f_y'(x,y)\\le k(x)\\), где \\(k(x)\\) непрерывна. Доказать, что решение уравнения \\(y'=f(x,y)\\) с любым начальным условием \\(y(x_0)=y_0\\) существует при \\(x_0\\le x<+\\infty\\).",
