  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить решение с нулевой линией",
      "text": "Односторонняя оценка \\(f_y'\\le k\\) дает \\(f(x,y)\\le f(x,0)+k(x)y\\) при \\(y>0\\) и \\(f(x,y)\\ge f(x,0)+k(x)y\\) при \\(y<0\\). Поэтому положительная и отрицательная части решения на каждом конечном отрезке контролируются линейным неравенством Гронуолла.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Локальное решение существует и единственно, так как \\(f\\) и \\(f_y'\\) непрерывны. Достаточно показать, что на любом конечном отрезке \\([x_0,b]\\) оно не может уйти на бесконечность. Зафиксируем \\(b\\) и положим \\(K=\\max_{[x_0,b]} |k(x)|\\), \\(M=\\max_{[x_0,b]} |f(x,0)|\\). По формуле Лагранжа по переменной \\(y\\) имеем \\(|f(x,y)|\\le M+K|y|\\) для \\(x\\in[x_0,b]\\). Пока решение определено на \\([x_0,t]\\), из интегральной формы следует \\(|y(t)|\\le |y_0|+M(t-x_0)+K\\int_{x_0}^t |y(s)|\\,ds\\). По неравенству Гронуолла \\(|y(t)|\\le (|y_0|+M(b-x_0))e^{K(b-x_0)}\\) на всем существующем куске внутри \\([x_0,b]\\). Значит граф решения на конечном отрезке остается в компакте и по теореме о продолжении не может иметь конечный правый конец. Так как \\(b\\) произволен, решение существует при всех \\(x\\ge x_0\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    }
