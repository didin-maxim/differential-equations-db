  "ideas": [
    {
      "id": "idea-main",
      "title": "Разность двух решений подчиняется одной однородной системе",
      "text": "Для линейной системы устойчивость траектории зависит не от самой траектории, а от уравнения для малых отклонений. Отклонения от любых двух решений удовлетворяют одному и тому же однородному уравнению.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим линейную систему x'=A(t)x+b(t); однородный случай получается при b=0. Пусть phi(t) - устойчивое решение. Если psi(t) - другое решение, то разность любых двух решений неоднородной системы удовлетворяет однородной системе z'=A(t)z. Устойчивость phi означает: для любого epsilon существует delta такое, что всякое решение, начавшееся delta-близко к phi(t0), остается epsilon-близко к phi(t) при t>=t0. Но это ровно утверждение, что нулевое решение системы z'=A(t)z устойчиво. Для решения psi отклонение соседнего решения от psi снова удовлетворяет той же системе z'=A(t)z. Поэтому тот же delta обеспечивает малость отклонения от psi. Следовательно psi устойчиво. Так как psi было произвольным, устойчивы все решения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
