        "title": "Филиппов, задача 240*",
        "text": "Дана система в векторной записи \\(y'=f(x,y),\\) удовлетворяющая условиям теоремы существования и единственности в окрестности каждой точки. Пусть в области |y|>b при всех x выполнено y·\\(f(x,y)\\le k(x)\\)|y|\\(^2,\\)где k(x) непрерывна. Доказать, что решение с любым начальным условием\\(y(x_0)=y_0\\)существует при\\(x_0\\le x<+\\infty.\\)",
