  "ideas": [
    {
      "id": "idea-main",
      "title": "Следить за радиусом, а не за координатами",
      "text": "Для \\(V=\\)|y|\\(^2\\)условие дает \\(V'\\le2k(x)V\\) вне шара. Внутри шара на конечном отрезке поле локально ограничено, поэтому выход из любого конечного шара можно контролировать через V и Гронуолла.",
      "status": "ai_checked",
