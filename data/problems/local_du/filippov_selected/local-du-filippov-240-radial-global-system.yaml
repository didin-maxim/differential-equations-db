  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим максимальное решение на правом промежутке и зафиксируем конечный отрезок \\([x_0,B]\\). Если \\(|y|>b\\), то для \\(V=|y|^2\\) имеем \\(V'=2y\\cdot f(x,y)\\le2k(x)V\\le2K V\\), где \\(K=\\max_{[x_0,B]}|k(x)|\\). Пока траектория находится вне шара \\(|y|\\le b\\), это неравенство запрещает взрыв радиуса быстрее экспоненты. Внутри шара \\(|y|\\le b\\) поле \\(f\\) локально ограничено на каждом компакте по \\(x\\); если нужно, берем чуть больший шар \\(|y|\\le b+1\\) и получаем конечную константу \\(M\\) для \\(|f|\\) на \\([x_0,B]\\) в этом шаре. Поэтому траектория не может перейти из \\(|y|\\le b\\) в бесконечность мгновенно: сначала она выходит через сферу \\(|y|=b\\), а дальше ее радиус управляется экспоненциальной оценкой. Формально, для \\(r(t)=\\max(|y(t)|,b)\\) получаем верхнюю оценку \\(r(t)^2\\le C_B e^{2K(B-x_0)}\\) с конечной \\(C_B\\), зависящей от начальной точки и локального прохода через шар. Значит, на \\([x_0,B]\\) решение остается ограниченным. По критерию продолжения конечный правый конец невозможен. Так как \\(B\\) произволен, решение продолжается на весь луч \\(x\\ge x_0\\).",
      "status": "ai_checked",
