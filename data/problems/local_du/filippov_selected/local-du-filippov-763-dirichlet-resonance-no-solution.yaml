      "id": "idea-main",
      "title": "Неразрешимость появляется только при резонансе",
      "text": "Если однородная задача Дирихле имеет только нулевое решение, краевые условия определяют константы. При собственном значении надо проверить совместимость правой части с собственным направлением.",
