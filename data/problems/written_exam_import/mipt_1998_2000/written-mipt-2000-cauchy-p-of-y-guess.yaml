  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим p=p(y)=y'. Тогда y''=p dp/dy, и уравнение после деления на p в окрестности начальной точки принимает вид (y-1)^2 dp/dy+p(y-1)=p^2. Начальные данные дают p(2)=2. Легко проверить, что p=2(y-1) удовлетворяет этому уравнению и начальному условию: левая часть равна 2(y-1)^2+2(y-1)^2=4(y-1)^2, правая тоже равна 4(y-1)^2. По локальной единственности для уравнения на p(y) это нужная ветвь. Тогда y'=2(y-1), y(0)=2, откуда \\(y=1+e^{2x}\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof"
      ]
    }
