        "title": "МФТИ ДУ, письменный экзамен 1998/99, вариант 3, задача 9",
        "text": "Пусть на [0,+∞) задано уравнение y'=a(t)y+b(t), где a(t), b(t) непрерывны, a(t)≥1 и |b(t)|≤1. Доказать, что существует и притом единственное решение, ограниченное на всей полупрямой.",
