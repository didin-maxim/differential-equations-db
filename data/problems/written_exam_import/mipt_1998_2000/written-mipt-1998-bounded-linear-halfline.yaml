  "ideas": [
    {
      "id": "idea-main",
      "title": "Выбрать начальное значение из условия ограниченности на бесконечности",
      "text": "Все решения отличаются на \\(Ce^{\\int_0^t a(r)\\,dr}\\), поэтому ограниченное решение может быть только одно; его удобно записать интегралом от t до бесконечности.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим \\(A(t,s)=\\int_t^s a(r)\\,dr\\). Так как \\(a\\ge 1\\), интеграл \\(y(t)=-\\int_t^\\infty e^{-A(t,s)}b(s)\\,ds\\) сходится абсолютно и \\(|y(t)|\\le \\int_t^\\infty e^{-(s-t)}\\,ds=1\\). Дифференцируя по t под знаком интеграла, получаем \\(y'=a(t)y+b(t)\\), поэтому это ограниченное решение. Если \\(y_1\\) и \\(y_2\\) - два ограниченных решения, то их разность \\(z\\) удовлетворяет \\(z'=a(t)z\\), значит \\(z(t)=z(0)e^{\\int_0^t a(r)\\,dr}\\). При \\(z(0)\\ne 0\\) это решение неограниченно, поскольку \\(\\int_0^t a(r)\\,dr\\ge t\\). Следовательно, \\(z(0)=0\\) и ограниченное решение единственно.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof"
      ]
    }
  ],
