  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим u=y'/y. Тогда y'=uy и y''=u'y+u^2y. Уравнение принимает вид y^2u+2xy^2u^2=x y^2(u'+u^2), то есть u'=u/x+u^2. Для w=1/u получаем w'=-w/x-1, или w'+w/x=-1. Значит, (xw)'=-x, откуда xw=-x^2/2+C. По начальным данным u(1)=-1, w(1)=-1, поэтому C=-1/2 и w=-(x^2+1)/(2x). Следовательно, u=-2x/(x^2+1), то есть (ln |y|)'=-2x/(x^2+1). Из y(1)=1 получаем y=2/(x^2+1).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof"
      ]
    }
  ],
