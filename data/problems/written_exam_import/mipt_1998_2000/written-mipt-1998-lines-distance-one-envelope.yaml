  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть искомая прямая записана как y=px+b, где p - ее наклон. Условие расстояния от начала координат равно b^2/(1+p^2)=1. На графике решения p=y', а b=y-xy'. Поэтому подходит уравнение (y-xy')^2=1+(y')^2. Все прямые исходного семейства действительно являются его решениями. Чтобы найти особые решения, рассмотрим F=(y-xp)^2-1-p^2=0 и F_p=-2x(y-xp)-2p=0. Обозначая b=y-xp, получаем p=-xb и b^2=1+p^2=1+x^2b^2. Отсюда b^2=1/(1-x^2), |x|<1, и y=b+xp=b(1-x^2)=+-sqrt(1-x^2). Значит, кроме прямых, решениями являются две дуги единичной окружности y=+-sqrt(1-x^2), |x|<1.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "implicit_function_theorem"
      ]
    }
