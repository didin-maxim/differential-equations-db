  "ideas": [
    {
      "id": "idea-main",
      "title": "Найти два первых интеграла характеристик",
      "text": "Для характеристической системы отношение y/x сохраняется. Второй интеграл удобно искать как \\(z^2-2x+x^2+y^2\\): его производная вдоль характеристик равна нулю.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристическая система: dx/ds=xz, dy/ds=yz, \\(dz/ds=x-x^2-y^2\\). Из d(y/x)/ds=0 получаем первый интеграл \\(I_1=y/x\\). Для \\(I_2=z^2-2x+x^2+y^2\\) имеем \\(I_2'=2z(x-x^2-y^2)-2xz+2x^2z+2y^2z=0\\). Поэтому общее решение имеет вид \\(u=F(I_1,I_2)\\). На начальной окружности \\(x^2+y^2=1\\) величина \\(I_2=z^2-2x+1\\), а условие Коши задает \\(u=I_2\\). Следовательно искомое решение равно \\(u=z^2-2x+x^2+y^2\\) в области, покрытой соответствующими характеристиками.",
      "status": "ai_checked"
    }
  ],
