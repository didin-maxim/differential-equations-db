  "ideas": [
    {
      "id": "idea-main",
      "title": "Считать производную функцией от y",
      "text": "Так как уравнение не содержит x явно, положим p=p(y)=y'. Тогда y''=p dp/dy. После перехода к q=1/p получается линейное уравнение q'+q/y=-y.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "В окрестности начальной точки p=y' не равно нулю, поэтому можно положить p=p(y). Тогда y''=p dp/dy, и уравнение дает y dp/dy=y^2p^2+p. Для q=1/p имеем q'=-(1/p^2)dp/dy, откуда q'+q/y=-y. Умножая на y, получаем (yq)'=-y^2, значит yq=-y^3/3+C. Из y(0)=1, p(1)=-3 следует q(1)=-1/3, поэтому C=0. Итак, 1/p=-y^2/3, то есть y'=-3/y^2. Тогда (y^3)'=-9, и с y(0)=1 получаем y^3=1-9x. Локальное решение, проходящее через начальную точку, равно y=(1-9x)^(1/3).",
      "status": "ai_checked"
    }
  ],
