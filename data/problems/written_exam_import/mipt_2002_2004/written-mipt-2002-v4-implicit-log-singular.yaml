  "ideas": [
    {
      "id": "idea-main",
      "title": "Дифференцировать уравнение с p=y'",
      "text": "Запишем y=(xp+ln x-ln p)/2 и продифференцируем. Получится произведение, которое дает либо регулярное семейство p=Cx, либо особую ветвь px=1.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть p=y'>0. Из уравнения y=(xp+ln x-ln p)/2. Дифференцируем по x: p=(p+xp'+1/x-p'/p)/2. Поэтому p-1/x=(x-1/p)p'. Если px≠1, то p'=p/x, значит p=Cx, C>0. Подстановка в исходное уравнение дает семейство \\(y=(Cx^2-\\ln C)/2\\). Если px=1, то p=1/x, и исходное уравнение дает особую кривую y=1/2+ln x. Она является огибающей семейства: для \\(y=(Cx^2-\\ln C)/2\\) условие \\(\\partial_C y\\)=0 дает \\(C=1/x^2\\) и ровно y=1/2+ln x.",
      "status": "ai_checked"
    }
  ],
