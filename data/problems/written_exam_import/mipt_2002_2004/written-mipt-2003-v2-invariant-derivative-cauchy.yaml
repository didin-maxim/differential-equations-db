  "ideas": [
    {
      "id": "idea-main",
      "title": "Увидеть производную \\(y'/y^2\\)",
      "text": "Комбинация \\(yy''-2(y')^2\\) равна \\(y^3\\) \\((y'/y^2)'\\). После деления на \\(y^3\\) получается линейное уравнение для \\(u=y'/y^2\\).",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "В окрестности x=1 решение не равно нулю. Положим \\(u=y'/y^2\\). Тогда \\(u'=(yy''-2(y')^2)/y^3\\). Исходное уравнение после деления на \\(y^3\\) дает xu'+u=0, то есть (xu)'=0. Из y(1)=1, y'(1)=1 получаем u(1)=1, значит u=1/x. Поэтому \\(y'/y^2=1/x\\). Интегрируя, получаем -1/y=ln x+C. Из y(1)=1 следует C=-1. Следовательно y=1/(1-ln x) на максимальном интервале, содержащем 1 и не пересекающем x=e.",
      "status": "ai_checked"
    }
  ],
