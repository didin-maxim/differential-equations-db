      "id": "idea-main",
      "title": "Заменить y^2 на новую переменную вдоль характеристик",
      "text": "Характеристическое уравнение для v=y^2 становится линейным: v'-v/x=1. Поэтому номер характеристики выражается как y^2/x-ln x.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристики удовлетворяют dy/dx=(x+y^2)/(2xy). Для v=y^2 получаем dv/dx=2y dy/dx=1+v/x, то есть v'-v/x=1. Умножая на 1/x, имеем (v/x)'=1/x, поэтому I=y^2/x-ln x является первым интегралом. Общее решение в области x>0, y>0 имеет вид u=F(I). На начальной кривой x=y^2 положим x=s>0; тогда I=1-ln s, а условие дает u=s. Значит F(1-ln s)=s, или F(I)=\\(e^{1-I}\\). Поэтому решение задачи Коши равно u(x,y)=\\(e^{1-y^2/x+ln x}\\)=e x \\(e^{-y^2/x}\\). Прямая подстановка и проверка условия при x=y^2 завершают решение.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ]
    }
  ],
