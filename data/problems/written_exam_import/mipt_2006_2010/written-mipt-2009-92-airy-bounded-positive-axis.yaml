      "id": "idea-main",
      "title": "Сделать лиувиллеву замену и получить убывающую энергию",
      "text": "После замены t=2x^(3/2)/3, y=x^(-1/4)u(t) уравнение становится почти гармоническим: u_tt+(1+5/(36t^2))u=0. Коэффициент добавки убывает, поэтому соответствующая энергия не возрастает.",
