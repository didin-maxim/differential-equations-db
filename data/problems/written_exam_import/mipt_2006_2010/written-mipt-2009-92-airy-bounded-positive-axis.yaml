  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "На отрезке [0,1] решение ограничено по непрерывности. Рассмотрим x≥1 и положим t=2x^(3/2)/3, y=x^(-1/4)u(t). Прямая дифференциация дает уравнение u_tt+(1+5/(36t^2))u=0. Обозначим r(t)=5/(36t^2) и E(t)=u_t^2+(1+r(t))u^2. Тогда E'=2u_tu_tt+r'u^2+2(1+r)uu_t=r'u^2≤0, поскольку r'(t)<0. Значит E ограничена сверху на t≥2/3, а вместе с ней ограничена и u. Поэтому |y(x)|=x^(-1/4)|u(t)| ограничена при x≥1. Совмещая с ограниченностью на [0,1], получаем требуемое.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
