        "id": "stmt-original",
        "title": "МФТИ ДУ, письменный экзамен 2009/2010, вариант 01, задача 9",
        "text": "По определению sin A=(\\(e^{iA}\\)-\\(e^{-iA}\\))/(2i), где A - числовая квадратная матрица порядка n. Пусть матрица A имеет n различных вещественных собственных значений lambda_1,...,lambda_n, которым соответствуют собственные векторы h_1,...,h_n. а) Найти собственные значения и собственные векторы матрицы sin A. б) Вычислить det(sin A).",
        "source_ids": [
          "src-local-du-written-exams"
        ],
        "status": "ai_checked",
        "self_contained": {
