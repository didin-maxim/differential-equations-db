  "ideas": [
    {
      "id": "idea-main",
      "title": "Применить функцию к собственным векторам",
      "text": "Если Ah_j=lambda_j h_j, то \\(e^{iA}\\)h_j=\\(e^{i lambda_j}\\)h_j. Поэтому любая функция, заданная через ряд или матричную экспоненту, действует на h_j скалярно.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для каждого собственного вектора h_j имеем A h_j=lambda_j h_j, а значит A^k h_j=lambda_j^k h_j. Поэтому \\(e^{iA}\\)h_j=\\(e^{i lambda_j}\\)h_j и \\(e^{-iA}\\)h_j=\\(e^{-i lambda_j}\\)h_j. Следовательно, (sin A)h_j=((\\(e^{i lambda_j}\\)-\\(e^{-i lambda_j}\\))/(2i))h_j=sin(lambda_j)h_j. Так как собственные значения A различны, векторы h_1,...,h_n образуют базис. В этом базисе sin A диагональна с диагональными элементами sin(lambda_1),...,sin(lambda_n). Поэтому det(sin A)=\\(\\prod_{j=1}^n\\) sin(lambda_j). Если некоторые sin(lambda_j) совпадают или равны нулю, это не меняет вывода: h_j остаются собственными векторами, а определитель равен произведению диагональных элементов.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
