        "id": "stmt-original",
        "title": "МФТИ ДУ, письменный экзамен 2004/2005, вариант 1, задача 9",
        "text": "Пусть вещественная функция y(x), -infty<x<infty, является решением дифференциального уравнения y'=sin^2 x+sin^2 y. Докажите, что lim_{x->-infty} y(x)=-infty и lim_{x->+infty} y(x)=+infty.",
        "source_ids": [
          "src-local-du-written-exams"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "ordinary_differential_equation",
          "solution"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить прирост с интегралом sin^2 x",
      "text": "Правая часть не меньше sin^2 x. Поэтому полный прирост на бесконечной полуоси бесконечен, а монотонность запрещает конечный предел.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Так как y'=sin^2 x+sin^2 y>=0, решение монотонно не убывает. При x>0 имеем y(x)-y(0)=int_0^x (sin^2 t+sin^2 y(t)) dt >= int_0^x sin^2 t dt = x/2 - sin 2x/4, и правая часть стремится к +infty. Значит y(x)->+infty. При x<0 получаем y(0)-y(x)=int_x^0 y'(t)dt >= int_x^0 sin^2 t dt = -x/2 + sin 2x/4. Эта нижняя оценка стремится к +infty при x->-infty, поэтому y(x)->-infty слева.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
