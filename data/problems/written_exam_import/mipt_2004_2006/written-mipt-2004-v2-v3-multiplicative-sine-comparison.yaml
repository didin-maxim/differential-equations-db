  "ideas": [
    {
      "id": "idea-main",
      "title": "Взять логарифм модуля ненулевого решения",
      "text": "Нулевая траектория отделяет знаки по единственности. Для ненулевого решения производная ln|y| равна ±(1+sin^2 x+sin^2 y), поэтому зажимается линейной функцией времени.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "logarithmic_derivative",
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "В обоих уравнениях правая часть гладкая, поэтому решение, однажды равное нулю, тождественно равно нулю; ненулевое решение не меняет знак. В первом случае для y!=0 получаем (ln|y|)'=-(1+sin^2 x+sin^2 y)<=-1. Поэтому ln|y(x)|<=ln|y(0)|-x, откуда y(x)->0. Если y(0)=0, утверждение тривиально. Во втором случае для x>=x0 имеем (ln|y|)'=1+sin^2 x+sin^2 y>=1. Значит ln|y(x)|>=ln|y(x0)|+(x-x0), и |y(x)|->+infty.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "logarithmic_derivative",
        "comparison_argument"
      ]
    }
  ],
