        "id": "stmt-original",
        "title": "МФТИ ДУ, письменный экзамен 2004/2005, варианты 2-3, задача 9",
        "text": "1) Пусть y(x), 0<=x<+infty, является решением уравнения y'=-(1+sin^2 x+sin^2 y)y. Докажите, что y(x)->0 при x->+infty. 2) Пусть y'= (1+sin^2 x+sin^2 y)y и существует x0>=0 такое, что y(x0)!=0. Докажите, что |y(x)|->+infty при x->+infty.",
