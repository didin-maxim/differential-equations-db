  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Перейти к arctan y",
      "text": "Правая часть не меньше 1+y^2. Поэтому arctan y растет со скоростью не меньше 1 и за конечное время достигает границы возможных значений.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Поскольку sin^2 x+2cos^2 x>=1 и 3sin^2 y>=0, имеем y'>=1+y^2. Тогда phi(x)=arctan y(x) удовлетворяет phi'=y'/(1+y^2)>=1. Если решение существует на интервале (a,b) и x0 принадлежит (a,b), то для x>x0 получаем phi(x)>=phi(x0)+x-x0. Так как phi<pi/2, отсюда b<=x0+pi/2-phi(x0)<+infty. Для левого конца берем x<x0 и интегрируем неравенство phi'>=1 от x до x0: phi(x0)-phi(x)>=x0-x, то есть phi(x)<=phi(x0)+x-x0. Из phi>-pi/2 следует a>=x0-pi/2-phi(x0)>-infty. Значит максимальный интервал существования конечен с обеих сторон.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
