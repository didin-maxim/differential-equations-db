        "title": "МФТИ ДУ, письменный экзамен 2004/2005, вариант 4, задача 9",
        "text": "Пусть функция y(x) является решением уравнения y'=y^2+sin^2 x+2cos^2 x+3sin^2 y, рассматриваемого при -infty<x<infty, -infty<y<infty. Докажите, что y(x) определена лишь на конечном промежутке.",
        "source_ids": [
