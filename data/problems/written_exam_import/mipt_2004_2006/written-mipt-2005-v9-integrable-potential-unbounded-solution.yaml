  "ideas": [
    {
      "id": "idea-main",
      "title": "На далеком хвосте построить решение, похожее на x-A",
      "text": "После деления на старший коэффициент получаем y''+q(x)y=0, где q≥0 и \\(\\int_A^∞\\) (x-A)q(x)dx можно сделать малым. Интегральное уравнение тогда имеет решение y(x)=(x-A)+o(x-A), значит оно неограниченно.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_iteration",
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Рассмотрим общий факт. Пусть q≥0 непрерывна на [1,+∞) и для некоторого A>1 выполнено \\(\\int_A^∞\\) (t-A)q(t)dt≤1/3. Тогда интегральное уравнение y(x)=x-A-\\(\\int_A^x\\) (x-t)q(t)y(t)dt имеет решение на [A,+∞), удовлетворяющее |y(x)-(x-A)|≤(x-A)/2. Это следует из стандартного сжимающего/пикаровского аргумента в норме sup |y(x)-(x-A)|/(x-A): оператор переводит эту полосу в себя и становится сжимающим после выбора A с достаточно малым хвостовым интегралом. Для такого решения y(x)≥(x-A)/2, поэтому оно неограниченно. Дифференцирование интегрального уравнения дает y''+q(x)y=0, y(A)=0, y'(A)=1. Теперь для исходных вариантов q(x)=1/sinh x, 1/x^3, 1/cosh x или x^(-5/2). Во всех случаях \\(\\int_A^∞\\) (t-A)q(t)dt стремится к 0 при A→∞. Значит на некотором хвосте существует неограниченное решение; по теореме существования для линейного уравнения оно продолжается влево до всего интервала (1,+∞).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_iteration",
        "comparison_argument"
      ]
    }
  ],
