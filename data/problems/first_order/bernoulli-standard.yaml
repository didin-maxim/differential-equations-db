      "id": "sol-main",
      "title": "Решение",
      "text": "Положим z=y^{-1}. Тогда z'=-y'/y^2. Делим исходное уравнение на y^2: y'/y^2+1/y=x. Поэтому -z'+z=x, то есть z'-z=-x. Решая линейное уравнение, получаем z=Ce^x+x+1. Значит y=1/(Ce^x+x+1).",
      "status": "ai_checked",
