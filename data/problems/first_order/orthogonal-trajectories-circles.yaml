      "title": "Решение",
      "text": "Для окружностей 2x+2yy'=0, значит y'=-x/y. Ортогональные траектории имеют наклон y/x. Решаем dy/dx=y/x: dy/y=dx/x, откуда y=Cx. Это прямые через начало координат.",
