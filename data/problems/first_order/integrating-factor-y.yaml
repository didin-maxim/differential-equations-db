      "id": "sol-main",
      "title": "Решение",
      "text": "Для M=y^2+xy, N=-x^2. Выражение (N_x-M_y)/M=(-2x-(2y+x))/(y^2+xy)=-(3x+2y)/(y(x+y)) не зависит только от y, но (M_y-N_x)/N=(2y+x+2x)/(-x^2)=-(2y+3x)/x^2 не подходит. Удобнее заметить однородность формы степени 2. Для однородной формы M dx+N dy интегрирующий множитель равен 1/(xM+yN), если знаменатель не ноль. Здесь xM+yN=x(y^2+xy)-x^2y=xy^2. После умножения получаем (1/x+1/y)dx-(x/y^2)dy=0. Потенциал F=ln|x|+x/y, так что ln|x|+x/y=C.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "find_potential"
      ]
    }
