      "id": "sol-main",
      "title": "Решение",
      "text": "Разделяем переменные: dy/(y(1-y/K))=a dx. Так как 1/(y(1-y/K))=K/(y(K-y))=1/y+1/(K-y), получаем ln(y/(K-y))=ax+C. Из начального условия \\(y/(K-y)=(y_0/(K-y_0))e^{ax}\\). Поэтому \\(y(x)=K/(1+((K-y_0)/y_0)e^{-ax})\\).",
