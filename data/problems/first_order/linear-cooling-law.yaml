      "title": "Решение",
      "text": "Уравнение для u=T-T0 имеет вид u'=-ku. Значит u(t)=u(0)e^{-kt}. Поэтому T(t)=T0+(T1-T0)e^{-kt}, а предел при k>0 равен T0.",
