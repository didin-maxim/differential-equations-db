  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим v=y/x, то есть y=xv(x). Тогда y'=v+xv'. Уравнение дает v+xv'=1+v, откуда xv'=1. Так как x>0, делим на x и интегрируем: v'=1/x, v=ln x+C. Следовательно y=x(ln x+C). Обратная подстановка проверяет ответ.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "separate_variables"
      ]
    }
