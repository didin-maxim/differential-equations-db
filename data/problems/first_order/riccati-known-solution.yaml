      "id": "sol-main",
      "title": "Решение",
      "text": "Пишем y=1+1/u. Тогда y'=-u'/u^2, а y^2-2y+1=(y-1)^2=1/u^2. Значит -u'=1, u=C-x. Поэтому y=1+1/(C-x). Кроме того, y=1 - отдельное постоянное решение.",
      "status": "ai_checked",
