      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим \\(p=y'\\). Уравнение Клеро имеет вид \\(y=xp+p^2\\). Дифференцируем: \\(p=p+xp'+2pp'\\), то есть \\((x+2p)\\(p'=0\\)\\). Если \\(p'=0\\), то \\(p=C\\) и \\(y=Cx+C^2\\). Если \\(x+2p=0\\), то \\(p=-x/2\\), и из исходного уравнения \\(y=x(-x/2)+x^2/4=-x^2/4\\). Это огибающая семейства прямых.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "separate_variables"
      ]
    }
