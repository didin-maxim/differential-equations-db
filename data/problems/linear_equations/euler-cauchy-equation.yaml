      "title": "Решение",
      "text": "Ищем y=x^r. Получаем r(r-1)-3r+4=r^2-4r+4=(r-2)^2. Корень r=2 кратный, поэтому фундаментальные решения x^2 и x^2 ln x. Ответ: y=x^2(C1+C2 ln x).",
