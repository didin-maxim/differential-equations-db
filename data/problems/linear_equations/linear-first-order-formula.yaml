      "text": "Пусть μ(x)=exp(∫p(x)dx). Тогда (μy)'=μq. Интегрируя, получаем μ(x)y(x)=C+∫ μ(x)q(x)dx, то есть y=μ^{-1}(C+∫μq). Проверка прямой подстановкой завершает доказательство.",
