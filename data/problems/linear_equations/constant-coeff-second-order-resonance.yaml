      "id": "sol-main",
      "title": "Решение",
      "text": "Однородное уравнение имеет характеристический многочлен r^2-3r+2=(r-1)(r-2), поэтому \\(e^{x}\\) уже является однородным решением. Ищем частное решение в виде \\(A x e^x\\). Тогда \\(y_p'=A(1+x)e^x\\), \\(y_p''=A(2+x)e^x\\). Подстановка дает \\(A[(2+x)-3(1+x)+2x]e^x=-A e^x\\). Нужно -A=1, значит A=-1. Ответ: \\(y=C_1e^x+C_2e^{2x}-xe^x\\).",
      "status": "ai_checked"
    }
  ],
