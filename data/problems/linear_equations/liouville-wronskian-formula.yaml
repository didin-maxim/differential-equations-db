      "id": "sol-main",
      "title": "Доказательство",
      "text": "Дифференцируем определитель фундаментальной матрицы по столбцам. В каждом слагаемом один столбец X заменяется на его производную AX. По линейности по строкам сумма этих слагаемых равна \\(\\operatorname{tr}(A)\\det X\\): это стандартная формула Якоби для производной det X, \\((\\det X)'=\\det X\\,\\operatorname{tr}(X'X^{-1})\\), где X обратима; в точках необратимости равенство продолжается по непрерывности. Так как \\(X'=AX\\), получаем \\(W'=\\operatorname{tr}(A)W\\).",
      "status": "ai_checked"
    }
