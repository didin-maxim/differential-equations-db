      "id": "sol-main",
      "title": "Решение",
      "text": "Фундаментальные решения однородного уравнения: \\(\\cos x\\) и \\(\\sin x\\), вронскиан равен \\(1\\). Формула вариации постоянных дает \\(y_p=-\\cos x\\int \\sin x\\sec x\\,dx+\\sin x\\int \\cos x\\sec x\\,dx\\). Интегралы равны \\(\\int \\tan x\\,dx=-\\ln\\cos x\\) и \\(\\int 1\\,dx=x\\). Поэтому \\(y_p=\\cos x\\ln\\cos x+x\\sin x\\).",
      "status": "ai_checked"
    }
