      "id": "proof-continuation",
      "title": "Доказательство от противного",
      "text": "Пусть правый конец максимального интервала конечен и граф решения при подходе к нему остается в компакте K внутри области D. На некоторой окрестности K функция f ограничена и локально липшицева с равномерными константами. Тогда решение равномерно непрерывно при x, стремящемся к правому концу, потому что |y'|=|f(x,y)| ограничено. Значит существует конечный предел y*. Точка (b,y*) лежит внутри D. По теореме Пикара-Линделёфа из нее выходит локальное решение вправо от b. Склеив старое решение с новым, получаем продолжение за правый конец, что противоречит максимальности. Поэтому при конечном конце граф обязан выходить из любого компакта.",
