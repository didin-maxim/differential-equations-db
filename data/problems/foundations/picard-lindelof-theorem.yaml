        "title": "Формулировка",
        "text": "Пусть функция f(x,y) непрерывна в прямоугольнике около (x_0,y_0) и удовлетворяет условию Липшица по y. Тогда задача Коши y'=f(x,y), y(x_0)=y_0 имеет единственное решение на некотором промежутке около x_0.",
