  "solutions": [
    {
      "id": "proof-picard",
      "title": "Доказательство через итерации Пикара",
      "text": "Перепишем задачу в интегральном виде: y(x)=y_0+\\(\\(\\int_{x_0}^{x}\\)\\) f(t,y(t))dt. Выберем малый отрезок I так, чтобы все графики из замкнутого шара непрерывных функций оставались в исходном прямоугольнике, а L|I|<1, где L - константа Липшица. Оператор T, заданный правой частью, переводит этот шар в себя: длина отрезка контролирует отклонение от y_0. Для двух функций y и z имеем ||Ty-Tz|| ≤ L|I| ||y-z||. Поэтому T - сжатие. По принципу Банаха у него есть единственная неподвижная точка. Эта точка и есть решение интегрального уравнения, а значит после дифференцирования - решение задачи Коши. Если два решения существуют на пересечении промежутков, та же оценка на малом куске дает их совпадение; продолжая по цепочке малых отрезков, получаем локальную единственность.",
