      "text": "Обозначим v(t)=a+\\(\\int_{t_0}^{t}\\) b(s)u(s)ds. Тогда u(t)≤v(t), v(t)≥0 и v'(t)=b(t)u(t)≤b(t)v(t). Если a>0, делим на v(t) и получаем (ln v)'≤b(t). После интегрирования v(t)≤a \\(e^{∫b}\\). Значит и u(t)≤a \\(e^{∫b}\\). Если a=0, применим доказанное к a=epsilon и затем устремим epsilon к нулю.",
