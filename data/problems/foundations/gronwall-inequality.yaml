      "id": "proof-gronwall",
      "title": "Доказательство",
      "text": "Обозначим \\(v(t)=a+\\int_{t_0}^{t} b(s)u(s)\\,ds\\). Тогда \\(u(t)\\le v(t)\\), \\(v(t)\\ge0\\) и \\(v'(t)=b(t)u(t)\\le b(t)v(t)\\). Если \\(a>0\\), делим на v(t) и получаем \\((\\ln v)'\\le b(t)\\). После интегрирования \\(v(t)\\le a e^{\\int_{t_0}^{t} b(s)\\,ds}\\). Значит и \\(u(t)\\le a e^{\\int_{t_0}^{t} b(s)\\,ds}\\). Если \\(a=0\\), применим доказанное к \\(a=\\varepsilon\\) и затем устремим \\(\\varepsilon\\) к нулю.",
