      "id": "proof-peano-sketch-complete",
      "title": "Доказательство через ломаные Эйлера",
      "text": "На малом прямоугольнике функция f ограничена числом M. Строим ломаные Эйлера с шагом h: на каждом отрезке наклон равен f в левом конце. Все ломаные проходят через (x-0,y-0), имеют модуль наклона не больше M и потому равностепенно непрерывны и равномерно ограничены на достаточно малом отрезке. По теореме Арцела-Асколи из любой последовательности шагов \\(h_n\\) → 0 выбирается равномерно сходящаяся подпоследовательность \\(y_n\\) → y. Для каждой ломаной выполняется интегральное тождество с ошибкой, стремящейся к нулю: \\(y_n(x)=y_0+\\int_{x_0}^{x} f(t,y_n(t))\\,dt+r_n(x)\\). Непрерывность f и равномерная сходимость дают переход к пределу под интегралом. Получаем \\(y(x)=y_0+\\int_{x_0}^{x} f(t,y(t))\\,dt\\), значит y - решение. Пример \\(y'=\\sqrt{|y|}\\), \\(y(0)=0\\) показывает неединственность: кроме нулевого решения есть решения, которые некоторое время равны нулю, а затем идут как \\((x-a)^2/4\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
