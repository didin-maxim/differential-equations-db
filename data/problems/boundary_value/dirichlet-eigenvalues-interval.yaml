  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Если \\(\\lambda=\\mu^2>0\\), то \\(y=A\\cos \\mu x+B\\sin \\mu x\\). Условие \\(y(0)=0\\) дает \\(A=0\\), а \\(y(\\pi)=0\\) дает \\(B\\sin(\\mu\\pi)=0\\). Для нетривиального решения нужно \\(\\mu=n\\), \\(n=1,2,\\ldots\\) Тогда \\(\\lambda=n^2\\), \\(y=B\\sin nx\\). При \\(\\lambda=0\\) получаем \\(y=Ax+B\\) и оба условия дают нуль. При \\(\\lambda<0\\) решения гиперболические, два нуля снова дают только нулевое решение.",
      "status": "ai_checked"
    }
  ],
