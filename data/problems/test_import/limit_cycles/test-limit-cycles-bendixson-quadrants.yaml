        "title": "Переформулированная тестовая задача",
        "text": "Для системы \\(x'=1+x^2y-4x\\), \\(y'=3x-x^2y\\) определить, в каких открытых квадрантах критерий Бендиксона сразу запрещает предельные циклы. Укажите все подходящие квадранты.",
