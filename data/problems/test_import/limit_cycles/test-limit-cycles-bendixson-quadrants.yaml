  "ideas": [
    {
      "id": "idea-main",
      "title": "Посчитать дивергенцию и ее знак",
      "text": "Критерий Бендиксона дает запрет, когда дивергенция сохраняет строгий знак в односвязной области. В этой задаче знак удобно читать по произведению xy.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "bendixson_divergence"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Дивергенция поля равна \\(\\frac{d}{dx}(1+x^2y-4x)+\\frac{d}{dy}(3x-x^2y)=2xy-4-x^2\\). Если \\(xy<0\\), то 2\\(xy<0\\) и вся дивергенция строго отрицательна. Поэтому в квадрантах \\(x>0,y<0\\) и \\(x<0,y>0\\) предельных циклов нет. В квадрантах с \\(xy>0\\) этот быстрый аргумент уже не работает: знак выражения \\(2xy-4-x^2\\) там может меняться, а из критерия Бендиксона нельзя заключить ни существование, ни отсутствие цикла.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "bendixson_divergence"
      ]
    }
  ],
