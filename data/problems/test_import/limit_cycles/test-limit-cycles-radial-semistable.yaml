        "title": "Тестовая задача",
        "text": "Рассмотрим систему \\(x'=3y+x(x^2+y^2-1)(x^2+y^2-4)^2\\), \\(y'=-3x+y(x^2+y^2-1)(x^2+y^2-4)^2\\). Какие предельные циклы \\(r=1\\) и \\(r=2\\) устойчивы?",
