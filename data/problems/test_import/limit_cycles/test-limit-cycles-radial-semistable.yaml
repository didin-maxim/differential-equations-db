  "ideas": [
    {
      "id": "idea-main",
      "title": "Перейти к радиальному уравнению",
      "text": "Для поля вида \\(x'=-\\omega y+xF(r^2)\\), \\(y'=\\omega x+yF(r^2)\\) окружности \\(r=\\operatorname{const}\\) проверяются по одному уравнению \\(r'=rF(r^2)\\). Простой корень меняет знак и дает устойчивый или неустойчивый цикл, а корень четной кратности дает полуустойчивость.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "radial_limit_cycle_stability",
        "phase_line_signs"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "В полярных координатах получаем \\(\\phi'=-3\\) и \\(r'=r(r^2-1)(r^2-4)^2\\). Вблизи \\(r=1\\) множитель \\((r^2-4)^2\\) положителен, а \\(r^2-1\\) меняет знак с минуса на плюс, поэтому при \\(r<1\\) радиус убывает, а при \\(r>1\\) растет. Окружность \\(r=1\\) неустойчива. Вблизи \\(r=2\\) множитель \\((r^2-4)^2\\) неотрицателен и знак \\(r'\\) определяется положительным \\(r(r^2-1)\\), поэтому \\(r'\\) положителен с обеих сторон от \\(r=2\\). С внутренней стороны траектории приближаются к \\(r=2\\), с внешней уходят от него: цикл \\(r=2\\) полуустойчив.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "radial_limit_cycle_stability",
        "phase_line_signs"
      ]
    }
  ],
