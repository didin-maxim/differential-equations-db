  "ideas": [
    {
      "id": "idea-main",
      "title": "Индекс замкнутой траектории равен единице",
      "text": "Если замкнутая траектория ограничивает область без особых точек на границе, сумма индексов особых точек внутри равна индексу векторного поля вдоль границы, то есть 1. У грубого узла индекс +1, у седла -1.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "poincare_index_inside_cycle"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Внутри предельного цикла сумма индексов должна быть равна +1. В случае (а) индексы равны ind A=ind B=-1, ind C=+1. Поэтому подходит только C одна. Если добавить к C одно седло, сумма станет 0; если добавить оба седла, сумма станет -1; без C сумма тоже не равна +1. В случае (б) индексы A и B равны +1, индекс C равен -1. Возможны варианты: внутри лежит только A, только B или все три точки A,B,C, потому что соответствующие суммы равны +1. Внутри не может лежать только C, не может лежать A и B без C, и не может не лежать ни одной особой точки.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "poincare_index_inside_cycle"
      ]
    },
    {
      "id": "sol-note",
      "title": "Почему это self-check, а не обычный тест",
      "text": "В исходном тесте варианты ответа по двум случаям расходятся по форме. Для базы полезнее самопроверка: студент должен удержать общий инвариант 'сумма индексов внутри цикла равна 1' и сам перечислить допустимые наборы.",
      "status": "ai_checked"
    }
