        "id": "stmt-original",
        "title": "Задача на самопроверку",
        "text": "У автономной системы на плоскости есть один предельный цикл и ровно три грубые особые точки A,B,C. Разобрать два случая. (а) A и B - седла, C - узел. Какие из этих точек могут лежать внутри цикла? (б) A и B - узлы, C - седло. Какие варианты расположения внутри цикла возможны?",
        "source_ids": [
          "src-test-du-limit-cycles"
        ],
