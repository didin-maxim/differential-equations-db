  "ideas": [
    {
      "id": "idea-main",
      "title": "Посчитать допустимые наклоны и проверить регулярность",
      "text": "В точке (x_0,y_0) неявное уравнение дает алгебраическое уравнение на p=y'. Каждый простой действительный корень p порождает одну регулярную локальную ветвь решения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "implicit_function_theorem",
        "picard_lindelof"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "В точке (1,2) получаем уравнение p^3-6p^2+12p-4=0, то есть (p-2)^3+4=0. У него ровно один действительный корень p=2-sqrt[3]{4}. Проверим регулярность: F_p=3p^2-6xyp+3x^2y^2=3(p-xy)^2, и при x=1, y=2 этот корень не равен xy=2, значит F_p ≠ 0. По теореме о неявной функции и теореме существования и единственности через точку проходит ровно одно локальное решение.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "implicit_function_theorem",
        "picard_lindelof"
      ]
    }
  ],
