  "ideas": [
    {
      "id": "idea-main",
      "title": "Неявная задача Коши задает точку, а не производную",
      "text": "Если F_p ≠ 0, неявное уравнение F(x,y,p)=0 локально разрешается относительно p=y'. Поэтому задача Коши задается парой x_0, y_0; дополнительное условие на y' обычно несовместимо или избыточно.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "implicit_function_theorem",
        "picard_lindelof"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим F(x,y,p)=\\(e^{p+xy+p}\\). Тогда F_p=\\(e^{p+1}\\)>0 всюду, значит в окрестности любой точки, где F=0, уравнение однозначно разрешается относительно p: p=f(x,y). После этого это обычное уравнение y'=f(x,y), и корректные данные Коши имеют вид y(x_0)=y_0. В предложенном наборе естественный вариант - y(1)=1: он задает точку, а наклон затем определяется из \\(e^{p+p+1}\\)=0. Условия с y'(1)=0 некорректны как начальные данные: например F(1,1,0)=2 ≠ 0, так что такой наклон даже не совместим с уравнением в точке.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "implicit_function_theorem",
        "picard_lindelof"
      ]
    }
  ],
