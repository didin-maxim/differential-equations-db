  "ideas": [
    {
      "id": "idea-main",
      "title": "Особое решение должно лежать там, где теряется регулярность",
      "text": "Если вдоль решения F_p != 0, уравнение локально превращается в обычное y'=f(x,y), и касающаяся другая ветвь запрещена единственностью. Поэтому особая кривая лежит в p-дискриминанте, но сам дискриминант может не быть решением.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "implicit_function_theorem",
        "picard_lindelof"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Верное утверждение: любое особое решение содержится в p-дискриминантной кривой. Действительно, если в точке решения F_p != 0, то по теореме о неявной функции рядом есть единственная C^1-ветвь p=f(x,y). Для обычного уравнения y'=f(x,y) с C^1 правой частью две разные интегральные кривые не могут касаться в одной точке с тем же начальным значением. Значит особенность возможна только при F_p=0. Обратные утверждения неверны: дискриминант может быть границей поля направлений или содержать точки, через которые вообще не проходит интегральная кривая.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "implicit_function_theorem",
        "picard_lindelof"
      ]
    }
