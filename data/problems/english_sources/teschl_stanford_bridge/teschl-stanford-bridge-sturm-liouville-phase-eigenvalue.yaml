  "ideas": [
    {
      "id": "idea-main",
      "title": "Граничное условие превратить в условие на угол",
      "text": "Нули решения соответствуют значениям theta из pi Z; начальное условие u'(a)=1 фиксирует единственное решение для каждого lambda.",
      "status": "ai_checked",
