        "id": "stmt-original",
        "title": "Лемма",
        "text": "Рассмотрим задачу Дирихле -u''+q(x)u=lambda u на [a,b], u(a)=u(b)=0, где q непрерывна. Пусть u(a,lambda)=0, u'(a,lambda)=1, и зададим фазовый угол theta(x,lambda) так, что u=r sin theta, u'=r cos theta, theta(a,lambda)=0. Тогда lambda является собственным значением тогда и только тогда, когда theta(b,lambda) кратен pi.",
        "source_ids": [
          "src-stanford-math63cm-ode"
        ],
