  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Для каждого lambda задача Коши u(a)=0, u'(a)=1 имеет единственное решение. Величина r=sqrt(u^2+u'^2) нигде не обращается в нуль: иначе в некоторой точке одновременно u=0 и u'=0, и по единственности решение было бы нулевым, что противоречит u'(a)=1. Поэтому можно выбрать непрерывный угол theta с u=r sin theta, u'=r cos theta и theta(a)=0. Условие u(b)=0 равносильно sin theta(b)=0, то есть theta(b) in pi Z. При этом u не является нулевым решением, значит найденное решение является собственной функцией задачи Дирихле. Обратно, если lambda - собственное значение, собственная функция с u(a)=0 имеет u'(a) != 0; после умножения на константу можно сделать u'(a)=1, и тогда ее правое граничное условие дает theta(b) in pi Z. Метод фазового угла стандартен для расширенного курса Штурма-Лиувилля, но доказательство использует только задачу Коши.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "angle_comparison"
      ]
    }
  ],
