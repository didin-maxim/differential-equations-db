        "id": "stmt-original",
        "title": "Задача",
        "text": "Пусть A(t) непрерывна и T-периодична, X'=A(t)X, X(0)=I, M=X(T). Докажите, что произведение всех мультипликаторов Флоке, считая алгебраические кратности, равно det M=\\(e^{\\int_0^T tr A(s) ds}\\). В частности, для системы с tr A(t)=0 произведение мультипликаторов равно 1.",
