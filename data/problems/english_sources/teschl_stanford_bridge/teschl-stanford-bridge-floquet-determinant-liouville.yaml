  "ideas": [
    {
      "id": "idea-main",
      "title": "Определитель фундаментальной матрицы удовлетворяет скалярному уравнению",
      "text": "Формула Лиувилля превращает det X(T) в экспоненту интеграла tr A; det M равен произведению собственных значений M.",
      "status": "ai_checked",
