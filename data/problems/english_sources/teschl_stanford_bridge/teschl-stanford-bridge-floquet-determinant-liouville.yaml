  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "По формуле Лиувилля для матричного уравнения X'=A(t)X имеем (det X)'=tr A(t) det X. Так как X(0)=I, то det X(0)=1, и решение этого скалярного уравнения равно det X(t)=\\(e^{\\int_0^t tr A(s) ds}\\). При t=T получаем det M=det X(T)=\\(e^{\\int_0^T tr A(s) ds}\\). С другой стороны, мультипликаторы Флоке по определению являются собственными значениями M, а произведение собственных значений матрицы с учетом алгебраических кратностей равно ее определителю. Если tr A(t)=0 на всем периоде, интеграл равен нулю, значит det M=1. Это задача-мост: она использует стандартную формулу Лиувилля, но интерпретирует ее в языке теории Флоке.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
  ],
