  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Запишем обе задачи Коши в интегральной форме: x(t)=x0+int_{t0}^t f(s,x(s)) ds и y(t)=y0+int_{t0}^t f(s,y(s)) ds. Тогда для t>=t0 имеем |x(t)-y(t)|<=|x0-y0|+int_{t0}^t |f(s,x(s))-f(s,y(s))| ds<=|x0-y0|+L int_{t0}^t |x(s)-y(s)| ds. По неравенству Гронуолла получаем |x(t)-y(t)|<=|x0-y0| exp(L(t-t0)). Если начальные точки стремятся к x0 и все решения существуют на рассматриваемом отрезке, правая часть стремится к нулю равномерно по t. Это и есть непрерывная зависимость на фиксированном времени. Факт помечен advanced_standard_course только потому, что в обычном вычислительном курсе часто доказывают единственность, но не выделяют полную теорему о зависимости.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    }
  ],
