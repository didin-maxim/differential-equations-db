        "id": "stmt-original",
        "title": "Теорема",
        "text": "Пусть f(t,x) непрерывна и локально липшицева по x в цилиндре, а две задачи Коши x'=f(t,x), x(t0)=x0 и y'=f(t,y), y(t0)=y0 имеют решения на одном отрезке [t0,T]. Если на общей области |f(t,u)-f(t,v)|<=L|u-v|, то для t из [t0,T] выполнено |x(t)-y(t)|<=|x0-y0| exp(L(t-t0)). В частности, при близких начальных данных решения остаются близкими на фиксированном конечном отрезке.",
