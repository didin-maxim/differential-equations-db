        "id": "stmt-original",
        "title": "Лемма",
        "text": "Пусть A(t+T)=A(t), а X(t) - фундаментальная матрица системы x'=A(t)x с X(0)=I. Тогда X(t+T)=X(t)X(T) для всех t, и, в частности, X(nT)=X(T)^n для всех целых n>=0. Матрица M=X(T) называется матрицей монодромии.",
