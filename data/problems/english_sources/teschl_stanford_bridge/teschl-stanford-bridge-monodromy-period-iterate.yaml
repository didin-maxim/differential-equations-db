  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Рассмотрим Y(t)=X(t+T). Тогда Y'(t)=A(t+T)X(t+T)=A(t)Y(t), то есть Y является фундаментальной матрицей той же системы. Ее значение при t=0 равно Y(0)=X(T). Матрица Z(t)=X(t)X(T) также удовлетворяет Z'=A(t)Z и Z(0)=X(T). По единственности матричной задачи Коши Y(t)=Z(t), то есть X(t+T)=X(t)X(T). Подставляя t=(n-1)T и применяя индукцию, получаем X(nT)=X(T)^n. Эта лемма сама по себе элементарна, но она является входом в теорию Флоке, поэтому помечена как advanced_standard_course.",
