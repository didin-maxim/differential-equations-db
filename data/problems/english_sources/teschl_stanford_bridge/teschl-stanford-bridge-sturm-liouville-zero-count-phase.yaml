        "title": "Теорема",
        "text": "В регулярной задаче Дирихле -u''+q(x)u=lambda u на [a,b] собственные значения можно занумеровать lambda_1<lambda_2<... так, что собственная функция при lambda_n имеет ровно n-1 нулей внутри (a,b). Фазовый способ доказательства: theta(b,lambda_n)=n pi, а внутренние нули соответствуют промежуточным кратным pi.",
