      "title": "Угол растет и пересекает кратные pi по одному разу",
      "text": "Если theta(b,lambda) возрастает от 0 к бесконечности при росте lambda, то каждое значение n pi задает одно собственное значение, а число уже пройденных кратных pi равно числу внутренних нулей.",
