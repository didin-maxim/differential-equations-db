  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Запустим решение из левого конца условиями u(a)=0, u'(a)=1 и введем фазовый угол theta. По фазовой лемме lambda является собственным значением тогда и только тогда, когда theta(b,lambda) кратен pi. В регулярной теории Штурма-Лиувилля доказывается, что theta(b,lambda) непрерывно и строго возрастает по lambda, причем при lambda -> -infty оно стремится к 0, а при lambda -> +infty стремится к бесконечности. Поэтому уравнение theta(b,lambda)=n pi имеет ровно одно решение lambda_n для каждого n>=1, и они строго упорядочены. Для соответствующего решения theta(a)=0 и theta(b)=n pi; внутренние нули u - это точки, где theta=k pi, k=1,...,n-1. Между соседними такими значениями нет дополнительных нулей, так как r>0 и theta проходит кратные pi последовательно. Следовательно, собственная функция при lambda_n имеет ровно n-1 внутренних нулей. Строгая монотонность theta по lambda является advanced_standard_course, но не требует тяжелой функциональной теории в этой формулировке.",
