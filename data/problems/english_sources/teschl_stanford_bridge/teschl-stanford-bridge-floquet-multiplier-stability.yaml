  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Для решения x(t)=X(t)x_0 в моменты nT имеем x(nT)=M^n x_0. Если все собственные значения M лежат внутри единичного круга, то по жордановой форме M^n → 0. На каждом промежутке [nT,(n+1)T] решение равно X(s)M^n x_0, где s in [0,T], а X(s) ограничена на компактном отрезке. Поэтому x(t)→0 и малость начального значения сохраняется равномерно: нулевое решение асимптотически устойчиво. Если у M есть собственное значение lambda с |lambda|>1 и собственный или обобщенный собственный вектор v, то последовательность M^n v растет по норме. Следовательно, при сколь угодно малом начальном значении вдоль этого направления решение в моменты nT выходит из любой фиксированной окрестности нуля. Это дает неустойчивость. Случай |lambda|=1 требует дополнительных условий на жордановы клетки и здесь намеренно не включен, чтобы не утяжелять карточку.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
