        "title": "Теорема",
        "text": "Для T-периодической линейной системы x'=A(t)x пусть M=X(T) - матрица монодромии, где X(0)=I. Если все собственные значения M по модулю меньше 1, то нулевое решение асимптотически устойчиво. Если хотя бы одно собственное значение M имеет модуль больше 1, то нулевое решение неустойчиво.",
