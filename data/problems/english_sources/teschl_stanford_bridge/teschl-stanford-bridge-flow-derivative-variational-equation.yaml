  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Для базового решения phi интегральная форма имеет вид phi(t)=x0+int_{t0}^t f(s,phi(s)) ds. Формально дифференцируя по x0, получаем U(t)=I+int_{t0}^t D_x f(s,phi(s))U(s) ds. Это интегральная форма линейной задачи U'=D_x f(s,phi(s))U, U(t0)=I. Строгость оправдывается стандартной теоремой о дифференцируемости решений по параметру: остаток в формуле Тейлора для f оценивается через непрерывность D_x f, а затем применяется Гронуолл. В результате U(t) является фундаментальной матрицей уравнения в вариациях вдоль выбранной траектории. Мостовой факт выходит за вычислительный курс тем, что говорит не об одном решении, а о дифференцируемости всего локального потока.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
        "gronwall_estimate"
      ]
    }
