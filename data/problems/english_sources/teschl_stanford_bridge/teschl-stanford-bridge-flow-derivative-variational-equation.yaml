        "title": "Теорема",
        "text": "Пусть f(t,x) непрерывна по t и непрерывно дифференцируема по x. Обозначим через phi(t,t0,x0) решение задачи x'=f(t,x), x(t0)=x0. Если решение существует на фиксированном отрезке, то производная U(t)=D_{x0}phi(t,t0,x0) удовлетворяет линейной матричной задаче Коши U'=D_x f(t,phi(t,t0,x0))U, U(t0)=I.",
