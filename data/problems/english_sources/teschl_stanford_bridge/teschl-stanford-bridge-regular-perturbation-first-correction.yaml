        "id": "stmt-original",
        "title": "Задача",
        "text": "Пусть\\(x \\varepsilon'=f(t,x \\varepsilon)+\\varepsilon g(t,x \\varepsilon), x \\varepsilon(t_0)=x_0,\\)где f и g достаточно гладкие. Пусть\\(x_0(t)\\)решает невозмущенную задачу при \\(\\varepsilon=0.\\) Докажите, что \\(z(t)=partial x \\varepsilon(t)/partial \\varepsilon\\) |\\(_{\\varepsilon=0}\\)удовлетворяет\\(z'=D x_f(t,x_0(t))z+g(t,x_0(t)), z(t_0)=0.\\)",
