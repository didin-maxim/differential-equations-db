        "id": "stmt-original",
        "title": "Задача",
        "text": "Пусть x_epsilon'=f(t,x_epsilon)+epsilon g(t,x_epsilon), x_epsilon(t0)=x0, где f и g достаточно гладкие. Пусть x0(t) решает невозмущенную задачу при epsilon=0. Докажите, что z(t)=partial x_epsilon(t)/partial epsilon |_{epsilon=0} удовлетворяет z'=D_x f(t,x0(t))z+g(t,x0(t)), z(t0)=0.",
