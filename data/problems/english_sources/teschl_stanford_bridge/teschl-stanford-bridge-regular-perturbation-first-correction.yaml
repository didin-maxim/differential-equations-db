  "ideas": [
    {
      "id": "idea-main",
      "title": "Дифференцировать по малому параметру",
      "text": "Регулярное возмущение первого порядка является неоднородным вариационным уравнением: матрица берется вдоль невозмущенной траектории, а правая часть равна самому возмущению.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Предположим, что по теореме о гладкой зависимости от параметра производная \\(z(t)=partial \\varepsilon x \\varepsilon(t)\\)|\\(_{\\varepsilon=0}\\)существует на рассматриваемом отрезке. Дифференцируем уравнение \\(x \\varepsilon'=f(t,x \\varepsilon)+\\varepsilon g(t,x \\varepsilon)\\) по \\(\\varepsilon.\\) Получаем\\(partial \\varepsilon x \\varepsilon'=D x_f(t,x \\varepsilon) partial \\varepsilon x \\varepsilon+g(t,x \\varepsilon)+\\varepsilon D x_g(t,x \\varepsilon) partial \\varepsilon x \\varepsilon.\\)При \\(\\varepsilon=0\\) имеем\\(x \\varepsilon=x_0,\\)поэтому\\(z'=D x_f(t,x_0(t))z+g(t,x_0(t)).\\)Начальное условие не зависит от \\(\\varepsilon,\\) значит\\(z(t_0)=0.\\)Если \\(\\Phi(t) -\\) фундаментальная матрица однородного вариационного уравнения, то \\(z(t)=\\Phi(t)\\int_{t_0}^t \\Phi(s)^{-1}g(s,x_0(s))\\,ds.\\) За пределами стандартного курса здесь находится не вычисление линейного уравнения, а сам факт дифференцируемости решения по параметру.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
