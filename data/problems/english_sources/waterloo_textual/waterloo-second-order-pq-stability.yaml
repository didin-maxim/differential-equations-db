        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "След и определитель для двух корней",
      "text": "Корни r1,r2 характеристического многочлена удовлетворяют \\(r1+r2=-p\\) и \\(r1 r2=q.\\) Оба корня имеют отрицательные действительные части ровно при p>0 и q>0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристическое уравнение имеет вид\\(r^2+pr+q=0.\\)Если корни вещественные, то для отрицательности обоих корней необходимо и достаточно, чтобы сумма корней -p была отрицательной, а произведение q положительным; это дает p>0 и q>0. Если корни комплексные, они равны -p/2 плюс-минус \\(i \\beta,\\) поэтому затухание всех решений эквивалентно p>0; при этом\\(q=p^2/4+\\beta^2>0.\\) Обратно, при p>0 и q>0 в вещественном случае оба корня отрицательны, а в комплексном случае вещественная часть -p/2 отрицательна. Если q<0, есть положительный вещественный корень; если \\(q=0,\\) есть нулевой корень; если \\(p\\le0\\) при q>0, хотя бы одна вещественная часть неотрицательна. Значит точное условие: p>0 и q>0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
