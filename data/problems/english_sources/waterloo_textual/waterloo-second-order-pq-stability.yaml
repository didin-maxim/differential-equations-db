        "title": "Устойчивость по коэффициентам второго порядка",
        "text": "Для уравнения\\(y''+p_y'+q y=0\\)с постоянными вещественными p и q найдите условие на параметры, при котором все решения стремятся к нулю при \\(t\\to+\\infty.\\) Объясните ответ через корни характеристического уравнения, не решая отдельные численные примеры.",
