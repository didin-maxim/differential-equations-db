      "title": "Восстановление ОДУ по семейству окружностей",
      "text": "Семейство кривых задано уравнением k(x^2+y^2)=2y, где k - параметр. Восстановите дифференциальное уравнение первого порядка, для которого эти кривые являются интегральными, и опишите форму типичных кривых семейства.",
      "source_ids": ["src-waterloo-amath250-notes"],
      "status": "ai_checked",
      "self_contained": {"status": "ai_checked"},
      "definition_ids": ["ordinary_differential_equation", "solution"]
    }]
  },
  "ideas": [{
    "id": "idea-main",
    "title": "Исключить параметр дифференцированием",
    "text": "Параметр k сначала выражается из самого семейства, а затем исключается из продифференцированного равенства. Геометрически это семейство окружностей с общей точкой касания, что помогает проверить знак наклона.",
    "status": "ai_checked",
    "standard_idea_ids": ["differentiate_auxiliary_function"]
  }],
  "solutions": [{
    "id": "sol-main",
    "title": "Решение",
    "text": "Из k(x^2+y^2)=2y получаем k=2y/(x^2+y^2) там, где кривая не выродилась. Дифференцируем исходное равенство по x: k(2x+2yy')=2y'. Подставляя k, имеем 2y(x+yy')=(x^2+y^2)y'. Отсюда (y^2-x^2)y'+2xy=0, или y'=2xy/(x^2-y^2). Если k>0, исходное равенство переписывается как x^2+(y-1/k)^2=1/k^2: это окружности, касающиеся оси Ox в начале координат сверху. При k<0 такие же окружности расположены снизу. Полученное поле наклонов согласуется с этой картиной.",
    "status": "ai_checked",
    "standard_idea_ids": ["differentiate_auxiliary_function"]
  }],
