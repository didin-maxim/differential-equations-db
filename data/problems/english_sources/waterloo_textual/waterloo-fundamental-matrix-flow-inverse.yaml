        "title": "Фундаментальная матрица как поток",
        "text": "Пусть \\(\\Phi(t) -\\) фундаментальная матрица системы \\(x'=Ax,\\) нормированная условием \\(\\Phi(0)=I.\\) Докажите геометрически и алгебраически, что \\(\\Phi(t+s)=\\Phi(t)\\Phi(s)\\) и\\(\\Phi(-t)=\\Phi(t)^{-1}.\\)",
