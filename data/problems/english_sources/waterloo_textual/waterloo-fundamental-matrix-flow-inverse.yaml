  "ideas": [
    {
      "id": "idea-main",
      "title": "Фундаментальная матрица переводит начальное состояние во время t",
      "text": "Оператор \\(\\Phi(t) -\\) это сдвиг вдоль траекторий линейной автономной системы. Сдвиг сначала на s, потом на t равен сдвигу на t+s; обратный сдвиг получается движением на время -t.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Для любого начального вектора a решение имеет вид \\(x(u)=\\Phi(u)a.\\) Если сначала пройти время s, получим состояние \\(b=\\Phi(s)a.\\) Запуская ту же автономную систему из b еще на время t, получаем \\(\\Phi(t)b=\\Phi(t)\\Phi(s)a.\\) С другой стороны, это то же решение, прошедшее суммарное время t+s, то есть \\(\\Phi(t+s)a.\\) Так как a произволен\\(, \\Phi(t+s)=\\Phi(t)\\Phi(s).\\) Подставляя \\(s=-t,\\) имеем \\(I=\\Phi(0)=\\Phi(t)\\Phi(-t).\\) При t, замененном на -t, получаем также \\(I=\\Phi(-t)\\Phi(t).\\) Следовательно \\(\\Phi(t)\\) обратима, и ее обратная матрица равна \\(\\Phi(-t).\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
