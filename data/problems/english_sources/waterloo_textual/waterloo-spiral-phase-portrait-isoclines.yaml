        "title": "Фазовый портрет по матрице и изоклинам",
        "text": "Для системы \\(x'=Ax, A=[[-1,-4],[1,-1]],\\) постройте качественный фазовый портрет без точного рисования траекторий: определите тип равновесия, направление вращения, убывание амплитуды и роль вертикальной и горизонтальной изоклин.",
