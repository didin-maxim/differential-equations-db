  "ideas": [
    {
      "id": "idea-main",
      "title": "Спектр дает тип, изоклины - форму эскиза",
      "text": "Собственные значения определяют устойчивый фокус. Изоклины\\(x_1'=0\\) и \\(x_2'=0\\)показывают, где касательные вертикальны и горизонтальны, а знак поля в одной точке задает направление вращения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристический многочлен равен\\((\\lambda+1)^2+4,\\)поэтому \\(\\lambda=-1\\) плюс-минус 2i. Значит начало координат - асимптотически устойчивый фокус: траектории спирально стремятся к нулю. В точке (1,0) поле равно (-1,1), то есть движение идет вверх и влево; вращение против часовой стрелки. Вертикальная касательная возникает там, где\\(x_1'=-x_1-4x2=0,\\)то есть\\(x_2=-x_1/4.\\)Горизонтальная касательная возникает там, где\\(x_2'=x_1-x_2=0,\\)то есть\\(x_2=x_1.\\)Эти две прямые не являются траекториями, но они задают каркас рисунка: при пересечении первой траектория вертикальна, при пересечении второй горизонтальна, а между ними наклон меняет знак. Амплитуда убывает из-за отрицательной вещественной части собственных значений.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
