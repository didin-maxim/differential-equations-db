        "id": "stmt-original",
        "title": "Линейное уравнение около особой точки",
        "text": "Рассмотрите уравнение \\(x y' + (x+1)y=e^{-x}.\\) Найдите семейство решений на промежутках x>0 и x<0 и объясните качественную структуру эскиза около \\(x=0\\): какие решения продолжаются гладко, а какие имеют вертикальную асимптоту.",
        "source_ids": [
          "src-waterloo-amath250-notes"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
