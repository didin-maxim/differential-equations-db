          "linear_first_order_equation"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Сингулярная точка решает судьбу эскиза",
      "text": "На каждом из промежутков x>0 и x<0 работает обычный интегрирующий множитель. Но качественно важнее член C/x: только одна кривая проходит через \\(x=0\\) без разрыва.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "При x не равном нулю уравнение имеет вид \\(y'+(1+1/x)y=e^{-x}/x.\\) Интегрирующий множитель на каждом из промежутков x>0 и x<0 можно взять равным \\(x e^x.\\) Тогда \\((x e^x y)'=1,\\) откуда \\(x e^x y=x+C\\) и \\(y=e^{-x}(1+C/x).\\) Если \\(C=0,\\) решение \\(y=e^{-x}\\) гладко проходит через \\(x=0\\) и удовлетворяет предельному равенству \\(y(0)=1.\\) Если C не равен нулю, главный член \\(C e^{-x}/x\\) дает вертикальную асимптоту при \\(x\\to0+\\) или \\(x\\to0-.\\) Поэтому эскиз состоит из одной регулярной кривой и двух семейств ветвей, уходящих к бесконечности у сингулярной прямой.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
  ],
