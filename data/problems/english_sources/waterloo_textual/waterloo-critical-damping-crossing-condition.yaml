        "id": "stmt-original",
        "title": "Критически демпфированный осциллятор",
        "text": "Критически демпфированный осциллятор удовлетворяет y''+2omega y'+omega^2 y=0, omega>0. Пусть y(0)=A>0 и y'(0)=-V. При каких V масса пересечет положение равновесия y=0, а при каких только подойдет к нему с положительной стороны?",
        "source_ids": [
          "src-waterloo-amath250-notes"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "stability"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "У критического корня знак решает линейный множитель",
      "text": "В критическом режиме решение имеет вид (C1+C2 t)\\(e^{-omega t}\\). Экспонента положительна, поэтому пересечение равновесия полностью определяется нулем линейного множителя.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "resonance_ansatz"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для двойного корня -omega имеем y(t)=(C1+C2 t)\\(e^{-omega t}\\). Из y(0)=A следует C1=A. Производная равна y'(t)=(C2-omega C1-omega C2 t)\\(e^{-omega t}\\), поэтому y'(0)=C2-omega A=-V и C2=omega A-V. Так как \\(e^{-omega t}\\)>0, знак y(t) при t≥0 задает A+(omega A-V)t. Если V>omega A, этот линейный множитель обращается в нуль при t=A/(V-omega A), и масса пересекает равновесие. Если V=omega A, y(t)=A \\(e^{-omega t}\\)>0. Если V<omega A, линейный множитель растет или убывает недостаточно быстро и остается положительным при t≥0. Значит пересечение происходит ровно при V>omega A.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "resonance_ansatz"
      ]
    }
  ],
