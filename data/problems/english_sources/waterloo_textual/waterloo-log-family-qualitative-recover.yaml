        "id": "stmt-original",
        "title": "Качественный эскиз логарифмического семейства",
        "text": "Для семейства y=ln(\\(e^{x+C}\\)) восстановите дифференциальное уравнение первого порядка и дайте качественный эскиз кривых при C>0, C=0 и C<0: область определения, асимптоты, монотонность и выпуклость.",
