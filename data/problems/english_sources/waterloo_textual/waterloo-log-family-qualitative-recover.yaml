          "solution"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Параметр виден через \\(e^{y-e}\\)^x",
      "text": "Из \\(e^{y}\\)=\\(e^{x+C}\\) сразу получается y'=\\(e^{x-y}\\). После этого качественная картина читается из знака C и из формулы y''=y'(1-y').",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Экспоненцируя, получаем \\(e^{y}\\)=\\(e^{x+C}\\). Дифференцирование дает \\(e^{y}\\) y'=\\(e^{x}\\), значит y'=\\(e^{x-y}\\). Это ОДУ уже не содержит C. Все решения возрастают. При C=0 получаем прямую y=x. При C>0 функция определена на всей прямой, при x→-∞ стремится к ln C, а при x→+∞ имеет асимптоту y=x; здесь 0<y'<1 и y''=y'(1-y')>0. При C<0 область x>ln(-C); слева возникает вертикальная асимптота, y→-∞, затем кривая возрастает и при x→+∞ снова приближается к y=x, но уже сверху; здесь y'>1 и y''<0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
