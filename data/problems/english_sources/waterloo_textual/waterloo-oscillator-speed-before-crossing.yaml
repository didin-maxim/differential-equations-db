        "id": "stmt-original",
        "title": "Скорость перед первым пересечением равновесия",
        "text": "Осциллятор удовлетворяет y''+4y'+5y=0, y(0)=0, y'(0)=1. Не ограничиваясь явным графиком, определите: модуль скорости |y'| максимален непосредственно до первого пересечения равновесия y=0, после него или ровно в момент пересечения?",
        "source_ids": [
          "src-waterloo-amath250-notes"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
        "definition_ids": [
          "linear_system",
          "stability"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Максимум скорости виден на фазовой плоскости",
      "text": "Для скорости v=y' максимум |v| на гладком участке, где v не равна нулю, достигается при v'=0. Уравнение v'=-4v-5y показывает, с какой стороны от оси y=0 лежит эта точка.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим v=y'. Тогда y'=v, v'=-5y-4v. Решение сначала имеет y>0 и v>0, затем v меняет знак, а первое следующее пересечение равновесия y=0 происходит при движении вниз, то есть v<0. В момент этого пересечения v'=-4v>0, значит v уже увеличивается от отрицательных значений к нулю, а |v| уменьшается. Максимум отрицательной скорости должен был произойти раньше, когда v'=0, то есть на прямой -5y-4v=0. При v<0 это дает y>0, следовательно точка максимального |v| лежит до пересечения y=0. Явная проверка дает y=\\(e^{-2t}\\) sin t, но для ответа достаточно фазового аргумента.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
