      "id": "idea-main",
      "title": "Смешанное условие дает не целые частоты, а уравнение на частоту",
      "text": "Для lambda=mu^2 положительная частота mu должна удовлетворять sin mu+mu cos mu=0. Нулевой и отрицательный случаи исключаются отдельно.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "shooting_parameter"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть lambda=mu^2>0. Тогда y=A cos(mu x)+B sin(mu x). Условие y(0)-y'(0)=0 дает A-mu B=0, то есть A=mu B. Условие y(1)=0 дает B(mu cos mu+sin mu)=0. Для нетривиального решения нужно sin mu+mu cos mu=0; тогда собственная функция пропорциональна mu cos(mu x)+sin(mu x). При lambda=0 имеем y=Ax+B, условия дают B-A=0 и A+B=0, откуда A=B=0. При lambda=-nu^2<0 имеем y=A cosh(nu x)+B sinh(nu x), первое условие дает A=nu B, а второе B(nu cosh nu+sinh nu)=0; выражение в скобках положительно при nu>0. Значит отрицательных собственных значений нет.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "shooting_parameter"
      ]
    }
