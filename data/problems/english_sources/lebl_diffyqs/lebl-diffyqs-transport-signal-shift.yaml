  "ideas": [
    {
      "id": "idea-main",
      "title": "Характеристика несет значение u без изменения",
      "text": "В координатах xi=x-alpha t, s=t производная по s равна нулю. Значит начальный профиль не искажается, а только сдвигается вдоль прямых x-alpha t=const.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Введем xi=x-alpha t и s=t. Тогда u_x=u_xi, а u_t=-alpha u_xi+u_s. Уравнение alpha u_x+u_t=0 превращается в u_s=0. Поэтому u=A(xi)=A(x-alpha t). Начальное условие дает A(x)=f(x), следовательно u(x,t)=f(x-alpha t). Если alpha>0, один и тот же уровень профиля находится при x=xi+alpha t, то есть профиль движется вправо со скоростью alpha; при alpha<0 он движется влево.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ]
    }
  ],
