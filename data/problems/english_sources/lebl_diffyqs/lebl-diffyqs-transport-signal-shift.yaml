        "title": "Lebl, раздел 1.9, пример 1.9.1",
        "text": "Пусть alpha - постоянная. Решить линейное однородное уравнение alpha u_x+u_t=0 с начальным условием u(x,0)=f(x). Объяснить геометрически, куда движется профиль f.",
