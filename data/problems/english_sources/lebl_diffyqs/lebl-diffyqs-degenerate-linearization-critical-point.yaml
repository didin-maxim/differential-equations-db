    {
      "id": "idea-main",
      "title": "При нулевом Якобиане смотреть на первые ненулевые члены",
      "text": "Обе правые части квадратичны, поэтому линейная часть в нуле исчезает. В координатах p=x-y, q=x+y видно, что q'=p^2+q^2 неотрицательна и задает основное направление движения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Равновесие требует одновременно x-y=0 и x+y=0, значит единственная критическая точка - (0,0). Якобиан системы равен нулевой матрице в этой точке, поэтому линейная система не дает фазовой информации. Введем p=x-y и q=x+y. Тогда q'=x'+y'=(x-y)^2+(x+y)^2=p^2+q^2, а p'=x'-y'=p^2-q^2. Поэтому вне нуля величина q строго возрастает. Траектории не могут кружить вокруг нуля или стремиться к нему при t->+infty: они проходят через малую окрестность снизу вверх в координате q. Главный вывод: это не гиперболическая точка, и характер определяется квадратичной частью, а не линеаризацией.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
