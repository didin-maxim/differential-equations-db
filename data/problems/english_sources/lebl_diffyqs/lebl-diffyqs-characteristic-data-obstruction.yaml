  "ideas": [
    {
      "id": "idea-main",
      "title": "Начальная кривая сама является характеристикой",
      "text": "Уравнение не содержит u_t, поэтому оно накладывает ОДУ по x прямо на линии t=0. Данные на этой линии должны уже удовлетворять этому ОДУ; произвольная функция недопустима.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Если бы решение существовало, то на линии t=0 мы имели бы u(x,0)=sin x и, дифференцируя это равенство по x, получили бы u_x(x,0)=cos x. Но само уравнение на той же линии требует u_x(x,0)+u(x,0)=0. Получается cos x+sin x=0 для всех x, что неверно. Геометрически поле характеристик направлено вдоль оси x, поэтому прямая t=0 является характеристикой. На характеристике нельзя произвольно задать весь профиль: он должен быть совместим с ОДУ du/dx+u=0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
