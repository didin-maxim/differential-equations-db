        "title": "Lebl, раздел 1.9, замечание после примера 1.9.3",
        "text": "Показать, что задача u_x+u=0, u(x,0)=sin x не имеет решения. Объяснить это через характеристики.",
        "source_ids": [
          "src-lebl-diffyqs"
