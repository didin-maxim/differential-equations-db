      "id": "idea-main",
      "title": "Локальная классификация не отменяет глобальный барьер",
      "text": "Оба равновесия локально выглядят как спиральные стоки, но прямая \\(x=0\\) инвариантна. Поэтому знак x сохраняется, и правая полуплоскость не может попасть к левому стоку.",
