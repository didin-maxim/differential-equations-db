        "title": "Lebl, раздел 8.2, упражнение 8.2.4",
        "text": "Для системы\\(x'=-xy, y'=x^2-1-y\\)показать, что точки (-1,0) и (1,0) являются спиральными стоками. Найти траекторию при начальных данных\\(x(0)=0, y(0)=y_0.\\)Может ли траектория, стартующая при\\(x_0>0,\\)спирально стремиться к (-1,0)?",
