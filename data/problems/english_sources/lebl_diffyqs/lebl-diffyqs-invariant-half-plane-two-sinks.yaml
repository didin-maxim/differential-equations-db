  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Якобиан равен [[-y,-x],[2x,-1]]. В точке (1,0) получаем матрицу [[0,-1],[2,-1]] со следом -1 и определителем 2; дискриминант равен\\((-1)^2-4\\)·\\(2=-7<0,\\) поэтому это спиральный сток. В точке (-1,0) матрица [[0,1],[-2,-1]] имеет те же след и определитель, значит это тоже спиральный сток. Если \\(x=0,\\) то \\(x'=0,\\) а \\(y'=-1-y\\); поэтому траектория остается на оси \\(x=0\\) и имеет вид \\(y(t)=-1+(y_0+1)e^{-t}.\\) Если \\(x_0>0,\\)то из \\(x'=-xy\\) следует \\(x(t)=x_0 e^{-\\int_0^t y(s)\\,ds},\\) пока решение существует; знак x не меняется. Значит такая траектория не пересекает инвариантную прямую \\(x=0\\) и не может стремиться к равновесию (-1,0) в левой полуплоскости.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "phase_line_signs"
      ]
    }
