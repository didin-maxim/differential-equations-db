  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристики задаются dx/dt=π, поэтому x-π t=xi. Вдоль такой прямой полная производная равна d/dt u(xi+π t,t)=π u_x+u_t. Уравнение превращается в du/dt+u=0. Если при t=0 характеристика стартует из точки xi, то u(0)=sin xi, значит u=sin(xi)\\(e^{-t}\\). Подставляя xi=x-π t, получаем u(x,t)=\\(e^{-t}\\) sin(x-π t).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ]
    }
  ],
