    {
      "id": "idea-main",
      "title": "Снять первую производную заменой y=\\(e^{-x/2}\\)z",
      "text": "После деления на \\(e^{x}\\) получается y''+y'+lambda y=0. Экспоненциальная замена переводит это в z''+(lambda-1/4)z=0 с условиями Дирихле.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Разделив уравнение на \\(e^{x}\\), получаем y''+y'+lambda y=0. Положим y=\\(e^{-x/2}\\)z. Тогда y''+y'=\\(e^{-x/2}\\)(z''-z/4), и уравнение становится z''+(lambda-1/4)z=0. Поскольку множитель \\(e^{-x/2}\\) не обращается в нуль, условия y(0)=y(1)=0 эквивалентны z(0)=z(1)=0. Для задачи Дирихле нетривиальные решения существуют при lambda-1/4=(n π)^2, n=1,2,.... Следовательно lambda_n=1/4+n^2 π^2, а собственные функции можно взять y_n(x)=\\(e^{-x/2}\\) sin(n π x).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
