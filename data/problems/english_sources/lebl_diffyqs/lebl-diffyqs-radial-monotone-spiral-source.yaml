        "title": "Lebl, раздел 8.2, упражнение 8.2.5",
        "text": "Для системы\\(x'=y, y'=y^3-x\\)показать, что вдоль любой ненулевой траектории расстояние от начала координат не убывает. Сделать вывод о поведении около нуля.",
