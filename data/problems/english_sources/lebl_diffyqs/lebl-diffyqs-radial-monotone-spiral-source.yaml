  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим\\(V=x^2+y^2.\\) Тогда\\(V'=2xx'+2yy'=2xy+2y(y^3-x)=2y^4\\ge0.\\) Если траектория не является равновесием, V не может убывать. Более того, при \\(y=0\\) и \\(x \\ne 0\\) имеем \\(y'=-x,\\) так что траектория сразу уходит в область \\(y \\ne 0,\\) где V начинает расти. Линеаризация в нуле равна \\(x'=y, y'=-x\\) и дает центр, но нелинейный член\\(y^3\\)создает радиальный отток. Поэтому нуль ведет себя как неустойчивый спиральный источник, хотя это не следует из одной линейной части.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
