  "ideas": [
    {
      "id": "idea-main",
      "title": "Проверить радиальную монотонность вместо доверия линеаризации",
      "text": "Линейная часть дает центр, но производная\\(V=x^2+y^2\\) равна\\(2y^4.\\)Это запрещает приближение к нулю и показывает источник спирального типа.",
      "status": "ai_checked",
