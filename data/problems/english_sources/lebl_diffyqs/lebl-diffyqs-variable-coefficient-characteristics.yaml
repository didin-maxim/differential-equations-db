  "ideas": [
    {
      "id": "idea-main",
      "title": "Характеристика сама решает ОДУ с переменным коэффициентом",
      "text": "Вместо прямых с постоянной скоростью возникает\\(dx/dt=x.\\) Начальная точка характеристики равна \\(\\xi=xe^{-t},\\) а значение u дополнительно умножается на \\(e^{-2t}.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Параметризуем характеристику временем t. Тогда\\(dx/dt=x,\\) поэтому \\(x=\\xi e^t,\\) где \\(\\xi -\\) точка пересечения характеристики с прямой \\(t=0.\\) Следовательно \\(\\xi=xe^{-t}.\\) Вдоль характеристики\\(d u/dt=xu x+u_t,\\)и уравнение дает \\(du/dt+2u=0.\\) При \\(t=0\\) значение равно \\(\\cos \\xi,\\) значит \\(u=\\cos(\\xi)e^{-2t}.\\) Возвращаясь к x,t, получаем \\(u(x,t)=e^{-2t}\\cos(xe^{-t}).\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ]
    }
  ],
