  "ideas": [
    {
      "id": "idea-main",
      "title": "Исключить внутренний максимум и минимум",
      "text": "Внутренний максимум выше 1 противоречит знакам y'=0, y''≤0 в уравнении. Внутренний отрицательный минимум противоречит знакам y'=0, y''≥0; нулевой минимум запрещается единственностью задачи Коши.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Предположим, что y(c)>1 в некоторой внутренней точке. Тогда на [a,b] функция имеет внутренний максимум c с y(c)>1, y'(c)=0 и y''(c)≤0. Подстановка в уравнение дает (cosh c)y''(c)=(1+c^2)y(c), но левая часть ≤0, а правая >0, противоречие. Значит y≤1. Если y(c)<0 в некоторой точке, то существует внутренний минимум c с y(c)<0, y'(c)=0, y''(c)≥0. Тогда (cosh c)y''(c)=(1+c^2)y(c), левая часть ≥0, правая <0, снова противоречие. Следовательно y≥0. Наконец, если y(c)=0 во внутренней точке, то это минимум: y'(c)=0. Линейное уравнение с начальными данными y(c)=y'(c)=0 имеет только нулевое решение, что несовместимо с y(a)=y(b)=1. Поэтому 0<y<1 внутри интервала.",
      "status": "ai_checked"
    }
  ],
