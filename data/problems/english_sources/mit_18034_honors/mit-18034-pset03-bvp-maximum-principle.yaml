        "title": "Формулировка",
        "text": "Пусть y удовлетворяет на интервале a<x<b уравнению (cosh x)y''+(cos x)y'=(1+x^2)y и краевым условиям y(a)=y(b)=1. Доказать, что 0<y(x)<1 для всех a<x<b.",
