        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Рассмотрим задачу Коши\\(x''=f(t,x), x(t_0)=x_0, x'(t_0)=x_1.\\)Доказать, что она эквивалентна интегральному уравнению \\(x(t)=x_0+(t-t_0)x_1+\\int_{t_0}^t (t-s)f(s,x(s))\\,ds.\\) Если f непрерывна, липшицева по x и |f|\\(\\leM\\) в прямоугольнике |\\(t-t_0\\)|\\(\\leT,\\) |\\(x-x_0\\)|\\(\\leK,\\) показать сходимость последовательных приближений для этого интегрального уравнения на достаточно малом общем интервале.",
