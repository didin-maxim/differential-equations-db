  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Если x решает задачу Коши, то \\(x'(t)=x_1+\\int_{t_0}^t f(s,x(s))\\,ds,\\) а повторное интегрирование дает \\(x(t)=x_0+(t-t_0)x_1+\\int_{t_0}^t (t-s)f(s,x(s))\\,ds.\\) Обратно, дифференцируя это интегральное равенство, получаем \\(x'(t)=x_1+\\int_{t_0}^t f(s,x(s))\\,ds,\\) а затем \\(x''=f(t,x)\\); начальные условия очевидны. Для сходимости положим \\((Tx)(t)=x_0+(t-t_0)x_1+\\int_{t_0}^t (t-s)f(s,x(s))\\,ds\\) и выберем \\(h\\leT\\) так, чтобы |\\(x_1\\)|\\(h+Mh^2/2\\leK.\\) Тогда T переводит замкнутый шар непрерывных функций |\\(x-x_0\\)|\\(\\leK\\) на\\([t_0-h,t_0+h]\\)в себя. Если f липшицева с константой L, то повторные разности итераций получают вложенные интегралы с ядром |t-s|; отсюда по индукции получается факториальная оценка вида ||\\(x_n-x_{n-1}\\)||\\(\\leC (Lh^2)^n/(2n)\\)! с некоторой константой C, зависящей от первого шага. Ряд приращений сходится равномерно, поэтому итерации сходятся к непрерывной функции x. Переход к пределу под интегралом разрешен равномерной сходимостью и непрерывностью f; предельная функция удовлетворяет интегральному уравнению, а значит и исходной задаче Коши.",
      "status": "ai_checked"
    }
  ],
