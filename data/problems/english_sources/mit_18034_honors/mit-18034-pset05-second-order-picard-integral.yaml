      "id": "idea-main",
      "title": "Дважды проинтегрировать правую часть",
      "text": "Для второго порядка роль интегрального оператора Пикара играет оператор с ядром t-s. Это тот же метод, но вместо перехода к системе первого порядка используется явная формула для решения \\(x''=F(t).\\)",
      "status": "ai_checked",
