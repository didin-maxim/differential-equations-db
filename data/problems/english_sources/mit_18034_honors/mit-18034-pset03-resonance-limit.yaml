        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(\\omega>0, \\omega_0 \\ne \\omega\\) и \\(\\omega_0\\) близко к \\(\\omega.\\) Для уравнения\\(y''+\\omega^2 y=\\sin(\\omega_0 t)\\)рассмотрим частное решение\\(y_2(t)=(\\sin(\\omega_0 t)-\\sin(\\omega t))/(\\omega^2-\\omega_0^2),\\)у которого начальные данные остаются конечными при \\(\\omega_0 \\to \\omega.\\) Найти предел\\(y_2\\)и проверить, что он дает частное решение резонансного уравнения\\(y''+\\omega^2 y=\\sin(\\omega t).\\)",
