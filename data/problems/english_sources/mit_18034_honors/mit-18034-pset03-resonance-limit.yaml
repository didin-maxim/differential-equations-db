  "ideas": [
    {
      "id": "idea-main",
      "title": "Убрать сингулярную часть перед предельным переходом",
      "text": "Обычное частное решение имеет знаменатель omega^2-omega0^2 и взрывающуюся производную в нуле. Вычитание однородного решения sin(omega t)/(omega^2-omega0^2) оставляет семейство с конечными начальными данными, а резонансный множитель t появляется как производная по параметру.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "resonance_ansatz"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для omega0 != omega функция y2 является частным решением, потому что sin(omega0 t)/(omega^2-omega0^2) дает правую часть sin(omega0 t), а sin(omega t)/(omega^2-omega0^2) является решением однородного уравнения. При omega0 -> omega числитель и знаменатель стремятся к нулю. По правилу Лопиталя по параметру omega0 получаем lim y2(t)=lim (t cos(omega0 t))/(-2 omega0)=-t cos(omega t)/(2 omega). Проверка прямая: если yp=-t cos(omega t)/(2 omega), то yp''+omega^2 yp=sin(omega t). Значит резонансное частное решение возникает как предел правильно нормированных нерезонансных частных решений.",
      "status": "ai_checked"
    }
  ],
