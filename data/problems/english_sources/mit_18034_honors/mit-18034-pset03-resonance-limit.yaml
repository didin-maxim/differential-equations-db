        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть omega>0, omega0 != omega и omega0 близко к omega. Для уравнения y''+omega^2 y=sin(omega0 t) рассмотрим частное решение y2(t)=(sin(omega0 t)-sin(omega t))/(omega^2-omega0^2), у которого начальные данные остаются конечными при omega0 -> omega. Найти предел y2 и проверить, что он дает частное решение резонансного уравнения y''+omega^2 y=sin(omega t).",
