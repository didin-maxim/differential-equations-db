  "ideas": [
    {
      "id": "idea-main",
      "title": "Отделить растущую координату от вращательной плоскости",
      "text": "Вторая координата сама равна \\(b e^t,\\) поэтому периодичность сразу требует \\(b=0.\\) На инвариантной плоскости\\(y_2=0\\)оставшаяся система имеет чисто мнимые собственные значения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из\\(y_2'=y_2\\)получаем \\(y_2(t)=b e^t.\\) Периодическая функция такого вида возможна только при \\(b=0.\\) Если \\(b=0,\\) то плоскость\\(y_2=0\\)инвариантна, и оставшиеся координаты удовлетворяют системе \\(z' = Bz,\\) где\\(z=(y_1,y_3)^T, B=[[1,-2],[1,-1]].\\)У этой матрицы \\(tr B=0\\) и \\(det B=1,\\) поэтому характеристический многочлен \\(\\lambda^2+1,\\) а\\(B^2=-I.\\)Следовательно \\(e^{Bt}=I\\cos t+B\\sin t,\\) и каждое решение на этой плоскости \\(2\\pi-\\)периодично. Значит все и только начальные векторы вида (a,0,c), где a и c произвольны, дают периодические решения.",
      "status": "ai_checked"
    }
  ],
