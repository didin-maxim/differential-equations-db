        "title": "Формулировка",
        "text": "Для системы\\(y_1'=y_1-2y3,y_2'=y_2,y_3'=y_1-y_2-y_3\\)найти все начальные векторы (a,b,c), при которых решение с \\(y(0)=(a,b,c)\\) периодично по t.",
