  "ideas": [
    {
      "id": "idea-main",
      "title": "Использовать автономность и формулу конечных приращений",
      "text": "Если в предельной точке поле ненулевое, одна координата продолжала бы монотонно уходить, что несовместимо со сходимостью. Локальная линейная часть получается из интегральной формы формулы Лагранжа.",
