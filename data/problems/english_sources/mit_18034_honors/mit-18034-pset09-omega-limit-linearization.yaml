  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть, например\\(, f(x_1,y_1)<0.\\)Тогда по непрерывности найдутся \\(\\alpha>0\\) и окрестность предельной точки, где \\(f<-\\alpha.\\) Для всех достаточно больших t траектория лежит в этой окрестности, значит \\(x'(t)<-\\alpha\\) и \\(x(t)\\le-\\alpha t+C,\\) что противоречит сходимости x(t) к конечному\\(x_1.\\)Если\\(f(x_1,y_1)>0,\\)тем же рассуждением \\(x(t)\\ge\\alpha t+C\\) и снова нет конечного предела. Если\\(g(x_1,y_1)<0\\)или\\(g(x_1,y_1)>0,\\)противоречие получается для координаты y(t). Поэтому\\(f(x_1,y_1)=g(x_1,y_1)=0.\\)Для второй части перенесем критическую точку в начало. По формуле Ньютона-Лейбница вдоль отрезка от 0 до (x,y) имеем \\(f(x,y)=\\int_0^1 [f_x(sx,sy)x+f_y(sx,sy)y]\\,ds.\\) Значит \\(f=a(x,y)x+b(x,y)y,\\) где \\(a=\\int_0^1 f_x(sx,sy)\\,ds, b=\\int_0^1 f_y(sx,sy)\\,ds.\\) Так же \\(g=c(x,y)x+d(x,y)y,\\) где \\(c=\\int_0^1 g_x(sx,sy)\\,ds, d=\\int_0^1 g_y(sx,sy)\\,ds.\\) Непрерывность частных производных дает \\(a\\tof x(0,0), b\\tof y(0,0), c\\tog x(0,0), d\\tog y(0,0)\\) при \\((x,y)\\to0.\\) После обратного сдвига получаем требуемую локальную запись около\\((x_0,y_0).\\)",
      "status": "ai_checked"
    }
  ],
