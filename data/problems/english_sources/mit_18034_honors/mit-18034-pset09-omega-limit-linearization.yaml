        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(x'=f(x,y), y'=g(x,y),\\) где f и g непрерывно дифференцируемы. (a) Если решение имеет конечный предел \\((x(t),y(t))\\to(x_1,y_1)\\)при \\(t\\to+\\infty,\\) доказать, что\\((x_1,y_1) -\\)критическая точка. (b) Показать, что в окрестности критической точки\\((x_0,y_0)\\)система записывается как производная вектора\\((x-x_0,y-y_0)\\)равна матрице с коэффициентами a,b,c,d, умноженной на этот вектор, причем эта матрица стремится к якобиану поля в точке.",
