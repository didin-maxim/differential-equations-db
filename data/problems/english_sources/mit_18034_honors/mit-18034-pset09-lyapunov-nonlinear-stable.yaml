  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Линеаризация в нуле имеет вид \\(x'=y, y'=0.\\) Ее решения: \\(y(t)=b, x(t)=a+bt.\\) При \\(b \\ne 0\\) они уходят сколь угодно далеко, поэтому линейная система неустойчива. Для нелинейной системы возьмем\\(E(x,y)=x^4+2y^2.\\) Она положительно определена и стремится к нулю вместе с (x,y). Вдоль решений\\(E'=4x^3(y-x^3)+4y(-x^3)=-4x^6\\le0.\\) Значит \\(E(t)\\le E(0).\\) Для любого eps>0 можно выбрать \\(\\delta>0\\) так, что |(x,y)|\\(<\\delta\\) влечет\\(E(x,y)<min_{\\)|(u,v)|\\(=eps} E(u,v).\\) Тогда решение, начавшееся в \\(\\delta-\\)окрестности, не может достичь окружности радиуса eps, потому что там E не меньше указанного положительного минимума, а E не возрастает. Следовательно равновесие устойчиво по Ляпунову, хотя линейное приближение неустойчиво.",
      "status": "ai_checked"
    }
  ],
