        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Для задачи Коши\\(x'=f(t,x), x(t_0)=x_0\\)пусть f непрерывна, липшицева по x с константой L в прямоугольнике |\\(t-t_0\\)|\\(\\leT,\\) |\\(x-x_0\\)|\\(\\leK,\\) и |f(t,x)|\\(\\leM.\\) Пусть точное решение x и итерации Пикара xn существуют на одном и том же промежутке |\\(t-t_0\\)|\\(\\leT.\\) Доказать оценку |x(t)-xn(t)|\\(\\leM_L^n T^{n+1}e^{LT}/(n+1)\\)!.",
        "source_ids": [
          "src-mit-18034-honors-ode"
        ],
        "status": "ai_checked",
