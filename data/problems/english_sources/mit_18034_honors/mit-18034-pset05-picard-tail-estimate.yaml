      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Оценить хвост ряда последовательных приближений",
      "text": "Разность точного решения и n-й итерации равна хвосту телескопического ряда по приращениям\\(xk-x_{k-1}.\\)Каждое следующее приращение получает дополнительный интеграл и фактор L.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_iteration"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Итерации Пикара задаются формулой \\(x_{k+1}(t)=x_0+\\int_{t_0}^t f(s,x_k(s))\\,ds.\\) Сначала |\\(x_1(t)-x_0\\)|\\(\\leM\\)|\\(t-t_0\\)|. По индукции из липшицевости следует |\\(x_k(t)-x_{k-1}(t)\\)|\\(\\leM_L^{k-1}\\)|\\(t-t_0\\)|\\(^k/k\\)! для \\(k\\ge1\\): каждый шаг добавляет интеграл от предыдущей оценки. Так как x является пределом итераций\\(, x-x_n=\\sum_{k=n+1}^\\infty (x_k-x_{k-1}).\\) Поэтому при |\\(t-t_0\\)|\\(\\leT\\) имеем \\(\\)|\\(x(t)-x_n(t)\\)|\\(\\le \\sum_{k=n+1}^\\infty M L^{k-1}T^k/k\\)!\\). Для \\(k=n+1+j\\) используем (n+1+j)!\\(\\ge(n+1)\\)! j!, получаем хвост \\(\\le M L^n T^{n+1}/(n+1)\\)!\\(\\sum_{j=0}^\\infty (LT)^j/j\\)! \\(= M L^n T^{n+1}e^{LT}/(n+1)\\)!\\).",
      "status": "ai_checked"
    }
  ],
