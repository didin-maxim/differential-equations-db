        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Для t>0 рассмотрим систему\\(y_1'=(-2/t)y_1+(4/t^2)y_2,y_2'=-2y1+(5/t)y_2.\\)Показать, что каждая компонента решения удовлетворяет уравнению\\((t^2 \\varphi'+2t \\varphi)'=-8\\varphi+5(t \\varphi'+2\\varphi),\\)и найти фундаментальную матрицу системы.",
