    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из первого уравнения получаем\\(4y2=t^2 y_1'+2t y_1.\\)Дифференцируем это равенство и используем второе уравнение:\\((t^2 y_1'+2t y_1)'=4y2'= -8y1+(20/t)y_2 = -8y1+5(t y_1'+2y1).\\)Значит\\(y_1\\)удовлетворяет указанному уравнению. После раскрытия скобок оно упрощается до\\(t^2 \\varphi''-t \\varphi'=0,\\)поэтому\\(\\varphi=A+B_t^2.\\) Для\\(\\varphi=y_1\\)вторая координата равна\\(y_2=(t^2 \\varphi'+2t \\varphi)/4=A_t/2+B t^3.\\) Берем две независимые пары: при \\(A=2,B=0\\) получаем\\((y_1,y_2)=(2,t),\\)а при \\(A=0,B=1\\) получаем\\((t^2,t^3).\\) Следовательно фундаментальная матрица может быть выбрана как\\(X(t)=[[2,t^2],[t,t^3]],\\) ее определитель равен\\(t^3\\)и не обращается в нуль при t>0. Для\\(y_2\\)аналогичный скалярный вывод получается тем же исключением\\(y_1.\\)",
      "status": "ai_checked"
    }
  ],
