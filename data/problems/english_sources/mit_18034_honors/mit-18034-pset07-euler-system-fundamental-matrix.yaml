      "id": "idea-main",
      "title": "Исключить одну координату",
      "text": "Первое уравнение выражает\\(y_2\\)через\\(y_1\\)и\\(y_1'.\\)Подстановка во второе уравнение дает скалярное уравнение Эйлера, после чего вторая координата восстанавливается алгебраически.",
      "status": "ai_checked",
