      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Дифференцируем u=r sin theta: u'=r' sin theta+r theta' cos theta. Но по определению u'=r cos theta, значит r' sin theta+r theta' cos theta=r cos theta. Дифференцируем u'=r cos theta и используем уравнение u''=-p u'-q u: r' cos theta-r theta' sin theta=-p r cos theta-q r sin theta. Решая эту линейную систему относительно theta' и r'/r, получаем theta'=cos^2 theta+p sin theta cos theta+q sin^2 theta и r'/r=-p cos^2 theta+(1-q)sin theta cos theta. Если квадратичная форма по (cos theta,sin theta) равномерно положительна на рассматриваемом луче, угол растет неограниченно, и решение имеет бесконечно много нулей. Если q<0 и у ненулевого решения были бы два соседних нуля alpha<beta, то на (alpha,beta) оно имело бы постоянный знак. Пусть u>0. В точке внутреннего положительного максимума u'=0, u''<=0, но из уравнения u''=-q u>0, противоречие. Для u<0 применяем тот же довод к -u. Значит при q<0 два соседних нуля невозможны, то есть решение неосциллирует.",
      "status": "ai_checked"
    }
  ],
