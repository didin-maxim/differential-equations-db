  "ideas": [
    {
      "id": "idea-main",
      "title": "Считать нули через вращение фазового угла",
      "text": "Нуль решения соответствует sin theta=0. Поэтому осцилляционные утверждения можно получать из скорости вращения theta, а не из явной формулы решения.",
      "status": "ai_checked",
      "standard_idea_ids": [
