        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Для уравнения u''+p(t)u'+q(t)u=0 ввести полярные переменные u=r sin theta, u'=r cos theta. Вывести уравнения для theta и r. Объяснить, как знак квадратичной формы theta'=cos^2 theta+p(t)sin theta cos theta+q(t)sin^2 theta дает критерии вращения угла и неосцилляции; в частности q(t)<0 запрещает два соседних нуля ненулевого решения.",
