  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "В области xy != 0 положим H=(x^3+y^3)/(xy). Обозначим N=x^3+y^3 и D=xy. Тогда N'=3x^2x'+3y^2y'=3x^3(2y^3-x^3)-3y^3(2x^3-y^3)=3(y^6-x^6). Кроме того, D'=x'y+xy'=xy((2y^3-x^3)+(-2x^3+y^3))=3xy(y^3-x^3). Поэтому H'=(N'D-ND')/D^2. Но y^6-x^6=(y^3-x^3)(y^3+x^3)=N(y^3-x^3), так что числитель равен нулю. Следовательно H сохраняется вдоль траекторий. Уровень H=3c эквивалентен x^3+y^3-3cxy=0. Оси x=0 и y=0 также инвариантны, потому что соответствующие правые части содержат множители x и y.",
      "status": "ai_checked"
    }
  ],
