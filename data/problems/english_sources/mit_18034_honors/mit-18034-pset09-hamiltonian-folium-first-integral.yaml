        "title": "Формулировка",
        "text": "Показать, что траектории автономной системы x'=x(2y^3-x^3), y'=-y(2x^3-y^3) в областях xy != 0 лежат на кривых x^3+y^3-3cxy=0, где c - постоянная. Объяснить, почему это является задачей на первый интеграл.",
