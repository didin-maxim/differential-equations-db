  "ideas": [
    {
      "id": "idea-main",
      "title": "Применить Гронуолла к положительной части разности",
      "text": "Полного двустороннего условия Липшица не требуется: когда f-g положительна, односторонняя оценка дает \\((f-g)'\\leL(f-g).\\) То же верно для положительной части g-f.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим \\(h=f-g.\\) В тех точках, где h>0, имеем \\(h'=F(x,f)-F(x,g)\\leL(f-g)=Lh.\\) Значит верхняя правая производная положительной части\\(h_+=max(h,0)\\)удовлетворяет\\(D^+h_+\\leL h_+.\\)По неравенству Гронуолла \\(h_+(x)\\le e^{L(x-a)}h_+(a).\\) Применяя тот же аргумент к g-f, получаем \\((-h)_+(x)\\le e^{L(x-a)}(-h)_+(a).\\) Так как |h|\\(=h_++(-h)_+,\\)отсюда следует \\(\\)|f(x)-g(x)|\\(\\le e^{L(x-a)}\\)|f(a)-g(a)|\\). В частности, одинаковые начальные данные дают совпадение решений вправо от a.",
      "status": "ai_checked"
    }
  ],
