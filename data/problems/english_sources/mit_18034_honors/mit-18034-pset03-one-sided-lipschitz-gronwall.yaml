        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f(x) и g(x) - решения уравнения \\(y'=F(x,y)\\) в области, где для\\(y_1<y_2\\)выполнено одностороннее условие Липшица\\(F(x,y_2)-F(x,y_1)\\leL(y_2-y_1).\\)Доказать, что при x>a выполняется |f(x)-g(x)|\\(\\lee^{L(x-a)}\\) |f(a)-g(a)|.",
