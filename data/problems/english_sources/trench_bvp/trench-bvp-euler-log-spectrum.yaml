  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "При lambda=0 получаем y=c1 log x+c2, и условия y(1)=y(2)=0 дают c1=c2=0. При lambda=-k^2<0 решения имеют вид c1 x^k+c2 x^{-k}; из условий в 1 и 2 получается невырожденная система, поэтому нет ненулевого решения. При lambda=k^2>0 решения имеют вид c1 cos(k log x)+c2 sin(k log x). Условие y(1)=0 дает c1=0, потому что log 1=0. Условие y(2)=0 требует sin(k log 2)=0, то есть k log 2=n pi, n=1,2,... Поэтому lambda_n=(n pi/log 2)^2, а собственные функции можно взять y_n(x)=sin(n pi log x/log 2).",
      "status": "ai_checked",
