    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Краевые условия убивают вронскиан на концах",
      "text": "Интегрирование по частям оставляет только p(uv'-u'v) на концах; два решения одного линейного краевого условия делают этот определитель нулевым.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Вычислим: \\(\\int_a^b [u(pv')'-v(pu')']\\,dx\\) = p(uv'-u'v)|_a^b, поскольку интегралы с p u'v' сокращаются. Члены q в выражении uLv-vLu тоже сокращаются. На левом конце пары (u(a),u'(a)) и (v(a),v'(a)) обе лежат в одном одномерном подпространстве, заданном \\(\\alpha z+\\beta z'=0\\); значит их определитель uv'-u'v в точке a равен нулю. То же верно в точке b для второго краевого условия. Поэтому весь краевой член равен нулю.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant"
      ]
    }
  ],
