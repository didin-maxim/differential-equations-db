        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть L[y]=(p(x)y')'+q(x)y. Если дважды непрерывно дифференцируемые функции u и v удовлетворяют одним и тем же однородным разделенным краевым условиям B1(y)=0, B2(y)=0, то \\(\\int_a^b (uLv-vLu)\\,dx=0\\).",
