  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Пусть y - собственная функция. Умножим уравнение на y и проинтегрируем: int y(p y')' dx+lambda int r y^2 dx=0. Интегрирование по частям дает [p y y']_a^b-int p(y')^2 dx+lambda int r y^2 dx=0. Для всех четырех перечисленных типов условий произведение y y' зануляется на каждом конце, поэтому lambda int r y^2 dx=int p(y')^2 dx. Так как y не тождественно нуль и r>0, знаменатель положителен, значит lambda>=0. Если lambda=0, то int p(y')^2=0, откуда y'=0 и y - постоянна. Постоянная ненулевая функция удовлетворяет только условиям Нейман-Нейман; при наличии условия Дирихле она равна нулю на соответствующем конце и потому тождественно равна нулю.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral"
      ]
    }
