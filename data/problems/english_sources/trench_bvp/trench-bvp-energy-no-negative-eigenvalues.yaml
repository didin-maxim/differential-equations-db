        "title": "Формулировка",
        "text": "Пусть p(x)>0 и r(x)>0 на [a,b]. Для задач (p y')'+lambda r y=0 с условиями Дирихле-Дирихле, Нейман-Нейман или смешанными Дирихле-Нейман/Нейман-Дирихле доказать, что отрицательных собственных значений нет. Кроме того, lambda=0 является собственным значением только для задачи Нейман-Нейман, где собственная функция постоянна.",
