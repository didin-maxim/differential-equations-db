        "title": "Задача",
        "text": "Для краевой задачи \\(y''+y=F(x), y(0)=y(\\pi)=0\\) найти необходимое и достаточное условие разрешимости. Объяснить, почему при \\(F=1\\) решений нет, а при \\(F=\\sin 2x\\) решений бесконечно много.",
