  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Однородное уравнение \\(y''+y=0\\) имеет решения \\(\\sin x\\) и \\(\\cos x,\\) но краевые условия Дирихле выполняет только ненулевая мода \\(\\sin x.\\) По резонансной альтернативе условие совместности имеет вид \\(\\int_0^\\pi F(x)\\sin x\\,dx=0.\\) Если \\(F=1,\\) интеграл равен 2, значит решений нет. Если \\(F=\\sin 2x,\\) то \\(\\int_0^\\pi \\sin 2x\\sin x\\,dx=2\\int_0^\\pi \\sin^2 x\\cos x\\,dx=0,\\) поэтому решения существуют. Так как \\(\\sin x\\) лежит в ядре однородной краевой задачи, вместе с одним решением\\(y_0\\)все функции\\(y_0+C \\sin x\\)тоже являются решениями; следовательно, решений бесконечно много.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
