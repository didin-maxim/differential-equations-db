  "ideas": [
    {
      "id": "idea-main",
      "title": "Правая часть должна быть ортогональна резонансной моде",
      "text": "Однородная задача имеет собственную функцию \\(\\sin x,\\) поэтому совместность неоднородной задачи проверяется одним интегралом против \\(\\sin x.\\)",
      "status": "ai_checked",
