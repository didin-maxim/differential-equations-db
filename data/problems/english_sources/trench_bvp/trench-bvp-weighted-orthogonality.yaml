  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Имеем Lu=-lambda1 r u и Lv=-lambda2 r v. По тождеству Грина int_a^b (uLv-vLu)dx=0, поскольку u и v удовлетворяют тем же однородным краевым условиям. Подставляя выражения для Lu и Lv, получаем (lambda1-lambda2) int_a^b ruv dx=0. Так как собственные значения различны, весовой скалярный продукт равен нулю.",
      "status": "ai_checked"
    }
  ],
