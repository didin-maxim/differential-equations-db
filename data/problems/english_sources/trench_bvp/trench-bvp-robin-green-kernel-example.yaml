  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Подобрать по одному решению на каждый конец",
      "text": "Фундаментальные решения \\(\\cos x\\) и \\(\\sin x\\) надо линейно скомбинировать так, чтобы\\(y_1\\)удовлетворяло левому условию, а \\(y_2 -\\)правому.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Для однородного уравнения берем \\(\\cos x\\) и \\(\\sin x.\\) Левому условию удовлетворяет\\(y_1=\\cos x-\\sin x,\\)потому что\\(y_1(0)+y_1'(0)=1-1=0.\\)Правому условию удовлетворяет\\(y_2=\\cos x+\\sin x,\\)потому что\\(y_2(\\pi)-y_2'(\\pi)=-1-(-1)=0.\\) Их вронскиан \\(W=2.\\) Поэтому по формуле Грина \\(y(x)=\\frac{\\cos x-\\sin x}{2}\\int_x^\\pi F(t)(\\cos t+\\sin t)\\,dt+\\frac{\\cos x+\\sin x}{2}\\int_0^x F(t)(\\cos t-\\sin t)\\,dt.\\) Значит \\(G(x,t)=((\\cos t-\\sin t)(\\cos x+\\sin x))/2\\) при \\(0\\le t\\le x\\) и \\(G(x,t)=((\\cos x-\\sin x)(\\cos t+\\sin t))/2\\) при \\(x\\le t\\le\\pi.\\)",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
