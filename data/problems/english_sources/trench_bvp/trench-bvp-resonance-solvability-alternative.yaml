        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть однородная задача L[y]=0, B1(y)=B2(y)=0 имеет ненулевое решение y_1, а y_2 - независимое с ним решение L[y]=0. Тогда для задачи L[y]=F, B1(y)=B2(y)=0 возникает единственное условие совместности \\(\\int_a^b\\) F(t)y_1(t)/(P0(t)W(t)) dt=0. Если оно выполнено, решений бесконечно много и они отличаются добавлением C y_1; если не выполнено, решений нет.",
