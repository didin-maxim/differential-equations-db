  "ideas": [
    {
      "id": "idea-main",
      "title": "Резонанс превращает одно краевое условие в условие на правую часть",
      "text": "Когда ядро однородной краевой задачи ненулевое, параметр при втором фундаментальном решении убивается одним краевым условием, а другое дает ортогональность правой части.",
      "status": "ai_checked",
