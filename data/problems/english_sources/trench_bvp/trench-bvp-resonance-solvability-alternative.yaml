        "variation_of_constants"
      ]
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Та же вариация постоянных строит частное выражение yp. Общее решение неоднородного уравнения имеет вид yp+c1 y_1+c2 y_2. Так как y_1 удовлетворяет обоим краевым условиям, первое краевое условие после подстановки зануляет c2: иначе y_2 тоже удовлетворяло бы этому условию вместе с y_1, что противоречит независимости в нужной краевой постановке. После этого второе краевое условие уже не может быть исправлено добавлением c1 y_1 и превращается ровно в интегральное условие \\(\\int_a^b\\) F y_1/(P0 W)=0. При выполнении условия c1 свободен, поэтому решений бесконечно много; при нарушении условия их нет.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
