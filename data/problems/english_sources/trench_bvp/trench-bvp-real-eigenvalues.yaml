        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Для регулярной задачи Штурма-Лиувилля \\(L[y]+\\lambda r(x)y=0, B1(y)=B2(y)=0\\) с вещественными p,q,r и r>0 комплексное число с ненулевой мнимой частью не может быть собственным значением.",
