  "ideas": [
    {
      "id": "idea-main",
      "title": "Взять мнимую часть энергетического тождества",
      "text": "Если \\(y=u+iv\\) и \\(\\lambda=p+iq,\\) то тождество Грина для u и v зануляет левую часть, а\\(q \\int r(u^2+v^2)\\) заставляет y быть нулем.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Пусть \\(\\lambda=p+iq, q\\) не равно 0, и \\(y=u+iv -\\) собственная функция. Разделяя действительную и мнимую части уравнения, получаем \\(Lu+r(pu-qv)=0\\) и \\(Lv+r(qu+pv)=0.\\) Умножим первое равенство на v, второе на u и вычтем:\\(uLv-vLu+q r(u^2+v^2)=0.\\) Интегрируем по [a,b]. Первый интеграл равен нулю по тождеству Грина, потому что u и v удовлетворяют тем же однородным краевым условиям. Тогда \\(q\\int_a^b r(u^2+v^2)\\,dx=0.\\) Так как q не равно 0 и r>0, имеем \\(u=v=0\\) на [a,b], что противоречит ненулевости собственной функции.",
      "status": "ai_checked"
    }
  ],
