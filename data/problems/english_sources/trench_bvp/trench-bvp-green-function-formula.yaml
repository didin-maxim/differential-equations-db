  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "По вариации постоянных ищем y=u_1 y_1+u_2 y_2 и накладываем стандартное условие u_1' y_1+u_2' y_2=0. Тогда u_1'=-F y_2/(P0 W), u_2'=F y_1/(P0 W). Выбор \\(u_1(x)=\\int_x^b F(t)y_2(t)/(P0(t)W(t))\\,dt\\) и \\(u_2(x)=\\int_a^x F(t)y_1(t)/(P0(t)W(t))\\,dt\\) дает L[y]=F. При x=a оба выражения для y и y' содержат тот же линейный функционал B1 от y_1, потому B1(y)=0. При x=b по той же подстановке остается множитель B2(y_2), значит B2(y)=0. Единственность следует из предположения: разность двух решений решает однородную краевую задачу и поэтому равна нулю.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
