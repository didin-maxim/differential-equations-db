        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть L[y]=P0(x)y''+P1(x)y'+P2(x)y на [a,b], P0 не обращается в нуль, а однородная задача L[y]=0, B1(y)=0, B2(y)=0 имеет только нулевое решение. Пусть y_1,y_2 - решения L[y]=0 такие, что B1(y_1)=0, B2(y_2)=0. Тогда решение задачи L[y]=F, B1(y)=B2(y)=0 задается формулой \\(y(x)=y_1(x)\\int_x^b F(t)y_2(t)/(P0(t)W(t))\\,dt+y_2(x)\\int_a^x F(t)y_1(t)/(P0(t)W(t))\\,dt\\), где W=y_1 y_2'-y_1' y_2. Эквивалентно, \\(y(x)=\\int_a^b G(x,t)F(t)\\,dt\\) с кусочной функцией Грина.",
