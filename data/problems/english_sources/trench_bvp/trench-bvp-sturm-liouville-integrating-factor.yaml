        "title": "Формулировка",
        "text": "Если P0,P1,P2,R непрерывны на [a,b], P0>0 и R>0, то уравнение P0 y''+P1 y'+P2 y+lambda R y=0 можно умножением на положительный множитель привести к виду (p y')'+q y+lambda r y=0 с p>0 и r>0.",
