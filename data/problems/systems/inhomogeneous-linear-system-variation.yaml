  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство",
      "text": "Умножим уравнение слева на \\(e^{-At}\\). Так как d/dt(\\(e^{-At}\\)x)=\\(e^{-At}\\)(x'-Ax), получаем d/dt(\\(e^{-At}\\)x)=\\(e^{-At}\\)b(t). Интегрируя от 0 до t, имеем \\(e^{-At}\\)x(t)-x_0=\\(\\int_0^t\\) \\(e^{-As}\\)b(s)ds. Умножение на \\(e^{At}\\) дает x(t)=\\(e^{At}\\)x_0+\\(\\int_0^t\\) \\(e^{A(t-s)}\\)b(s)ds.",
      "status": "ai_checked"
    }
  ],
