      "title": "Решение",
      "text": "Пишем A=2I+N, где N^2=0 и N=[[0,1],[0,0]]. Тогда exp(At)=e^{2t}exp(Nt)=e^{2t}(I+tN). Поэтому для x(0)=(a,b) получаем x(t)=e^{2t}(a+tb,b).",
