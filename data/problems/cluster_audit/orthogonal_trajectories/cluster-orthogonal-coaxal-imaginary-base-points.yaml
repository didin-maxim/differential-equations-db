        "title": "Формулировка",
        "text": "Рассмотрим пучок окружностей x^2+y^2-2ax+1=0, где a - параметр и берутся действительные окружности. У этого пучка нет действительных общих точек, а вся семья симметрична относительно обеих координатных осей. Найдите его ортогональные траектории и объясните, как этот ответ связан с сопряженным пучком окружностей через две действительные точки.",
