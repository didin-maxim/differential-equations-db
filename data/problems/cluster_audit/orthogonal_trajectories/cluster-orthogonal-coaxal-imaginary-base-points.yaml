  "ideas": [
    {
      "id": "idea-main",
      "title": "Поменять местами действительные и мнимые базовые точки",
      "text": "Пучок x^2+y^2-2ax+1=0 имеет общие точки только в комплексном расширении: (0,i) и (0,-i). Его ортогональный пучок оказывается пучком окружностей через реальные точки (1,0) и (-1,0).",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение через наклон",
      "text": "Дифференцируем x^2+y^2-2ax+1=0: 2x+2yy'-2a=0. Из исходного уравнения a=(x^2+y^2+1)/(2x), поэтому наклон окружностей равен y'=(y^2-x^2+1)/(2xy). Ортогональные траектории должны удовлетворять dy/dx=-2xy/(y^2-x^2+1). Удобнее считать x функцией y: dx/dy=-(y^2-x^2+1)/(2xy). Для u=x^2 получаем du/dy=(u-y^2-1)/y, то есть u'-u/y=-y-1/y. После умножения на 1/y имеем (u/y)'=-1-1/y^2, откуда u/y=-y+1/y+C. Следовательно, x^2+y^2-Cy-1=0, или x^2+y^2-2by-1=0. Это окружности с центрами на оси Oy, проходящие через (1,0) и (-1,0). Итак, непересекающийся действительный пучок и пучок через две реальные точки являются ортогонально сопряженными. В терминологии коаксиальных систем это пара пучков разных типов: один имеет действительные базовые точки, другой - действительные предельные точки и мнимые общие точки.",
      "status": "ai_checked"
    }
  ],
