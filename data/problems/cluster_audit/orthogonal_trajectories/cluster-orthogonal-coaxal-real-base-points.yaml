  "ideas": [
    {
      "id": "idea-main",
      "title": "Сопряженный коаксиальный пучок",
      "text": "Окружности через две фиксированные точки образуют коаксиальный пучок. Ортогональный пучок состоит из окружностей Аполлония для тех же двух точек: на каждой такой окружности отношение расстояний до A и B постоянно.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение через наклон",
      "text": "Центры всех окружностей, проходящих через A и B, лежат на оси Oy, поэтому семейство удобно записать как \\(x^2+y^2-2ay-1=0\\). Дифференцируем при постоянном a: 2x+2(y-a)y'=0. Из исходного равенства \\(a=(x^2+y^2-1)/(2y)\\), значит наклон окружностей равен \\(y'=-2xy/(y^2-x^2+1)\\). Ортогональные траектории должны иметь наклон \\(dy/dx=(y^2-x^2+1)/(2xy)\\). Положим \\(v=y^2\\). Тогда \\(dv/dx=2yy'=(y^2-x^2+1)/x\\), то есть v'-v/x=1/x-x. Умножая на 1/x и интегрируя, получаем v/x=-1/x-x+C. Поэтому \\(x^2+y^2-Cx+1=0\\). В более симметричной записи это \\(x^2+y^2-2bx+1=0\\). Такие окружности имеют центры на оси Ox и, при |b|>1, являются обычными окружностями; при |b|=1 вырождаются в точки A и B. Геометрически это сопряженный коаксиальный пучок: его окружности пересекают исходные окружности под прямым углом.",
      "status": "ai_checked"
    }
  ],
