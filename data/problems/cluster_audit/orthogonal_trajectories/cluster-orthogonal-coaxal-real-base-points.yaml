        "title": "Формулировка",
        "text": "Рассмотрим все окружности, проходящие через две точки A=(1,0) и B=(-1,0). Найдите семейство кривых, которые пересекают каждую такую окружность под прямым углом. Объясните геометрически, что получилось, и проверьте ответ через дифференциальное уравнение для углового коэффициента.",
