  "ideas": [
    {
      "id": "idea-main",
      "title": "Градиенты сумм и разностей расстояний",
      "text": "Нормали к линиям уровня задаются градиентами. Градиент расстояния до фокуса - единичный вектор от фокуса к точке, поэтому градиенты r1+r2 и r1-r2 автоматически перпендикулярны.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Доказательство через уровни",
      "text": "Работаем в точке P=(x,y), не совпадающей с фокусами и лежащей на гладких частях кривых. Пусть e1=grad r1 и e2=grad r2. Это единичные векторы, направленные от F1 к P и от F2 к P, поэтому |e1|=|e2|=1. Нормаль к эллипсу r1+r2=const равна grad(r1+r2)=e1+e2, а нормаль к гиперболе r1-r2=const равна grad(r1-r2)=e1-e2. Их скалярное произведение равно (e1+e2)·(e1-e2)=|e1|^2-|e2|^2=0. Значит нормали к двум линиям уровня перпендикулярны; в плоскости тогда и касательные к этим линиям тоже перпендикулярны. Следовательно, каждый эллипс с фокусами F1,F2 пересекает каждую софокусную гиперболу под прямым углом. Это ровно ортогональная сетка эллиптических координат.",
      "status": "ai_checked"
    }
  ],
