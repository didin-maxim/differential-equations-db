        "title": "Формулировка",
        "text": "Пусть F1=(-1,0), F2=(1,0). Эллипсы задаются уровнями r1+r2=const, а ветви гипербол - уровнями r1-r2=const, где r1 и r2 - расстояния от точки (x,y) до F1 и F2. Докажите без тяжелых вычислений, что софокусные эллипсы и гиперболы пересекаются под прямым углом.",
