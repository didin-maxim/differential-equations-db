      ]
    },
    {
      "id": "idea-geometric-pencils",
      "title": "Пучки окружностей часто лучше узнавать геометрически",
      "text": "Окружности с общим центром дают ортогональные радиальные прямые. Коаксиальный пучок через две действительные точки ортогонален сопряженному пучку окружностей Аполлония; коаксиальный пучок без действительных общих точек меняет роли с пучком через реальные предельные точки. В таких задачах вычисление наклона нужно как проверка, а не как единственный смысл ответа.",
      "status": "ai_checked",
      "definition_ids": [
        "orthogonal_trajectories",
        "direction_field"
      ]
    },
    {
      "id": "idea-confocal-levels",
      "title": "Софокусные коники удобнее доказывать через уровни",
      "text": "Эллипсы \\(r1+r2=const\\) и гиперболы \\(r1-r2=const\\) не требуют развернутого уравнения коники. Их нормали равны \\(grad(r1+r2)=e1+e2\\) и \\(grad(r1-r2)=e1-e2\\), где e1,e2 - единичные векторы от фокусов; скалярное произведение равно нулю. Это короткий путь к ортогональности без тяжелого ответа.",
      "status": "ai_checked",
      "definition_ids": [
        "orthogonal_trajectories"
      ]
    },
    {
      "id": "idea-neighbor-boundaries",
      "title": "Соседние методы определяются главной целью",
      "text": "Если задача просит только восстановить ОДУ данного семейства, это recover-ode-from-family. Если после ортогонального поворота осталось \\(\\,dy/\\,dx=a(x)b(y)\\), это не переносит задачу в separable-homogeneous-first-order: разделение лишь закрывает вычисление. Если ортогональное поле записано полной формой \\(dF=0\\) или требует простого множителя, это связь с exact-forms, но главная цель остается геометрической: найти семейство \\(F=C\\), ортогональное исходному.",
      "status": "ai_checked",
