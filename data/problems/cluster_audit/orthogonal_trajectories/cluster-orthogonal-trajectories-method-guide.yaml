  "solutions": [
    {
      "id": "guide-route",
      "title": "Маршрут решения",
      "text": "1. Записать исходное семейство в форме, где параметр легко исключается, или как линии уровня. 2. Найти касательное поле исходных кривых: дифференцировать при фиксированном параметре, исключить параметр и отметить точки, где деление запрещено. 3. Заменить наклон m на \\(-1/m\\); вертикальные и горизонтальные направления проверять отдельно либо работать через векторы\\(/\\)формы. 4. Решить новое уравнение самым коротким способом: разделение, линейное уравнение для \\(x^2\\) или \\(y^2,\\) точная форма, потенциал уровня или геометрическое распознавание. 5. Записать ответ как семейство кривых и проверить ортогональность в регулярных точках. 6. Не усложнять ответ: если геометрия пучка окружностей или софокусных уровней уже дает семейство, алгебраическая нормальная форма нужна только для контроля.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function",
        "separate_variables"
      ],
      "definition_ids": [
        "ordinary_differential_equation",
        "direction_field",
        "orthogonal_trajectories",
        "separable_equation",
        "exact_equation"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не заменять исходный наклон на отрицательно обратный до исключения параметра: иначе в ответе останется C вместо поля на плоскости. Не делить без проверки на \\(x, y, Phi_y\\) или выражение для наклона: так теряются оси, прямые и вырожденные члены пучка. Не считать всякое разделяющееся уравнение задачей separable-кластера, если оно появилось только после ортогонального поворота. Не разворачивать софокусные коники до громоздких квадратных уравнений, когда градиенты уровней дают ортогональность в одну строку. Не добавлять новые карточки, где меняется только нормировка окружности или параметра, а метод уже покрыт существующим представителем.",
      "status": "ai_checked",
