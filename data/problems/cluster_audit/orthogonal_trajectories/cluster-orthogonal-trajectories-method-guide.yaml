  "ideas": [
    {
      "id": "idea-recover-then-rotate",
      "title": "Сначала восстановить наклон, затем повернуть поле",
      "text": "Для \\(\\Phi(x,y,C)=0\\) дифференцируют \\(Phi_x+Phi_y y'=0\\) при фиксированном C и исключают C. Полученный наклон исходного семейства заменяют на отрицательно обратный. Если удобнее работать с 1-формами, то исходное касательное поле \\(M\\,dx+N\\,dy=0\\) заменяют на ортогональное поле с повернутым направлением, не деля на выражения, которые могут обращаться в нуль.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ],
      "definition_ids": [
        "direction_field",
        "orthogonal_trajectories",
