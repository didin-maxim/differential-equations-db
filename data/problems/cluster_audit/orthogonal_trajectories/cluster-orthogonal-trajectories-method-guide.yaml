        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "В задачах на ортогональные траектории исходно задано семейство кривых \\(\\Phi(x,y,C)=0, y=\\varphi(x,C)\\) или геометрическое описание уровней. Первый шаг совпадает с recover-ode-from-family: дифференцируют исходное семейство при постоянном параметре и исключают параметр, получая наклон исходных кривых \\(y'=f(x,y)\\), либо берут нормаль \\(grad \\Phi\\) для линий уровня. Второй шаг специфичен именно для ортогональных траекторий: в регулярной точке наклон нового семейства равен \\(-1/f(x,y)\\), если f конечен и ненулевой; вертикальные и горизонтальные направления обрабатывают как предельные случаи или через дифференциальную форму, чтобы не потерять оси и вырожденные кривые. После этого решают полученное ОДУ первого порядка: часто оно разделяется, становится линейным после замены \\(u=x^{2}\\) или \\(u=y^{2}\\), либо распознается как точная форма M\\,dx+N\\,dy=0. Однако хорошее решение не обязано превращаться в тяжелую алгебру: для пучков окружностей лучше узнать сопряженный коаксиальный пучок, а для софокусных коник - сравнить градиенты уровней \\(r1+r2\\) и r1-r2. Кластер отделяется от recover-ode-from-family тем, что восстановленное поле наклонов здесь только промежуточно; от separable-homogeneous-first-order тем, что разделение переменных является последним техническим шагом; от integrating-factor-exact-forms тем, что точность формы служит способом интегрировать ортогональное поле, а не самостоятельной целью подбора множителя.",
