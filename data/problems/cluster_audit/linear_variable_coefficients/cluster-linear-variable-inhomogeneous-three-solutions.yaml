  "ideas": [
    {
      "id": "idea-main",
      "title": "Разности частных решений решают однородное уравнение",
      "text": "Если L[y]=f для трех функций, то L[y2-y1]=L[y3-y1]=0. Линейная независимость y1,y2,y3 гарантирует независимость двух разностей, а значит они образуют фундаментальную систему однородного уравнения.",
      "status": "ai_checked",
      "standard_idea_ids": []
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим L[y]=y''+p y'+q y. Так как L[y1]=L[y2]=L[y3]=f, функции u=y2-y1 и v=y3-y1 удовлетворяют L[u]=L[v]=0. Покажем, что u и v линейно независимы. Если alpha u+beta v=0, то alpha y2+beta y3-(alpha+beta)y1=0. Линейная независимость y1,y2,y3 дает alpha=beta=0. Следовательно, u и v образуют фундаментальную систему решений однородного уравнения второго порядка. Одна частная функция уже есть, например y1. Поэтому общее решение неоднородного уравнения имеет вид y=y1+C1(y2-y1)+C2(y3-y1), где C1,C2 - произвольные константы. Эта формула задает все решения, потому что разность любого решения с y1 решает однородное уравнение и потому единственно раскладывается по u,v.",
      "status": "ai_checked",
      "standard_idea_ids": []
    }
