        "title": "Формулировка",
        "text": "Пусть y1,y2,y3 - три линейно независимые функции, и все они являются решениями одного уравнения y''+p(x)y'+q(x)y=f(x) с непрерывными p,q,f на интервале I. Восстановите общее решение этого неоднородного уравнения только через y1,y2,y3.",
