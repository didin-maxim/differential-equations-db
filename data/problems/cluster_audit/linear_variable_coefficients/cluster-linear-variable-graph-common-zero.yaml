        "id": "stmt-original",
        "title": "Формулировка",
        "text": "На рисунке две различные функции u и v имеют общий нуль x0: u(x0)=v(x0)=0. Докажите, что они не могут быть линейно независимыми решениями одного уравнения y''+p(x)y'+q(x)y=0 с непрерывными p,q. Объясните, почему умножение одного из графиков на ненулевую константу не устраняет препятствие.",
        "source_ids": [
          "src-didin-linear-variable-coefficients-audit"
        ],
