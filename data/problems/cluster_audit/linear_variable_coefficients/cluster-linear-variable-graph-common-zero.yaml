  "ideas": [
    {
      "id": "idea-main",
      "title": "Общий нуль сразу зануляет вронскиан",
      "text": "В общей нулевой точке W(u,v)(x0)=u v'-u' v=0. Формула Абеля переводит это в линейную зависимость, а масштабирование сохраняет общий нуль.",
      "status": "ai_checked",
      "standard_idea_ids": []
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Если u и v решают одно и то же уравнение, то их вронскиан удовлетворяет W'=-pW. В точке x0 обе функции равны нулю, поэтому W(x0)=u(x0)v'(x0)-u'(x0)v(x0)=0. Отсюда W тождественно равен нулю на интервале, следовательно u и v линейно зависимы. Значит две различные линейно независимые функции с общим нулем не могут быть парой решений такого уравнения. Если заменить u на c u, где c != 0, общий нуль сохранится и новый вронскиан станет cW, так что тот же аргумент остается без изменений.",
      "status": "ai_checked",
      "standard_idea_ids": []
    }
  ],
