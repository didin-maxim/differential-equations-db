    {
      "id": "guide-proof-route",
      "title": "Как строить доказательство",
      "text": "Доказательство обычно начинается не с интегрирования коэффициентов, а с правильного линейного объекта. Для ФСР доказывают, что отображение решения в начальные данные является изоморфизмом, а затем выбирают базис начальных данных. Для формулы Абеля дифференцируют W и подставляют уравнение, получая W'=-pW. Для понижения порядка подставляют y=u y_1 и используют, что y_1 уже зануляет однородный оператор. Для вариации параметров накладывают C1'y_1+C2'y_2=0, чтобы производные C1,C2 вошли линейной 2x2-системой с определителем W. Для неоднородной структуры доказывают два включения: yp+ker L дает решения L[y]=f, а разность любого решения с yp лежит в ker L. Для графических следствий доказывают противное и получают совпадение начальных данных или W=0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness",
        "wronskian_liouville",
        "variation_of_constants"
      ],
      "definition_ids": [
        "cauchy_problem",
        "linear_independence_solutions",
        "fundamental_system_solutions",
        "wronskian"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя говорить о фундаментальной системе на интервале, где коэффициенты не непрерывны или старший коэффициент зануляется. Нельзя делить на известное решение при редукции порядка без ограничения на промежуток, где оно не равно нулю. Нельзя считать W ненулевым только потому, что решения выглядят разными на рисунке; нужна проверка в одной точке или аргумент через начальные данные. Нельзя добавлять к неоднородному решению произвольную линейную комбинацию частных неоднородных решений: прибавлять можно только решения однородного уравнения. Нельзя переносить методы постоянных коэффициентов на переменные коэффициенты без проверки: характеристический многочлен обычно отсутствует. Нельзя превращать любую задачу о нулях в спектральную задачу Штурма-Лиувилля; собственные значения, ортогональность и функция Грина имеют отдельный кластерный смысл.",
      "status": "ai_checked",
