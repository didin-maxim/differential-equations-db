  "solutions": [
    {
      "id": "guide-method-route",
      "title": "Маршрут выбора метода",
      "text": "1. Нормализовать уравнение на интервале непрерывности: для второго порядка работать с y''+p(x)y'+q(x)y=f(x), для высшего порядка помнить о размерности пространства начальных данных. 2. Если требуется доказать единственность, невозможность касания или простоту нуля, перейти к вектору состояния (y,y') и применить единственность задачи Коши. 3. Если требуется независимость или фундаментальная система, вычислить W в одной удобной точке и применить формулу Абеля-Лиувилля; не искать все решения без нужды. 4. Если дано одно ненулевое решение, положить y=u y_1 и получить уравнение первого порядка для u', либо сразу записать \\(y_2=y_1\\int e^{-\\int p}/y_1^2\\). 5. Если уравнение неоднородное, сначала найти или выделить одно частное решение; все остальные получаются прибавлением общего решения однородного уравнения. 6. Если фундаментальная система дана, использовать вариацию параметров: yp=-y_1 int y_2 f/W + y_2 int y_1 f/W, с фиксированными нижними пределами, а изменение пределов поглощать константами. 7. Если формулировка графическая, перевести рисунок в равенства u(x_0), u'(x_0), общий нуль или W(x_0)=0. 8. Если вопрос о нулях, сначала проверить, достаточно ли леммы Абеля и отношения решений; полноценное сравнение Штурма применять только при порядке коэффициентов и эталонном уравнении.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness",
