      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера linear-equations-variable-coefficients сначала фиксируют рабочий интервал, где коэффициенты непрерывны и старший коэффициент не обращается в нуль, затем приводят уравнение к нормальной форме. Однородную часть читают как конечномерное пространство решений: начальные данные задают решение единственно, фундаментальная система задает базис, а вронскиан контролируется формулой Абеля-Лиувилля. Если одно ненулевое решение известно, порядок понижают через y=u y_1 или формулу второго решения. Если уравнение неоднородное, сначала отделяют одно частное решение и пространство однородных решений; когда фундаментальная система дана, применяют вариацию параметров. В графических задачах касание, общий нуль или экстремум отношения переводят в одинаковые данные Коши или нулевой вронскиан. В задачах о нулях используют простоту нулей, отношение решений и ближайшие следствия Штурма, но спектральные собственные значения и ортогональность оставляют соседним краевым кластерам.",
