  "ideas": [
    {
      "id": "idea-main",
      "title": "Однородность разрешает вертикальное масштабирование решения",
      "text": "Если u является решением однородного линейного уравнения, то c u тоже решение. После масштабирования получаем прямое касание c u и v, а оно запрещено единственностью задачи Коши.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Допустим, u и v являются решениями одного однородного линейного уравнения. По линейности c u также является решением. В точке x_0 функции c u и v имеют одинаковые значение и производную. Их разность z=v-c u решает то же однородное уравнение и имеет z(x_0)=z'(x_0)=0. Единственность линейной задачи Коши дает z тождественно равно нулю. Значит v=c u на всем интервале, что противоречит условию и рисунку. Поэтому искомого уравнения с непрерывными коэффициентами нет.",
      "status": "ai_checked",
