        "id": "stmt-original",
        "title": "Формулировка",
        "text": "На рисунке даны две различные ненулевые функции u и v. В отмеченной точке x_0 выполнено v(x_0)=c u(x_0) и v'(x_0)=c u'(x_0) для некоторого c ≠ 0; пунктиром показан график c u. Докажите, что u и v не могут быть двумя решениями одного уравнения y''+p(x)y'+q(x)y=0 с непрерывными p,q, если v не совпадает с c u.",
        "source_ids": [
