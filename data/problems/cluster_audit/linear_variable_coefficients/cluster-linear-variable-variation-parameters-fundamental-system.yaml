  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Ищем yp=C1 y1+C2 y2 и добавляем стандартное условие C1'y1+C2'y2=0. Тогда yp'=C1 y1'+C2 y2', а yp''=C1'y1'+C2'y2'+C1 y1''+C2 y2''. Подстановка в неоднородное уравнение и использование того, что y1,y2 решают однородное, дает C1'y1'+C2'y2'=f. Поэтому [[y1,y2],[y1',y2']][C1',C2']^T=[0,f]^T. При W=y1 y2'-y1' y2 получаем C1'=-y2 f/W, C2'=y1 f/W. Значит можно взять yp=-y1 int (y2 f/W) dx + y2 int (y1 f/W) dx на любом фиксированном промежутке с выбранной нижней границей. Общее решение равно y=yp+A y1+B y2. Слагаемые от изменения нижних границ поглощаются константами A,B.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
        "wronskian_liouville"
      ]
    }
