  "ideas": [
    {
      "id": "idea-main",
      "title": "Искать частное решение с переменными коэффициентами",
      "text": "Положить yp=C1(x)y1+C2(x)y2, наложить C1'y1+C2'y2=0 и решить систему для C1',C2'. Ненулевой вронскиан фундаментальной системы делает формулу корректной на всем I.",
      "status": "ai_checked",
