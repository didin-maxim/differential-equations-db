        "title": "Формулировка",
        "text": "Пусть p,q,f непрерывны на I, а y1,y2 - фундаментальная система решений уравнения y''+p(x)y'+q(x)y=0. Запишите частное и общее решение неоднородного уравнения y''+p(x)y'+q(x)y=f(x) через y1,y2 и их вронскиан.",
