        "id": "stmt-original",
        "title": "Формулировка",
        "text": "На рисунке изображены две различные функции u и v. В точке x0 их графики касаются: u(x0)=v(x0) и u'(x0)=v'(x0). Докажите, что не существует непрерывных p,q на интервале рисунка, для которых обе функции являются решениями одного уравнения y''+p(x)y'+q(x)y=0.",
        "source_ids": [
