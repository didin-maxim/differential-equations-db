  "ideas": [
    {
      "id": "idea-main",
      "title": "Касание задает одинаковые начальные данные",
      "text": "Для уравнения с непрерывными p,q задача Коши с данными y(x0), y'(x0) единственна. Поэтому две разные функции не могут иметь одинаковую позицию и наклон в одной точке.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Предположим, что такие p,q существуют. Тогда u и v решают одно и то же линейное уравнение в нормальной форме. Рассмотрим w=u-v. Функция w тоже является решением однородного уравнения, причем w(x0)=0 и w'(x0)=0. По единственности задачи Коши для системы (w,w')'=((w'),-q w-p w') с нулевым начальным вектором получаем w тождественно равно нулю на интервале. Это противоречит рисунку, где графики различны. Следовательно, таких непрерывных коэффициентов p,q нет.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ]
    }
