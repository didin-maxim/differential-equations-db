  "ideas": [
    {
      "id": "idea-main",
      "title": "Экстремум отношения зануляет вронскиан",
      "text": "Так как (u/v)'= (u'v-u v')/v^2, внутренний экстремум отношения дает W(u,v)(x_0)=0. Для двух решений одного линейного уравнения это означает линейную зависимость.",
      "status": "ai_checked",
      "standard_idea_ids": []
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Предположим, что u и v решают одно уравнение y''+p y'+q y=0. В точке внутреннего максимума отношения h=u/v имеем h'(x_0)=0. Поскольку v(x_0) ≠ 0, получаем u'(x_0)v(x_0)-u(x_0)v'(x_0)=0, то есть W(u,v)(x_0)=0. По формуле Абеля W'=-pW, поэтому вронскиан, обратившийся в нуль в одной точке, тождественно равен нулю. Тогда u и v линейно зависимы, а для положительных функций это означает u=Cv на интервале. Это противоречит строгому внутреннему максимуму отношения и непостоянству u/v. Следовательно, общей линейной ОДУ с такими графиками не существует.",
      "status": "ai_checked",
      "standard_idea_ids": []
    }
