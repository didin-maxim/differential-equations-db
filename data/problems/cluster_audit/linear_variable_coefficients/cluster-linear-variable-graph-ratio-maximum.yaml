        "title": "Формулировка",
        "text": "На рисунке функции u и v положительны на рассматриваемом интервале, не пропорциональны, а отношение u/v имеет строгий внутренний максимум в точке x_0. Докажите, что u и v не могут быть двумя решениями одного уравнения y''+p(x)y'+q(x)y=0 с непрерывными p,q.",
        "source_ids": [
