  "solutions": [
    {
      "id": "guide-route-find-h",
      "title": "Маршрут поиска первого интеграла",
      "text": "1. Записать систему в виде \\(x'=P(x,y), y'=Q(x,y)\\) и область, где P,Q и предполагаемый H определены. 2. Если известна геометрия уровней, переписать ее как \\(H(x,y)=C\\) и проверить \\(H_x P+H_y Q=0. 3\\). Если H не дан, рассмотреть дифференциальное уравнение траекторий \\(\\,dy/\\,dx=Q/P\\) на участках P ≠ 0 или форму \\(Q\\,dx-P\\,dy=0\\); точность или интегрирующий множитель дают H. 4. Для гамильтонова вида проверить \\(P=H_y, Q=-H_x\\) или подобрать потенциал по этим равенствам. 5. Для второго порядка \\(x''=f(x)\\) перейти к \\(v=x'\\) и умножить исходное уравнение на x', чтобы получить энергию. 6. После нахождения H обязательно проверить \\(Hdot=0\\) прямой подстановкой, потому что похожая формула может быть только кандидатом.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral"
      ],
      "definition_ids": [
        "first_integral",
        "integral_curve"
      ]
    },
    {
      "id": "guide-route-phase-curves",
      "title": "Маршрут чтения фазовых кривых",
      "text": "1. Найти равновесия \\(F(z)=0\\): они являются точечными фазовыми траекториями. 2. На регулярных уровнях \\(H=C\\) выделить связные компоненты; каждая ненулевая траектория остается в одной такой компоненте. 3. Проверить, не содержит ли уровень особых точек, самопересечений, инвариантных прямых или сепаратрис. 4. Если компонент уровня компактна, гладкая и не содержит равновесий, движение по ней периодично. 5. Если уровни около равновесия образуют вложенные замкнутые кривые, использовать их как барьеры для устойчивости. 6. Если уровень некомпактен или подходит к седлу, не делать вывода о центре без отдельного анализа.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral",
        "state_vector_uniqueness"
      ],
      "definition_ids": [
        "phase_trajectory",
        "equilibrium",
        "lyapunov_stability"
      ]
    },
    {
      "id": "guide-route-stability",
      "title": "Маршрут связи с устойчивостью",
      "text": "1. Если H имеет строгий локальный минимум или максимум в равновесии и малые уровни замкнуты, равновесие устойчиво по Ляпунову. 2. Если рядом есть ненулевые замкнутые уровни \\(H=C\\), асимптотической устойчивости нет: H сохраняется и не может стремиться к \\(H(O)\\), если начальное значение другое. 3. Для доказательства асимптотической устойчивости искать не первый интеграл, а функцию Ляпунова с отрицательной производной вдоль поля или другой механизм притяжения. 4. В задачах с демпфированием энергия обычно уже не первый интеграл, а монотонная функция Ляпунова; это соседний энергетический метод, а не та же фазовая геометрия.",
      "status": "ai_checked",
