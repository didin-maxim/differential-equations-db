      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для автономной системы на плоскости \\(z'=F(z), z=(x,y)\\), первый интеграл H ищут как функцию, постоянную вдоль поля: \\(dH/\\,dt=grad H(z) dot F(z)=H_x P+H_y Q=0\\). Если H уже предложен, главная проверка состоит именно в этом равенстве, а не в решении системы. Если H надо найти, используют вид поля: у гамильтонова поля \\(x'=H_y, y'=-H_x\\) интеграл виден по скрещенным производным; для уравнения второго порядка \\(x''+V'(x)=0\\) переходят к системе \\(x'=v, v'=-V'(x)\\) и получают энергию \\(E=v^2/2+V(x)\\); для однородных, рациональных или симметричных систем пробуют отношение \\(\\,dy/\\,dx=Q/P\\) и ищут уровень \\(H(x,y)=C\\). Регулярная фазовая траектория лежит в компоненте уровня \\(H=C\\); равновесия и сепаратрисы появляются на особых уровнях, где поле зануляется или уровень перестает быть гладкой замкнутой кривой. Если около изолированного равновесия уровни H замкнуты и вложены, они дают центр и устойчивость по Ляпунову, но не асимптотическую устойчивость: ненулевая траектория сохраняет H и не может стремиться к равновесию. Поэтому первый интеграл надо отличать от функции Ляпунова: у первого интеграла производная вдоль поля равна нулю, а у функции Ляпунова знак производной используется для удержания или притяжения.",
