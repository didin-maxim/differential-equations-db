      "text": "Регулярный уровень \\(H=C\\) может иметь несколько компонент; отдельная фазовая траектория лежит в одной компоненте, а не во всем множестве уровня. Особые уровни надо разбирать отдельно: там находятся равновесия, сепаратрисы, инвариантные оси или самопересечения уровня.",
