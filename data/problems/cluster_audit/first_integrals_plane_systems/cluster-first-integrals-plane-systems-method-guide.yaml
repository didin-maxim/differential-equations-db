    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не считать весь уровень \\(H=C\\) одной траекторией, если он распадается на несколько компонент. Не игнорировать точки, где \\(P=0\\) при переходе к \\(\\,dy/\\,dx=Q/P\\). Не объявлять замкнутый уровень периодической траекторией, если на нем есть равновесие. Не выводить асимптотическую устойчивость из \\(Hdot=0\\). Не добавлять новую карточку в кластер только из-за новой первообразной \\(V(x)\\): если вывод снова состоит в \\(E'=0\\) и овалах энергии, это дубль уже представленного метода.",
