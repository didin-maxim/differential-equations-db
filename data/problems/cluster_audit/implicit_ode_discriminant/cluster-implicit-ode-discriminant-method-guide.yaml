  "solutions": [
    {
      "id": "guide-method-route",
      "title": "Маршрут разбора",
      "text": "1. Записать p=y' и F(x,y,p)=0, не деля на выражения, которые могут обратиться в нуль. 2. Найти регулярные области: если F_p ≠ 0, локально разрешить p=f_i(x,y) и работать с каждой ветвью как с обычным уравнением y'=f_i(x,y). 3. Найти дискриминант из F=0 и F_p=0; спроектировать его на (x,y), отметив, является ли компонента графиком y=phi(x). 4. Проверить статус каждой дискриминантной компоненты: вычислить phi'(x) и подставить F(x,phi(x),phi'(x)); для вертикальных компонент сразу отметить, что это не решение в классе функций y(x). 5. Если есть общее семейство Phi(x,y,C)=0, найти огибающую через Phi=0, Phi_C=0 и сверить ее с дискриминантом и исходным уравнением. 6. Для Клеро и Лагранжа после дифференцирования отделить регулярное семейство от особых кривых, не теряя ветви p=const и вырожденные значения параметра. 7. В задаче Коши явно указать, сколько регулярных ветвей проходит через точку и попадает ли точка на дискриминант; только после этого говорить о существовании, единственности или ветвлении.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "implicit_function_theorem",
