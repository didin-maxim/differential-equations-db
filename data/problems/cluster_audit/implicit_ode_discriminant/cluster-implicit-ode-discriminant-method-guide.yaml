        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для неразрешенного уравнения первого порядка F(x,y,p)=0, p=y', сначала рассматривают поверхность F=0 в пространстве (x,y,p). В регулярной точке F_p ≠ 0 по теореме о неявной функции выбирают ветвь p=f_i(x,y) и получают обычное поле направлений; задача Коши на такой ветви разбирается стандартной теорией существования и единственности. Дискриминантное множество получают из F=0, F_p=0 и проектируют на плоскость (x,y): там ветви могут сливаться, менять число или терять локальную единственность. Однако дискриминантная кривая сама является решением только после отдельной проверки: если она задается y=phi(x), нужно подставить p=phi'(x) в исходное F(x,phi,phi')=0; вертикальная или не являющаяся графиком компонента не является решением y(x). Особые решения часто возникают как огибающие общего семейства интегральных кривых, но не всякий дискриминант есть огибающая и не всякая огибающая появляется без проверки исходного уравнения. Уравнения Клеро y=xp+g(p) и Лагранжа y=x f(p)+g(p) служат стандартными моделями: дифференцирование по x отделяет ветвь p=const или уравнение для x(p) от особых кривых и огибающих.",
