    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя считать F=0, F_p=0 готовым особым решением: это только дискриминантный кандидат. Нельзя применять Пикара-Линделефа к F(x,y,y')=0 без выбора регулярной ветви p=f(x,y). Нельзя забывать, что разные корни по p дают разные поля направлений даже в одной точке (x,y). Нельзя отбрасывать множители при дифференцировании уравнений Клеро и Лагранжа: именно отброшенный множитель часто дает особую кривую. Нельзя объявлять вертикальную дискриминантную прямую решением для функции y(x). Нельзя добавлять в кластер очередной коэффициентный вариант Клеро, если он не меняет статус дискриминанта, ветвление или проверку задачи Коши.",
