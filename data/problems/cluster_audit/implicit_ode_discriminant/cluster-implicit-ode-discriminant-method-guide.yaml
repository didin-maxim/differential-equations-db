    {
      "id": "guide-method-choice",
      "title": "Как выбрать прием",
      "text": "Если F_p ≠ 0 в начальной точке, главный прием - теорема о неявной функции и переход к нормальной форме. Если F_p=0, главный объект - дискриминант и число ветвей по p. Если дана формула общего семейства, главный прием - огибающая через производную по параметру. Если уравнение имеет вид Клеро или Лагранжа, главный прием - дифференцирование после p=y' и параметризация через p. Если вопрос формулируется как задача Коши, главный прием - подсчитать допустимые наклоны и проверить регулярность каждого корня. Если найденная кривая не является графиком y(x), ее описывают как геометрическую границу поля направлений, но не как решение.",
