  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть F(x,y,p)=p^2-x. Условие F_p=2p=0 вместе с F=0 дает p=0, x=0. Поэтому дискриминантное множество в плоскости (x,y) - вертикальная прямая x=0. При x>0 есть две регулярные ветви: y'=sqrt(x) и y'=-sqrt(x). Их интегрирование дает y=2x^{3/2}/3+C и y=-2x^{3/2}/3+C на полуплоскости x>=0. В точке x=0 эти кривые имеют горизонтальную касательную y'=0 и не продолжаются как действительные регулярные ветви в x<0. При этом сам дискриминант x=0 не является графиком функции y(x) на интервале, поэтому не является решением исходного ОДУ. Это пример, где дискриминант описывает границу поля направлений, а не особую интегральную кривую.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
