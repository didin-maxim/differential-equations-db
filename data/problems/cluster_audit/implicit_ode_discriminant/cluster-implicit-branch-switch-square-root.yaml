  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Запишем F(x,y,p)=p^2-y. Дискриминант задается системой F=0, F_p=2p=0, откуда p=0 и y=0. Значит дискриминантное множество в плоскости (x,y) - ось y=0. В области y>0 есть две регулярные ветви p=+sqrt(y) и p=-sqrt(y). Например, y=x^2/4 является решением на всей прямой: y'=x/2 и (y')^2=x^2/4=y; при x<0 оно идет по ветви p=-sqrt(y), при x>0 - по ветви p=+sqrt(y), а в точке x=0 ветви склеиваются на дискриминанте. Через (0,0) проходят также y=0 и решение y=0 при x≤0, y=x^2/4 при x≥0. Поэтому дискриминант здесь является не просто особой кривой, а местом потери единственности и допустимого переключения ветвей.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
