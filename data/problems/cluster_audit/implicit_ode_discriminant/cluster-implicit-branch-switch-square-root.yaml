      "id": "idea-main",
      "title": "Дискриминант как место склейки ветвей",
      "text": "Для F=y-p^2 условия F=0 и F_p=0 дают y=0, p=0. На этой кривой две регулярные ветви наклона сходятся, поэтому возможны разные продолжения из одной и той же начальной точки.",
