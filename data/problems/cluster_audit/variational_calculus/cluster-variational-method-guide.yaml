  "ideas": [
    {
      "id": "idea-router",
      "title": "Сначала определить, какие вариации разрешены",
      "text": "Фиксированные концы зануляют вариации на границе, свободный конец оставляет независимый граничный коэффициент, а подвижный конец связывает delta y и delta x касанием к заданной кривой. Поэтому тип граничного условия выбирают до вычислений, иначе легко перепутать натуральное условие и трансверсальность.",
      "status": "ai_checked",
      "definition_ids": [
        "variation",
        "transversality_condition",
        "boundary_value_problem"
      ]
    },
    {
      "id": "idea-euler-family",
      "title": "Один расчет первой вариации дает несколько уравнений",
      "text": "В простейшей задаче интегрируют по частям член F_{y'}h'. Для нескольких функций это делается по каждой компоненте, для y'',...,y^(m) - несколько раз, а при изопериметрии тот же расчет применяют к расширенному лагранжиану F+lambda G.",
      "status": "ai_checked",
      "definition_ids": [
        "functional",
        "variation",
        "isoperimetric_problem"
      ]
    },
    {
      "id": "idea-stationary-vs-minimum",
      "title": "Стационарность не равна минимуму",
      "text": "Уравнение Эйлера-Лагранжа и натуральные условия находят экстремали, но не доказывают минимум. Локальный вывод требует знака второй вариации, условия Лежандра и условия Якоби; глобальный вывод требует отдельной структуры функционала, например строгой выпуклости или спектрального нижнего порога.",
      "status": "ai_checked",
      "definition_ids": [
        "extremal",
        "conjugate_point",
        "jacobi_condition",
        "eigenvalue_of_boundary_value_problem"
      ]
    }
  ],
  "solutions": [
    {
      "id": "guide-first-variation-route",
      "title": "Маршрут первой вариации",
      "text": "1. Записать допустимые вариации y_e=y+epsilon h и сразу отметить, какие значения h, h', ... на концах обязаны быть нулевыми. 2. Посчитать d/depsilon J[y_e] при epsilon=0. 3. Перенести производные с h', h'', ... на коэффициенты F_{y'}, F_{y''}, ... интегрированием по частям. 4. Внутренний интеграл занулить по основной лемме вариационного исчисления. 5. Оставшиеся граничные члены читать как натуральные условия, условия трансверсальности или условия на высшие производные. 6. После этого решать полученную краевую задачу ОДУ и проверять допустимость найденной экстремали.",
      "status": "ai_checked",
      "definition_ids": [
        "variation",
        "extremal",
        "boundary_value_problem",
        "transversality_condition"
      ]
    },
    {
      "id": "guide-extensions-route",
      "title": "Маршрут расширений",
      "text": "Для изопериметрической задачи с K[y]=const сначала проверяют, что связь действительно интегральная, затем вводят множитель lambda и заменяют F на F+lambda G; значение lambda определяется вместе с константами из краевых условий и связи. Для векторной неизвестной y=(y1,...,yn) берут независимые вариации каждой компоненты и получают систему уравнений Эйлера. Для функционала от y'',...,y^(m) закрепление y,y',...,y^(m-1) на концах убирает все граничные члены, а при свободных производных соответствующие коэффициенты становятся натуральными условиями. В каждом из этих случаев не добавляется новый вычислительный шаблон, если меняются только коэффициенты лагранжиана.",
      "status": "ai_checked",
      "definition_ids": [
        "functional",
        "isoperimetric_problem",
        "variation",
        "boundary_value_problem"
      ]
    },
    {
      "id": "guide-second-variation-route",
      "title": "Маршрут второй вариации и минимума",
      "text": "1. После нахождения экстремали выписать квадратичную форму второй вариации на допустимых h. 2. Для слабого минимума проверить необходимое условие Лежандра P=F_{y'y'}>=0 вдоль экстремали. 3. При P>0 перейти к уравнению Якоби; наличие сопряженной точки указывает на вырождение или смену знака второй вариации, а отсутствие сопряженных точек является стандартным достаточным условием локального минимума в регулярном случае. 4. Если вторая вариация сводится к краевой спектральной задаче, знак определяет первое собственное значение. 5. Глобальный минимум доказывать отдельно: строгая выпуклость и коэрцитивность дают единственность, а разложение по собственным функциям или неравенство Пуанкаре дает нижнюю оценку в квадратичных примерах.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ],
      "definition_ids": [
        "variation",
        "conjugate_point",
        "jacobi_condition",
        "eigenvalue_problem",
        "eigenvalue_of_boundary_value_problem"
      ]
    },
    {
      "id": "guide-neighbor-boundaries",
      "title": "Границы с соседними кластерами",
      "text": "Если параметр lambda ищется ради нетривиального решения линейной краевой задачи, это уже boundary-spectral-problems. Если главная цель - условие существования неоднородной краевой задачи при резонансе, это linear-bvp-solvability-resonance. Если главный объект - расположение нулей, дисконъюгированность или сравнение Штурма, это sturm-oscillation-comparison. В вариационном кластере эти темы остаются только как проверка знака второй вариации, глобального порога или отсутствия сопряженных точек.",
      "status": "ai_checked",
      "definition_ids": [
        "boundary_value_problem",
        "eigenvalue_problem",
        "eigenvalue_of_boundary_value_problem",
        "conjugate_point",
        "jacobi_condition"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не ставить F_{y'}=0 на подвижном конце: при изменении абсциссы нужен полный трансверсальный граничный член. Не считать найденную экстремаль минимумом только потому, что она удовлетворяет уравнению Эйлера-Лагранжа. Не вводить множитель Лагранжа для обычного фиксированного краевого условия: изопериметрический множитель относится к дополнительной интегральной связи. Не смешивать условие Лежандра с достаточностью: P>=0 необходимо, но для локального минимума обычно нужен анализ Якоби или другой знак второй вариации. Не превращать каждую квадратичную вариационную задачу в новую карточку: если меняются только числа, ее покрывает этот навигатор и существующие representatives.",
      "status": "ai_checked",
      "definition_ids": [
        "transversality_condition",
        "isoperimetric_problem",
        "jacobi_condition",
        "eigenvalue_of_boundary_value_problem"
      ]
    }
