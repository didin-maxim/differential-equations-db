      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера simple-variational-calculus сначала фиксируют класс допустимых кривых и тип концов, затем считают первую вариацию функционала. Для J[y]=int_a^b F(x,y,y') dx при закрепленных концах граничный член исчезает и получается уравнение Эйлера-Лагранжа F_y-d/dx F_{y'}=0. Если значение y на конце свободно, оставшийся граничный коэффициент дает натуральное условие; если конечная точка движется по кривой, вместо него появляется условие трансверсальности с членом F-y'F_{y'}. При интегральной связи вводят множитель Лагранжа и пишут уравнение Эйлера для F+lambda G. Для нескольких неизвестных функций первая вариация дает систему уравнений Эйлера, а для зависимости от y'',...,y^(m) - формулу Эйлера-Пуассона с повторным интегрированием по частям. После нахождения экстремали отдельно решают вопрос о типе экстремума: первая вариация дает только стационарность, а локальный минимум требует анализа второй вариации, условий Лежандра и Якоби или отсутствия сопряженных точек; глобальный минимум обычно доказывают выпуклостью, коэрцитивностью, неравенством Пуанкаре или спектральным порогом краевой задачи.",
