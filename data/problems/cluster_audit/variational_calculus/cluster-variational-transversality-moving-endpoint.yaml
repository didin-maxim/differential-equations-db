        "title": "Формулировка",
        "text": "Для функционала J[y]=int_0^T (1+y'^2) dx левый конец закреплен условием y(0)=0, а правый конец (T,y(T)) может двигаться по прямой y=1. Вывести уравнение Эйлера-Лагранжа, условие трансверсальности и найти экстремаль.",
