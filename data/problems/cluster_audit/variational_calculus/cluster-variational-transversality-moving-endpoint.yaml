      "id": "idea-main",
      "title": "Учесть сдвиг конечной точки",
      "text": "При подвижном x=T граничная вариация содержит не только F_{y'} delta y, но и гамильтонов член (F-y'F_{y'}) delta x.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Здесь F=1+y'^2, поэтому уравнение Эйлера-Лагранжа дает -d/dx(2y')=0, то есть y=Cx+D. Из y(0)=0 получаем D=0. Правый конец лежит на прямой y=1, значит CT=1. Для подвижной конечной точки на кривой y=phi(x) условие трансверсальности имеет вид (F-y'F_{y'}+phi'(x)F_{y'})|_{x=T}=0. В нашей задаче phi'(x)=0, поэтому F-y'F_{y'}=1+C^2-2C^2=1-C^2=0. Следовательно C=1 или C=-1. Так как CT=1 и T>0, остается C=1, T=1. Экстремаль имеет вид y=x на [0,1]. Это не просто свободный конец: натуральное условие F_{y'}=0 здесь неверно, потому что конечная абсцисса тоже варьируется.",
      "status": "ai_checked"
    }
