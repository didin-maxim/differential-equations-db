  "ideas": [
    {
      "id": "idea-main",
      "title": "Два раза интегрировать граничный член",
      "text": "В первой вариации появляются h' и h''. При закрепленных y и y' на концах граничные члены после двух интегрирований по частям исчезают.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Возьмем вариацию \\(y_\\varepsilon=y+\\varepsilon h\\), где \\(h(a)=h'(a)=h(b)=h'(b)=0\\). Из стационарности следует \\(0=\\delta J[y]h=\\int_a^b (F_yh+F_{y'}h'+F_{y''}h'')\\,dx\\). Интегрируем второй член один раз, а третий два раза: \\(\\int F_{y'}h'\\,dx=[F_{y'}h]_a^b-\\int \\frac{d}{dx}F_{y'}\\,h\\,dx\\), \\(\\int F_{y''}h''\\,dx=[F_{y''}h']_a^b-[\\frac{d}{dx}(F_{y''})h]_a^b+\\int \\frac{d^2}{dx^2}F_{y''}\\,h\\,dx\\). Все граничные слагаемые равны нулю из-за условий на \\(h\\) и \\(h'\\). Поэтому \\(\\int_a^b (F_y-\\frac{d}{dx}F_{y'}+\\frac{d^2}{dx^2}F_{y''})h\\,dx=0\\) для всех гладких \\(h\\) с компактной поддержкой в \\((a,b)\\). По основной лемме вариационного исчисления коэффициент при \\(h\\) равен нулю на интервале.",
      "status": "ai_checked"
    }
  ],
