        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(F=F(x,y,y',y'')\\) гладка, а \\(y\\) дает локальный экстремум функционала \\(J[y]=\\int_a^b F(x,y,y',y'')\\,dx\\) среди кривых, для которых \\(y(a)\\), \\(y'(a)\\), \\(y(b)\\), \\(y'(b)\\) закреплены. Вывести уравнение Эйлера-Пуассона: \\(F_y-\\frac{d}{dx}F_{y'}+\\frac{d^2}{dx^2}F_{y''}=0\\).",
        "source_ids": [
          "src-local-du-8-program-or-exam"
        ],
