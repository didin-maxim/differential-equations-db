  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Работаем в аффинном классе H^1-функций с заданными следами y(a)=A, y(b)=B; класс C^1 можно затем получить из регулярности решения линейной краевой задачи. Выберем одну функцию ell с этими концами и положим y=ell+u, где u принадлежит H_0^1(a,b). Тогда J[ell+u]=int_a^b (u'^2+q u^2)dx+L(u)+C, где L - непрерывный линейный функционал на H_0^1, а C не зависит от u. Непрерывность L следует из ограниченности коэффициентов и неравенства Пуанкаре: члены с u и u' оцениваются через ||u'||_2. Поэтому J[ell+u] >= ||u'||_2^2 - C1||u'||_2 - C2 и стремится к +infty при ||u'||_2 -> +infty. Значит минимизирующая последовательность ограничена в H_0^1; из слабой компактности, слабой нижней полунепрерывности нормы u' и компактности вложения H^1(a,b) в C[a,b] получаем существование минимума. Для единственности возьмем две разные допустимые функции y,z и 0<t<1. Прямое раскрытие квадрата дает J[ty+(1-t)z]=tJ[y]+(1-t)J[z]-t(1-t)int_a^b ((y'-z')^2+q(y-z)^2)dx. Последний интеграл положителен, если y не равно z, поэтому J строго выпукл и минимум единственен. Условие стационарности на произвольных h из H_0^1 имеет вид int_a^b (2y'h'+(2qy+f)h+g h')dx=0. После интегрирования по частям получаем слабое уравнение -2y''+2q(x)y+f(x)-g'(x)=0, или -y''+q(x)y=(g'(x)-f(x))/2, с условиями y(a)=A, y(b)=B. Так как коэффициенты гладкие, решение является классическим. Если у этой линейной краевой задачи были бы два решения, их разность w удовлетворяла бы -w''+qw=0 и w(a)=w(b)=0; умножение на w и интегрирование дают int_a^b (w'^2+q w^2)dx=0, откуда w=0. Следовательно краевая задача имеет ровно одно решение, и оно совпадает с единственным глобальным минимизатором.",
      "status": "ai_checked"
    }
