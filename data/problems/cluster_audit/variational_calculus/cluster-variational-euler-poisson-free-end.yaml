        "title": "Формулировка",
        "text": "Рассмотреть функционал J[y]=int_a^b F(x,y,y',y'') dx. Пусть y(a), y'(a) закреплены, а на правом конце значения y(b) и y'(b) свободны. Вывести уравнение Эйлера-Пуассона и естественные граничные условия на x=b.",
