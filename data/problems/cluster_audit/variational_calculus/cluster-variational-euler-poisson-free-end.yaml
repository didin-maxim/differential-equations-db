  "ideas": [
    {
      "id": "idea-main",
      "title": "Оставить два независимых граничных коэффициента",
      "text": "Для функционала со второй производной свободный конец дает не одно, а два натуральных условия: при h(b) и при h'(b).",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Вывод",
      "text": "Первая вариация равна int_a^b (F_y h+F_{y'}h'+F_{y''}h'') dx. После интегрирования по частям получаем int_a^b (F_y-d/dx F_{y'}+d^2/dx^2 F_{y''})h dx + [(F_{y'}-d/dx F_{y''})h+F_{y''}h']_a^b. На левом конце h(a)=h'(a)=0, так как y(a) и y'(a) закреплены. Внутренние вариации дают уравнение Эйлера-Пуассона F_y-d/dx F_{y'}+d^2/dx^2 F_{y''}=0. На правом конце h(b) и h'(b) независимы, поэтому их коэффициенты должны обращаться в нуль: F_{y''}(b,y(b),y'(b),y''(b))=0 и (F_{y'}-d/dx F_{y''})(b,y(b),y'(b),y''(b),y'''(b))=0. Эти две формулы являются естественными граничными условиями для свободного правого конца.",
      "status": "ai_checked"
    }
  ],
