        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть \\(J[y]=\\int_a^b F(x,y,y',\\ldots,y^{(m)})\\,dx\\), а на концах закреплены значения \\(y,y',\\ldots,y^{(m-1)}\\). Вывести общее уравнение Эйлера-Пуассона \\(\\sum_{k=0}^m (-1)^k\\frac{d^k}{dx^k}F_{y^{(k)}}=0\\).",
        "source_ids": [
          "src-local-du-8-program-or-exam"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
