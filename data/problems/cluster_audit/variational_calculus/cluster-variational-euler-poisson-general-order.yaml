        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Повторить интегрирование k раз",
      "text": "Каждый член \\(F_{y^{(k)}}h^{(k)}\\) переносится на \\(h\\) после \\(k\\) интегрирований по частям и приобретает знак \\((-1)^k\\).",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Для вариации \\(y_\\varepsilon=y+\\varepsilon h\\) имеем \\(h^{(j)}(a)=h^{(j)}(b)=0\\) при \\(j=0,\\ldots,m-1\\). Первая вариация имеет вид \\(\\delta J[y]h=\\sum_{k=0}^m\\int_a^b F_{y^{(k)}}h^{(k)}\\,dx\\). Для фиксированного \\(k\\) интегрируем по частям \\(k\\) раз. Все возникающие граничные члены содержат одну из величин \\(h,h',\\ldots,h^{(k-1)}\\) на концах, поэтому равны нулю. Остается \\(\\int_a^b (-1)^k\\frac{d^k}{dx^k}(F_{y^{(k)}})h\\,dx\\). Складывая по \\(k\\), получаем \\(\\int_a^b [\\sum_{k=0}^m (-1)^k\\frac{d^k}{dx^k}F_{y^{(k)}}]h\\,dx=0\\) для всех \\(h\\) с компактной поддержкой. Основная лемма вариационного исчисления дает заявленное дифференциальное уравнение.",
      "status": "ai_checked"
    }
  ],
