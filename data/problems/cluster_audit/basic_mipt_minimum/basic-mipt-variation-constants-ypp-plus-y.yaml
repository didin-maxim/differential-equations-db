      "title": "Решение",
      "text": "Однородное уравнение y''+y=0 имеет фундаментальную систему cos x, sin x, причем W=cos^2 x+sin^2 x=1. По формуле вариации постоянных для правой части f(x)=1 можно взять yp=-cos x int sin x dx+sin x int cos x dx. Получаем yp=-cos x(-cos x)+sin x sin x=1. Значит общее решение исходного уравнения равно y=C1 cos x+C2 sin x+1.",
