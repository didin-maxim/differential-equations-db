        "initial_value_problem"
      ]
    },
    {
      "id": "guide-criteria-proof",
      "title": "Откуда берутся критерии",
      "text": "Для множителя mu(x) условие точности имеет вид (mu M)_y=(mu N)_x, то есть mu M_y=mu' N+mu N_x. После деления на mu N получаем mu'/mu=(M_y-N_x)/N; левая часть зависит только от x, поэтому правая часть должна быть функцией x. Для mu(y) условие записывается как mu' M+mu M_y=mu N_x, откуда mu'/mu=(N_x-M_y)/M, и правая часть должна зависеть только от y. Для h(xy) или x^a y^b доказательство строится той же подстановкой, только производные множителя уже содержат x,y; поэтому критерий не запоминают как отдельную магическую формулу, а быстро выводят из (mu M)_y=(mu N)_x.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "find_potential"
      ],
      "definition_ids": [
        "integrating_factor",
        "exact_equation"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не применять критерий mu(x), если (M_y-N_x)/N зависит от y после сокращений, и не менять знак в парном критерии mu(y). Не считать множитель обязанным быть единственным: его можно домножать на подходящую функцию найденного первого интеграла. Не забывать про область: mu=|y| и mu=y задают один и тот же локальный множитель только на полуплоскостях y>0 или y<0. Не делить на x, y, M, N или xM+yN без возврата к исходной форме. Не относить обычное линейное уравнение первого порядка сюда только потому, что у него тоже есть integrating factor; в этом кластере решающим объектом является точность формы M dx+N dy.",
