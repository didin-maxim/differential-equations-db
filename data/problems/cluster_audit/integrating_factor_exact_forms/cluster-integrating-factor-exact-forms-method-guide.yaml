        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера integrating-factor-exact-forms уравнение сначала записывают как дифференциальную 1-форму M(x,y) dx+N(x,y) dy=0 на выбранной области. Если M_y=N_x и область не создает топологической ловушки для потенциала, форма точна: ищут F с F_x=M, F_y=N и записывают первый интеграл F=C. Если форма не точна, не начинают с тяжелых первообразных, а проверяют короткие признаки множителя. Множитель mu(x) существует по стандартному тесту, когда (M_y-N_x)/N зависит только от x; тогда mu=exp int ((M_y-N_x)/N) dx. Парный тест для mu(y): (N_x-M_y)/M зависит только от y, и mu=exp int ((N_x-M_y)/M) dy. Для однородной формы с M,N одной степени часто работает mu=1/(xM+yN) там, где знаменатель не равен нулю. Для специальных анзацев h(xy), h(y/x) или x^a y^b условие точности подставляют прямо в (mu M)_y=(mu N)_x: удачный вид распознается тем, что остается функция одной переменной или линейные условия на показатели. После умножения заново фиксируют рабочую область, восстанавливают потенциал и проверяют, не потеряны ли интегральные кривые на нулях множителя, знаменателей или при делении на x,y. Для задачи Коши выбирают ту компоненту области, где лежит начальная точка, и только затем определяют константу F(x0,y0).",
