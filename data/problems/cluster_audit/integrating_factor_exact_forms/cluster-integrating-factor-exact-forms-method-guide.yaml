  "solutions": [
    {
      "id": "guide-method-route",
      "title": "Маршрут выбора метода",
      "text": "1. Переписать уравнение в виде M dx+N dy=0 и явно назвать рабочую область, где M,N имеют нужную гладкость. 2. Проверить M_y=N_x. Если равенство выполнено, восстановить F: интегрировать M по x или N по y, затем подобрать недостающую функцию второй переменной. 3. Если точности нет, проверить mu(x) и mu(y) как самые дешевые тесты одной переменной. 4. Если оба теста не прошли, посмотреть на структуру: однородные степени, множитель 1/(xM+yN), мономный анзац x^a y^b, специальный h(xy) или h(y/x). 5. После множителя снова проверить точность и только потом искать потенциал. 6. Записать F=C, а для задачи Коши подставить начальную точку в той компоненте области, где множитель допустим. 7. Проверить исключенные множества исходным уравнением: на них могут жить отдельные решения или компоненты общего ответа.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "find_potential",
        "integrating_factor_linear"
      ],
      "definition_ids": [
        "exact_equation",
        "integrating_factor",
