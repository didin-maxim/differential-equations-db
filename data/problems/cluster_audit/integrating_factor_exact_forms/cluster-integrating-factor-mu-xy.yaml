  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Здесь M=e^(-xy), N=2e^(-xy). Для mu=h(t), t=xy, условие точности имеет вид h'(t)(xM-yN)+h(t)(M_y-N_x)=0, то есть h'/h=(N_x-M_y)/(xM-yN). Имеем M_y=-x e^(-xy), N_x=-2y e^(-xy), поэтому (N_x-M_y)/(xM-yN)=(x-2y)e^(-xy)/((x-2y)e^(-xy))=1 там, где x-2y != 0. Следовательно h'=h и можно взять mu=e^(xy); полученный множитель гладко продолжается через прямую x=2y. После умножения форма становится dx+2dy=0, поэтому первый интеграл равен x+2y=C.",
