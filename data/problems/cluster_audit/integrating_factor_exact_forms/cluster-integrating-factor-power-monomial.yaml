      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть \\(M=2y^2+3xy, N=3xy+2x^{2}\\). После умножения на \\(x^a y^b\\) условие точности дает равенство коэффициентов при \\(x^a y^{(b+1)}\\) и \\(x^(a+1)y^{b}: 2(b+2)=3(a+1), 3(b+1)=2(a+2)\\). Отсюда \\(a=1, b=1\\), то есть можно взять \\(\\mu=xy\\). Тогда умноженная форма равна \\((2xy^3+3x^2y^2)\\,dx+(3x^2y^2+2x^3y)\\,dy\\). Потенциал находится сразу:\\(F=x^{2y}^3+x^{3y}^2\\), поскольку \\(F_x=2xy^3+3x^{2y}^2\\) и \\(F_y=3x^{2y}^2+2x^{3y}\\). Первый интеграл:\\(x^2y^3+x^{3y}^2=C\\).",
      "status": "ai_checked",
