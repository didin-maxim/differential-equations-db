      "id": "sol-main",
      "title": "Решение",
      "text": "Здесь M=xy, N=x^2+1/y. Имеем M_y=x и N_x=2x, поэтому (N_x-M_y)/M=x/(xy)=1/y. Значит можно взять \\(\\mu(y)=e^{\\int dy/y}=|y|\\); на любой полуплоскости y>0 или y<0 достаточно множителя mu=y. После умножения получаем точную форму x y^2 dx + (x^2 y+1) dy=0. Из F_x=x y^2 следует F=(1/2)x^2 y^2+phi(y), а сравнение F_y=x^2 y+phi'(y)=x^2 y+1 дает phi=y. Общий интеграл: (1/2)x^2 y^2+y=C.",
