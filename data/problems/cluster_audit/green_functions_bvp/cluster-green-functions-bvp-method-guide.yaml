        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера green-functions-bvp сначала проверяют нерезонанс: однородная краевая задача должна иметь только нулевое решение. Затем выбирают две фундаментальные функции u и v однородного уравнения так, чтобы u удовлетворяла левому краевому условию, а v - правому. Для оператора L[y]=P0(x)y''+P1(x)y'+P2(x)y функция Грина строится кусочно: при x<t берут множитель u(x)v(t), при x>t - v(x)u(t), а общий коэффициент нормируют по скачку производной G_x(t+0,t)-G_x(t-0,t)=1/P0(t), или по скачку потока p(t)(G_x(t+0,t)-G_x(t-0,t))=1 в самосопряженной форме (p y')'+q y. Непрерывность по x в точке t и исходные краевые условия обязательны: без них получится не обратный оператор, а только формальная вариация постоянных. В самосопряженной регулярной задаче Green-оператор симметричен: G(x,t)=G(t,x) с учетом выбранного веса, и это та же причина, по которой работает тождество Грина, вещественность спектра и ортогональность. Если однородная задача имеет ненулевое решение, обычной функции Грина нет: вместо нее появляется альтернатива Фредгольма, то есть условие ортогональности правой части ядру сопряженной задачи и неединственность при выполнении условия. Функция Грина избыточна, когда требуется одно частное решение простой неоднородной задачи или всего лишь критерий разрешимости: тогда прямой подбор, стрельба или вариация постоянных короче, чем построение полного ядра.",
