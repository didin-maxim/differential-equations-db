  "solutions": [
    {
      "id": "guide-construction-route",
      "title": "Маршрут построения ядра",
      "text": "1. Записать однородное уравнение и проверить, что соответствующая однородная краевая задача нерезонансна. 2. Найти u с левым краевым условием и v с правым краевым условием; если W(u,v)=0, это сигнал резонанса или неверного выбора. 3. Положить G(x,t)=A(t)u(x) для x<t и G(x,t)=B(t)v(x) для x>t. 4. Использовать непрерывность в x=t и скачок P0(t)(G_x(t+0,t)-G_x(t-0,t))=1, чтобы получить A(t), B(t); эквивалентно, в стандартной формуле коэффициент содержит P0(t)W(t). 5. Проверить оба краевых условия по переменной x и только после этого записать y(x)=int_a^b G(x,t)F(t)dt. 6. В самосопряженной форме дополнительно проверить симметрию ядра: нарушение симметрии обычно означает ошибку в весе, знаке скачка или нормировке.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
        "wronskian_liouville"
      ],
      "definition_ids": [
        "green_function_bvp",
        "fundamental_system_solutions",
        "wronskian",
        "self_adjoint_boundary_problem"
      ]
    },
    {
      "id": "guide-diagnostic-route",
      "title": "Диагностика границ применимости",
      "text": "Если детерминант краевых условий на фундаментальные константы не равен нулю, Green-ядро существует и дает единственное решение для любой правой части из выбранного класса. Если детерминант равен нулю, надо остановить Green-построение и перейти к альтернативе Фредгольма: найти ядро сопряженной задачи, проверить ортогональность правой части и описать семейство решений. Если задача спрашивает только один числовой параметр, одно частное решение или отсутствие ядра, прямое решение может быть короче и методически чище.",
