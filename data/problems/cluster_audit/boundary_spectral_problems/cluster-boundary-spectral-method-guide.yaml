        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера boundary-spectral-problems сначала отделяют линейную краевую постановку от обычной неоднородной BVP: параметр lambda является собственным значением, только если однородная задача с заданными краевыми условиями имеет ненулевое решение. В простых задачах y''+lambda y=0 это проверяют через три случая lambda>0, lambda=0, lambda<0 и нулевой определитель системы на константы; нулевой параметр всегда проверяют отдельно. В регулярной задаче Штурма-Лиувилля работают с самосопряженной формой (p y')'+(lambda r-q)y=0, r>0: собственные функции при разных собственных значениях ортогональны с весом r, а тождество Грина объясняет вещественность спектра и условия совместности. Если неоднородная задача попадает в собственное значение, появляется резонанс: правая часть должна быть ортогональна собственному решению сопряженной задачи; при самосопряженных разделенных условиях это обычная весовая ортогональность. Если собственного значения нет, соседний язык функции Грина строит обратный оператор; если цель - именно ядро, карточка ближе к green-functions-bvp. Связь со Штурмом читать так: нули и сравнение помогают считать или упорядочивать собственные значения, но не заменяют сам спектральный расчет. Связь с вариационными задачами возникает через вторую вариацию, уравнение Якоби и первое собственное значение квадратичной формы.",
