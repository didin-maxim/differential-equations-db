    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не добавлять новый представитель только потому, что отрезок [0,π] заменен на [0,L]. Не терять lambda=0: формула через mu часто не покрывает этот случай. Не называть правую часть ортогональной без указания веса или сопряженной задачи. Не смешивать Green kernel с вычислением спектра: функция Грина строится для нерезонансного оператора или после отдельной регуляризации. Не использовать теоремы Штурма как замену краевым условиям: они дают порядок и нули, а собственное значение все равно фиксируется попаданием в граничное условие.",
