  "solutions": [
    {
      "id": "guide-computational-route",
      "title": "Маршрут вычисления спектра",
      "text": "1. Привести задачу к однородному линейному уравнению с параметром и однородными краевыми условиями. 2. Выписать фундаментальную систему для каждого качественно разного значения параметра: обычно lambda=mu^2, lambda=0, lambda=-mu^2. 3. Подставить краевые условия и получить матрицу на произвольные постоянные. 4. Приравнять определитель нулю и аккуратно исключить только те значения, при которых вывод был законен. 5. Для каждого найденного lambda выбрать ненулевой вектор констант и записать собственную функцию с точностью до множителя. 6. Проверить кратность: в регулярных разделенных задачах второго порядка собственные значения обычно простые, но это надо читать из ранга конкретных условий.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "shooting_parameter",
        "wronskian_liouville"
      ],
      "definition_ids": [
        "fundamental_system_solutions",
        "wronskian",
        "eigenvalue_of_boundary_value_problem"
      ]
    },
    {
      "id": "guide-sturm-liouville-route",
      "title": "Маршрут Штурма-Лиувилля",
      "text": "1. Проверить, находится ли уравнение в самосопряженной форме или приводится к ней интегрирующим множителем. 2. Зафиксировать вес r(x) и скалярный продукт \\(\\int_a^b ruv\\,dx\\). 3. Для вещественности и ортогональности использовать тождество Грина, а не новый подбор констант. 4. Для простейших примеров держать три модели: Дирихле-Дирихле дает sin(nx), смешанные условия сдвигают частоты, весовая задача может сводиться заменой переменной или множителем. 5. Для качественных вопросов о числе нулей перейти к Sturm-соседу: сравнение и фазовый угол объясняют порядок собственных функций, но сами краевые условия остаются спектральной частью.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument",
        "angle_comparison"
      ],
      "definition_ids": [
        "boundary_value_problem",
        "eigenvalue_problem",
        "eigenvalue_of_boundary_value_problem"
      ]
    },
    {
      "id": "guide-resonance-green-route",
      "title": "Маршрут резонанса и функции Грина",
      "text": "Если lambda не является собственным значением соответствующей однородной BVP, неоднородная задача имеет единственное решение и его можно записывать через функцию Грина. Если lambda является собственным значением, обратного оператора нет: нужно проверить условие совместности с ядром сопряженной задачи. В самосопряженной учебной модели это \\(\\int_a^b r(x) f(x) \\phi(x)\\,dx=0\\). При выполнении условия решения образуют аффинное семейство y_part+C phi, при нарушении условия решений нет.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ],
      "definition_ids": [
        "boundary_value_problem",
        "eigenvalue_of_boundary_value_problem",
