      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "В кластере floquet-periodic-linear-systems главный объект - не матрица A(t) в отдельный момент, а оператор перехода за один период. Для T-периодической однородной системы x'=A(t)x берут нормированную фундаментальную матрицу X(0)=I и матрицу монодромии M=X(T). Периодичность дает X(t+T)=X(t)M и X(nT)=M^n; при другой начальной точке монодромия заменяется подобной матрицей, поэтому ее собственные значения инвариантны. Эти собственные значения называются мультипликаторами Флоке. Устойчивость нулевого решения читается по степеням M: если все мультипликаторы лежат внутри единичного круга, то решение асимптотически устойчиво; если есть мультипликатор с модулем больше 1, то оно неустойчиво; на единичной окружности надо отдельно проверять жордановы клетки. Для неоднородной T-периодической системы x'=A(t)x+f(t) отображение за период имеет вид x_0 → Mx0+b; T-периодическое решение существует ровно тогда, когда (I-M)x_0=b совместно, а все такие решения отличаются на Ker(I-M). Полная нормальная форма Флоке X(t)=P(t)\\(e^{Bt}\\) полезна как язык, но для стандартной программы часто достаточно монодромии, мультипликаторов, формулы Лиувилля det M=\\(e^{\\int_0^T tr A(s) ds}\\) и линейной алгебры; полная конструкция логарифма M и ветвления показателей Флоке помечается как выход за базовый курс.",
