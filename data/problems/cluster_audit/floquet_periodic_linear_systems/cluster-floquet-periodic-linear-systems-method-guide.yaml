    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не заменять M на \\(e^{A(0)T}\\), если A(t) не постоянна и матрицы A(t) не коммутируют в нужном смысле. Не делать вывод об устойчивости по собственным значениям A(t) в одной точке периода. Не считать случай |mu|=1 автоматически устойчивым: нетривиальная жорданова клетка дает рост степеней M. Не путать периодическое решение неоднородной системы с периодичностью каждого решения: нужна неподвижная точка отображения x_0 → Mx0+b. Не отправлять в этот кластер задачи, где периодичность только украшает скалярное уравнение первого порядка или энергетический запрет; там владельцы - linear-first-order-ode, energy-estimates-second-order-ode или phase-line-stability.",
      "status": "ai_checked",
