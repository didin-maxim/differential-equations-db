  "solutions": [
    {
      "id": "guide-diagnostic-route",
      "title": "Диагностический маршрут",
      "text": "1. Проверить, что коэффициенты действительно T-периодичны и задача спрашивает свойство за период, а не обычное решение x'=Ax. 2. Выбрать нормированную фундаментальную матрицу X(0)=I и обозначить M=X(T). 3. Для повторения периодов использовать X(t+T)=X(t)M и X(nT)=M^n. 4. Для устойчивости перейти к степеням M: внутри единичного круга - асимптотическая устойчивость, вне круга - неустойчивость, на окружности - отдельная проверка жордановых блоков. 5. Для детерминанта применить Лиувилля, не раскрывая X(T) по элементам без необходимости. 6. Для неоднородной периодической системы выписать b=X(T) \\(\\int_0^T\\) X(s)^{-1}f(s) ds и решить (I-M)x_0=b. 7. Если требуется полная нормальная форма Флоке, отметить, что это уже более продвинутый слой, и не смешивать его с базовым критерием через M.",
      "status": "ai_checked",
