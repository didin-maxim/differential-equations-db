      ],
      "definition_ids": [
        "functional_differential_equation",
        "ordinary_differential_equation"
      ]
    },
    {
      "id": "idea-composition-growth",
      "title": "Композиция f(f(x)) чаще ведет к качественному противоречию",
      "text": "Для f'=f(f(x)) редко надо ждать явной формулы. Обычно проверяют знак, монотонность, выпуклость, существование обратной функции на хвосте и сравнение роста. Если из уравнения следует f' ≥ c f^2 или еще более быстрый рост, глобальная область определения становится главным источником противоречия.",
