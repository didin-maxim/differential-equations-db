  "solutions": [
    {
      "id": "guide-diagnostic-route",
      "title": "Диагностический маршрут",
      "text": "1. Определить тип функционального аргумента: инволюция, отражение, сдвиг, сжатие, запаздывание или композиция. 2. Проверить область: где определены x, T(x), f(x), f(f(x)); разрешены ли логарифм, деление, обратная функция. 3. Использовать условие повторно: подставить T(x), -x, x+period, f(x) или соседнее окно. 4. Только после замыкания дифференцировать функциональное тождество или вывести неравенство. 5. Решить полученное ОДУ/систему либо доказать blow-up/монотонность/затухание без явного решения. 6. Подставить ответ или противоречие обратно в исходное условие: восстановить фазу, знак, параметры, начальные данные и глобальность.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function",
        "logarithmic_derivative",
        "comparison_argument"
      ],
      "definition_ids": [
        "functional_differential_equation",
