      "title": "Граница со стандартными кластерами",
      "text": "Если после первой редукции остается обычное линейное уравнение с постоянными коэффициентами и главная работа - решить его, это соседство со scalar-constant-coefficient-linear-ode. Если функциональное условие было интегралом и центральный шаг - дифференцировать интегральное равенство, основным владельцем может быть integral-equation-to-ode. Если задача на f'=f(f) превращается в автономную задачу Коши y'=f(y) с единственностью, нужна связь с existence-uniqueness-continuation, но олимпиадный кластер остается владельцем только при существенной композиционной идее.",
