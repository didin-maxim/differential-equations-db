      "id": "idea-membership-test",
      "title": "Сначала проверить, почему это все еще ДУ",
      "text": "Задача входит в базу ДУ, если после функционального условия появляется обычное ОДУ, система, дифференциальное неравенство, рекурсия производных или аргумент про продолжение/взрыв. Если итоговое решение целиком держится на алгебре функционального уравнения без дифференциальной динамики, это near-miss для этого кластера.",
