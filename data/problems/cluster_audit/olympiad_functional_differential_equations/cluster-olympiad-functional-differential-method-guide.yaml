    {
      "id": "idea-involution",
      "title": "Инволюцию использовать дважды",
      "text": "При T(T(x))=x полезно записать условие в точках x и T(x), выразить функциональный аргумент через f, f' или вспомогательную величину, а уже затем дифференцировать. Для T(x)=a/x часто помогает u=ln x: отражение в логарифмической переменной становится линейной симметрией, а положительность позволяет взять ln f.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "logarithmic_derivative",
        "differentiate_auxiliary_function"
      ],
      "definition_ids": [
        "argument_involution",
        "functional_differential_equation"
      ]
    },
    {
      "id": "idea-symmetry-differentiation",
      "title": "Симметрия и дифференцирование функционального тождества",
      "text": "В задачах с отражением, сдвигом или четностью сначала извлекают симметрии: четность, антипериод, фазовое условие, ненулевость множителя. Дифференцировать стоит только после этого, чтобы получить замкнутое ОДУ вроде f''+cf=0 и не потерять исходное функциональное ограничение, которое затем отбирает фазу или амплитуду.",
      "status": "ai_checked",
      "standard_idea_ids": [
