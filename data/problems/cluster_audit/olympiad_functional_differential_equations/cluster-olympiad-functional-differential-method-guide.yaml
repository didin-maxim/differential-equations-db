      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не дифференцировать функциональное тождество до выяснения симметрий: можно получить незамкнутое выражение с f'(T(x)). Не забывать исходное условие после решения ОДУ: оно часто отбирает фазу, знак или параметр. Не делить на f и не брать ln f без положительности или отдельного разбора нулей. Не переносить сюда каждую задачу с f(x/2) или интегралом: если главный метод - степенной ряд, интегральное уравнение или стандартное ОДУ без функциональной идеи, нужна связь с соседним кластером, а не новый дубль.",
