        "id": "stmt-method-guide",
        "title": "Границы кластера",
        "text": "Кластер olympiad-functional-differential-equations относится к базе дифференциальных уравнений только тогда, когда производная является существенной частью механизма: функциональное соотношение после подстановки, дифференцирования, итерации или проверки области определения сводится к ОДУ, системе, дифференциальному неравенству, рекурсии производных или конечному противоречию. Если условие является почти чистым функциональным уравнением, а производная используется только как декоративная гладкость, такую задачу не надо притягивать в базу ДУ. Типовые формы: f'(T(x)) связано с f(x) при инволюции T(T(x))=x; f'(x)=f(-x) или сдвиговое тождество, которое после дифференцирования дает f''+af=0; композиционное уравнение f'(x)=f(f(x)), где монотонность и рост дают несуществование; уравнение с сжатым или запаздывающим аргументом, где главная работа - переход к ряду, окнам осцилляции или ОДУ-подобной оценке. Такие задачи обычно выше стандартного экзамена: надо не просто решить готовое ОДУ, а сначала распознать, как функциональная связь порождает дифференциальную динамику, и затем проверить, что обратные замены, знаки, область и глобальность не потеряны.",
