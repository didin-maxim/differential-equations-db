        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f и g дифференцируемы на интервале, f^2+g^2>0 и |f'|<=A|g|, |g'|<=A|f|, где A>=0. Тогда для любого непрерывного выбора угла theta=arg(f+ig) выполнено |theta'|<=A. В частности, чтобы повернуть ненулевой вектор (f,g) на угол pi/2, нужно время не меньше pi/(2A).",
        "source_ids": [
          "src-student-olympiad-folklore"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
