  "ideas": [
    {
      "id": "idea-main",
      "title": "Ограничить скорость угла",
      "text": "Пара неравенств на производные часто означает, что отношение g/f или угол arctan(g/f) не может измениться быстрее заданной константы.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "angle_comparison",
        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "На промежутке, где выбран непрерывный угол, имеем theta'=(f g'-g f')/(f^2+g^2). Поэтому |theta'|<=(|f||g'|+|g||f'|)/(f^2+g^2)<=A(f^2+g^2)/(f^2+g^2)=A. Интегрирование дает |theta(t2)-theta(t1)|<=A|t2-t1|. Если угол должен измениться на pi/2, то |t2-t1|>=pi/(2A). При A=0 угол постоянен.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "angle_comparison"
      ]
    }
  ],
