        "id": "stmt-original",
        "title": "Формулировка",
        "text": "В функционально-дифференциальных уравнениях, где аргумент заменяется инволюцией T(T(x))=x, полезно сначала записать условие в точках x и T(x), а затем дифференцировать полученное тождество. В типичном случае T(x)=a/x после перехода к u=ln x функциональная симметрия превращается в обычное ОДУ с постоянными коэффициентами или постоянным логарифмическим наклоном.",
