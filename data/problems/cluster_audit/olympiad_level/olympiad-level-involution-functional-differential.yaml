        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "proof-sketch",
      "title": "Доказательство-схема",
      "text": "Пусть условие связывает f'(T(x)) с x и f(x). Подстановка x -> T(x) дает вторую формулу, где f'(x) выражается через f(T(x)). Если из нее можно выразить f(T(x)) через f'(x), то дифференцирование убирает функциональный аргумент: производная левой части содержит f'(T(x))T'(x), а f'(T(x)) уже известна из исходного условия. Для T(x)=a/x после этого часто получается уравнение вида x(f')^2=f(f'+xf''). Замена x=e^u и F(u)=ln f(e^u) превращает его в F''=0, то есть в степенной ответ.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "logarithmic_derivative",
        "differentiate_auxiliary_function"
      ]
    }
