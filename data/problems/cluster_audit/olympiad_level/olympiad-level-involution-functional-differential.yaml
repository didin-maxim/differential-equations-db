  "ideas": [
    {
      "id": "idea-main",
      "title": "Симметрия аргумента до ОДУ",
      "text": "Не пытаться угадывать функцию сразу: сначала использовать T дважды, чтобы избавиться от сдвинутого аргумента или выразить его через f и f'.",
      "status": "ai_checked",
      "standard_idea_ids": [
