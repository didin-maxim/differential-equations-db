        "title": "Формулировка",
        "text": "Пусть f>0, f'>0, f''>0 на всей R. Тогда для каждой точки x выполнено (f'(x))^2 <= 2 f(x) f''(x). Если дополнительно f'''<=f и f'''>0, то получается вторая оценка (f''(x))^2 < 2 f(x) f'(x).",
