  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Зафиксируем x и t>0. Так как f'' возрастает, из формулы Тейлора с интегральным остатком следует f(x-t)<=f(x)-t f'(x)+t^2 f''(x)/2. Левая часть положительна для всех t>0, значит квадратный трехчлен справа не имеет положительного корня; отсюда (f')^2<=2ff''. Если f'''>0 и f'''<=f, то для 0<=s<=t имеем f''(x-s)>=f''(x)-s f(x). Интегрируя по s от 0 до t, получаем f'(x)>t f''(x)-t^2 f(x)/2. Максимум правой части по t достигается при t=f''(x)/f(x), поэтому (f'')^2<2ff'.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    }
