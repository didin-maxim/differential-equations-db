        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть m != 0,1. Найти условие на p(x), q(x), при котором уравнение Y''+p(x)Y'+q(x)Y=0 имеет на интервале два решения вида y и y^m, где y нигде не обращается в нуль и y'/y не тождественно равна нулю.",
