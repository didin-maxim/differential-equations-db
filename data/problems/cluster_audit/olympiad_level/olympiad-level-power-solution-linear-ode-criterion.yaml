  "ideas": [
    {
      "id": "idea-main",
      "title": "Свести к логарифмической производной",
      "text": "Подстановка y и y^m дает две алгебраические связи для r=y'/y; их вычитание выражает q через r^2, а оставшаяся формула задает p.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "logarithmic_derivative",
        "wronskian_liouville"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Обозначим r=y'/y. Для Y=y получаем r'+r^2+pr+q=0. Для Y=y^m логарифмическая производная равна mr, поэтому подстановка дает m r'+m^2 r^2+p m r+q=0. Вычтем m раз первое равенство из второго: m(m-1)r^2+(1-m)q=0, откуда q=m r^2. Тогда первое равенство принимает вид r'+(m+1)r^2+pr=0. Поэтому критерий таков: существует гладкая функция r, не тождественно равная нулю, для которой q=m r^2 и r'+(m+1)r^2+pr=0. Обратно, при таком r функция y=exp(int r dx) дает решения y и y^m; их отношение y^{m-1} непостоянно, если r не тождественно ноль, значит решения линейно независимы. Случай m=2 возвращает условие q=2r^2, используемое в олимпиадной задаче ХНУРЭ.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "logarithmic_derivative"
      ]
    }
