  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Имеем (y/u)'=(u y'-u'y)/u^2=(y'-(u'/u)y)/u. Если y(a)/u(a)=y(b)/u(b), то по теореме Ролля существует c in (a,b), где (y/u)'(c)=0. Так как u(c) != 0, это равносильно y'(c)-(u'(c)/u(c))y(c)=0. В более общей олимпиадной форме надо построить F так, чтобы F'=mu L[y] и mu не обращался в нуль; тогда из F(a)=F(b) следует F'(c)=0 и, значит, L[y](c)=0.",
