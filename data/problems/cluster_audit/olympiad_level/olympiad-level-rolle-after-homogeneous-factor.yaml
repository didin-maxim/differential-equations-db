        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть u не обращается в нуль на [a,b]. Если выражение вида y'-(u'/u)y принимает после умножения на 1/u форму производной (y/u)', то равенство y(a)/u(a)=y(b)/u(b) влечет существование c in (a,b), где y'(c)-(u'(c)/u(c))y(c)=0. Аналогично для линейного выражения L[y], если подобранный множитель превращает его в производную вспомогательной функции, равенство этой функции на концах дает точку Ролля.",
