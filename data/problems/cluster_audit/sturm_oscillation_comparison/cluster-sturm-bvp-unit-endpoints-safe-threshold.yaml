      "id": "sol-main",
      "title": "Решение",
      "text": "Так как C<=0 и f<C, имеем f(x)<0 на всем [a,b]. Проверим однородное ядро Дирихле. Если u''+f u=0 и u(a)=u(b)=0, то после умножения на u и интегрирования получаем 0=int_a^b u(u''+fu) dx=-int_a^b (u')^2 dx+int_a^b f u^2 dx. Правая часть может быть равна нулю только при u=0, потому что оба слагаемых неположительны, а второе строго отрицательно там, где u не равно нулю. Значит однородного решения с нулевыми концами нет. По лемме о нерезонансе Дирихле задача с заданными концами y(a)=y(b)=1 имеет единственное решение. Порог не острый: например на [0,L] сравнение Штурма дает тот же вывод при всех C<=pi^2/L^2, что допускает положительные C.",
      "status": "ai_checked",
