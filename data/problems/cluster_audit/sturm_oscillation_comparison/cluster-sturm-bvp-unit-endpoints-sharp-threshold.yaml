        "title": "Формулировка",
        "text": "Зафиксируем L>0. Найдите все значения C, при которых для любой непрерывной функции f на [0,L] с f(x)<C краевая задача y''+f(x)y=0, y(0)=1, y(L)=1 обязательно имеет единственное решение. Покажите, что ответ C<=pi^2/L^2; для произвольного отрезка [a,b] нужно заменить L на b-a.",
