  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Сначала докажем достаточность. Пусть C<=pi^2/L^2 и f<C. По лемме о дисконъюгированности при строгом верхнем ограничении уравнение u''+f u=0 не имеет ненулевого решения с двумя нулями на [0,L]. Значит однородная задача Дирихле u(0)=u(L)=0 имеет только нулевое решение. По лемме о нерезонансе Дирихле отсюда следует существование и единственность решения с концами y(0)=y(L)=1. Для необходимости покажем, что больший C не может давать универсальную гарантию. Если C>pi^2/L^2, возьмем f0=(pi/L)^2<C. Тогда уравнение y''+f0 y=0 имеет общее решение y=A cos(pi x/L)+B sin(pi x/L). Условие y(0)=1 дает A=1, а тогда y(L)=cos pi=-1 независимо от B. Поэтому решения с y(L)=1 нет. Итак, универсальная гарантия существует ровно при C<=pi^2/L^2. Для [a,b] делаем замену t=(x-a)/(b-a): критический коэффициент масштабируется как pi^2/(b-a)^2.",
