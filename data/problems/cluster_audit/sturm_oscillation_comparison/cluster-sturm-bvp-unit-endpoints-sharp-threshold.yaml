      "title": "Острота равна первой дирихлеевой длине",
      "text": "Гарантия сводится к отсутствию ненулевого решения с нулевыми концами. Строгое сравнение f<C исключает такое решение при C<=pi^2/L^2, а при C>pi^2/L^2 постоянный коэффициент (pi/L)^2 уже дает резонанс.",
