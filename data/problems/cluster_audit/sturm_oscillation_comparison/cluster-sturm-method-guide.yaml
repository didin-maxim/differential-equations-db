  "solutions": [
    {
      "id": "guide-route",
      "title": "Маршрут выбора метода",
      "text": "1. Привести уравнение к нормальной форме y''+q(x)y=0 или явно учесть, что первая производная уже убрана заменой. 2. Если даны два решения одного уравнения, проверить вронскиан: простота нулей и отношение \\(y_2/y_1\\) ведут к теореме разделения. 3. Если дано неравенство q≤Q или q≥Q, выбрать эталонное уравнение и применить сравнение Штурма, внимательно следя, у какого коэффициента нули должны быть чаще. 4. Если надо доказать, что решения с двумя заданными нулями нет, применить дисконъюгированность: сравнение с z''+Cz=0, энергетическое интегрирование при q≤0 или следствие о расстоянии между нулями. 5. Если формулировка краевая, проверить однородную задачу Дирихле; нулевое ядро переводит штурмовский запрет двух нулей в существование и единственность решения с заданными концами. 6. Если интервал бесконечный, локальный аргумент повторить на хвосте; для q похожего на \\(c/x^2\\) применять критерий Кнезера. 7. Если нужно считать нули как функцию параметра, перейти к фазовому углу Пруфера и читать нули как прохождение угла через кратные π.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_invariant",
        "comparison_argument",
        "shooting_parameter",
        "angle_comparison"
      ]
    },
    {
      "id": "guide-method-choice",
      "title": "Когда какой результат выбирать",
      "text": "Теорема разделения нужна, когда оба объекта являются решениями одного и того же уравнения; она не сравнивает разные потенциалы. Теорема сравнения нужна, когда есть порядок коэффициентов и эталон с известными нулями. Неосцилляционные признаки выбирают, когда требуется показать, что на хвосте у решения не может быть бесконечно много нулей. Дисконъюгированность выбирают для конечного отрезка и двухточечных краевых следствий. Критерий Кнезера выбирают только в асимптотическом режиме \\(q(x)~c/x^2\\); на коротком отрезке вместо него работают синусные оценки. Графические и нулевые аргументы через касание, отношение решений или максимум допустимы, если они явно сводятся к единственности задачи Коши, постоянству вронскиана или запрету двух нулей.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument",
        "wronskian_invariant",
        "angle_comparison"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя применять сравнение Штурма без порядка коэффициентов на всем нужном промежутке. Нельзя делать вывод о спектре только из того, что найден один нуль: спектральная задача требует краевых условий и параметра. Нельзя заменять дисконъюгированность на неосцилляцию: первая говорит о любом конечном подотрезке, вторая о хвосте. Нельзя забывать строгий случай q<C в задачах с критическим значением коэффициента: именно строгая оценка позволяет пройти границу \\(C=π^2/L^2\\). Наконец, при наличии первой производной нужно либо работать с правильной самосопряженной формой, либо явно выполнить преобразование, иначе стандартные формулировки для y''+q(x)y=0 могут оказаться неприменимы.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument",
        "wronskian_liouville"
      ]
    }
