        "id": "stmt-method-guide",
        "title": "Методический блок",
        "text": "Для задач кластера sturm-oscillation-comparison сначала отделяют вопрос о нулях от вопроса о явном решении или спектре. Если сравниваются два уравнения y''+q(x)y=0 и z''+Q(x)z=0, выбирают теорему сравнения Штурма: больший коэффициент заставляет нули появляться чаще. Если сравниваются два решения одного уравнения, используют разделение нулей и постоянство вронскиана. Если надо запретить два нуля на конечном отрезке, ищут дисконъюгированность: сравнивают с y''+C y=0, применяют энергетическую идентичность при q≤0 или сводят к отсутствию ядра Дирихле. Если вопрос поставлен на бесконечном хвосте, переходят к осцилляции и неосцилляции: локальные сравнения повторяют на бесконечной последовательности отрезков, а критерий Кнезера сравнивает q(x) с критическим выражением \\(1/(4x^2)\\). Если в условии важна фаза или число нулей при параметре, полезен угол Пруфера. Краевые следствия читать через нерезонанс: отсутствие ненулевого решения с нулевыми концами дает единственность и обратимость двухточечной задачи, тогда как вычисление самих собственных значений относится уже к boundary-spectral-problems.",
