      "id": "idea-main",
      "title": "Взять первый резонанс Дирихле ниже C",
      "text": "Постоянный коэффициент f=(pi/L)^2 уже имеет ненулевое решение с нулевыми концами. Для концов 1 и 1 он даже дает несовместность: левый конец 1 переходит в правый конец -1 независимо от синусной добавки.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "shooting_parameter"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Возьмем f(x)=pi^2/L^2. По условию f<C. Общее решение равно y=A cos(pi x/L)+B sin(pi x/L). Из y(0)=1 следует A=1. Тогда y(L)=A cos pi+B sin pi=-1, поэтому условие y(L)=1 невыполнимо ни при каком B. Одновременно функция sin(pi x/L) является ненулевым решением однородной задачи Дирихле с нулями 0 и L. Именно появление такого ядра и есть потеря дисконъюгированности/нерезонанса, из-за которой универсальная гарантия существования и единственности пропадает.",
      "status": "ai_checked",
