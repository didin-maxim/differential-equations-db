        "title": "Формулировка",
        "text": "Пусть L>0 и C>pi^2/L^2. Постройте непрерывную функцию f на [0,L] такую, что f(x)<C, но краевая задача y''+f(x)y=0, y(0)=1, y(L)=1 не имеет решения. Объясните связь с нарушением дисконъюгированности.",
