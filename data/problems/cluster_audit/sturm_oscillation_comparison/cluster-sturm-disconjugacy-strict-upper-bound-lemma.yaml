        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть q непрерывна на [a,b], L=b-a, и q(x)<C для всех x. Если C≤π^2/L^2, то уравнение y''+q(x)y=0 дисконъюгировано на [a,b]: ненулевое решение не может иметь два нуля на этом отрезке. При C>0 это эквивалентно условию L≤π/sqrt(C); при C≤0 запрет двух нулей следует еще проще из знака q.",
