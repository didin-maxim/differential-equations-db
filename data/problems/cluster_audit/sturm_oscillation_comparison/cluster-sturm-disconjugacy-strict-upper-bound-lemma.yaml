  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Сначала пусть C>0. Предположим, что ненулевое y имеет два нуля alpha<beta внутри [a,b]; выберем соседнюю пару нулей, тогда beta-alpha≤L≤π/sqrt(C). Так как q<C, сравнение Штурма с z''+Cz=0 требует, чтобы всякое ненулевое решение модельного уравнения имело нуль в (alpha,beta). Возьмем z(x)=cos(sqrt(C)(x-m)), где m=(alpha+beta)/2. Из beta-alpha≤π/sqrt(C) следует |sqrt(C)(x-m)|<π/2 при x in (alpha,beta), поэтому z не имеет нулей внутри. Противоречие. Если C≤0, то q<0. Для решения с нулями alpha,beta умножаем уравнение на y и интегрируем: \\(0=\\int_alpha^beta y(y''+q y)\\,dx=-\\int_alpha^beta (y')^2\\,dx+\\int_alpha^beta q y^2\\,dx\\). Правая часть строго отрицательна для ненулевого y, противоречие.",
      "status": "ai_checked",
