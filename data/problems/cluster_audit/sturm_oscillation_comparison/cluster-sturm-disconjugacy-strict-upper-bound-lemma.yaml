  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить с постоянным коэффициентом на критической длине",
      "text": "Если у решения с меньшим коэффициентом были бы два нуля, то уравнение z''+Cz=0 с большим коэффициентом должно было бы иметь нуль между ними. Но на отрезке длины не больше π/sqrt(C) можно выбрать положительное внутри решение постоянного уравнения.",
      "status": "ai_checked",
