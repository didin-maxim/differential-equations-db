        "title": "Формулировка",
        "text": "Пусть q,r непрерывны на [a,b]. Если однородная задача Дирихле u''+q(x)u=0, u(a)=u(b)=0 имеет только нулевое решение, то для любых A,B краевая задача y''+q(x)y=r(x), y(a)=A, y(b)=B имеет единственное решение. В частности, это применимо к задаче y''+q(x)y=0 с ненулевыми заданными концами после вычитания линейной функции, соединяющей A и B.",
