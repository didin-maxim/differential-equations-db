      "id": "proof-main",
      "title": "Доказательство",
      "text": "Единственность немедленна: если y1 и y2 решают одну и ту же краевую задачу, то w=y1-y2 удовлетворяет w''+q w=0 и w(a)=w(b)=0, значит w=0. Для существования решим две задачи Коши: y0''+q y0=r, y0(a)=A, y0'(a)=0, и v''+q v=0, v(a)=0, v'(a)=1. Все решения с левым условием y(a)=A имеют вид y=y0+c v. Если v(b)=0, то v было бы ненулевым решением однородной задачи Дирихле, что запрещено; значит v(b)!=0. Поэтому единственное c=(B-y0(b))/v(b) дает y(b)=B.",
