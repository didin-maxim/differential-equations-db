      "id": "idea-main",
      "title": "Ядро краевого оператора отвечает за единственность",
      "text": "Разность двух решений решает однородную задачу с нулевыми концами. Существование удобно получить стрельбой: параметр начального наклона попадает в правый конец тогда и только тогда, когда соответствующее базисное решение не зануляется в b.",
