        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для автономной системы на плоскости z'=F(z), z=(x,y), предельный цикл - это изолированная замкнутая фазовая траектория: в любой достаточно малой кольцевой окрестности этой кривой нет других замкнутых траекторий, кроме нее самой. Поэтому не всякая замкнутая траектория является предельным циклом: в центре линейного осциллятора или на регулярных замкнутых уровнях первого интеграла обычно лежит семейство вложенных периодических траекторий, и каждая из них не изолирована. На уровне стандартного курса сначала проверяют простые качественные признаки: радиальную редукцию r'=R(r), знак дивергенции по критерию Бендиксона, инвариантные или ловящие области, связь с устойчивостью через поведение близких траекторий и запрет замкнутых орбит при наличии глобального первого интеграла с регулярными уровнями. Критерий Бендиксона в базе уже представлен как отдельная теорема: в односвязной области, где div F сохраняет один знак и не тождественно равна нулю, замкнутых траекторий нет. Вариант Бендиксона-Дюлака с множителем B использует знак div(BF); это полезное расширение, но если множитель не дан явно, его подбор обычно выходит за стандартную программу. Теорема Пуанкаре-Бендиксона, отображение Пуанкаре и индекс Пуанкаре являются продвинутыми фактами: их можно применять в навигаторе как помеченный beyond_standard_course слой, но не подменять ими базовую проверку определения, знака дивергенции и фазовой геометрии.",
