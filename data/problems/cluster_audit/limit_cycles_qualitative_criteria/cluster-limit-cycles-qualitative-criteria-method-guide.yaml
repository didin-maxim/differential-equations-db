  "solutions": [
    {
      "id": "guide-route-definition",
      "title": "Маршрут проверки определения",
      "text": "1. Убедиться, что система автономна и рассматривается фазовая плоскость, а не график решения как функции времени. 2. Найти замкнутую фазовую траекторию: решение должно возвращаться в ту же точку через период T>0 и не быть равновесием. 3. Проверить изолированность: рядом не должно быть семейства других замкнутых траекторий. 4. Если замкнутые кривые являются регулярными уровнями первого интеграла H=C и заполняют кольцо, назвать их периодическими траекториями центра, но не предельными циклами. 5. Если к циклу с одной или двух сторон приближаются соседние траектории, использовать это как признак устойчивости цикла, но не как замену проверке его изолированности.",
      "status": "ai_checked",
      "definition_ids": [
        "phase_trajectory",
        "closed_phase_trajectory",
        "periodic_solution",
        "limit_cycle",
        "first_integral"
