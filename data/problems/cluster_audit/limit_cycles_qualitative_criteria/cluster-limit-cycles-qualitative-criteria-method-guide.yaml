    {
      "id": "guide-route-radial",
      "title": "Маршрут радиальной устойчивости",
      "text": "1. Перейти к полярным координатам или напрямую вычислить (r^2)'=2xx'+2yy'. 2. Получить уравнение для r или r^2 и найти положительные корни, соответствующие окружностям. 3. Проверить, что угловая скорость на окружности не зануляется так, что движение вырождается в равновесия. 4. Изолированный положительный корень радиального уравнения дает предельный цикл. 5. Если радиус при r<r0 растет, а при r>r0 убывает, цикл устойчив; обратные стрелки дают неустойчивость; одинаковое направление с двух сторон дает полуустойчивость. 6. Если корни радиального уравнения накапливаются, отдельные окружности могут быть периодическими, но вопрос о предельном цикле и устойчивости нужно формулировать по определению изолированности.",
