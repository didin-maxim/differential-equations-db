      "id": "idea-isolated-cycle",
      "title": "Сначала отделить периодическую траекторию от предельного цикла",
      "text": "Замкнутая фазовая траектория становится предельным циклом только при изолированности. Если рядом есть непрерывное семейство замкнутых уровней H=C, то это периодические траектории центра, но не предельные циклы. Эта диагностика защищает от типичной ошибки: называть все овалы фазового портрета предельными циклами.",
      "status": "ai_checked",
      "definition_ids": [
        "closed_phase_trajectory",
        "limit_cycle",
        "first_integral"
      ]
    },
    {
      "id": "idea-bendixson-region",
      "title": "Бендиксон запрещает, но не доказывает существование",
      "text": "После вычисления div F=P_x+Q_y надо явно назвать область: она должна быть односвязной, лежать в области гладкости поля и содержать предполагаемую замкнутую траекторию вместе с внутренностью. Если знак дивергенции постоянен и не нулевой тождественно, циклов в этой области нет. Если знак меняется, критерий просто молчит.",
