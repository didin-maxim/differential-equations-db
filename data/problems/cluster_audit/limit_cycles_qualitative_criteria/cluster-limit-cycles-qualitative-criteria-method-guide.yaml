      "title": "Маршрут существования в продвинутом слое",
      "text": "1. Найти компактную положительно инвариантную область или кольцо: поле должно направлять траектории внутрь на границах либо границы должны быть инвариантными. 2. Проверить, что внутри нет равновесий, если планируется применять теорему Пуанкаре-Бендиксона в короткой форме. 3. Сделать вывод о наличии периодической траектории в omega-предельном множестве и отдельно проверить, является ли она изолированной. 4. Если используется индекс Пуанкаре, сложить индексы особых точек внутри замкнутой траектории и получить сумму +1; этот шаг помечать beyond_standard_course. 5. Не использовать индексную арифметику как замену локальной классификации равновесий: индексы ограничивают возможную конфигурацию, но не рисуют весь фазовый портрет.",
