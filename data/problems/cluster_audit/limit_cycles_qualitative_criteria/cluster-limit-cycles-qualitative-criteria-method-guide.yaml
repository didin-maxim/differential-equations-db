    {
      "id": "guide-route-exclusion",
      "title": "Маршрут запрета циклов",
      "text": "1. Для системы x'=P(x,y), y'=Q(x,y) вычислить div F=P_x+Q_y. 2. Выбрать конкретную область D, где P,Q гладкие и где могла бы лежать замкнутая траектория вместе со своей внутренностью. 3. Проверить односвязность D; проколотая область или кольцо требуют отдельного рассуждения. 4. Если div F имеет один строгий знак или один знак и не равна нулю тождественно, применить критерий Бендиксона и запретить замкнутые траектории в D. 5. Если есть предложенный множитель B, проверить знак div(BF); без заданного B подбор множителя Дюлака считать продвинутым шагом. 6. Если знак дивергенции меняется, честный вывод такой: данный критерий не применим, а не 'цикл существует'.",
