      "title": "Типовые ловушки",
      "text": "Не называть любой периодический овал предельным циклом: нужна изолированность. Не применять Бендиксона в области, которая не содержит внутренность предполагаемой замкнутой кривой или не является односвязной. Не выводить существование цикла из того, что Бендиксон не сработал. Не путать устойчивость предельного цикла с устойчивостью равновесия внутри него. Не забывать, что первый интеграл с замкнутыми уровнями обычно исключает асимптотическое притяжение к равновесию и одновременно показывает не-изолированность соседних периодических траекторий.",
