      "text": "Для систем, где в полярных координатах r'=R(r), phi'=Omega(r,phi) и Omega не обращается в нуль на r=r0, окружность R(r0)=0 является периодической траекторией. Если это изолированный корень R, то она является предельным циклом. Знак R слева и справа от r0 дает устойчивый, неустойчивый или полуустойчивый цикл так же, как на фазовой прямой.",
