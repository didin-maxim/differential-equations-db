  "solutions": [
    {
      "id": "guide-route",
      "title": "Маршрут решения",
      "text": "1. Определить тип интеграла: переменный верхний предел, фиксированные пределы, параметрический интеграл или повторный интеграл. 2. До дифференцирования выписать, какие значения исходного равенства будут потеряны: обычно это x=a, x=b, условие на бесконечности или значение всего интеграла. 3. Дифференцировать столько раз, сколько нужно для исчезновения интеграла или для замыкания системы. 4. Решить полученное ОДУ, систему или краевую задачу стандартными методами. 5. Вернуться к исходному интегральному равенству: проверить константы интегрирования, начальные/краевые условия, самосогласованность скрытых интегралов и допустимость дифференцирования.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function",
        "integrating_factor_linear",
        "variation_of_constants"
      ],
      "definition_ids": [
        "ordinary_differential_equation",
        "initial_value_problem",
        "boundary_value_problem",
        "integral_equation"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не заменять исходное интегральное уравнение только его производной: так теряется константа и можно получить лишние решения. Не считать фиксированный интеграл известной константой без финального уравнения на эту константу. Не переносить начальное условие из int_a^x автоматически, если в ядре есть сингулярность или требуется дополнительная гладкость. Не относить к этому кластеру задачи, где ОДУ не возникает, а основная работа идет с интегральным оператором, нормой ядра, резольвентой или спектром.",
      "status": "ai_checked",
