        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "В задачах кластера integral-equation-to-ode интеграл не является самостоятельным объектом теории интегральных уравнений: его дифференцируют, обозначают скрытую интегральную величину константой или вводят вспомогательную функцию, после чего получают обычную задачу Коши, краевую задачу или линейную систему малой размерности. Для уравнений Вольтерра переменный верхний предел сразу дает начальное условие: при x=a интеграл обычно равен нулю, а каждое дифференцирование переносит в ОДУ значения y(a), y'(a), ... . Для уравнений Фредгольма с фиксированными пределами интеграл чаще превращается в неизвестный параметр C=int_a^b K(s)y(s)ds; после решения ОДУ этот параметр надо заново определить из исходного интеграла. При дифференцировании нельзя терять постоянные: производная интегрального равенства дает только необходимое условие, поэтому все исходные значения, краевые условия и условия самосогласованности возвращаются в конце. Задача остается задачей по ДУ, если решающий шаг - получение и решение ОДУ; если же главный вопрос состоит в существовании решения интегрального оператора, спектре ядра, сжимающем отображении или резольвенте без перехода к ОДУ, это уже чистое интегральное уравнение вне фокуса базы.",
