  "solutions": [
    {
      "id": "guide-method-route",
      "title": "Маршрут выбора метода",
      "text": "1. Привести уравнение к нормальной форме, разделив на старший коэффициент, и выбрать точку \\(x_0. 2\\). Проверить, является ли \\(x_0\\) обычной точкой: нормализованные коэффициенты аналитичны в окрестности \\(x_0. 3\\). Записать \\(y=\\sum a_n (x-x_0)^n\\) и производные с одинаковым центром. 4. Подставить ряд, совместить степени и отдельно обработать первые степени, где сдвиг индексов может давать граничные случаи. 5. Выделить свободные коэффициенты: для второго порядка это a0 и a1, для n-го порядка \\(- a0,...,a_{n-1}. 6\\). Получить рекурсию и, если требуется, выписать первые члены двух базисных решений по начальному набору коэффициентов. 7. Область применимости формулировать через аналитичность коэффициентов: ряд работает до ближайшей особой точки нормализованного уравнения или границы выбранной аналитической области. 8. Если точка особая, но регулярная, перейти к внешнему факту Фробениуса:\\(y=(x-x_0)^r \\sum a_n (x-x_0)^n\\), индикаторное уравнение, затем рекурсия. 9. Если задача после этого спрашивает нули, осцилляцию или расстояния между нулями, переключиться на штурмовский инструментарий.",
