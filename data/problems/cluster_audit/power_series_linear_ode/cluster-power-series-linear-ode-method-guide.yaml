        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера power-series-linear-ode сначала проверяют тип точки. Если после деления на старший коэффициент уравнение имеет аналитические коэффициенты в окрестности \\(x_0\\), то \\(x_0\\) является обычной точкой, а решения задачи Коши ищутся как \\(y=\\sum a_n (x-x_0)^n\\). Подстановка ряда и сравнение коэффициентов дают рекуррентные формулы; для уравнения второго порядка два свободных коэффициента соответствуют \\(y(x_0)\\) и \\(y'(x_0)\\), а для порядка n - начальному вектору до производной n-1. Радиус сходимости на уровне курса читается не как отдельный расчет всех коэффициентов, а как локальный вывод из аналитичности коэффициентов: решение аналитично хотя бы до ближайшей особой точки нормализованных коэффициентов или границы области, где уравнение остается регулярным. Если точка не обычная, но регулярная особая, метод Фробениуса рассматривают как продвинутый внешний факт: пробуют \\(y=(x-x_0)^r \\sum a_n (x-x_0)^n\\), сначала получают индикаторное уравнение, а затем рекурсию. Уравнение Бесселя является типичным мостом: около нуля оно требует фробениусовского языка, а на больших x часто связывается уже со штурмовскими нулями и асимптотикой. Поэтому в этом кластере остаются обычная точка, рекурсия коэффициентов, первые коэффициенты и базовая модель Фробениуса; полноценную теорию нулей, сравнения и осцилляции следует относить к sturm-oscillation-comparison, а общую структуру линейных уравнений с переменными коэффициентами - к linear-equations-variable-coefficients.",
