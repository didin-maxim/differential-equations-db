    {
      "id": "guide-proof-route",
      "title": "Как строить доказательство",
      "text": "Доказательство для обычной точки обычно состоит из двух уровней. На вычислительном уровне формально подставляют ряд, сравнивают коэффициенты и получают рекурсию. На теоретическом уровне ссылаются на теорему: при аналитических коэффициентах нормализованного линейного уравнения решение задачи Коши аналитично по x около \\(x_0\\), поэтому найденный формальный ряд действительно представляет решение. Единственность задачи Коши гарантирует, что разные наборы свободных коэффициентов дают все локальные решения. Для оценки области сходимости достаточно указать ближайшую точку, где коэффициенты нормализованного уравнения теряют аналитичность или старший коэффициент исходной формы обращается в нуль. Для регулярной особой точки аналогичную роль играет теорема Фробениуса, но ее полное доказательство обычно не требуется в базовой карточке.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "series_recursion",
        "state_vector_uniqueness"
      ],
      "definition_ids": [
