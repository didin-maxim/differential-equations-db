    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя начинать с ряда, не проверив центр разложения: в особой точке обычная рекурсия может потерять решения. Нельзя считать радиус сходимости доказанным только потому, что рекурсия формально выписана; нужна аналитичность коэффициентов или отдельная оценка коэффициентов. Нельзя занулять a0 или a1 без начальных условий: это свободные параметры, отвечающие двум решениям второго порядка. Нельзя переносить формулы Фробениуса на произвольную особую точку без проверки регулярности. Наконец, не надо превращать каждую задачу с Бесселем в задачу на специальные функции: если вопрос о вронскиане или нулях, часто работают Лиувилль и Штурм; если вопрос о локальном поведении у нуля, уместен язык Фробениуса.",
