  "solutions": [
    {
      "id": "guide-homogeneous-route",
      "title": "Маршрут для однородного уравнения",
      "text": "1. Нормировать уравнение при a_n != 0 и выписать P(lambda). 2. Разложить P на вещественные корни и комплексные сопряженные пары с кратностями. 3. Для вещественного корня lambda кратности m записать e^{lambda t}, t e^{lambda t}, ..., t^{m-1}e^{lambda t}. 4. Для пары alpha +- i beta записать t^k e^{alpha t}cos beta t и t^k e^{alpha t}sin beta t для k=0,...,m-1. 5. Проверить число мод: их должно быть n. 6. Собрать общее однородное решение и затем подставить начальные или качественные условия.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ],
      "definition_ids": [
        "wronskian",
        "linear_independence_solutions",
        "fundamental_system_solutions",
        "general_solution",
        "initial_value_problem"
      ]
    },
    {
      "id": "guide-inhomogeneous-quasipolynomial-route",
      "title": "Маршрут для квазимногочленной правой части",
      "text": "1. Сначала решить однородную часть, чтобы знать корни P и их кратности. 2. Разложить f(t) на слагаемые e^{mu t}q(t), полиномиальные, синусно-косинусные или их произведения. 3. Для каждого слагаемого выбрать пробный вид того же типа с неопределенными коэффициентами. 4. Если соответствующее mu или alpha +- i beta является корнем P кратности s, умножить весь пробный вид на t^s. 5. Подставить ansatz в L[y]=f и решить линейную систему на коэффициенты. 6. Добавить найденное частное решение к общему однородному и только после этого применять условия задачи.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "resonance_ansatz"
      ],
      "definition_ids": [
        "particular_solution",
        "general_solution",
        "fundamental_system_solutions"
      ]
    },
    {
      "id": "guide-variation-route",
      "title": "Когда лучше вариация постоянных",
      "text": "Если правая часть не принадлежит удобному квазимногочленному классу, если требуется вывести формулу, оценить зависимость от начальных данных или сравнить со случаем переменных коэффициентов, надо брать ФСР y_1,...,y_n и варьировать постоянные. В системной записи это формула X(t)c+X(t) int X(s)^{-1}g(s) ds. Для постоянных коэффициентов она совместима с характеристическими модами, но обычно длиннее метода неопределенных коэффициентов на полиномах, экспонентах и синусах.",
