    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не путать кратность корня с числом разных корней: именно кратность дает множители t^k. Не оставлять комплексные моды в ответе, когда задача сформулирована над вещественными функциями. Не применять метод неопределенных коэффициентов к произвольной правой части без конечномерной замкнутости под дифференцированием. Не забывать резонансный множитель t^s для всей пробной группы, включая синус и косинус вместе. Не подгонять начальные условия до добавления однородной части к частному решению.",
