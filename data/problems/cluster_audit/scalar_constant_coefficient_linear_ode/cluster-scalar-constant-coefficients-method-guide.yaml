    {
      "id": "guide-boundaries",
      "title": "Границы кластера",
      "text": "Если задача про x'=Ax, жордановы цепочки матрицы или фазовый портрет системы, это соседний кластер constant-coefficient-linear-systems. Если главный объект - фундаментальная матрица X(t), формула Абеля-Лиувилля или вариация параметров при переменных коэффициентах, это linear-equations-variable-coefficients или variation-of-constants. В текущем кластере остаются задачи, где центральный ход - скалярный характеристический многочлен P(D), кратность его корней и резонанс правой части.",
