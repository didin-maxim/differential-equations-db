      "text": "Скалярное уравнение порядка n можно записать как систему для состояния (y,y',...,y^(n-1)). Ее companion-матрица имеет тот же характеристический многочлен P. Поэтому формула вариации постоянных и матричная экспонента объясняют метод неопределенных коэффициентов как сокращенный маршрут для специальных правых частей, а не как отдельную теорию.",
