    {
      "id": "idea-resonance-multiplicity",
      "title": "Резонанс измеряется кратностью корня",
      "text": "Если пробный вид частного решения уже лежит в однородной ФСР, оператор L его зануляет. Тогда пробный класс умножают на t^s, где s равно кратности соответствующего характеристического корня; это ровно выводит ansatz из ядра L, но оставляет его в том же квазимногочленном семействе.",
