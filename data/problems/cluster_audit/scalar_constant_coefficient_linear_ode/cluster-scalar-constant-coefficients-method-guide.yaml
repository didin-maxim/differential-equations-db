  "ideas": [
    {
      "id": "idea-characteristic-polynomial",
      "title": "Характеристический многочлен задает все однородные моды",
      "text": "Подстановка y=e^{lambda t} превращает L[y]=0 в P(lambda)=0. Если корень lambda имеет кратность m, то дифференцирование по параметру lambda или факторизация (D-lambda)^m дают цепочку решений t^k e^{lambda t}, k=0,...,m-1. Поэтому кратность корня сразу переводится в число полиномиальных множителей.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ],
      "definition_ids": [
        "wronskian",
        "linear_independence_solutions",
        "fundamental_system_solutions"
      ]
    },
    {
      "id": "idea-complex-roots-real-form",
      "title": "Комплексные корни переписывать в вещественную форму",
      "text": "При вещественных коэффициентах комплексные корни приходят сопряженными парами. Пара alpha +- i beta дает вещественные решения e^{alpha t} cos beta t и e^{alpha t} sin beta t; при кратности m к каждой паре добавляются множители t^k. Вещественная форма нужна для задач Коши, устойчивости, ограниченности и периодичности.",
