      "standard_idea_ids": [
        "wronskian_liouville"
      ],
      "definition_ids": [
        "solution",
        "fundamental_system_solutions",
        "general_solution"
      ]
    },
    {
      "id": "idea-undetermined-coefficients-annihilator",
      "title": "Квазимногочленную правую часть держать в конечномерном классе",
      "text": "Если f(t) является суммой e^{mu t}q(t), полиномов, синусов и косинусов с полиномиальными коэффициентами, то дифференцирование сохраняет конечномерную оболочку таких функций. Аннигилятор показывает, какие моды могут появиться, а метод неопределенных коэффициентов превращает поиск частного решения в линейную алгебру для коэффициентов.",
