        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера scalar-constant-coefficient-linear-ode уравнение a_n y^(n)+...+a_1 y'+a_0 y=f(t), a_n != 0, сначала читают как действие постоянного линейного оператора L=P(D), где P(lambda)=a_n lambda^n+...+a_0. Однородная часть строится по корням характеристического многочлена: вещественный корень lambda кратности m дает моды e^{lambda t}, t e^{lambda t}, ..., t^{m-1} e^{lambda t}; комплексная пара alpha +- i beta кратности m переводится в вещественные пары t^k e^{alpha t} cos beta t и t^k e^{alpha t} sin beta t, k=0,...,m-1. Эти моды образуют ФСР, а ненулевой вронскиан и единственность задачи Коши объясняют, почему общее решение однородного уравнения имеет ровно n произвольных постоянных. Для неоднородной правой части из конечномерного класса квазимногочленов e^{mu t} q(t), а также sin beta t, cos beta t и их полиномиальных произведений, удобно применять аннигилятор или метод неопределенных коэффициентов: искать частное решение в том же классе, а при резонансе умножать пробный вид на t^s, где s - кратность соответствующего корня mu или alpha +- i beta у P. Общее решение равно сумме общего однородного и одного частного. Вариация постоянных остается универсальным способом проверки и вывода формулы, а переход к системе первого порядка с companion-матрицей связывает скалярный характеристический многочлен с матричной экспонентой и соседним кластером систем.",
