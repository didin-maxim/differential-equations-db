  "ideas": [
    {
      "id": "idea-main",
      "title": "Одна характеристика задает только одно значение произвольной функции",
      "text": "Данные совместимы, потому что постоянны вдоль начальной характеристики. Но они фиксируют только F(0), а не значения F(c) для соседних характеристик.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Общее решение равно u=F(y-x). На прямой y=x условие превращается в F(0)=1. Это условие имеет бесконечно много C^1-продолжений: например, F(c)=1 и F(c)=1+c^2 дают разные решения, но оба удовлетворяют начальным данным. Значит решение существует, но не единственно.",
      "status": "ai_checked"
    }
  ],
