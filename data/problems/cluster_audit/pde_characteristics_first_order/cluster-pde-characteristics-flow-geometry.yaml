  "ideas": [
    {
      "id": "idea-main",
      "title": "Поток характеристик растягивает координату x",
      "text": "Характеристическое ОДУ dx/dt=x имеет поток x(t)=xi e^t. Значение u сохраняется, а начальная точка характеристики равна xi=x e^{-t}.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Вдоль характеристики dx/dt=x и du/dt=0. Отсюда x(t)=xi e^t и xi=x e^{-t}. Значит u(t,x)=f(x e^{-t}). Если начальный профиль отличен от нуля только при xi in [1,2], то в момент t он может быть отличен от нуля только при x e^{-t} in [1,2], то есть x in [e^t,2e^t]. Профиль не просто сдвигается, а растягивается потоком x -> x e^t.",
      "status": "ai_checked"
    }
  ],
