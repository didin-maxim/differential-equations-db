        "title": "Формулировка",
        "text": "Для уравнения \\(u_x+u_y=0\\) начальная кривая задана как \\(Gamma: (x,y)=(s,\\phi(s)), s in I\\). Сформулируйте простой критерий, при котором Gamma пересекает каждую характеристику y-x=c не более одного раза. Проверьте его для \\(\\phi(s)=s+s^3\\) на любом интервале I.",
