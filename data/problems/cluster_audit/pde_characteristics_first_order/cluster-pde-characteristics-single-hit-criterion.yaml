  "ideas": [
    {
      "id": "idea-main",
      "title": "Параметр характеристики должен быть однозначной координатой на кривой",
      "text": "Характеристики нумеруются инвариантом c=y-x. На начальной кривой этот номер равен \\(\\phi(s)-s\\); отсутствие повторных пересечений означает инъективность этой функции.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристика через точку \\((s,\\phi(s))\\) имеет номер \\(c=\\phi(s)-s\\). Поэтому две разные точки начальной кривой лежат на одной характеристике тогда и только тогда, когда \\(\\phi(s_1)-s_1=\\phi(s_2)-s_2\\). Следовательно, кривая пересекает каждую характеристику не более одного раза ровно тогда, когда функция \\(\\psi(s)=\\phi(s)-s\\) инъективна на I. Удобное достаточное условие:\\(\\psi'(s)=\\phi'(s)-1\\) имеет один знак и не обращается в нуль. Для \\(\\phi(s)=s+s^3\\) получаем \\(\\psi(s)=s^3\\), она строго возрастает на любом интервале, значит каждая характеристика встречается не более одного раза; на образе \\(\\psi(I)\\) встречается ровно один раз.",
      "status": "ai_checked"
    }
