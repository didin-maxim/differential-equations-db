  "ideas": [
    {
      "id": "idea-main",
      "title": "Характеристика должна попасть в отрезок данных",
      "text": "Решение постоянно на прямых y-x=const. Значение в точке (x,y) определяется ровно тогда, когда характеристика через эту точку пересекает начальный отрезок x=0, |y|<1.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристики имеют направление (1,1), поэтому y-x постоянно, а u=F(y-x). Характеристика через точку (x,y) пересекает прямую x=0 в точке (0,y-x). Данные известны в этой точке тогда и только тогда, когда |y-x|<1. Поэтому на полосе |y-x|<1 решение однозначно равно u(x,y)=f(y-x). Вне этой полосы данная начальная информация не задает значение решения.",
      "status": "ai_checked"
    }
  ],
