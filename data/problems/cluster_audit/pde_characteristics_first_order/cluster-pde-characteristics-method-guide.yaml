  "ideas": [
    {
      "id": "idea-characteristic-system",
      "title": "Характеристики - интегральные кривые поля коэффициентов",
      "text": "Для уравнения a(x,y)u_x+b(x,y)u_y=0 характеристическая система x'=a(x,y), y'=b(x,y) задает кривые, касательные к направлению, в котором PDE измеряет производную u. В трех независимых переменных аналогично появляется система для x,y,z; общее решение ищут через независимые первые интегралы этой системы.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ],
      "definition_ids": [
        "pde_characteristic_first_order",
        "integral_curve",
        "first_integral"
      ]
    },
    {
      "id": "idea-first-integrals",
      "title": "Первый интеграл нумерует характеристики",
      "text": "Если I постоянно вдоль характеристик, то в однородном двумерном случае u=F(I). В трехмерном случае нужны два независимых интеграла I1,I2, и общее решение имеет вид F(I1,I2). Начальные данные затем определяют произвольную функцию F, если отображение с начальной поверхности на набор инвариантов обратимо.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ],
      "definition_ids": [
        "first_integral",
        "cauchy_problem"
      ]
    },
    {
      "id": "idea-noncharacteristic-data",
      "title": "Нехарактеристичность - локальная обратимость параметров",
      "text": "Начальная кривая в плоскости годится как кривая Коши, когда ее касательное направление не совпадает с характеристическим полем. Тогда параметры 'точка на начальной кривой' и 'время вдоль характеристики' локально дают координаты в области решения. Для поверхности в пространстве аналогичное условие означает, что характеристическое поле не касательно поверхности.",
      "status": "ai_checked",
      "definition_ids": [
        "pde_characteristic_first_order",
        "noncharacteristic_curve",
        "cauchy_problem",
        "integral_curve"
      ]
    },
    {
      "id": "idea-domain-continuation",
      "title": "Область продолжения задается покрытием характеристиками",
      "text": "Даже при локально хорошей кривой Коши данные могут быть заданы только на отрезке или части поверхности. Тогда решение определено именно в объединении характеристик, выходящих из этой части данных. Вне такой области значение произвольной функции инварианта не задано, а при двух попаданиях одной характеристики в данные требуется совпадение предписанных значений после учета ОДУ для u.",
      "status": "ai_checked",
      "definition_ids": [
        "cauchy_problem",
        "pde_characteristic_first_order",
        "solution"
      ]
    },
    {
      "id": "idea-characteristic-data",
      "title": "Данные на характеристике не задают соседние характеристики",
      "text": "Если начальная кривая сама является характеристикой, PDE уже диктует изменение u вдоль нее. Несовпадение с этим законом дает отсутствие решения; совпадение дает только значение на одной характеристике и оставляет соседние характеристики свободными, поэтому единственность теряется.",
      "status": "ai_checked",
      "definition_ids": [
        "pde_characteristic_first_order",
        "cauchy_problem",
        "solution"
      ]
    },
    {
      "id": "idea-flow-geometry",
      "title": "Поток переносит профиль и его носитель",
      "text": "Для транспортного уравнения u_t+a(x)u_x=0 поток x'=a(x) переносит начальную точку xi в текущую точку x(t;xi), а решение читается как u(t,x)=u_0(xi). Поэтому надо уметь читать не только формулу, но и геометрию: сдвиг, растяжение, сжатие или выход из заданной области.",
