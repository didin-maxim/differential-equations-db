  "solutions": [
    {
      "id": "guide-route",
      "title": "Маршрут решения задачи",
      "text": "1. Привести уравнение к виду производной вдоль поля: a u_x+b u_y+c u=f или его многомерному аналогу. 2. Записать характеристическую систему для независимых переменных; для u добавить уравнение du/ds=f-cu. 3. Найти первые интегралы или явный поток характеристик. 4. Подставить начальную кривую или поверхность и проверить нехарактеристичность: характеристическое направление не должно быть касательным к данным. 5. Проверить глобальную однократность попадания: каждая характеристика из рассматриваемой области должна встретить данные ровно один раз. 6. Если данные заданы только на части кривой, явно описать объединение покрытых характеристик. 7. Если начальные данные характеристичны или одна характеристика бьет по данным дважды, проверить совместимость значений вдоль одной характеристики; после совместимости отдельно сказать, есть ли единственность.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ],
      "definition_ids": [
        "pde_characteristic_first_order",
        "noncharacteristic_curve",
        "cauchy_problem",
        "first_integral"
      ]
    },
    {
      "id": "guide-method-choice",
      "title": "Как выбирать между инвариантами и потоком",
      "text": "Если коэффициенты постоянны или поле легко интегрируется, удобнее писать явный поток и переносить начальную точку назад к данным. Если уравнение задано в нескольких переменных и спрашивает общее решение, обычно удобнее искать первые интегралы характеристической системы. Для транспортного уравнения с временем t естественная нормировка - брать t параметром характеристики. Для задачи Коши на кривой или поверхности важна не сама красота интегралов, а обратимость перехода от начальных параметров к текущей точке.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "first_integral_difference"
      ],
      "definition_ids": [
        "first_integral",
        "integral_curve",
        "cauchy_problem"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя считать любую начальную прямую допустимой: прямая может быть характеристикой. Нельзя ограничиться локальной нехарактеристичностью, если задача спрашивает всю область: одна характеристика может пересечь начальную кривую дважды или не пересечь ее вовсе. Нельзя переносить значение с одной точки характеристики, не проверив закон для u вдоль этой характеристики, если в уравнении есть член c u или правая часть f. Нельзя смешивать этот блок с PDE второго порядка и ударными волнами: здесь достаточно линейных однородных или простых линейных уравнений первого порядка из стандартного курса.",
      "status": "ai_checked",
      "definition_ids": [
