        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для линейного уравнения первого порядка a(x)u_{x_1}+...+a_n(x)u_{x_n}+c(x)u=f(x) метод характеристик заменяет частную производную производной вдоль потока x'=a(x). В однородном случае c=f=0 значение u постоянно на характеристиках; в случае c или f не равных нулю вдоль характеристики остается линейное ОДУ для u. Задача Коши корректна локально там, где начальная кривая или поверхность нехарактеристична: характеристическое поле не лежит в ее касательном направлении. Глобально надо отдельно проверить, что каждая нужная характеристика пересекает данные ровно один раз и попадает в область задания данных; отсутствие пересечения дает незаданную область, повторное пересечение требует совместимости, а данные на самой характеристике обычно дают либо неединственность, либо несовместность.",
