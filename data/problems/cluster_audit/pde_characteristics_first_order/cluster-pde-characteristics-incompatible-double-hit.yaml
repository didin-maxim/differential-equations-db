        "title": "Формулировка",
        "text": "Для уравнения \\(u_x=0\\) на параболе \\(Gamma: (x,y)=(s,s^2)\\) заданы данные \\(u(s,s^2)=s\\). Может ли существовать решение в области, содержащей обе ветви параболы при s около 1 и s около -1? Схема: data/assets/images/pde characteristics/parabola-double-hit.svg.",
