  "ideas": [
    {
      "id": "idea-main",
      "title": "Одна характеристика не может нести два разных значения",
      "text": "Для \\(u_x=0\\) характеристики горизонтальны. Горизонтальная прямая \\(y=a^2\\) пересекает параболу в двух точках с параметрами a и -a, а данные там противоположны.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из \\(u_x=0\\) следует, что u постоянно вдоль горизонтальных характеристик y=const. При 0<a<1 характеристика \\(y=a^2\\) пересекает начальную кривую в точках \\((a,a^2)\\) и \\((-a,a^2)\\). Начальные данные требуют \\(u(a,a^2)=a\\) и \\(u(-a,a^2)=-a\\). Эти две точки лежат на одной характеристике, значит значение u должно быть одинаковым, но a ≠ -a. Поэтому решения на области, содержащей обе ветви и горизонтальные отрезки между ними, не существует. На одной отдельной ветви такой локальный конфликт исчезает.",
      "status": "ai_checked"
    }
  ],
