  "ideas": [
    {
      "id": "idea-main",
      "title": "На характеристике значение должно быть постоянным",
      "text": "Прямая y=x сама является характеристикой. Для однородного транспортного уравнения u не меняется вдоль характеристики, поэтому данные на одной характеристике не могут зависеть от параметра вдоль нее.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристики задаются прямыми y-x=c, и общее решение имеет вид u=F(y-x). На прямой y=x имеем c=0, поэтому вся прямая должна иметь одно и то же значение u=F(0). Условие u(x,x)=x^2 требует разных значений на одной и той же характеристике. Это невозможно, значит решения в окрестности всей такой начальной кривой не существует.",
      "status": "ai_checked"
    }
  ],
