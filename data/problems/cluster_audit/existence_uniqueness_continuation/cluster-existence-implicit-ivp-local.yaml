      "id": "proof-main",
      "title": "Доказательство",
      "text": "По теореме о неявной функции из условий F(t_0,y_0,p_0)=0 и F_p(t_0,y_0,p_0) ≠ 0 существуют окрестность точки (t_0,y_0) и единственная C^1-функция phi(t,y), такая что phi(t_0,y_0)=p_0 и F(t,y,phi(t,y))=0. В этой окрестности уравнение F(t,y,y')=0 для решений с y' близкой к p_0 эквивалентно нормальной форме y'=phi(t,y). Функция phi непрерывна и локально липшицева по y, так как она C^1. По теореме Пикара-Линделефа задача y'=phi(t,y), y(t_0)=y_0 имеет единственное локальное решение. Для него y'(t_0)=phi(t_0,y_0)=p_0, и оно удовлетворяет исходному неявному уравнению. Если другое локальное решение исходной задачи имеет производную около p_0, то оно также удовлетворяет y'=phi(t,y), а значит совпадает с найденным решением по единственности.",
