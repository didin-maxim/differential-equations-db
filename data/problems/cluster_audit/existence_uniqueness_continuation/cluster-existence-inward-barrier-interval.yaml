        "comparison_argument"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Докажем запрет выхода через верхнюю границу. На любом конечном промежутке [t_0,T] локальная липшицевость в окрестности отрезка [a,b] дает константу L. Обозначим u(t)=(x(t)-b)_+. В точках, где x(t)>b и решение еще близко к b, имеем u'=x'=f(t,x)≤f(t,b)+L(x-b)≤Lu. В точках, где x(t)≤b, верхняя правая производная u не превосходит max(f(t,b),0)=0. Поэтому D^+u≤Lu и u(t_0)=0. По Гронуоллу u(t)=0, то есть x(t)≤b, пока решение существует на [t_0,T]. Для нижней границы применим тот же аргумент к v(t)=(a-x(t))_+: если x<a, то v'=-f(t,x)≤-f(t,a)+L(a-x)≤Lv, а при x≥a верхняя правая производная v не положительна. Значит v=0 и x(t)≥a. Отрезок [a,b] положительно инвариантен. На каждом конечном промежутке график лежит в компакте [t_0,T] x [a,b], поэтому по критерию продолжения конечный правый конец невозможен; решение существует при всех t≥t_0.",
      "status": "ai_checked"
    }
  ],
