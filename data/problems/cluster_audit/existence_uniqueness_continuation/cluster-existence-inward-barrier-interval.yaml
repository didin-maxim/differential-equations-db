        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f(t,x) непрерывна на \\(\\mathbb R\\times \\mathbb R\\), локально липшицева по x, и для некоторых a<b выполнено f(t,a)≥0, f(t,b)≤0 при всех t≥t_0. Докажите, что решение задачи x'=f(t,x), x(t_0)=x_0 из [a,b] не выходит из отрезка [a,b] вправо по времени. Выведите отсюда глобальное существование вправо, если f определена на всей полосе t≥t_0, x in R.",
