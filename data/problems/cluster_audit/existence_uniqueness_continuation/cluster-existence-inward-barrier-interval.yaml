      "id": "idea-main",
      "title": "Оценить положительную часть превышения над барьером",
      "text": "Локальная липшицевость около границы дает для (x-b)_+ неравенство D^+(x-b)_+≤L(x-b)_+. Так как на границе f(t,b)≤0, Гронуолл запрещает появление положительной части.",
      "status": "ai_checked",
