  "ideas": [
    {
      "id": "idea-regularity-first",
      "title": "Начинать с регулярности, а не с формулы",
      "text": "Если правая часть только непрерывна, разумная цель - существование и возможная неединственность. Если есть локальный Липшиц по y или по x в системе первого порядка, можно применять Пикара-Линделефа и пользоваться непересечением решений.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof"
      ]
    },
    {
      "id": "idea-compact-continuation",
      "title": "Продолжение доказывается априорной границей",
      "text": "Для максимального решения надо не угадывать конец интервала, а показать, что на каждом конечном промежутке график остается в компакте области определения; тогда теорема продолжения запрещает конечный обрыв.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    },
    {
      "id": "idea-gronwall-router",
      "title": "Гронуолл связывает три сюжета",
      "text": "Оценка разности решений дает единственность и непрерывную зависимость; оценка нормы одного решения при линейном росте дает глобальность; односторонний Липшиц заменяет симметричную липшицевость там, где хватает контроля положительной части.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    },
    {
      "id": "idea-first-exit-barrier",
      "title": "Барьеры читать через первый выход",
      "text": "Если на границе области поле направлено внутрь или касательно, то первый выход невозможен. После инвариантности компактная область становится априорной оценкой для продолжения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument"
      ]
    },
    {
      "id": "idea-implicit-regular",
      "title": "Неявную задачу сначала привести к нормальной форме",
      "text": "Для F(t,y,y')=0 регулярная точка F_p != 0 означает p=phi(t,y). Только после этого применяют Пикара-Линделефа; при F_p=0 задача уже относится к ветвям и дискриминанту.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "implicit_function_theorem",
        "picard_lindelof"
      ]
    },
    {
      "id": "idea-counterexamples",
      "title": "Контрпример должен ломать ровно нужное условие",
      "text": "Нелипшицевость типа y'=c|y|^alpha, 0<alpha<1, объясняет отложенные решения; разрыв правой части ломает Пеано; выход из области определения или взрыв объясняет невозможность глобального продолжения.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "guide-solution-route",
      "title": "Маршрут разбора задачи",
      "text": "1. Привести уравнение к задаче Коши для системы первого порядка и явно записать область D, где задана правая часть. 2. Проверить регулярность: непрерывность f дает локальное существование по Пеано; локальный Липшиц по фазовой переменной дает Пикара-Линделефа; C^1 по фазовой переменной является удобным достаточным условием Липшица на компактах. 3. Если спрашивают единственность или зависимость от данных, записать разность двух решений и получить неравенство вида u(t)<=u(t0)+int L(s)u(s)ds; дальше работает Гронуолл. 4. Если спрашивают максимальный интервал, построить априорную оценку нормы или инвариантную область и применить теорему продолжения: конечный конец возможен только при выходе графика из любого компакта области. 5. Если дана неявная задача F(t,y,y')=0, проверить F_p: при F_p!=0 перейти к y'=phi(t,y), при F_p=0 не обещать единственность без отдельного анализа ветвей.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof",
        "gronwall_estimate",
        "comparison_argument",
        "implicit_function_theorem"
      ]
    },
    {
      "id": "guide-method-choice",
      "title": "Критерии выбора теоремы",
      "text": "Пеано выбирают, когда нужно доказать хотя бы одно решение при непрерывной правой части или объяснить, почему единственность не следует. Пикара-Линделефа выбирают, когда задача требует запрета пересечений, совпадения угаданного решения с настоящим или корректности потока. Гронуолл выбирают, когда в доказательстве возникает интегральная оценка разности, возмущения или нормы. Теорему продолжения выбирают, когда надо отличить локальную разрешимость от глобальной: сама локальная теорема не говорит, что решение не оборвется на конечном времени. Барьер выбирают, когда решение нужно удержать в области без явной формулы. Неявную теорему о функции выбирают только в регулярной точке по производной.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof",
        "gronwall_estimate",
        "comparison_argument",
        "implicit_function_theorem"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя заменять непрерывность правой части единственностью: Пеано не запрещает несколько решений. Нельзя проверять Липшиц только вдоль найденной кривой, если теорема нужна в окрестности начальной точки. Нельзя выводить глобальность из ограниченности f на одной траектории без контроля приближения к границе области. Нельзя считать, что конечный конец максимального решения всегда означает |y|->infty: в общей области возможен выход к границе D. Нельзя применять обычную задачу Коши к F(t,y,y')=0, пока не проверено F_p!=0 и не выбрана ветвь y'=phi(t,y). Наконец, при барьерах надо проверять направление поля именно на границе и формулировать аргумент через первый момент выхода.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument",
        "implicit_function_theorem"
      ]
    }
  ],
