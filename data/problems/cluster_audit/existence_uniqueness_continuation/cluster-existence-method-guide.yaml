        "id": "stmt-method-guide",
        "title": "Методический блок",
        "text": "Для задач кластера existence-uniqueness-continuation сначала выбирают уровень регулярности правой части, затем отделяют локальную разрешимость от вопроса о максимальном продолжении. Базовый маршрут: непрерывность дает существование по Пеано; локальная липшицевость или C^1-гладкость по фазовой переменной дает Пикара-Линделефа и единственность; оценки Гронуолла дают единственность, непрерывную зависимость и глобальность при линейном росте; критерий продолжения переводит априорную ограниченность, барьер или выход из компактов в ответ об интервале существования.",
