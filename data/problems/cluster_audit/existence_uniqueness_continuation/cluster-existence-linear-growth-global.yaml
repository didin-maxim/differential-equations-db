  "ideas": [
    {
      "id": "idea-main",
      "title": "Линейный рост запрещает конечный уход на бесконечность",
      "text": "На любом конечном отрезке норма решения удовлетворяет интегральному неравенству с правой частью M+L|x|. Гронуолл дает априорную границу, после чего критерий продолжения исключает конечный конец максимального интервала.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Достаточно доказать продолжимость вправо; левая полуось получается тем же рассуждением после замены направления времени. Зафиксируем конечный T>t_0 и рассмотрим решение на его максимальном правом куске внутри [t_0,T]. Для |t|≤T имеем |f(t,x)|≤M+L|x|. Из интегральной формы следует \\(|x(t)|\\le |x_0|+\\int_{t_0}^t (M+L|x(s)|)\\,ds\\). По неравенству Гронуолла \\(|x(t)|\\le (|x_0|+M(T-t_0))e^{L(T-t_0)}\\) для всех t<T, пока решение определено. Значит на каждом конечном промежутке график решения лежит в компакте [t_0,T] x B_R. Если бы правый конец максимального интервала был конечным, теорема продолжения требовала бы выхода из любого такого компакта, что противоречит полученной оценке. Поэтому правый конец не меньше любого T, то есть равен +∞. Применяя тот же довод к уравнению dz/ds=-f(t_0-s,z), получаем продолжимость до -∞.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ]
    }
  ],
