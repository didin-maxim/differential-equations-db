        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f(t,x) непрерывна и локально липшицева по x на \\(\\mathbb R\\times \\mathbb R^n\\). Предположим, что для каждого T>0 существуют M_T,L_T≥0 такие, что |f(t,x)|≤M_T+L_T|x| при |t|≤T. Докажите, что любое решение задачи Коши x'=f(t,x), x(t_0)=x_0 продолжается на всю числовую ось.",
