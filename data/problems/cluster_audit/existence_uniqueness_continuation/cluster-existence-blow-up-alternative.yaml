  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Предположим противное: существует компакт K внутри U и последовательность t_m→T_+- такая, что (t_m,x(t_m)) принадлежит K. После перехода к подпоследовательности можно считать, что (t_m,x(t_m))→(T_+,x_*), причем предельная точка лежит в K, а значит и в U. Возьмем компактную окрестность V этой точки внутри U. На V правая часть ограничена, |f|≤M. Поэтому если s и t достаточно близки к T_+ и соответствующий кусок графика лежит в V, то |x(t)-x(s)|≤M|t-s|. Отсюда x(t) имеет предел x_* при t→T_+-. Задача Коши с начальными данными x(T_+)=x_* имеет локальное решение справа от T_+. Склеив его с прежним решением, получаем продолжение за T_+, что противоречит максимальности. Следовательно, при конечном правом конце график обязан покидать каждый компакт области. Если U=\\(\\mathbb R\\times \\mathbb \\(\\mathbb R^n\\)\\) и |x(t)| не стремится к бесконечности, то на некоторой последовательности x(t_m) ограничены; вместе с t_m→T_+ это дает компакт и противоречие.",
      "status": "ai_checked"
    }
  ],
