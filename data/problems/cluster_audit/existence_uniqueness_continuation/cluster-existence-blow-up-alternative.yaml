  "ideas": [
    {
      "id": "idea-main",
      "title": "Если график имеет предельную точку внутри области, решение склеивается дальше",
      "text": "Ограниченность на компакте дает ограниченную производную, поэтому вдоль последовательности t_m→T_+ возникает предельная точка. Локальная теорема от этой точки продолжает решение за T_+.",
      "status": "ai_checked"
    }
