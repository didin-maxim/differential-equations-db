        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f(t,x) непрерывна и локально липшицева по x в открытой области U в \\(\\mathbb R\\times \\mathbb \\(\\mathbb R^n\\)\\). Пусть x(t) - максимальное решение задачи x'=f(t,x), заданное на правом полуинтервале [t_0,T_+). Докажите: если T_+<+∞, то при t→T_+- график (t,x(t)) выходит из любого компакта K, содержащегося в U. В частности, при U=\\(\\mathbb R\\times \\mathbb \\(\\mathbb R^n\\)\\) выполнено |x(t)|→∞.",
