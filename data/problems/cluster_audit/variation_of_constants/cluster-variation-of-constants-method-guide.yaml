        "cauchy_problem"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя использовать ФСР или фундаментальную матрицу за пределами интервала, где коэффициенты корректны и W или det X не обращаются в нуль. Нельзя забывать нормировку: X(t)c с неопределенной постоянной и \\(\\Phi(t,t_0)x_0\\) имеют разные роли. Нельзя добавлять к частному решению произвольную комбинацию других частных решений; добавляется только решение однородной задачи. Нельзя автоматически выбирать вариацию постоянных для постоянных коэффициентов, если метод неопределенных коэффициентов дает короткий анзац. Нельзя считать резонанс ошибкой формулы: он проявляется в интеграле и должен остаться как множитель t.",
