  "solutions": [
    {
      "id": "guide-method-route",
      "title": "Маршрут применения метода",
      "text": "1. Зафиксировать рабочий интервал непрерывности коэффициентов и правой части. 2. Решить однородное уравнение или выбрать фундаментальную матрицу X(t). 3. Для первого порядка положить \\(y=c(x)y_h(x)\\); для скалярного высшего порядка положить \\(y_p=\\sum y_j u_j\\); для системы положить x=X(t)c(t). 4. Выписать уравнения на производные новых коэффициентов: одно уравнение первого порядка, систему с Вронскианом или \\(c'=X^{-1}b. 5\\). Интегрировать с удобными нижними пределами; изменение пределов поглощается однородным решением. 6. Добавить общее однородное решение и только затем применять начальные, краевые или периодические условия. 7. Если коэффициенты постоянные и правая часть специальная, сравнить с методом неопределенных коэффициентов: часто он короче, но формула вариации объясняет резонанс и область применимости.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
        "wronskian_liouville",
        "matrix_exponential"
      ],
      "definition_ids": [
        "linear_first_order_equation",
