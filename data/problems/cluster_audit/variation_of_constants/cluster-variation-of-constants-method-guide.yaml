    },
    {
      "id": "guide-proof-route",
      "title": "Как доказывать формулу",
      "text": "Для первого порядка доказательство совпадает с интегрирующим множителем: \\(y=ce^{-P}\\) зануляет однородную часть и оставляет \\(c'=qe^P\\).Для высших порядков дополнительные условия на \\(u_j'\\) убирают производные \\(u_j\\) выше первой; последняя строка дает правую часть, а обратимость Вронскиана обеспечивает единственность \\(u_j'\\). Для системы подстановка x=Xc дает X'c+Xc'=AXc+b, после сокращения X'=AX остается Xc'=b. Интегрирование от \\(t_0\\) дает формулу Коши с \\(\\Phi(t,s)=X(t)X(s)^{-1}\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
