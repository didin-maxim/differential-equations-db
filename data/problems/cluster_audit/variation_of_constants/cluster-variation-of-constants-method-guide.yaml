      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Вариация постоянных применяется к неоднородной линейной задаче после того, как однородная часть уже понята. Для уравнения первого порядка y'+p(x)y=q(x) однородное решение \\(y_h=Ce^{-P(x)}\\), P'=p, заменяют на \\(y=c(x)e^{-P(x)}\\) и получают \\(c'(x)=q(x)e^{P(x)}\\);это тот же интегрирующий множитель, записанный как варьирование постоянной. Для уравнения n-го порядка \\(a_n(x)y^{(n)}+...+a_0(x)y=f(x)\\) на интервале, где \\(a_n\\) не обращается в нуль и известна фундаментальная система \\(y_1,...,y_n\\), ищут \\(y_p=\\sum y_j u_j\\). Условия \\(\\sum y_j^{(k)}u_j'=0\\) для k=0,...,n-2 и \\(\\sum y_j^{(n-1)}u_j'=f/a_n\\) дают линейную систему с матрицей Вронскиана. Для системы x'=A(t)x+b(t) фундаментальная матрица X(t) однородной системы дает \\(x(t)=X(t)c(t), c'=X^{-1}b\\), а нормированная матрица Коши \\(\\Phi(t,s)=X(t)X(s)^{-1}\\) записывает задачу Коши как \\(x(t)=\\Phi(t,t_0)x_0+\\int_{t_0}^t \\Phi(t,s)b(s)\\,ds\\). При постоянной A эта формула превращается в интеграл с \\(e^{A(t-s)}\\). Резонанс не является отдельным правилом: если правая часть совпадает с однородным режимом, интеграл вариации постоянных автоматически дает дополнительный множитель t или более высокую степень t. Метод неопределенных коэффициентов быстрее для постоянных коэффициентов и правых частей конечного типа; вариация постоянных лучше, когда коэффициенты переменные, фундаментальная система дана, правая часть произвольная, нужны начальные/краевые условия через фундаментальную матрицу или важно увидеть условие совместности.",
