        "title": "Модельная задача уровня отличника",
        "text": "Пусть A(t) и f(t) непрерывны и T-периодичны, X'=A(t)X, X(0)=I, M=X(T). Для системы x'=A(t)x+f(t) выведите необходимое и достаточное условие существования T-периодического решения в случае, когда матрица I-M может быть необратима. Опишите множество всех таких решений.",
