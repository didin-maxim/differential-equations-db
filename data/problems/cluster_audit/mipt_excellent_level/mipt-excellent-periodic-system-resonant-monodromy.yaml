  "ideas": [
    {
      "id": "idea-main",
      "title": "Периодичность - это разрешимость линейной системы для x(0)",
      "text": "Формула вариации постоянных дает аффинное отображение Пуанкаре \\(x_0 → Mx0+b\\). Периодическое решение существует ровно тогда, когда уравнение \\((I-M)x_0=b\\) совместно; резонанс дает не единственность, а ядро.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Решение с начальным значением \\(x_0\\) имеет вид \\(x(t)=X(t)x_0+X(t)\\int_0^t X(s)^{-1}f(s)\\,ds\\). Обозначим \\(b=M\\int_0^T X(s)^{-1}f(s)\\,ds\\). Тогда \\(x(T)=Mx_0+b\\). Условие \\(x(T)=x(0)\\) эквивалентно \\((I-M)x_0=b\\). Следовательно, периодическое решение существует тогда и только тогда, когда \\(b\\) принадлежит образу \\(I-M\\). Если это выполнено и \\(x_*\\) - одно решение этой линейной системы, то все начальные точки периодических решений имеют вид \\(x_*+h\\), где \\(h\\) принадлежит \\(\\operatorname{Ker}(I-M)\\). Каждая такая начальная точка действительно задает \\(T\\)-периодическое решение: функции \\(x(t+T)\\) и \\(x(t)\\) решают одну и ту же задачу Коши благодаря периодичности \\(A\\) и \\(f\\). Если \\(\\operatorname{Ker}(I-M)\\) ненулево, периодических решений бесконечно много; если ядро нулевое, получается уже известный нерезонансный случай единственности.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
