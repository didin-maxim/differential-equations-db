  "ideas": [
    {
      "id": "idea-main",
      "title": "Достаточно одной допустимой малой вариации",
      "text": "Нулевая функция зануляет первую вариацию, но коэффициент при (h')^2 во второй вариации отрицателен. Высокочастотная синусоида делает вторую вариацию отрицательной при сколь угодно малой норме.",
      "status": "ai_checked",
