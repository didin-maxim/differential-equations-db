  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Уравнение Эйлера-Лагранжа для \\(F=y^2-(y')^2\\) имеет вид \\(F_y-\\frac{d}{dx}F_{y'}=2y+2y''=0\\), и \\(y=0\\) с закрепленными концами ему удовлетворяет. Теперь возьмем допустимую вариацию \\(h(x)=\\sin 2x\\). Для \\(y_\\varepsilon=\\varepsilon h\\) имеем \\(y_\\varepsilon(0)=y_\\varepsilon(\\pi)=0\\) и \\(y_\\varepsilon\\to 0\\) при \\(\\varepsilon\\to 0\\) в \\(C^1\\). Но \\(J[y_\\varepsilon]=\\varepsilon^2\\int_0^\\pi (\\sin^2 2x-4\\cos^2 2x)\\,dx=\\varepsilon^2(\\pi/2-2\\pi)=-3\\pi\\varepsilon^2/2<0\\), тогда как \\(J[0]=0\\). Следовательно, в любой малой окрестности нуля есть допустимая функция с меньшим значением \\(J\\), поэтому слабого локального минимума нет. Условие Лежандра тоже предупреждает об этом: \\(F_{y'y'}=-2<0\\), а для слабого минимума необходимо \\(F_{y'y'}\\ge 0\\) вдоль экстремали.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
  ],
