        "title": "Модельная задача уровня отличника",
        "text": "Для функционала \\(J[y]=\\int_0^\\pi (y^2-(y')^2)\\,dx\\) на классе \\(C^1\\)-функций с \\(y(0)=y(\\pi)=0\\) покажите, что \\(y=0\\) является экстремалью, но не является слабым локальным минимумом. Объясните связь с условием Лежандра.",
