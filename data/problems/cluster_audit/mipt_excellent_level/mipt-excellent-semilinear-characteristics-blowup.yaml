        "text": "Рассмотрим задачу Коши u_t+u_x=u^2, u(x,0)=1/(1+x^2). Найдите решение методом характеристик и укажите максимальную область в плоскости (x,t), куда это решение продолжается как классическое решение, проходящее через начальную прямую t=0.",
