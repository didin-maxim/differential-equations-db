  "ideas": [
    {
      "id": "idea-main",
      "title": "На характеристике остается скалярное уравнение с взрывом",
      "text": "Прямые x-t=const переносят начальное значение, а вдоль каждой такой прямой значение u решает v'=v^2. Поэтому область существования определяется не алгеброй формулы, а временем взрыва на каждой характеристике.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "separate_variables"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Характеристики поля partial_t+partial_x имеют вид x=t+xi, то есть xi=x-t. Если v(t)=u(t+xi,t), то v'=v^2 и v(0)=1/(1+xi^2). Отсюда 1/v(t)=1/v(0)-t=1+xi^2-t. Значит u(x,t)=1/(1+(x-t)^2-t). Для фиксированной характеристики xi решение существует до момента t=1+xi^2 и при t, стремящемся к 1+xi^2 снизу, стремится к +∞. Назад по времени знаменатель не обращается в нуль. Поэтому максимальная область, содержащая начальную прямую, задается неравенством t<1+(x-t)^2; на ее границе возникает конечный взрыв вдоль соответствующей характеристики.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "separate_variables"
      ]
    }
