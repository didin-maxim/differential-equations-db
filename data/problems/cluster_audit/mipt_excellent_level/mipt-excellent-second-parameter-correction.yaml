  "ideas": [
    {
      "id": "idea-main",
      "title": "Сравнить коэффициенты при степенях параметра",
      "text": "Нулевая траектория при \\(\\mu=0\\) делает первую вариацию очень простой, но квадрат \\(y^2\\) впервые влияет только на второй поправке.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "По гладкой зависимости от параметра можно подставить \\(y=\\mu z+\\mu^2 w+o(\\mu^2)\\) в уравнение на любом малом фиксированном отрезке, где решение существует. Левая часть равна \\(\\mu z'+\\mu^2 w'+o(\\mu^2)\\). Правая часть равна \\((\\mu z+\\mu^2 w)^2+\\mu t+o(\\mu^2)=\\mu t+\\mu^2 z^2+o(\\mu^2)\\). Из коэффициентов при \\(\\mu\\) получаем z'=t, z(0)=0, поэтому \\(z=t^2/2\\). Из коэффициентов при \\(\\mu^2\\) получаем \\(w'=z^2=t^4/4, w(0)=0\\), поэтому \\(w=t^5/20\\). Значит \\(y(t,\\mu)=\\mu t^2/2+\\mu^2 t^5/20+o(\\mu^2)\\). В терминах производных по параметру это означает \\(partial \\mu y|_{\\mu=0}=t^2/2\\) и \\(partial \\mu^2 y|_{\\mu=0}=t^5/10\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
