        "id": "stmt-original",
        "title": "Модельная задача уровня отличника",
        "text": "Пусть \\(y(t,\\mu)\\) решает задачу Коши \\(y'=y^2+\\mu t, y(0,\\mu)=0\\). Не решая нелинейное уравнение явно, найдите первые два ненулевых члена разложения \\(y(t,\\mu)=\\mu z(t)+\\mu^2 w(t)+o(\\mu^2)\\) на фиксированном малом отрезке по t.",
