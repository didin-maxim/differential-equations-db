        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера separable-homogeneous-first-order сначала проверяют две диагностики. Разделяющееся уравнение приводится к виду y'=a(x)b(y) или A(x) dx+B(y) dy=0; перед делением на b(y) надо отдельно выписать стационарные решения b(y_*)=0, иначе они исчезают из ответа. Оставшаяся ветвь решается на рабочем промежутке, где коэффициенты определены и b(y) не обращается в нуль: int dy/b(y)=int a(x) dx+C, затем учитываются начальные данные и максимальный интервал решения. Однородное уравнение первого порядка распознается по виду y'=Phi(y/x) или по однородной 1-форме M dx+N dy=0 одинаковой степени; на промежутке x>0 или x<0 кладут y=xv, получают v+xv'=Phi(v), то есть x dv/dx=Phi(v)-v, и снова отделяют особые прямые Phi(v)=v до деления. Рабочая область для однородной замены - не вся плоскость, а выбранный конус или сектор x != 0, где отношение v=y/x, исходная правая часть и интегралы имеют смысл. Логистическое уравнение является базовой автономной разделяющейся моделью: его равновесия читаются до интегрирования, фазовая прямая объясняет монотонность и невозможность пересечения стационарных уровней при единственности. Линейные уравнения первого порядка, точные формы и ортогональные траектории находятся рядом, но распознаются другим главным объектом: стандартной линейной формой y'+p(x)y=q(x), потенциалом 1-формы или заменой поля наклонов на отрицательно обратное.",
