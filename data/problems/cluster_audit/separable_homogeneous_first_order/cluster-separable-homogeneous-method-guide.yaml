  "solutions": [
    {
      "id": "guide-separable-route",
      "title": "Маршрут для разделяющихся уравнений",
      "text": "1. Привести уравнение к виду y'=a(x)b(y) или A(x) dx+B(y) dy=0 и зафиксировать область исходной записи. 2. До деления найти все уровни b(y)=0 и записать стационарные решения, если они допустимы. 3. На каждой нестабильной ветви, где b(y) != 0, разделить переменные и проинтегрировать. 4. Для задачи Коши выбрать константу и ту компоненту области, которая содержит начальную точку. 5. Проверить, не были ли при алгебре добавлены или потеряны решения из-за логарифмов, корней, знаменателей и обратных функций. 6. В автономном случае дополнить формулу фазовой прямой: знаки правой части между равновесиями дают монотонность и устойчивость уровней.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "separate_variables",
        "phase_line_signs"
      ],
      "definition_ids": [
        "separable_equation",
        "equilibrium",
        "phase_line",
        "initial_value_problem",
        "maximal_solution"
      ]
    },
    {
      "id": "guide-homogeneous-route",
      "title": "Маршрут для однородной замены",
      "text": "1. Проверить, что правая часть зависит от y/x, x/y или что M и N в 1-форме однородны одной степени. 2. Выбрать рабочий промежуток x>0 или x<0; если есть начальное условие, знак x берется из начальной точки. 3. Положить y=xv и заменить y' на v+xv'. 4. Получить x v'=Phi(v)-v и до деления отдельно проверить прямые y=cx, где Phi(c)=c. 5. На оставшихся секторах разделить переменные dv/(Phi(v)-v)=dx/x. 6. Вернуться к y=xv, указать сектор или конус, где решение действительно, и проверить исходное уравнение в точках, где знаменатели могли обращаться в нуль.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "separate_variables"
      ],
      "definition_ids": [
        "solution",
        "integral_curve",
        "maximal_solution"
      ]
    },
    {
      "id": "guide-boundaries",
      "title": "Границы с соседними кластерами",
      "text": "Разделение переменных остается главным кластером, если решение начинается с распознавания произведения a(x)b(y) или с замены y=xv. Линейный кластер выбирают, когда уравнение уже имеет форму y'+p(x)y=q(x) и решается множителем exp(int p). Exact-forms выбирают, когда главным объектом является 1-форма и потенциал. Orthogonal-trajectories выбирают, когда цель - построить семейство кривых, ортогональных данному; возникающее после этого разделение является внутренним шагом, а не основанием переносить задачу сюда.",
