  "solutions": [
    {
      "id": "guide-method-route",
      "title": "Маршрут решения",
      "text": "1. Привести уравнение к одной из форм: Бернулли \\(y'+py=qy^n\\) или Риккати \\(y'=ay^2+by+c\\); если форма уже y'+py=q, отправить задачу в linear-first-order-ode. 2. Выбрать рабочий промежуток, где коэффициенты непрерывны и допустимы деления или степени. 3. Для Бернулли отдельно проверить особые ветви, особенно y=0, затем положить \\(z=y^{1-n}\\) и получить линейное уравнение для z. 4. Для Риккати проверить, дано ли или угадывается ли частное решение \\(y_0\\); после этого положить \\(y=y_0+1/u\\) и решить линейное уравнение для u. 5. Если \\(y_0\\) не найдено, решить, требуется ли переход к линейному уравнению второго порядка через логарифмическую производную, или задача должна остаться на уровне качественного анализа. 6. Решить полученное линейное уравнение интегрирующим множителем. 7. Вернуться к y, добавить потерянные ветви и указать интервалы, где обратная замена имеет смысл.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear",
        "known_riccati_solution",
        "logarithmic_derivative"
      ],
      "definition_ids": [
        "linear_first_order_equation",
        "integrating_factor",
        "bernoulli_equation",
        "riccati_equation",
        "general_solution",
        "particular_solution"
      ]
    },
    {
      "id": "guide-method-choice",
      "title": "Как выбрать прием",
      "text": "Бернулли узнается по одной нелинейной степени \\(y^n\\) рядом с линейной частью y'+py. Риккати узнается по квадратичному многочлену по y в правой части; если коэффициент при \\(y^2\\) равен нулю, это уже линейное уравнение. Частное решение Риккати обычно пробуют искать среди постоянных, x, 1/x, простых сдвигов и выражений, видимых из коэффициентов. Если уравнение не разрешено относительно y' или содержит несколько возможных наклонов, сначала нужна диагностика ветвей, а не подстановка Бернулли или Риккати.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "known_riccati_solution",
        "implicit_function_theorem"
      ],
      "definition_ids": [
        "bernoulli_equation",
        "riccati_equation",
        "linear_first_order_equation",
        "discriminant_curve"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя делить на \\(y^n\\) и затем забывать проверить y=0. Нельзя включать известное решение Риккати в семейство \\(y_0+1/u\\) без отдельной записи. Нельзя объявлять ответ глобальным, если знаменатель u или выражение \\(y^{1-n}\\) обращается в нуль. Нельзя относить к этому кластеру любую замену, после которой возникло линейное уравнение: автономная редукция p=p(y), однородная замена y=xv и неявный дискриминант имеют собственные политики. Нельзя переносить скалярную формулу Риккати на матрицы без проверки обратимости и порядка умножения.",
