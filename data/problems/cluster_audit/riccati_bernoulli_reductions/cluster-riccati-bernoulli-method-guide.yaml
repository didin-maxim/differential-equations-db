      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Кластер riccati-bernoulli-reductions покрывает нелинейные уравнения первого порядка, где главный шаг состоит не в самом интегрирующем множителе, а в распознавании замены, после которой появляется линейное уравнение. Для Бернулли \\(y'+p(x)y=q(x)y^n\\) при n ≠ 0,1 на промежутке, где выбранная ветвь y допустима, делят на \\(y^n\\) и кладут \\(z=y^{1-n}\\); тогда z'+(1-n)p(x)z=(1-n)q(x). Для Риккати \\(y'=a(x)y^2+b(x)y+c(x)\\) известное частное решение \\(y_0\\) переводит остальные решения заменой \\(y=y_0+1/u\\) в линейное уравнение \\(u'+(2a y_0+b)u=-a\\). Если частное решение не дано, его обычно надо угадать из простых постоянных, линейных, рациональных или симметрийных кандидатов; без такого входа общее уравнение Риккати обычно сводится к линейному уравнению второго порядка заменой y=-u'/(a u), когда a не обращается в нуль, а не к еще одному линейному уравнению первого порядка. Каждая замена требует проверки потерь: при делении на \\(y^n\\) могут исчезнуть нулевые решения, при \\(y=y_0+1/u\\) отдельно остается \\(y_0\\), нули u становятся полюсами y, а рабочий промежуток нельзя переносить через нули коэффициентов и точки, где выбрана другая ветвь степени. Граница с linear-first-order-ode проходит после замены: линейная формула решает уже новую неизвестную. Граница с separable-homogeneous-first-order проходит по главному распознаванию: если уравнение сразу разделяется или становится разделяющимся после y=xv, это соседний маршрут. Граница с implicit-ode-discriminant возникает, когда исходно задано F(x,y,y')=0 и нужно выбирать ветви или дискриминант, а не применять готовую форму Бернулли/Риккати. Матричное Риккати похоже названием и идеей линеаризации, но имеет собственные ограничения некоммутативности и обратимости матриц; его нельзя автоматически сводить к скалярной формуле \\(y=y_0+1/u\\).",
