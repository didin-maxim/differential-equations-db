      "id": "sol-main",
      "title": "Решение через систему первого порядка",
      "text": "Проверим догадку theta(t)=π. Тогда theta'=0, theta''=0 и theta''+sin theta=0+sin π=0; начальные условия theta(0)=π, theta'(0)=0 выполнены. Для единственности перепишем уравнение как систему x'=v, v'=-sin x. Правая часть F(x,v)=(v,-sin x) гладкая на всей плоскости, значит локально липшицева по (x,v). По теореме существования и единственности задача Коши с начальным вектором (π,0) имеет единственное локальное решение. Постоянная траектория (x,v)=(π,0) уже является таким решением, поэтому любое другое решение с этими данными совпадает с ней около t=0, а затем совпадение продолжается по локальной единственности. Следовательно theta(t)=π. Упоминание эллиптических интегралов здесь служит только предупреждением: общий маятник тяжелый, но эта конкретная задача Коши решается одной проверкой и единственностью.",
