        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "В задачах кластера guess-cauchy-solution-uniqueness ответ получают не через общее решение, а через короткую цепочку: заметить простой кандидат по начальным данным, проверить его подстановкой, проверить локальную единственность задачи Коши и заключить, что других решений с теми же начальными данными нет. Кандидатом обычно служит равновесие автономного поля, нулевое решение, движение на инвариантной прямой или плоскости, симметрично построенная траектория либо специально видимая кривая вроде y=t. Для уравнений высокого порядка и систем единственность проверяют в фазовых переменных; для продолжения совпадения на больший интервал используют локальную единственность в каждой точке уже найденной траектории.",
