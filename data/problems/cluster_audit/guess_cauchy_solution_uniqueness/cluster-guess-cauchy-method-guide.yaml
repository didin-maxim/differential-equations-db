  "ideas": [
    {
      "id": "idea-read-initial-data",
      "title": "Начальные данные подсказывают кандидата",
      "text": "Если начальная точка попала в нуль правой части автономного уравнения, первым кандидатом является постоянное равновесие. Если все начальные координаты и производные зануляют уравнение, пробуют нулевое решение. Если начальная точка лежит на диагонали, оси, плоскости симметрии или уровне, проверяют инвариантность этого множества и решают уже ограниченную задачу.",
      "status": "ai_checked",
