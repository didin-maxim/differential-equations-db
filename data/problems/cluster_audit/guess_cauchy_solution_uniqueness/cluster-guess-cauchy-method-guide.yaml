        "integral_curve"
      ]
    },
    {
      "id": "idea-no-general-solution",
      "title": "Общее решение не является целью",
      "text": "После проверки конкретной траектории общая квадратура, полный фазовый портрет или формула через фундаментальную матрицу нужны только тогда, когда единственность неприменима или надо описать все начальные данные. В этом кластере достаточно решить ровно ту задачу Коши, которая задана.",
      "status": "ai_checked",
      "definition_ids": [
        "general_solution",
        "particular_solution",
        "cauchy_problem"
      ]
    },
    {
      "id": "idea-uniqueness-checklist",
      "title": "Единственность проверяется в окрестности, а не вдоль одной кривой",
      "text": "Стандартная проверка: записать уравнение в нормальной форме z'=F(t,z), убедиться, что начальная точка лежит в области определения, и проверить локальную липшицевость F по фазовым переменным. Достаточно C^1-гладкости по z на окрестности; для линейной системы достаточно непрерывности коэффициентов. Для уравнения n-го порядка фазовый вектор содержит функцию и первые n-1 производных.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof",
        "state_vector_uniqueness"
      ],
      "definition_ids": [
        "initial_value_problem",
        "lipschitz_condition",
        "solution"
      ]
    },
    {
      "id": "idea-continuation-of-coincidence",
      "title": "Локальное совпадение продолжается шаг за шагом",
      "text": "Теорема Пикара-Линделефа сначала дает совпадение найденного кандидата с любым другим решением только около начального момента. Если оба решения существуют дальше, то в конце уже доказанного участка они имеют одинаковый фазовый вектор; новая локальная единственность продлевает совпадение. Поэтому ответ корректен на всем общем интервале существования, а при глобальном кандидате часто на всем максимальном интервале.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof"
      ],
      "definition_ids": [
        "maximal_solution",
        "lipschitz_condition"
      ]
    },
    {
      "id": "idea-nonlipschitz-failure",
      "title": "Нелипшицевость ломает быстрый вывод",
      "text": "Если правая часть непрерывна, но не липшицева по фазовой переменной в начальной точке, угаданное решение может быть не единственным. Типовой механизм - отложенные решения уравнений вида y'=c|y|^alpha при 0<alpha<1: нулевая траектория существует, но к ней добавляются решения, которые некоторое время стоят в нуле и затем уходят.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof"
      ],
      "definition_ids": [
        "lipschitz_condition",
        "initial_value_problem"
      ]
    },
    {
      "id": "idea-model-examples",
      "title": "Один маршрут покрывает ОДУ, системы и маятник",
      "text": "Для y'=f(y), f(a)=0, ответ y=a фиксируется единственностью. Для theta''+sin theta=0 с данными (π,0) надо перейти к системе theta'=v, v'=-sin theta и увидеть равновесие. Для системы с начальной точкой на инвариантной диагонали сначала решают простое уравнение на диагонали, затем гладкость полного поля запрещает сход с найденной траектории.",
      "status": "ai_checked",
