  "solutions": [
    {
      "id": "guide-solution-route",
      "title": "Маршрут решения",
      "text": "1. Выписать начальный фазовый вектор: для первого порядка это y(t_0), для второго - (y(t_0),y'(t_0)), для системы - вся начальная точка. 2. По данным попробовать простые кандидаты: константу, нуль, прямую y=t+c, экспоненту на диагонали, симметричную или инвариантную траекторию. 3. Подставить кандидата в исходное уравнение, а не только в упрощенную версию. 4. Привести задачу к z'=F(t,z) и проверить условия единственности в окрестности начальной точки: F определена и локально липшицева по z. 5. Сослаться на единственность задачи Коши; если ответ нужен на большем интервале, отдельно сказать, что совпадение продолжается по локальной единственности вдоль найденной траектории. 6. Не искать общее решение, если вопрос уже закрыт конкретной задачей Коши.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof",
        "state_vector_uniqueness"
      ],
      "definition_ids": [
        "cauchy_problem",
        "integral_curve",
        "lipschitz_condition"
      ]
    },
    {
      "id": "guide-when-method-breaks",
      "title": "Граница применимости",
      "text": "Метод нельзя применять автоматически, если правая часть разрывна, не задана в начальной точке, не разрешена относительно старшей производной или не липшицева там, где нужна единственность. В таких случаях угаданное решение остается решением, но не обязано быть единственным. Тогда задача уходит в соседний кластер existence-uniqueness-continuation: надо доказывать существование по Пеано, строить контрпример к единственности, выбирать ветвь неявного уравнения или анализировать максимальное продолжение.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof",
        "implicit_function_theorem"
      ],
      "definition_ids": [
        "initial_value_problem",
        "maximal_solution",
        "lipschitz_condition"
      ]
    },
    {
      "id": "guide-neighbor-clusters",
      "title": "Связь с соседними кластерами",
      "text": "С phase-line-stability связь содержательна только для автономных равновесий: там изучают все равновесия и устойчивость, здесь нужно одно равновесное решение с конкретными данными Коши. С existence-uniqueness-continuation связь идет через теорему Пикара-Линделефа и контрпримеры к Липшицу: широкий кластер выбирает и доказывает теоремы, а этот кластер применяет уже проверенную единственность к найденному кандидату.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof",
        "phase_line_signs"
      ],
