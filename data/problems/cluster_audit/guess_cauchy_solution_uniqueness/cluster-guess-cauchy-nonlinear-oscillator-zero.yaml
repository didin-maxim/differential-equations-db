      "title": "Сведение к системе",
      "text": "Функция y(t)=0 является решением: y'=0, y''=0, и все слагаемые \\(e^{y^2}\\)y', y, y^3 равны нулю. Начальные условия также выполнены. Перейдем к системе u'=v, v'=-\\(e^{u^2}\\)v-u-u^3. Ее правая часть гладкая по (u,v) на всей плоскости, следовательно локально липшицева. По теореме Пикара-Линделефа задача Коши для системы с начальными данными (u(0),v(0))=(0,0) имеет единственное локальное решение. Поскольку постоянная траектория (u,v)=(0,0) уже решает эту задачу, всякое решение исходного уравнения с заданными начальными данными совпадает с нулевым решением. На любом большем интервале совпадение продолжается тем же локальным аргументом. Ответ: y(t)=0.",
