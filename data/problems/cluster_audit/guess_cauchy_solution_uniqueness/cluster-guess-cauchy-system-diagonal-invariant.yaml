  "solutions": [
    {
      "id": "sol-main",
      "title": "Проверка инвариантной траектории",
      "text": "Попробуем искать решение на диагонали x=y=u. Тогда sin(y-x)=sin 0=0, а система сводится к u'=u. Из u(0)=1 получаем u(t)=\\(e^{t}\\). Значит кандидат: x(t)=\\(e^{t}\\), y(t)=\\(e^{t}\\). Проверим его в исходной системе: x'=\\(e^{t}\\)=x+0, y'=\\(e^{t}\\)=y+0, начальные условия выполнены. Правая часть F(x,y)=(x+sin(y-x), y+sin(y-x)) гладкая на R^2, значит локально липшицева. Поэтому задача Коши с начальной точкой (1,1) имеет единственное локальное решение. Поскольку найденная траектория решает эту задачу, любое решение совпадает с ней; продолжение совпадения на весь общий интервал снова следует из локальной единственности. Ответ: x(t)=y(t)=\\(e^{t}\\).",
      "status": "ai_checked",
