      "title": "Остаться на диагонали",
      "text": "Начальная точка лежит на диагонали x=y. На этой прямой нелинейная добавка sin(y-x) исчезает, и остается простое уравнение u'=u. Единственность запрещает траектории сойти с найденного решения.",
