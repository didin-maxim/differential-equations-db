  "solutions": [
    {
      "id": "sol-main",
      "title": "Проверка и единственность",
      "text": "Угадаем постоянное решение y(t)=0. Тогда y'=0, а \\(e^{y^2}\\) sin y=\\(e^{0}\\) sin 0=0, значит уравнение выполнено; начальное условие y(0)=0 тоже выполнено. Правая часть f(y)=\\(e^{y^2}\\) sin y является C^1-функцией, поэтому в любой окрестности точки y=0 она локально липшицева по y. По теореме Пикара-Линделефа задача Коши с данными y(0)=0 имеет единственное локальное решение. Следовательно всякое решение совпадает с y=0 около t=0. Если рассматривать решение на большем интервале, то в каждой его точке, где оно уже равно нулю, та же локальная единственность продолжает совпадение. Итак, решение задачи Коши: y(t)=0 на всем интервале существования. Интегрировать разделяющееся уравнение не нужно: соответствующая квадратура имеет особенность при y=0 и не является частью решения этой конкретной задачи Коши.",
