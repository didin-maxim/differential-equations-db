      "id": "sol-main",
      "title": "Решение",
      "text": "Дифференцируя y=(x-a)^2 при постоянном a, получаем y'=2(x-a). Поэтому (x-a)^2=(y')^2/4, и исключение a дает уравнение (y')^2=4y. Каждая парабола из исходного семейства ему удовлетворяет. Огибающая находится из системы y=(x-a)^2, partial_a[(x-a)^2]=0. Второе равенство дает a=x, значит y=0. Эта прямая не является одной из парабол y=(x-a)^2 при фиксированном a, но она удовлетворяет восстановленному уравнению: при y=0 имеем y'=0 и (y')^2=4y. Значит y=0 - особое решение, возникшее как огибающая семейства. Именно поэтому такую карточку нельзя считать обычной заменой формы кривой: при восстановлении ОДУ появляется новая кривая, отсутствующая в исходном однопараметрическом наборе.",
      "status": "ai_checked",
