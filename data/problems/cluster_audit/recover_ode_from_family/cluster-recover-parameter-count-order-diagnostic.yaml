  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "В пункте (a) один независимый параметр C. Дифференцирование дает \\(y'=-Ce^{-x}=-y\\),поэтому минимальный порядок равен 1 и можно взять y'+y=0. В пункте (b) два независимых параметра C1,C2: значение \\(y(x_0)\\) и наклон \\(y'(x_0)\\) можно менять независимо, значит минимальный порядок равен 2; уравнение y''=0 имеет ровно семейство прямых y=C1 x+C2. В пункте (c) видимость двух параметров обманчива: \\(C1e^{x+C2}e^{-x}=C1e^{C2}\\), то есть меняется только одна эффективная константа K. Семейство имеет вид \\(y=3+K\\), поэтому минимальный порядок равен 1 и можно взять \\(y'=0\\). Именно здесь независимость параметров проверяется до дифференцирования: если считать C1 и C2 независимыми без учета их произведения, получится ложный второй порядок.",
