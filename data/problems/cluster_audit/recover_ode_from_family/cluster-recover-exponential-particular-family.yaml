        "title": "Формулировка",
        "text": "Для семейства кривых \\(y=e^x+Ce^{-x}\\), где \\(C\\) - произвольная постоянная, восстановите дифференциальное уравнение первого порядка, для которого эти кривые являются интегральными. Объясните, почему здесь сначала полезно отделить фиксированное частное решение.",
