  "ideas": [
    {
      "id": "idea-main",
      "title": "Убрать фиксированную часть семейства",
      "text": "Параметр сидит только в разности \\(y-e^x\\). Дифференцирование этой разности сразу дает однородный множитель \\(e^{-x}\\), а затем параметр исключается без интегрирования.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из заданного семейства имеем \\(y-e^x=Ce^{-x}\\). Дифференцируем при постоянном \\(C\\): \\(y'-e^x=-Ce^{-x}\\). Но \\(Ce^{-x}=y-e^x\\), поэтому \\(y'-e^x=-(y-e^x)\\). После приведения получаем искомое уравнение \\(y'+y=2e^x\\). Обратно, если решить это линейное уравнение, то \\((e^x y)'=2e^{2x}\\), откуда \\(e^x y=e^{2x}+C\\) и \\(y=e^x+Ce^{-x}\\). Значит восстановленное ОДУ имеет ровно данное однопараметрическое семейство решений.",
      "status": "ai_checked",
      "standard_idea_ids": [
