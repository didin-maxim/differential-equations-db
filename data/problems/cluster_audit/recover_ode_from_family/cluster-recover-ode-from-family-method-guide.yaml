    {
      "id": "idea-neighbor-boundaries",
      "title": "Граница с соседними кластерами задается целью",
      "text": "Если после исключения параметра требуется построить ортогональное семейство, задача уходит в orthogonal-trajectories. Если полученное уравнение просто линейное y'+p(x)y=q(x) и основной ход - интегрирующий множитель, это linear-first-order-ode. Если главный вопрос - число ветвей p, дискриминант F=0,F_p=0 или статус особой кривой у уже заданного F(x,y,p)=0, это implicit-ode-discriminant.",
