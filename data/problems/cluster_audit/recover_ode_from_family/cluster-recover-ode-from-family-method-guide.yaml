  "ideas": [
    {
      "id": "idea-count-independent-parameters",
      "title": "Считать независимые параметры, а не символы",
      "text": "Порядок восстанавливаемого ОДУ определяется числом независимых произвольных постоянных. Фиксированная частная часть семейства не увеличивает порядок, а зависимость вида C2=2C1 уменьшает его; поэтому перед дифференцированием надо понять размерность семейства.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ],
      "definition_ids": [
        "general_solution",
        "particular_solution",
        "solution"
      ]
    },
    {
      "id": "idea-differentiate-at-fixed-parameters",
      "title": "Дифференцировать при постоянных параметрах",
      "text": "При переходе от семейства к ОДУ параметры считаются постоянными вдоль каждой кривой. Это дает уравнения для y', y'', ... и позволяет исключить C1,...,Ck; дифференцирование по параметру решает другую задачу и относится к чувствительности решений.",
      "status": "ai_checked",
      "standard_idea_ids": [
