        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "В задачах кластера recover-ode-from-family исходным объектом является семейство кривых Phi(x,y,C1,...,Ck)=0 или y=phi(x,C1,...,Ck), которое требуется сделать семейством интегральных кривых некоторого ОДУ. Если C1,...,Ck - действительно независимые постоянные и семейство невырождено, ожидаемый минимальный порядок равен k: исходное равенство дифференцируют по x при фиксированных параметрах k раз и затем исключают параметры из системы Phi=0, dPhi/dx=0, ..., d^k Phi/dx^k=0. Для одного параметра обычно достаточно исходной формулы и первой производной; для двух параметров нужна вторая производная и проверка, что параметры не связаны скрытым условием. Полученное уравнение может быть записано явно y'=f(x,y), как линейное уравнение, или неявно F(x,y,y')=0; после исключения надо проверить область, деления, вырожденные кривые и обратное включение: каждая кривая исходного семейства действительно удовлетворяет ОДУ. Огибающая исходного семейства может стать особым решением восстановленного ОДУ, но это не меняет направления задачи: здесь сначала дано семейство, а ОДУ строится по нему. Поэтому recover-family отделяется от ортогональных траекторий, где после восстановления наклона нужно заменить его на отрицательно обратный и построить новое семейство, и от implicit-ode-discriminant, где исходно уже дано неявное ОДУ F(x,y,p)=0 и анализируются его ветви, дискриминант F=0, F_p=0 и особые решения.",
