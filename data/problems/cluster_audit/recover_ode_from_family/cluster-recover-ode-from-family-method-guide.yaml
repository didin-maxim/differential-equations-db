      ]
    },
    {
      "id": "idea-envelope-singular-solution",
      "title": "Огибающая может появиться после восстановления",
      "text": "Если семейство имеет огибающую, восстановленное неявное ОДУ часто допускает ее как особое решение. Нужно отличать эту проверку от задач Клеро, Лагранжа и общего implicit-discriminant: там ОДУ дано заранее, а здесь оно только строится по семейству кривых.",
      "status": "ai_checked",
