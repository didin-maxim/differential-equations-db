  "solutions": [
    {
      "id": "guide-route",
      "title": "Маршрут восстановления",
      "text": "1. Записать семейство в удобной форме Phi(x,y,C)=0 или y=phi(x,C). 2. Определить число независимых параметров и ожидаемый минимальный порядок. 3. Дифференцировать по x при фиксированных параметрах столько раз, сколько нужно для исключения C. 4. Исключить параметры алгебраически, сохранив сведения о делениях и рабочей области. 5. Проверить подстановкой, что исходные кривые удовлетворяют полученному ОДУ. 6. Если появилось неявное уравнение F(x,y,y')=0, отдельно проверить огибающую и особые кривые, но не подменять этим исходную задачу на восстановление.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function",
        "implicit_function_theorem"
      ],
      "definition_ids": [
        "ordinary_differential_equation",
        "integral_curve",
        "singular_solution"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не считать порядок по количеству букв C, если параметры связаны или часть семейства фиксирована. Не дифференцировать параметры как функции x. Не делить на выражение, которое может задавать отдельную кривую, без последующей проверки. Не относить все задачи с огибающей к Клеро: важен порядок постановки. Не отправлять задачу в orthogonal-trajectories, если ортогональное семейство не требуется. Не добавлять новые карточки, где меняется только вид элементарной функции, а метод остается тем же.",
      "status": "ai_checked",
