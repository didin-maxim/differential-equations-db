  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть \\(y=ax^2+bx\\). Тогда y'=2ax+b и y''=2a. Из этих трех равенств исключим a и \\(b: 2y=2ax^2+2bx\\), а \\(x^2y''-2xy'=2ax^2-2x(2ax+b)=-2ax^2-2bx\\). Поэтому \\(x^2y''-2xy'+2y=0\\). Проверка обратного включения короткая: при x≠0 это уравнение Эйлера, проба \\(y=x^m\\) дает (m-1)(m-2)=0, значит \\(y=C1 x+C2 x^2\\). На любом промежутке, не проходящем через 0, это ровно исходное двухпараметрическое семейство; многочлены продолжают решение через 0. Один параметр нельзя сохранить в общем случае, потому что через фиксированную точку с фиксированным наклоном можно подобрать единственную пару a,b, а значит семейство имеет две независимые начальные степени свободы.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "differentiate_auxiliary_function"
      ]
    }
