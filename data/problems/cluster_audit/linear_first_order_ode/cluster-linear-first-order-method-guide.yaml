        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера linear-first-order-ode сначала выбирают рабочий промежуток, на котором уравнение приводится к стандартной форме y'+p(x)y=q(x), а p и q непрерывны. Интегрирующий множитель mu(x)=\\(e^{int p(x) dx}\\) превращает левую часть в (mu y)', поэтому общее решение на этом промежутке имеет вид y=mu^{-1}(C+int mu q dx), а для задачи Коши удобнее писать формулу с нижним пределом x_0: y(x)=mu(x)^{-1}(mu(x_0)y_0+\\(\\int_{x_0}^x\\) mu(s)q(s) ds). Начальное условие определяет константу единственно; периодическое или двухточечное условие после той же формулы дает алгебраическое условие совместимости на константу, а иногда и условие на правую часть. Область определения является частью ответа: нельзя переходить через нули старшего коэффициента, разрывы p,q или точки, где преобразование было выполнено после деления. Линейное уравнение можно переписать как 1-форму, но если главный объект - точность M dx+N dy и восстановление потенциала, задача относится к соседнему кластеру integrating-factor-exact-forms. Уравнения Бернулли и Риккати входят сюда только после стандартной замены, когда уже получено линейное уравнение для новой неизвестной; сам шаг распознавания нелинейной редукции остается в riccati-bernoulli-reductions.",
