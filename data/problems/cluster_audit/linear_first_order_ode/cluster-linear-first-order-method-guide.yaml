      "title": "Условия после формулы становятся условиями на константу",
      "text": "Начальное условие всегда выбирает единственное значение C на рабочем интервале. Периодическое, ограниченное на полуоси или двухточечное условие может дать единственную константу, семейство решений или условие совместимости на q.",
      "status": "ai_checked",
