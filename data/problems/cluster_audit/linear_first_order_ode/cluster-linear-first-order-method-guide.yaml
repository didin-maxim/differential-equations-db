  "solutions": [
    {
      "id": "guide-method-route",
      "title": "Маршрут решения",
      "text": "1. Привести уравнение к виду y'+p(x)y=q(x) и зафиксировать рабочий промежуток непрерывности. 2. Построить mu=\\(e^{int p}\\); при задаче Коши брать определенный множитель mu(x)=\\(e^{\\int_{x_0}^x p(s) ds}\\), чтобы сразу иметь mu(x_0)=1. 3. Умножить уравнение на mu и записать (mu y)'=mu q. 4. Проинтегрировать: для общего решения оставить C, для задачи Коши использовать \\(\\int_{x_0}^x\\). 5. Если дано периодическое, ограниченное или краевое условие, подставить его в формулу и решить полученное алгебраическое условие на C; отдельно проверить совместимость, если коэффициент при C исчезает. 6. Вернуться к исходной переменной и проверить ограничения, появившиеся при делении или замене. 7. Если линейное уравнение возникло из Бернулли, Риккати или другой замены, проверить особые решения, которые могли быть потеряны до линейного этапа.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ],
      "definition_ids": [
        "linear_first_order_equation",
        "integrating_factor",
        "general_solution",
        "initial_value_problem",
        "boundary_value_problem"
      ]
    },
    {
      "id": "guide-periodic-boundary-route",
      "title": "Периодические и краевые условия",
      "text": "Для T-периодических p,q удобно брать mu(t)=\\(e^{\\int_0^t p}\\). Формула за период дает mu(T)y(T)-y(0)=\\(\\int_0^T\\) mu q dt. Если требуется y(T)=y(0), то (mu(T)-1)y(0)=\\(\\int_0^T\\) mu q dt: при mu(T)≠1 периодическое решение единственно, а при mu(T)=1 нужна совместимость \\(\\int_0^T\\) mu q dt=0. Для двухточечного условия ay(a)+by(b)=gamma действуют так же: выражают y(b) через y(a) и получают одно линейное уравнение на свободную константу.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ],
      "definition_ids": [
        "boundary_value_problem",
        "particular_solution",
        "general_solution"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя применять формулу на интервале, пересекающем разрыв p или q. Нельзя забывать, что исходное уравнение могло иметь старший коэффициент a(x)y'; после деления на a(x) точки a(x)=0 надо рассматривать отдельно. Нельзя относить задачу к exact-forms только потому, что в ней есть слово 'интегрирующий множитель': для линейного уравнения множитель сворачивает (mu y)', а для точной формы делает полным дифференциалом M dx+N dy. Нельзя после замены Бернулли или Риккати терять решения y=0 или известное частное решение. Нельзя добавлять новую карточку, если она меняет только p,q и не добавляет новой роли условия, области или редукции.",
      "status": "ai_checked",
