  "ideas": [
    {
      "id": "idea-standard-form-domain",
      "title": "Нормальная форма живет на выбранном интервале",
      "text": "Перед множителем надо разделить на старший коэффициент и явно выбрать компоненту области, где это деление законно и p,q непрерывны. Формула решения не переносится автоматически через особые точки коэффициентов.",
      "status": "ai_checked",
      "definition_ids": [
        "linear_first_order_equation",
        "solution",
        "cauchy_problem"
      ]
    },
    {
      "id": "idea-integrating-factor",
      "title": "Множитель сворачивает производную произведения",
      "text": "Вся формула следует из одного тождества: если mu'=p mu, то (mu y)'=mu(y'+py). Поэтому выбор mu=\\(e^{int p}\\) важнее вычисления конкретной первообразной.",
      "status": "ai_checked",
      "standard_idea_ids": [
