    {
      "id": "idea-neighbor-clusters",
      "title": "Соседние методы отличаются главным распознаванием",
      "text": "Если дано y'+p(x)y=q(x), это прямой линейный маршрут. Если дана точная или почти точная 1-форма, главный шаг - проверить M_y=N_x или подобрать множитель формы. Если дана Бернулли или Риккати, главный шаг - сначала выполнить замену; линейная формула включается только после нее. Если уравнение однородно по y/x и решается заменой y=xv, это соседний маршрут разделения переменных.",
