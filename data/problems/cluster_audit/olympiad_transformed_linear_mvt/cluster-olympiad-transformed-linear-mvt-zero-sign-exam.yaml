        "title": "Формулировка",
        "text": "Пусть p непрерывна на [a,b], u - ненулевое решение уравнения u'+p(x)u=0 на [a,b], а y непрерывна на [a,b] и дифференцируема на (a,b). 1) Докажите: если отношение y/u обращается в нуль в точках a≤x_0<x_1<...<xm≤b, то выражение y'+p y имеет не менее m нулей на (x_0,xm). 2) Докажите: если y'+p y не меняет знак и не обращается в нуль тождественно на каждом подотрезке, то y/u строго монотонно, а значит y не может иметь два различных нуля. 3) Объясните, почему это первый-порядковый аналог рассуждений со вронскианом и разделением нулей, но не полноценная теорема Штурма.",
