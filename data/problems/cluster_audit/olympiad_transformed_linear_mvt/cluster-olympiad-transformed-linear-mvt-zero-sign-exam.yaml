      "id": "sol-main",
      "title": "Решение",
      "text": "Так как u'+p u=0 и u не обращается в нуль, отношение z=y/u корректно на [a,b]. На (a,b) имеем z'=(u y'-u' y)/u^2=(y'+p y)/u. Между соседними нулями x_{i-1} и x_i функции z теорема Ролля дает точку c_i, где z'(c_i)=0. Отсюда y'(c_i)+p(c_i)y(c_i)=0. Получаем по крайней мере по одному нулю на каждом из m промежутков. Если y'+p y имеет один знак и не зануляется тождественно на промежутках, то z' имеет один знак с точностью до постоянного знака u; значит z строго монотонна и не может иметь два различных нуля. Наконец, формула z'=(u y'-u' y)/u^2 показывает вронскианный числитель. Но в отличие от Штурма мы не сравниваем уравнения второго порядка и не выводим чередование нулей решений одной второй-порядковой задачи; мы используем только одно отношение и Ролля.",
