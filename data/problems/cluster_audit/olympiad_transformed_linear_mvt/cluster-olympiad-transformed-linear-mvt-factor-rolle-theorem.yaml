        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть на [a,b] построена дифференцируемая вспомогательная функция F[y] и непрерывная функция mu, не обращающаяся в нуль на (a,b), такие что F'[y](x)=mu(x)(L[y](x)-A(x)), где L[y] - заданное линейное дифференциальное выражение от y. Если F[y](a)=F[y](b), то существует c in (a,b), для которого L[y](c)=A(c). Более общо, если вместе с F выбрана дифференцируемая функция G с G'(x) ≠ 0 и применима теорема Коши о среднем, то существует c, для которого (L[y](c)-A(c))mu(c)/G'(c)=(F[y](b)-F[y](a))/(G(b)-G(a)). В частном случае L[y]=y'+p(x)y и u'+p u=0, u ≠ 0, можно брать F[y]=y/u, потому что (y/u)'=(y'+p y)/u.",
