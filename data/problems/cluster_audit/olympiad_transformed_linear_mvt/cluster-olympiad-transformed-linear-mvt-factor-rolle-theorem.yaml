  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Если F[y](a)=F[y](b), то по теореме Ролля существует c in (a,b), где F'[y](c)=0. По построению F'[y](c)=mu(c)(L[y](c)-A(c)), а mu(c) ≠ 0, значит L[y](c)=A(c). Для версии с теоремой Коши о среднем применяем ее к F[y] и G: найдется c, где F'[y](c)/G'(c)=(F[y](b)-F[y](a))/(G(b)-G(a)); подстановка F'[y]=mu(L[y]-A) дает заявленную формулу. В первом порядке из u'+p u=0 получаем u'=-p u и (y/u)'=(u y'-u' y)/u^2=(y'+p y)/u, так что F=y/u является нужной вспомогательной функцией.",
      "status": "ai_checked",
