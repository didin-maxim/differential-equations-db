        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "В кластере olympiad-transformed-linear-mvt главный ход состоит не в случайном исследовании функции, а в переносимом шаблоне: заранее построить вспомогательную величину F[y] так, чтобы F'[y]=mu(x)L[y] или F'[y]=mu(x)(L[y]-lambda), где mu не обращается в нуль на рабочем интервале. После этого равенство значений F на концах, равенство отношений или краевое совпадение с модельным решением переводится в теорему Ролля, Лагранжа или Коши о среднем. Для линейного выражения первого порядка это обычно деление на ненулевое решение u однородного уравнения: если u'+p u=0, то (y/u)'=(y'+p y)/u. Для высоких порядков множитель часто заставляет телескопически сократиться сумму производных, как в выражениях f+f'+...+f^(n). Нули и знаки читаются у преобразованной функции F: число нулей F дает нули F' по Роллю, а знак L[y] совпадает со знаком F' с учетом постоянного знака mu. Связь со Штурмом и вронскианом является методической, а не автоматической: в первом порядке работает отношение y/u, во втором и выше похожий контроль отношения решений идет через вронскиан, разделение нулей и сравнение Штурма; если же цель - самостоятельная спектральная или штурмовская оценка нулей, задача относится к соседнему кластеру sturm-oscillation-comparison.",
