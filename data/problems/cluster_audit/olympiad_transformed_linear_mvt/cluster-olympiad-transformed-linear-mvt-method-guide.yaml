  "solutions": [
    {
      "id": "guide-route",
      "title": "Маршрут решения",
      "text": "1. Выписать целевое линейное выражение L[y] и понять, какая точка должна получиться: L[y](c)=0, L[y](c)=alpha или отношение двух выражений. 2. Найти ненулевой множитель mu или эталонное решение u так, чтобы F[y]=mu B[y] или F[y]=y/u имело производную mu L[y]. 3. Проверить рабочий интервал: mu и u не должны обращаться в нуль, а все функции должны иметь нужную гладкость. 4. Перевести условие на концах, логарифм отношения, равные значения или краевые условия в F(a)=F(b) либо в гипотезы теоремы Лагранжа/Коши. 5. Применить Ролля или MVT и убрать ненулевой множитель. 6. Если требуется параметр, сначала проверить необходимость на модельной функции, затем доказать достаточность для произвольной функции через разность с моделью. 7. Если требуется число нулей, повторить Ролля на соседних промежутках и отдельно отметить, где знак множителя сохраняется.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear",
        "rolle_on_transformed_expression",
        "differentiate_auxiliary_function"
      ],
      "definition_ids": [
        "linear_first_order_equation",
        "integrating_factor"
      ]
    },
    {
      "id": "guide-exam-variants",
      "title": "Варианты для сильного студента",
      "text": "Для сильного студента на экзамене уместны три ветки: поиск единственного параметра alpha через модельное решение и Ролля для y-h; высокий порядок с телескопической суммой производных после \\(e^{-x}\\); подсчет нулей L[y] из нескольких нулей y/u. Не стоит давать как новую сильную задачу вариант, где меняется только множитель x на x^2 или \\(e^{x}\\) на \\(e^{kx}\\): это проверяет то же распознавание без новой идеи.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "rolle_on_transformed_expression"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя делить на u без проверки, что u не имеет нулей на интервале. Нельзя применять Ролля к исходной функции y, если равенство на концах выполнено только после множителя. Нельзя считать, что любой интегрирующий множитель означает exact-forms: здесь множитель сворачивает линейное выражение в производную одной вспомогательной функции. Нельзя смешивать этот кластер со Штурмом: штурмовская задача начинается там, где главный вопрос - сравнение нулей решений второго порядка, а не одно применение Ролля к заранее выбранной комбинации.",
