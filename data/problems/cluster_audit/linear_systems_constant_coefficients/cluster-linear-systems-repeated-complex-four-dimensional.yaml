      "id": "idea-main",
      "title": "Перейти от сопровождающей системы к скалярному уравнению",
      "text": "Первая координата удовлетворяет уравнению y''''+2y''+y=0, характеристический многочлен которого равен (r^2+1)^2. Кратная комплексная пара дает дополнительные множители t.",
