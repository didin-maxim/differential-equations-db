  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Из первых трех уравнений имеем x_2=x_1', x_3=x_1'', x_4=x_1'''. Последнее уравнение дает x_1''''=-x_1-2x1'', то есть y=x_1 удовлетворяет y''''+2y''+y=0. Характеристический многочлен равен r^4+2r^2+1=(r^2+1)^2, поэтому собственные значения матрицы A равны i и -i, каждое алгебраической кратности 2. Общее действительное решение для первой координаты: x_1(t)=(C1+C2 t)cos t+(C3+C4 t)sin t. Остальные координаты получаются дифференцированием: x_2=x_1', x_3=x_1'', x_4=x_1'''. Множители t cos t и t sin t появляются из-за кратности корней r=±i, то есть из-за нетривиальной жордановой структуры над комплексными числами.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
