      "id": "idea-diagnose-spectrum",
      "title": "Сначала определить спектральный тип",
      "text": "Различные вещественные собственные значения дают независимые моды \\(e^{\\lambda t}v\\). Кратность требует сравнить алгебраическую и геометрическую кратности: если собственных векторов не хватает, достраивают жордановы цепочки и получают полиномиальные множители \\(t^k\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ],
      "definition_ids": [
        "linear_system",
        "matrix_exponential"
      ]
    },
    {
      "id": "idea-complex-to-real",
      "title": "Комплексные моды переводить в вещественную пару",
      "text": "Для вещественной системы комплексные собственные значения идут парами. Один комплексный режим \\(e^{(alpha+i beta)t}\\)(p+iq) дает две вещественные моды с cos beta t и sin beta t; знак alpha отвечает за рост или затухание, beta за вращение.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ],
      "definition_ids": [
        "linear_system"
      ]
    },
    {
      "id": "idea-inhomogeneous-route",
      "title": "Неоднородность решать через оператор или анзац",
      "text": "Вариация постоянных всегда дает интеграл с \\(e^{A(t-s)}\\). Для правых частей из конечномерного класса, например констант, полиномов, экспонент и синусов, часто короче подобрать частное решение в том же классе, увеличивая степень t при резонансе со спектром A.",
      "status": "ai_checked",
      "standard_idea_ids": [
