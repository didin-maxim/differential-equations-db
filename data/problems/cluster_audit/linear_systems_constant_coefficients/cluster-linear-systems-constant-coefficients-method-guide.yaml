  "solutions": [
    {
      "id": "guide-homogeneous-route",
      "title": "Маршрут для однородной системы",
      "text": "1. Найти характеристический многочлен \\(A\\) и собственные значения с кратностями. 2. Для каждого \\(\\lambda\\) найти \\(\\ker(A-\\lambda I)\\) и понять, хватает ли собственных векторов. 3. Если не хватает, построить присоединенные векторы из уравнений \\((A-\\lambda I)v_j=v_{j-1}\\). 4. Для каждой цепочки записать моды \\(e^{\\lambda t}\\) times polynomial in \\(t\\) along the chain. 5. Для комплексной пары взять действительную и мнимую части комплексного решения. 6. Собрать общее решение или фундаментальную матрицу и подставить начальные условия.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ],
      "definition_ids": [
        "linear_system",
        "matrix_exponential",
        "fundamental_matrix"
      ]
    },
    {
      "id": "guide-inhomogeneous-route",
      "title": "Маршрут для неоднородной системы",
      "text": "1. Сначала решить однородную систему или выбрать \\(X(t)=e^{At}\\). 2. Записать формулу вариации постоянных \\(x(t)=X(t)c+X(t)\\int X(s)^{-1}f(s)\\,ds\\); при нормировке от \\(t_0\\) она равна \\(e^{A(t-t_0)}x_0+\\int_{t_0}^t e^{A(t-s)}f(s)\\,ds\\). 3. Если \\(f(t)\\) имеет специальный вид, проверить, короче ли анзац: постоянный вектор, \\(e^{\\mu t}q(t)\\), \\(\\sin\\) / \\(\\cos\\) или их произведения с полиномом. 4. При \\(\\mu\\) в спектре \\(A\\) или при совпадении частоты с комплексной парой увеличить степень полинома по правилу жордановой цепочки. 5. Добавить общее однородное решение и только затем использовать начальные или краевые условия.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
        "matrix_exponential"
      ],
      "definition_ids": [
        "linear_system",
        "fundamental_matrix",
        "matrix_exponential"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не считать алгебраическую кратность числом независимых решений: независимость дают собственные и присоединенные цепочки нужной длины. Не оставлять комплексный ответ для вещественной системы, если требуется вещественная фундаментальная система. Не решать неоднородную систему только подбором без проверки резонанса. Не раскрывать \\(\\det(e^{At})\\) прямым счетом, если достаточно формулы \\(\\det(e^{At})=e^{t\\operatorname{tr} A}\\). Не переносить автоматически устойчивость нелинейной системы из линейной части в негиперболическом случае.",
