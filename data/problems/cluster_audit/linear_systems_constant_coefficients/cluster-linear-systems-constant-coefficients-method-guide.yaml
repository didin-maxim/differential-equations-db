      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера constant-coefficient-linear-systems систему \\(x'=Ax\\) или \\(x'=Ax+f(t)\\) сначала читают как задачу о спектре постоянной матрицы \\(A\\) и фундаментальном операторе \\(e^{At}\\). В однородном случае выбирают базис из собственных и присоединенных векторов: для жордановой цепочки \\(v_0,\\ldots,v_{m-1}\\), где \\((A-\\lambda I)v_0=0\\) и \\((A-\\lambda I)v_j=v_{j-1}\\), решения имеют вид \\(e^{\\lambda t}\\) times polynomial modes along the chain. Комплексную пару \\(\\lambda=\\alpha+i\\beta\\) с вектором \\(p+iq\\) переводят в вещественные решения \\(e^{\\alpha t}(p\\cos \\beta t-q\\sin \\beta t)\\) и \\(e^{\\alpha t}(p\\sin \\beta t+q\\cos \\beta t)\\); при кратной комплексной паре появляются те же множители \\(t^k\\). Если система неоднородна, базовая формула \\(x(t)=e^{A(t-t_0)}x_0+\\int_{t_0}^t e^{A(t-s)}f(s)\\,ds\\) является главным маршрутом, а для правых частей типа \\(e^{\\mu t}p(t)\\), \\(\\sin \\beta t\\), \\(\\cos \\beta t\\) или констант можно либо интегрировать эту формулу, либо подобрать частное решение, проверяя резонанс с жордановыми цепочками \\(A\\). Фундаментальная матрица \\(X(t)=e^{At}\\) связывает все эти подходы: ее столбцы образуют базис решений, \\(\\det X(t)=\\det X(0)e^{t\\operatorname{tr} A}\\), а фазовая устойчивость в плоскости читается по вещественным частям собственных значений и жордановым множителям.",
        "source_ids": [
          "src-mipt-ode-course",
          "src-romanko-problem-book",
          "src-filippov-problem-book",
