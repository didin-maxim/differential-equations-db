      ]
    },
    {
      "id": "idea-fundamental-matrix",
      "title": "Фундаментальная матрица объединяет способы решения",
      "text": "Для постоянной матрицы нормированная фундаментальная матрица равна \\(e^{A(t-t_0)}\\). Любая другая фундаментальная матрица отличается справа постоянной невырожденной матрицей, поэтому начальные и двухточечные условия переводятся в линейную алгебру.",
      "status": "ai_checked",
