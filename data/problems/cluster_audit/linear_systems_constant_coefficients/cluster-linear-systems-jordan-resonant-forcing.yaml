  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть \\(x(t)=e^t y(t)\\). Тогда \\(x'=e^t(y+y')\\), а \\(Ax+e^t b=e^t((I+N)y+b)\\), где \\(N=\\begin{pmatrix}0&1\\\\0&0\\end{pmatrix}\\) и \\(b=(0,1)^T\\). Поэтому \\(y'=Ny+b\\), то есть \\(y_2'=1\\), \\(y_1'=y_2\\). Отсюда \\(y_2=C_2+t\\), \\(y_1=C_1+C_2t+t^2/2\\). Значит общее решение равно \\(x(t)=e^t(C_1+C_2t+t^2/2, C_2+t)^T\\). Квадратичный множитель возникает потому, что \\(b\\) направлен вдоль присоединенного звена: сначала правая часть интегрируется в \\(y_2\\), а затем \\(y_2\\) входит в уравнение для \\(y_1\\).",
      "status": "ai_checked",
