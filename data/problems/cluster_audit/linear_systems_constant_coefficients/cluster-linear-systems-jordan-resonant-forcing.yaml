      "id": "idea-main",
      "title": "Резонанс с присоединенным направлением жордановой клетки",
      "text": "После вынесения множителя \\(e^{t}\\) правая часть становится постоянным вектором в нижнем звене жордановой цепочки. Интегрирование по цепочке сначала дает \\(t\\), а затем \\(t^2/2\\).",
