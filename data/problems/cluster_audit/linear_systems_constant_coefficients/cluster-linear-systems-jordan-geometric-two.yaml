        "text": "Решить систему x'=Ax, где A=[[1,0,1],[0,1,1],[0,0,1]]. Явно указать два собственных вектора для единственного собственного значения и присоединенный вектор, который присоединен к нетривиальной линейной комбинации этих двух собственных векторов.",
