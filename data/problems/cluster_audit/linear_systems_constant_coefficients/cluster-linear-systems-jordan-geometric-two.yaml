  "ideas": [
    {
      "id": "idea-main",
      "title": "Жорданова цепочка может начинаться с линейной комбинации собственных векторов",
      "text": "При алгебраической кратности 3 и геометрической кратности 2 нильпотентная часть имеет ранг 1. Присоединенный вектор w может удовлетворять (A-I)w=v_1+v_2, а не быть присоединенным к одному заранее выбранному собственному вектору.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
