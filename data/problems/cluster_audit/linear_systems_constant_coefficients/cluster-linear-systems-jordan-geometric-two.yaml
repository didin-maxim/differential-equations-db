  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пишем A=I+N, где N=[[0,0,1],[0,0,1],[0,0,0]] и N^2=0. Единственное собственное значение равно 1, так как A треугольна и на диагонали стоят единицы. Собственное подпространство задается Nz=0, то есть z_3=0, поэтому можно взять два собственных вектора v_1=(1,0,0)^T и v_2=(0,1,0)^T. Вектор w=(0,0,1)^T является присоединенным, причем (A-I)w=Nw=(1,1,0)^T=v_1+v_2; это нетривиальная линейная комбинация двух собственных векторов. Так как \\(e^{At}=e^t e^{Nt}=e^t(I+tN)\\), для начального вектора C1 v_1+C2 v_2+C3 w получаем \\(x(t)=e^t(C1 v_1+C2 v_2+C3(w+t(v_1+v_2)))\\). В координатах это \\(x_1=e^t(C1+C3 t)\\), \\(x_2=e^t(C2+C3 t)\\), \\(x_3=e^t C3\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
