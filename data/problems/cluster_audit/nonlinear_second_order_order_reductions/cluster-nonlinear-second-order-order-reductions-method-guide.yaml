    {
      "id": "idea-initial-data-and-lost-branches",
      "title": "Начальные условия и деление решают судьбу ветвей",
      "text": "Редукция понижает порядок только после выбора регулярной ветви. Если в ходе решения делили на p, y, y-a или выражение \\(\\Phi(y,p)\\), то все случаи \\(\\Phi=0\\) надо вернуть как кандидаты: постоянные решения, решения с нулевой начальной скоростью, особые уровни энергии и решения, проходящие через запрещенную при делении точку.",
