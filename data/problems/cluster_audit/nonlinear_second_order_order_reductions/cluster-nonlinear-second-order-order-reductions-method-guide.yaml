  "solutions": [
    {
      "id": "guide-route-diagnose",
      "title": "Маршрут диагностики редукции",
      "text": "1. Проверить, отсутствует ли y явно, отсутствует ли x явно, или уравнение уже похоже на полную производную/энергию. 2. Для отсутствия y положить p(x)=y' и решить первое уравнение для p. 3. Для отсутствия x положить p(y)=y' и заменить y'' на p dp/dy, заранее выделив p=0 и точки, где y не может служить локальной переменной. 4. Если получилась форма y''+V'(y)=0, записать энергию \\(p^2/2+V(y)=E\\) и только затем выбирать знак p. 5. Перенести начальные условия в редуцированную задачу и восстановить y(x). 6. Подставить ответ в исходное уравнение и отдельно перечислить ветви, которые могли исчезнуть при делении.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral",
        "state_vector_uniqueness"
      ],
      "definition_ids": [
        "cauchy_problem",
        "autonomous_equation",
        "first_integral",
        "separable_equation"
      ]
    },
    {
      "id": "guide-route-initial-conditions",
      "title": "Как переносить начальные условия",
      "text": "Для p(x)=y' условие \\(y'(x_0)=v_0\\) сразу дает \\(p(x_0)=v_0\\), а \\(y(x_0)=y_0\\) используется после интегрирования y'=p(x). Для p(y)=y' условие \\(y(x_0)=y_0, y'(x_0)=v_0\\) дает \\(p(y_0)=v_0\\); если \\(v_0=0\\), надо проверить, является ли это равновесием, точкой поворота энергетического уровня или началом отдельной ветви. При переходе от \\(p^2\\) к p знак выбирается \\(v_0\\), а при \\(v_0=0\\) знак нельзя выбрать без дополнительного анализа уравнения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral"
      ],
      "definition_ids": [
        "initial_value_problem",
        "maximal_solution",
        "first_integral"
      ]
    },
    {
      "id": "guide-neighbor-boundaries",
      "title": "Границы с соседними кластерами",
      "text": "Если после редукции осталось обычное первое уравнение с разделяющимися переменными или однородной заменой, вычислительная часть близка к separable-homogeneous-first-order, но представитель этого кластера - именно распознавание второго порядка и корректный переход к p. Если цель - фазовые уровни и первый интеграл системы, это first-integrals-plane-systems; если цель - качественный запрет или оценка через знак энергии, это energy-estimates-second-order-ode. Если же уравнение просто линейное второго порядка и используется известное решение, это другой кластер линейного понижения порядка.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral",
        "energy_monotonicity"
      ],
      "definition_ids": [
        "separable_equation",
        "first_integral",
        "phase_trajectory"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не делить на y' или p без отдельного случая p=0. Не считать p(y) глобальной функцией, если решение имеет точку поворота или самопересечение в проекции на y. Не терять знак при переходе от \\(p^2\\) к p. Не переносить начальные условия только в энергетическую константу: скорость выбирает ветвь. Не относить сюда любую энергию второго порядка: если понижение порядка не нужно, а вся задача состоит в оценке E' или интегральном тождестве, это соседний энергетический кластер.",
