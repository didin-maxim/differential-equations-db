  "ideas": [
    {
      "id": "idea-absence-y",
      "title": "Если нет y, снижать порядок через p(x)=y'",
      "text": "Форма F(x,y',y'')=0 не требует угадывать y. Замена p(x)=y' переводит ее в первое уравнение F(x,p,p')=0, а y появляется только на последнем шаге как первообразная p. Начальное условие на y фиксирует интеграционную константу после восстановления, а условие на y' задает \\(p(x_0)\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "integrating_factor_linear"
      ],
      "definition_ids": [
        "initial_value_problem",
        "linear_first_order_equation"
      ]
    },
    {
      "id": "idea-absence-x",
      "title": "Если нет x, считать скорость функцией положения",
      "text": "Форма F(y,y',y'')=0 допускает p=p(y) и замену y''=(dp/dx)=p dp/dy. Это локальный прием: он работает на участке, где выбранная ветвь y(x) позволяет использовать y как переменную. При y'=0 нельзя молча делить на p; нулевая ветвь или точка поворота проверяются отдельно.",
      "status": "ai_checked",
      "standard_idea_ids": [
