        "initial_value_problem"
      ]
    },
    {
      "id": "idea-energy-branch",
      "title": "Энергия дает первый интеграл, но не готовую ветвь y(x)",
      "text": "Для y''+V'(y)=0 редукция p=p(y) дает \\((p^2/2+V(y))_y=0\\) на ненулевой ветви, то есть \\(p^2/2+V(y)=E\\). Чтобы вернуться к решению, надо выбрать знак y'=p по начальному условию, отдельно обработать уровни с p=0 и проверить, не является ли уровень равновесием.",
      "status": "ai_checked",
