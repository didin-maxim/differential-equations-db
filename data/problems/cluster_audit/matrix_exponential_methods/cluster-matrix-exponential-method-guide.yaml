      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "В кластере matrix-exponential-methods матричная экспонента рассматривается не как длинный способ решить очередную систему, а как операторный объект. Базовые факты: \\(e^{A0}=I\\), \\(\\frac{d}{dt}e^{At}=Ae^{At}=e^{At}A\\), \\(e^{A(t+s)}=e^{At}e^{As}\\), \\((e^{At})^{-1}=e^{-At}\\), а при \\(E(t)=e^{At}\\) генератор восстанавливается как \\(A=E'(0)\\). Если \\(X(t)\\) - фундаментальная матрица системы \\(x'=A(t)x\\), то \\(A(t)=X'(t)X(t)^{-1}\\); для постоянной \\(A\\) нормированная фундаментальная матрица равна \\(e^{A(t-t_0)}\\). Спектр \\(A\\) читается в \\(e^{At}\\) через спектральное отображение: собственное значение \\(\\lambda\\) дает режим \\(e^{\\lambda t}\\), комплексная пара \\(\\alpha\\pm i\\beta\\) дает \\(e^{\\alpha t}\\cos \\beta t\\) и \\(e^{\\alpha t}\\sin \\beta t\\), а жорданова клетка размера \\(m\\) добавляет множители \\(1,t,\\ldots,t^{m-1}\\). Определитель не считают напрямую: \\(\\det(e^{At})=e^{t\\operatorname{tr} A}\\). Для \\(x'=Ax+b(t)\\) формула вариации постоянных имеет вид \\(x(t)=e^{A(t-t_0)}x_0+\\int_{t_0}^t e^{A(t-s)}b(s)\\,ds\\). Дискретный аналог - \\(x_{n+1}=Mx_n\\) и рекурренты, где вместо \\(e^{At}\\) работает \\(M^n\\), а спектр и жорданова структура управляют ростом, колебаниями и полиномиальными множителями.",
        "source_ids": [
          "src-mipt-ode-course",
          "src-local-du-8-program-or-exam",
          "src-romanko-problem-book",
          "src-waterloo-amath250-notes",
