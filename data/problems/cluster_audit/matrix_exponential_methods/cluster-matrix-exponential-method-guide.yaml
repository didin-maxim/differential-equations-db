  "ideas": [
    {
      "id": "idea-operator-first",
      "title": "Сначала использовать операторное свойство",
      "text": "Если в условии уже дана или узнается \\(e^{At}\\), сначала проверяют групповое свойство, обратный ход времени, производную в нуле, коммутирование с A и нормировку E(0)=I. Это часто заменяет обращение матрицы, перемножение блоков и раскрытие ряда.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ],
      "definition_ids": [
        "matrix_exponential"
      ]
    },
    {
      "id": "idea-recover-generator",
      "title": "Генератор восстанавливается локально",
      "text": "Для нормированной экспоненты E(t)=\\(e^{At}\\) матрица A равна E'(0). Для произвольной фундаментальной матрицы X(t) системы x'=A(t)x используется более общий факт A(t)=X'(t)X(t)^{-1}; поэтому важно не путать нормировку E(0)=I с произвольной заменой базиса решений.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ],
      "definition_ids": [
        "fundamental_matrix",
        "matrix_exponential"
      ]
    },
    {
      "id": "idea-spectrum-jordan",
      "title": "Спектр виден по режимам",
      "text": "Рост \\(e^{\\alpha t}\\), частота \\(\\beta\\) и множители \\(t^k\\) обычно важнее полного вычисления \\(e^{At}\\). Жорданова nilpotent-часть \\(N\\) дает конечный множитель \\(e^{Nt}=I+tN+\\cdots+t^{m-1}N^{m-1}/(m-1)!\\), поэтому полиномиальный множитель сообщает о длине цепочки.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ],
      "definition_ids": [
        "matrix_eigenvalue",
        "matrix_exponential"
      ]
    },
    {
      "id": "idea-trace-determinant",
      "title": "След управляет объемом",
      "text": "Формула \\(\\det(e^{At})=e^{t\\operatorname{tr} A}\\) является постояннокоэффициентной версией формулы Лиувилля. В задачах на площадь, объем, обратимость и след она должна срабатывать до попытки выписать саму экспоненту.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential",
        "wronskian_liouville"
      ],
      "definition_ids": [
        "det_exp_trace_identity",
        "fundamental_matrix"
      ]
    },
    {
      "id": "idea-systems-and-recurrences",
      "title": "Системы и рекурренты имеют один операторный язык",
      "text": "Для постоянной системы \\(e^{A(t-s)}\\) переносит вклад правой части из времени \\(s\\) во время \\(t\\). Для рекуррент \\(x_{n+1}=Mx_n\\) ту же роль играет \\(M^n\\): диагонализация, комплексные собственные значения и жордановы блоки дают рост, вращение и полиномиальные множители без перебора шагов.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential",
        "variation_of_constants"
      ],
      "definition_ids": [
        "linear_system",
        "variation_of_constants_system",
        "matrix_eigenvalue"
      ]
    },
    {
      "id": "idea-cluster-boundaries",
      "title": "Держать границы соседних кластеров",
      "text": "Если главное действие - построить общее решение x'=Ax по спектру, это constant-coefficient-linear-systems. Если главный объект - произвольная X(t), смена базиса или условие на концах, это fundamental-matrix-linear-systems. Если главный вопрос - интеграл неоднородности, это variation-of-constants. В matrix-exponential-methods остается случай, где свойство \\(e^{At}\\) само делает решение коротким.",
      "status": "ai_checked",
