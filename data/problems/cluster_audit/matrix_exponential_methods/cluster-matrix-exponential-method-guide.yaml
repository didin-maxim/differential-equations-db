  "solutions": [
    {
      "id": "guide-diagnostic-route",
      "title": "Диагностический маршрут",
      "text": "1. Установить, дана ли нормированная экспонента \\(E(0)=I\\) или произвольная фундаментальная матрица \\(X(t)\\). 2. Если нужен обратный оператор, заменить \\(t\\) на \\(-t\\). 3. Если нужен генератор, взять \\(E'(0)\\) или \\(X'X^{-1}\\). 4. Если нужен определитель, взять след, а не раскрывать \\(\\det\\). 5. Если нужно читать спектр, искать \\(e^{\\alpha t}\\), \\(\\cos \\beta t\\), \\(\\sin \\beta t\\) и множители \\(t^k\\). 6. Если дана неоднородность, записать интеграл с \\(e^{A(t-s)}\\) и только потом решать, нужен ли явный счет.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential",
        "variation_of_constants",
        "wronskian_liouville"
      ],
      "definition_ids": [
        "fundamental_matrix",
        "matrix_exponential",
        "det_exp_trace_identity",
        "variation_of_constants_system"
      ]
    },
    {
      "id": "guide-jordan-route",
      "title": "Маршрут через жорданову структуру",
      "text": "Если \\(A=PJP^{-1}\\), то \\(e^{At}=Pe^{Jt}P^{-1}\\). Для блока \\(J=\\lambda I+N\\) экспонента равна \\(e^{\\lambda t}e^{Nt}\\), а \\(e^{Nt}\\) - конечный полином, потому что \\(N^m=0\\). Над вещественными числами комплексную пару переводят в вращательно-растягивающий блок \\(e^{\\alpha t}R_{\\beta t}\\); при кратной паре появляются те же полиномиальные множители \\(t^k\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ],
      "definition_ids": [
        "matrix_eigenvalue",
        "matrix_exponential"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не обращать \\(e^{At}\\) как обычную числовую матрицу, если известна \\(E(-t)\\). Не восстанавливать \\(A\\) по \\(E'(t)\\) при \\(t\\ne 0\\) без умножения на \\(E(t)^{-1}\\). Не считать \\(\\det(e^{At})\\) по элементам. Не переносить правило \\(e^{(A+B)t}=e^{At}e^{Bt}\\) без коммутирования \\(A\\) и \\(B\\). Не относить каждую задачу на \\(x'=Ax\\) сюда: если \\(e^{At}\\) только фон, владельцем часто является соседний кластер систем с постоянными коэффициентами.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential",
        "wronskian_liouville"
      ],
      "definition_ids": [
        "matrix_exponential",
        "det_exp_trace_identity"
      ]
    }
