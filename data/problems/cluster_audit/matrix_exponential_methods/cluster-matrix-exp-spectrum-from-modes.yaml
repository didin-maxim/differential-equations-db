      "id": "idea-main",
      "title": "Рост дает вещественную часть, колебание - мнимую",
      "text": "Блок с собственным значением \\(\\alpha+i\\beta\\) дает множители \\(e^{\\alpha t}\\cos \\beta t\\) и \\(e^{\\alpha t}\\sin \\beta t\\); дополнительный множитель \\(t\\) указывает на нетривиальную жорданову клетку.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Если \\(Av=\\lambda v\\), то \\(e^{At}v=e^{\\lambda t}v\\); в жордановой клетке размера больше 1 появляются дополнительные множители \\(t, t^2, ...\\) перед тем же \\(e^{\\lambda t}\\). Для вещественной матрицы пара \\(\\lambda=\\alpha +/- i\\beta\\) проявляется как \\(e^{\\alpha t}\\cos \\beta t\\) и \\(e^{\\alpha t}\\sin \\beta t\\). Поэтому режим \\(e^{3t}\\) вместе с \\(t e^{3t}\\) означает собственное значение 3 с жордановой клеткой размера 2, то есть с алгебраической кратностью как минимум 2. Режимы \\(e^{-t}\\cos 2t\\) и \\(e^{-t}\\sin 2t\\) дают комплексную пару \\(-1+2i\\) и \\(-1-2i\\). Так как других режимов нет, спектр над \\(C\\) равен \\(\\{3,3,-1+2i,-1-2i\\}\\).",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
