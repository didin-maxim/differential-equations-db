        "title": "Формулировка",
        "text": "Сформулируйте базовое спектральное правило для матричной экспоненты. Затем восстановите спектр вещественной матрицы \\(A\\), если в \\(e^{At}\\) встречаются ровно режимы \\(e^{3t}\\), \\(t e^{3t}\\), \\(e^{-t}\\cos 2t\\), \\(e^{-t}\\sin 2t\\), причем все они действительно присутствуют.",
