      "title": "Матрица умножает комплексное число на 1+i",
      "text": "Если \\(z_n=p_n+iq_n\\), то действие A на \\((p_n,q_n)\\) совпадает с умножением \\(z_n\\) на 1+i; это дискретный аналог диагонализации комплексной пары.",
