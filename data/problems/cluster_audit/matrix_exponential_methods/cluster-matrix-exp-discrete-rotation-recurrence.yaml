  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Положим \\(z_n=p_n+iq_n\\) для \\(x_n=(p_n,q_n)^T\\). Тогда \\(A(p,q)^T=(p-q,p+q)^T\\), то есть \\(z_{n+1}=(1+i)z_n\\). При \\(z_0=1\\) получаем \\(z_n=(1+i)^n=2^{n/2}(\\cos(n π/4)+i \\sin(n π/4))\\). Следовательно \\(x_n=(2^{n/2}\\cos(n π/4), 2^{n/2}\\sin(n π/4))^T\\). По Кэли-Гамильтону \\(A^2-2A+2I=0\\), поэтому \\(x_{n+2}=2x_{n+1}-2x_n\\), и первая координата удовлетворяет \\(p_{n+2}=2p_{n+1}-2p_n, p_0=1, p_1=1\\).",
