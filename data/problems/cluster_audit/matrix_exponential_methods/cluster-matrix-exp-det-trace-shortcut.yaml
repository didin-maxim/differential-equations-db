  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Достаточно треугольнизовать A над C: A=QTQ^{-1}, где на диагонали T стоят собственные значения lambda_1,...,lambda_n с учетом кратностей. Тогда e^{At}=Q e^{Tt} Q^{-1}, а e^{Tt} треугольна с диагональю e^{lambda_1 t},...,e^{lambda_n t}. Поэтому det(e^{At})=product_j e^{lambda_j t}=e^{t sum_j lambda_j}=e^{t tr A}. В примере tr A=1+1-3=-1, значит det(e^{At})=e^{-t}. Внедиагональные числа 4 и 5 на ответ не влияют.",
      "status": "ai_checked",
