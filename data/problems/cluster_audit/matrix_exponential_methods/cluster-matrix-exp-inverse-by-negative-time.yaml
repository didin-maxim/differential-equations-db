        "title": "Формулировка",
        "text": "Пусть известно, что \\(E(t)=e^{At}\\), где \\(E(t)=\\operatorname{diag}(e^t R(t), e^{2t}J(t))\\), \\(R(t)=\\begin{pmatrix}\\cos t&-\\sin t\\\\ \\sin t&\\cos t\\end{pmatrix}\\), \\(J(t)=\\begin{pmatrix}1&t\\\\0&1\\end{pmatrix}\\). Не вычисляя \\(A\\) и не обращая матрицу \\(E(t)\\) напрямую, найдите \\(e^{-At}\\).",
