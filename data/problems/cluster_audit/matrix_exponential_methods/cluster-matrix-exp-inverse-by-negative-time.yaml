  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Так как \\(E(t)=e^{At}\\), имеем \\(e^{-At}=E(-t)\\). Поэтому \\(R(t)\\) заменяется на \\(R(-t)=\\begin{pmatrix}\\cos t&\\sin t\\\\-\\sin t&\\cos t\\end{pmatrix}\\), множитель \\(e^t\\) - на \\(e^{-t}\\), а жорданов блок \\(e^{2t}\\begin{pmatrix}1&t\\\\0&1\\end{pmatrix}\\) - на \\(e^{-2t}\\begin{pmatrix}1&-t\\\\0&1\\end{pmatrix}\\). Итак, \\(e^{-At}=\\operatorname{diag}(e^{-t}R(-t), e^{-2t}\\begin{pmatrix}1&-t\\\\0&1\\end{pmatrix})\\). Прямое обращение четырехмерной матрицы здесь не требуется: сработало групповое свойство матричной экспоненты.",
      "status": "ai_checked",
