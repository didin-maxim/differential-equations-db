      "title": "Обратный ход времени",
      "text": "Для автономного линейного потока обратный оператор к \\(e^{At}\\) равен \\(e^{-At}\\); поэтому достаточно заменить \\(t\\) на \\(-t\\) в уже известной экспоненте.",
