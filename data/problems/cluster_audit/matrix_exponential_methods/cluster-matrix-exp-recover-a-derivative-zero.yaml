  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "По определению e^{At}=I+tA+t^2A^2/2!+... . Поэтому производная в нуле равна коэффициенту при t, то есть A. Для заданной матрицы дифференцируем элементы при t=0: (e^t)'|_0=1, (2t e^t)'|_0=2, (e^{-2t})'|_0=-2, остальные внедиагональные элементы имеют нулевую производную. Получаем A=[[1,2,0],[0,1,0],[0,0,-2]]. Проверка: верхний левый блок равен e^{t(I+2N)}=e^t(I+2tN), где N^2=0.",
