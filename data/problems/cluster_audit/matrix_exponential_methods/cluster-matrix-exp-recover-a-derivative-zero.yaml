        "text": "Докажите, что для постоянной матрицы A выполнено (d/dt)e^{At}|_{t=0}=A. Затем восстановите A, если e^{At}=[[e^t,2t e^t,0],[0,e^t,0],[0,0,e^{-2t}]].",
