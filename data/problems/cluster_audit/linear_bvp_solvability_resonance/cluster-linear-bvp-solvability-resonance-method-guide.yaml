      "id": "guide-finite-dimensional-route",
      "title": "Линейно-алгебраическая форма того же критерия",
      "text": "Для системы x'=A(t)x+g(t) с двухточечным условием M x(a)+N x(b)=c записывают x(b)=Phi(b,a)x(a)+eta(b). Получается конечномерная система (M+N Phi)x(a)=c-N eta(b). Если матрица M+N Phi обратима, решение единственно. Если она вырождена, правая часть должна лежать в ее образе; эквивалентно она ортогональна левому ядру этой матрицы. Это та же учебная альтернатива Фредгольма без функционально-аналитического языка.",
