      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя проверять ортогональность только к одному собственному решению, если ядро многомерно. Нельзя использовать собственное решение исходной задачи вместо сопряженного в несамосопряженной постановке без доказательства самосопряженности. Нельзя строить обычную функцию Грина при ненулевом ядре и затем делать вид, что обратный оператор существует. Нельзя называть любую краевую задачу спектральной: если параметр не ищут из условия нетривиальности однородной задачи, главный объект может быть просто разрешимостью. В вариационных задачах нельзя забывать, что линейная BVP появляется после линеаризации условий стационарности и допустимых вариаций.",
