        "id": "stmt-method-guide",
        "title": "Учебная альтернатива для линейной краевой задачи",
        "text": "Для линейной краевой задачи L[y]=f с однородными краевыми условиями сначала решают однородную задачу L[y]=0. Если ее ядро нулевое, оператор краевой задачи обратим: неоднородная задача имеет единственное решение, которое можно получить стрельбой, через фундаментальную систему или через функцию Грина. Если однородная задача имеет ненулевое решение, наступает резонанс: добавление элемента ядра не меняет краевые условия, поэтому единственности нет, а существование требует условия совместности. В учебной самосопряженной постановке L[y]=-(p y')'+q y с условиями, зануляющими граничный член формулы Грина, это условие имеет вид \\(\\int_a^b\\) f(x) phi(x) dx=0 для всех phi из ядра. В несамосопряженном случае правая часть должна быть ортогональна ядру сопряженной краевой задачи. Это конечномерная альтернатива Фредгольма: либо ядро однородной задачи тривиально и решение единственно для любой правой части, либо ядро нетривиально, и тогда допустимые правые части выделяются ортогональностью к сопряженному ядру, а решения определены с точностью до добавления элементов ядра. Связь со спектром читается так: резонанс появляется при собственном значении соответствующей однородной BVP; связь с Green-функцией такова, что обычное Green-ядро существует только в нерезонансном случае. В вариационных задачах тот же механизм возникает для уравнения Якоби и второй вариации: появление нетривиальной вариации с нулевыми концами означает потерю обратимости линейной краевой задачи.",
