  "solutions": [
    {
      "id": "guide-route",
      "title": "Маршрут проверки разрешимости",
      "text": "1. Привести краевые условия к однородным: если концы неоднородны, сначала вынести простую функцию, удовлетворяющую этим условиям. 2. Решить или описать однородную задачу L[y]=0 с нулевыми краевыми условиями. 3. Если ядро нулевое, использовать стрельбу, фундаментальную систему, матрицу перехода или Green-функцию для единственного решения. 4. Если ядро ненулевое, зафиксировать базис ядра и найти сопряженное ядро; в самосопряженной задаче это тот же базис. 5. Проверить условия int f psi_j=0 для всех psi_j из сопряженного ядра, с нужным весом, если он входит в постановку. 6. При выполнении условий найти одно частное решение и добавить произвольную линейную комбинацию решений однородной краевой задачи. 7. При нарушении хотя бы одного условия совместности зафиксировать отсутствие решений.",
