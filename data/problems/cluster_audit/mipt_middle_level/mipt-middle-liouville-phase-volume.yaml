  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Обозначим Y(t)=D_a phi_t(a). Дифференцируя уравнение d/dt phi_t(a)=f(phi_t(a)) по начальной точке a, получаем вариационную систему Y'=Df(phi_t(a))Y, Y(0)=E. Для обратимой Y используем формулу Якоби: (det Y)'=det Y tr(Y'Y^{-1}). Подставляя Y'=Df(phi_t(a))Y, имеем tr(Y'Y^{-1})=tr Df(phi_t(a))=div f(phi_t(a)). Значит J'=div f(phi_t(a))J и J(0)=1. Если div f=0, то J(t,a)=1, поэтому малые объемы не меняются; через разбиение области это дает сохранение фазового объема там, где поток определен и взаимно однозначен. Для линейной системы Y'=A(t)Y та же формула дает (det Phi)'=tr A(t) det Phi и после интегрирования - указанную формулу.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville"
      ]
    }
