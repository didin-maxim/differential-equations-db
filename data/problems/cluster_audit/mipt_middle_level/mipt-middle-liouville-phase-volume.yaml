        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть автономная система x'=f(x) имеет гладкий поток phi_t, а J(t,a)=det D_a phi_t(a) - якобиан отображения начальной точки a в точку траектории в момент t. Доказать, что J'(t,a)=div f(phi_t(a))J(t,a), J(0,a)=1. В частности, если div f=0, поток сохраняет фазовый объем; для линейной системы x'=A(t)x получается det Phi(t)=det Phi(t0) exp(int_{t0}^t tr A(s) ds).",
