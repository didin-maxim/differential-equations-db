  "ideas": [
    {
      "id": "idea-main",
      "title": "Дифференциал потока решает вариационную систему",
      "text": "Матрица D_a phi_t удовлетворяет линейной системе Y'=Df(phi_t(a))Y. К ее определителю применяется формула Лиувилля: производная det Y равна tr(Df) det Y.",
