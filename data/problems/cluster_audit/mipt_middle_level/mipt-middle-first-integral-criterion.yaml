        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Для автономной системы x'=f(x) в области U доказать: гладкая функция H(x) является первым интегралом тогда и только тогда, когда grad H(x) dot f(x)=0 во всех точках U. Применить критерий к системе x'=y, y'=-x: найти первый интеграл и объяснить, почему ненулевые траектории лежат на окружностях.",
