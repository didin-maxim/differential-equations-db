  "ideas": [
    {
      "id": "idea-main",
      "title": "Производная вдоль поля должна исчезать",
      "text": "Первый интеграл постоянен на траекториях, значит его полная производная вдоль решения равна нулю. Обратно, если производная вдоль любого вектора поля равна нулю, H не меняется на каждой траектории.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство и пример",
      "text": "Если H - первый интеграл, то для любого решения x(t) функция H(x(t)) постоянна. По правилу цепочки d/dt H(x(t))=grad H(x(t)) dot x'(t)=grad H(x(t)) dot f(x(t))=0. Через каждую точку области, где задача Коши имеет решение, проходит траектория, поэтому grad H dot f=0 в этой точке. Обратно, если grad H dot f=0 всюду, то вдоль любого решения d/dt H(x(t))=0, значит H сохраняется. Для x'=y, y'=-x берем H=x^2+y^2. Тогда grad H=(2x,2y), и grad H dot f=2xy+2y(-x)=0. Поэтому H постоянно на траекториях. При H=c>0 уровни x^2+y^2=c - окружности, и ненулевая траектория не может покинуть соответствующую окружность.",
      "status": "ai_checked"
    }
  ],
