        "title": "Условие",
        "text": "Найти рекуррентную формулу для коэффициентов степенного решения уравнения y''+x y=0 около x=0. Показать, что коэффициенты a0=y(0) и a1=y'(0) задаются свободно, и выписать первые ненулевые члены двух решений с начальными данными (a0,a1)=(1,0) и (0,1).",
