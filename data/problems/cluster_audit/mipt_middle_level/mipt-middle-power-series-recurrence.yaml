  "ideas": [
    {
      "id": "idea-main",
      "title": "Сдвинуть индексы и сравнить коэффициенты",
      "text": "Подстановка y=sum a_n x^n дает y''=sum (n+2)(n+1)a_{n+2}x^n, а xy=sum a_{n-1}x^n для n>=1. Поэтому после a0,a1 все коэффициенты находятся рекурсивно.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "series_recursion"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "Пусть y=sum_{n=0}^infty a_n x^n. Тогда y''=sum_{n=0}^infty (n+2)(n+1)a_{n+2}x^n. Кроме того, xy=sum_{n=1}^infty a_{n-1}x^n. Сравнение коэффициентов в y''+xy=0 дает при n=0: 2a2=0, то есть a2=0. При n>=1 получаем (n+2)(n+1)a_{n+2}+a_{n-1}=0, то есть a_{n+2}=-a_{n-1}/((n+2)(n+1)). Поэтому a0 и a1 свободны, а дальше все коэффициенты определены. Для (a0,a1)=(1,0): a2=0, a3=-a0/(3*2)=-1/6, a4=-a1/(4*3)=0, a5=-a2/(5*4)=0, a6=-a3/(6*5)=1/180, значит y1=1-x^3/6+x^6/180+... . Для (0,1): a2=0, a3=0, a4=-1/12, a7=1/(12*7*6)=1/504, значит y2=x-x^4/12+x^7/504+... .",
      "status": "ai_checked",
      "standard_idea_ids": [
        "series_recursion"
      ]
    }
  ],
