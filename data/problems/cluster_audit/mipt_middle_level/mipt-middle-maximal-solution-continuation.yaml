  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Предположим, что b<+∞ и график решения при t из [t_0,b) лежит в компактном K внутри D. Возьмем небольшой открытый слой U, компактно содержащий K. На замыкании U функция f ограничена: |f|≤M, и локальная теорема существования дает один и тот же радиус продолжения delta>0 для задач Коши с начальными точками из K. Кроме того, x(t) имеет предел при t→b-: для s<t близких к b имеем |x(t)-x(s)|≤\\(\\int_s^t\\) |f(tau,x(tau))|d tau ≤ M|t-s|, значит x(t) является фундаментальной и стремится к некоторому x_b из K. По непрерывности можно положить x(b)=x_b. Теперь задача Коши с данными x(b)=x_b имеет решение на [b,b+delta), и склеивание с прежним решением дает продолжение за b. Это противоречит максимальности. Следовательно, при конечном правом конце максимального интервала график обязан выходить из любого компакта D.",
      "status": "ai_checked"
    }
