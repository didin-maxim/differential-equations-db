        "id": "stmt-original",
        "title": "Формулировка",
        "text": "Пусть f(t,x) непрерывна и локально липшицева по x в области D. Если решение x(t) задачи x'=f(t,x) задано на максимальном правом полуинтервале [t_0,b) и его график при t<b остается в компактном множестве K, лежащем внутри D, то b не может быть конечным. Иными словами, если максимальное решение нельзя продолжить за конечный правый конец, то график при t→b выходит из любого компакта области D.",
