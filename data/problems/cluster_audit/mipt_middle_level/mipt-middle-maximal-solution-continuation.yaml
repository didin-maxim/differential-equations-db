  "ideas": [
    {
      "id": "idea-main",
      "title": "Компакт дает общий локальный шаг продолжения",
      "text": "На компактной окрестности правой части ограничены и локально липшицевы с едиными константами, поэтому из любой точки графика около b можно продолжить решение на один и тот же малый промежуток.",
      "status": "ai_checked"
    }
