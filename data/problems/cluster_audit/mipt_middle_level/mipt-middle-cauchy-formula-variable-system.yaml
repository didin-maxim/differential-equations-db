  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Ищем решение в виде x(t)=Phi(t)c(t). Тогда x'=Phi'c+Phi c'=A(t)Phi c+Phi c'. Подстановка в x'=A(t)x+g(t) дает A Phi c+Phi c'=A Phi c+g, значит c'=Phi^{-1}g. Интегрируя, получаем c(t)=c(t0)+int_{t0}^t Phi(s)^(-1)g(s)ds. Из начального условия x0=Phi(t0)c(t0), то есть c(t0)=Phi(t0)^(-1)x0. Подстановка c(t) дает указанную формулу. Если выбрать нормировку Phi(t0)=E, первый множитель упрощается до Phi(t)x0.",
