        "title": "Формулировка",
        "text": "Пусть Phi(t) - фундаментальная матрица однородной системы x'=A(t)x на интервале I, причем Phi(t0) обратима. Вывести формулу решения задачи x'=A(t)x+g(t), x(t0)=x0: x(t)=Phi(t)Phi(t0)^(-1)x0+Phi(t) int_{t0}^t Phi(s)^(-1)g(s) ds.",
