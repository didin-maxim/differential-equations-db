  "solutions": [
    {
      "id": "guide-route",
      "title": "Маршрут выбора метода",
      "text": "1. Определить, что именно меняется: параметр в правой части, коэффициенте, начальных данных или сама начальная точка потока. 2. Зафиксировать базовое значение параметра и базовое решение на общем отрезке существования. 3. Если требуется производная по параметру, продифференцировать интегральную форму задачи Коши и начальные данные; получить линейную задачу для z. 4. Если параметр - начальная точка, записать матричное уравнение U'=D_x f(t,phi)U, U(t_0)=I и читать U как фундаментальную матрицу. 5. Если требуется только непрерывная зависимость, оценить разность двух интегральных уравнений и применить Гронуолла. 6. Для второго порядка перейти к системе для вектора состояния, затем при желании вернуться к скалярному уравнению для z. 7. Решать полученную линейную задачу коротким способом: интегрирующим множителем, фундаментальной матрицей или формулой вариации постоянных.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
        "gronwall_estimate",
        "state_vector_uniqueness"
      ],
      "definition_ids": [
        "initial_value_problem",
        "fundamental_matrix",
        "gronwall_inequality",
        "variation_of_constants_system"
      ]
    },
    {
      "id": "guide-proof-route",
      "title": "Как строить доказательство",
      "text": "Доказательство гладкой зависимости обычно начинается с интегрального уравнения и разностного отношения. Из формулы Тейлора для f выделяют D_x f умножить на разность решений и partial_lambda f умножить на приращение параметра; остаток контролируется непрерывностью производных на компактной трубке около базового решения. Непрерывная зависимость и Гронуолл дают, что разностные отношения остаются ограниченными и сходятся к решению линейной задачи. Единственность линейной задачи Коши завершает вывод: любая предельная чувствительность обязана быть тем же z.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "picard_lindelof",
        "gronwall_estimate",
        "variation_of_constants"
      ],
      "definition_ids": [
        "cauchy_problem",
        "linear_system",
        "lipschitz_condition",
        "gronwall_inequality"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Нельзя дифференцировать только уравнение и забывать про параметрические начальные данные. Нельзя применять формулу чувствительности без общего отрезка существования и достаточной гладкости правой части по фазовой переменной и параметру. Нельзя относить сюда любую задачу с числовым параметром: если вопрос решается только характеристическим многочленом, резонансом или классификацией устойчивости, это соседний кластер. Нельзя путать вариационное уравнение потока с вариационным исчислением: здесь вариация означает линеаризацию ОДУ вдоль решения. Наконец, нельзя превращать методический representative в длинный интегральный счет; ценность блока в правильном линейном уравнении для чувствительности.",
      "status": "ai_checked",
