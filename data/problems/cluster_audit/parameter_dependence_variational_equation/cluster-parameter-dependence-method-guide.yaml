      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Кластер parameter-dependence-variational-equation отвечает за задачи, где изучают не само решение задачи Коши, а его чувствительность к параметру, начальному условию или малому возмущению. Базовая схема для x'=f(t,x,lambda), x(t_0,lambda)=xi(lambda): сначала фиксируют решение x_0(t) при нужном значении параметра, затем дифференцируют интегральную форму задачи Коши и получают линейную задачу для z=partial_lambda x: z'=D_x f(t,x_0,lambda0)z+partial_lambda f(t,x_0,lambda0), z(t_0)=xi'(lambda0). Для зависимости от начальной точки производная потока U=D_{x_0}phi удовлетворяет однородному матричному вариационному уравнению U'=D_x f(t,phi)U, U(t_0)=I, то есть является нормированной фундаментальной матрицей вдоль траектории. Если гладкости по параметру пока нет, разность двух решений оценивают через липшицево неравенство и Гронуолла, получая непрерывную или липшицеву зависимость. Уравнения второго порядка и более высоких порядков сначала переводят к системе первого порядка; в линейных задачах с параметром надо дифференцировать и коэффициенты, и правую часть, и начальные данные. Обычная вариация постоянных для неоднородного линейного уравнения относится сюда только тогда, когда она решает именно уравнение чувствительности или уравнение для регулярной поправки.",
