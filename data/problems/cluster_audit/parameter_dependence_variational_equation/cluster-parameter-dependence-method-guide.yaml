  "ideas": [
    {
      "id": "idea-integral-form-first",
      "title": "Дифференцировать интегральную форму",
      "text": "Чувствительность не выводят из уже найденной явной формулы, если ее нет. Задачу Коши записывают как x=xi(lambda)+int f(s,x(s,lambda),lambda) ds и дифференцируют по параметру; цепное правило дает линейное уравнение вдоль базовой траектории.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
        "picard_lindelof"
      ],
      "definition_ids": [
        "initial_value_problem",
        "linear_system"
      ]
    },
    {
      "id": "idea-initial-data-flow",
      "title": "Начальные данные дают производную потока",
      "text": "Если параметром является начальная точка, то производная решения по x_0 является матрицей. Ее столбцы решают одно и то же линейное вариационное уравнение, поэтому U(t) играет роль фундаментальной матрицы для линеаризации вдоль выбранного решения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential",
        "variation_of_constants"
      ],
      "definition_ids": [
        "fundamental_matrix",
        "linear_system"
      ]
    },
    {
      "id": "idea-gronwall-before-smoothness",
      "title": "Гронуолл работает до производной",
      "text": "Непрерывная и липшицева зависимость доказываются через оценку разности двух решений. Этот шаг часто нужен перед гладкой зависимостью: он удерживает решения на одном отрезке и контролирует остатки после вычитания.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "gronwall_estimate"
      ],
      "definition_ids": [
        "gronwall_inequality",
        "lipschitz_condition"
      ]
    },
    {
      "id": "idea-higher-order-as-system",
      "title": "Второй порядок читать как систему",
      "text": "Для y''=F(t,y,y',lambda) параметрическая производная z=partial_lambda y удовлетворяет линейному уравнению второго порядка, но надежнее получать ее из системы для (y,y'). Тогда автоматически дифференцируются оба начальных условия.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness"
      ],
      "definition_ids": [
        "cauchy_problem",
        "linear_system"
      ]
    },
    {
      "id": "idea-regular-perturbation",
      "title": "Регулярная поправка - это чувствительность",
      "text": "Разложение x=x_0+epsilon x_1+... дает на первом порядке то же неоднородное вариационное уравнение. На втором порядке появляются новые члены из второй производной поля или нелинейности; это новая идея только если меняется структура уравнения, а не длина интеграла.",
      "status": "ai_checked",
      "standard_idea_ids": [
