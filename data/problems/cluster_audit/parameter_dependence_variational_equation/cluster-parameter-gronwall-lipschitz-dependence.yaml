  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Из интегральной формы задач Коши получаем |x_lambda(t)-x_mu(t)|<=K|lambda-mu|+int_0^t (L|x_lambda(s)-x_mu(s)|+M|lambda-mu|) ds. Значит u(t)=|x_lambda(t)-x_mu(t)| удовлетворяет u(t)<= (K+Mt)|lambda-mu|+L int_0^t u(s) ds. Так как K+Mt не убывает, неравенство Гронуолла дает u(t)<=(K+Mt)exp(Lt)|lambda-mu|.",
      "status": "ai_checked",
