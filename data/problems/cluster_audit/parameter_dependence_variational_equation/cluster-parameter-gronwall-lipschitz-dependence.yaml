        "id": "stmt-original",
        "title": "Модельная лемма",
        "text": "Пусть решения x_lambda и x_mu задач x'=f(t,x,lambda), x(0)=xi(lambda) существуют на [0,T]. Предположим, что |f(t,x,lambda)-f(t,y,mu)|<=L|x-y|+M|lambda-mu| и |xi(lambda)-xi(mu)|<=K|lambda-mu|. Докажите оценку |x_lambda(t)-x_mu(t)|<=(K+Mt)exp(Lt)|lambda-mu| для 0<=t<=T.",
