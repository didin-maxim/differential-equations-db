  "ideas": [
    {
      "id": "idea-main",
      "title": "Дифференцировать линейное уравнение второго порядка",
      "text": "Параметр стоит и в коэффициенте, и в правой части, а начальные данные тоже зависят от него; все это превращается в одно неоднородное уравнение для z.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "При alpha=0 имеем y_0''+y_0=0, y_0(0)=1, y_0'(0)=0, поэтому y_0=cos t. Дифференцируя исходную задачу по alpha и подставляя alpha=0, получаем z''+z=t-y_0=t-cos t, z(0)=1, z'(0)=1. Отсюда z(t)=cos t+t-(t/2)sin t.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
