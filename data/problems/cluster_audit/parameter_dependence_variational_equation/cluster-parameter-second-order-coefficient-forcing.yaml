        "title": "Модельная задача",
        "text": "Пусть y(t,alpha) решает y''+(1+alpha)y=alpha t, y(0,alpha)=1+alpha, y'(0,alpha)=alpha. Найдите z(t)=partial y/partial alpha при alpha=0.",
