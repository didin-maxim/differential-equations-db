        "title": "Модельная задача",
        "text": "Пусть x(t,a), y(t,a) решают систему x'=a x+y, y'=-x+a t, x(0,a)=1, y(0,a)=a. Найдите partial_a x(t,a)|_{a=0} и partial_a y(t,a)|_{a=0}.",
