      "id": "idea-main",
      "title": "Получить систему для вектора чувствительности",
      "text": "Дифференцирование по параметру дает линейную неоднородную систему вдоль базового вращения при a=0.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "При a=0 базовое решение равно x0=cos t, y0=-sin t. Обозначим p=partial_a x|_{a=0}, q=partial_a y|_{a=0}. Тогда p'=x0+q, q'=-p+t, p(0)=0, q(0)=1. Исключая q, получаем p''+p=t-sin t, p(0)=0, p'(0)=2. Поэтому p(t)=t+(t/2)cos t+(1/2)sin t. Из q=p'-cos t находим q(t)=1-(t/2)sin t.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants"
      ]
    }
  ],
