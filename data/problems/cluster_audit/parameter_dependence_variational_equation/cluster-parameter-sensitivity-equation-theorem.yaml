        "id": "stmt-original",
        "title": "Базовая теорема",
        "text": "Пусть f(t,x,lambda) непрерывна по t и непрерывно дифференцируема по (x,lambda) в окрестности графика решения задачи x'=f(t,x,lambda), x(t_0,lambda)=xi(lambda), где xi дифференцируема. Если решения существуют на одном фиксированном отрезке, то z(t)=partial x(t,lambda)/partial lambda удовлетворяет z'=D_x f(t,x(t,lambda),lambda)z+partial_lambda f(t,x(t,lambda),lambda), z(t_0)=xi'(lambda).",
