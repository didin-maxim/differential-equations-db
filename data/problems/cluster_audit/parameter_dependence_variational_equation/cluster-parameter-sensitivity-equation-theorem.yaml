  ],
  "solutions": [
    {
      "id": "proof-main",
      "title": "Доказательство",
      "text": "Интегральная форма имеет вид \\(x(t,\\lambda)=\\xi(\\lambda)+\\int_{t_0}^t f(s,x(s,\\lambda),\\lambda)\\,ds\\). Дифференцируя ее по lambda и используя гладкую зависимость решения от параметра, получаем \\(z(t)=\\xi'(\\lambda)+\\int_{t_0}^t [D_x f(s,x(s,\\lambda),\\lambda)z(s)+\\partial_\\lambda f(s,x(s,\\lambda),\\lambda)]\\,ds\\). Это интегральная форма заявленной линейной задачи Коши. Стандартная строгость получается из оценки остатка в формуле Тейлора для f и неравенства Гронуолла на фиксированном отрезке.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "variation_of_constants",
        "gronwall_estimate"
      ]
    }
