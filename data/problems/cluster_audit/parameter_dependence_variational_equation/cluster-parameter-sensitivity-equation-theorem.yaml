  "ideas": [
    {
      "id": "idea-main",
      "title": "Дифференцировать интегральную форму задачи Коши",
      "text": "Параметр входит и в поле, и в начальные данные; после дифференцирования остается линейная неоднородная задача вдоль базовой траектории.",
      "status": "ai_checked",
