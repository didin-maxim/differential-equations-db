        "title": "Модельная задача",
        "text": "Пусть \\(y(t,\\lambda)\\) решает \\(y'=\\lambda y+t\\), \\(y(0,\\lambda)=e^{\\lambda}\\). Найдите \\(\\partial y/\\partial \\lambda\\) при \\(\\lambda=0\\).",
