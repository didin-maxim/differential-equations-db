  "solutions": [
    {
      "id": "sol-main",
      "title": "Формулировка",
      "text": "Пусть V непрерывно дифференцируема в окрестности нуля, V(0)=0 и V(z)>0 при z ≠ 0. Если производная вдоль поля Vdot(z)=grad V(z)·f(z) неположительна в достаточно малой окрестности, то нулевое равновесие устойчиво по Ляпунову: малый уровень V остается инвариантным вперед по времени и помещается в заданную epsilon-окрестность. Если дополнительно Vdot(z)<0 при z ≠ 0 в проколотой окрестности, то равновесие асимптотически устойчиво. В стандартных задачах V часто является квадратичной формой, энергией осциллятора или первым интегралом; в последнем случае Vdot=0 обычно дает устойчивость центра, но не асимптотическую устойчивость.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ]
    }
