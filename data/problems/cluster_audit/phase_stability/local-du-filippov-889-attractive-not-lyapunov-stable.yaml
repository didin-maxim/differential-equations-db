  "ideas": [
    {
      "id": "idea-main",
      "title": "Притяжение не заменяет epsilon-delta устойчивость",
      "text": "На рисунке все траектории в итоге входят в начало координат, но траектории, стартующие сколь угодно близко к положительной полуоси x снизу, сначала уходят на фиксированное расстояние по y.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Решение",
      "text": "По направлению стрелок видно, что все изображенные траектории при t→+∞ стремятся к началу координат: они входят в нуль, хотя делают перед этим большой обход. Однако устойчивость по Ляпунову требует большего: начав достаточно близко к нулю, решение должно оставаться в заранее заданной малой окрестности для всех t≥0. На рисунке для любого сколь угодно малого delta можно взять начальную точку на нижней ветви с |y(0)|<delta. Такая траектория позже поднимается до уровня |y(t)|≥epsilon0, где epsilon0 фиксирован выбранной горизонтальной полосой на рисунке. Значит условие устойчивости по Ляпунову нарушается. Поэтому нулевое решение неустойчиво по Ляпунову. Асимптотически устойчивым оно тоже не является, потому что асимптотическая устойчивость включает устойчивость по Ляпунову как обязательную часть, даже если предельное притяжение к нулю выполняется.",
      "status": "ai_checked"
    }
  ],
