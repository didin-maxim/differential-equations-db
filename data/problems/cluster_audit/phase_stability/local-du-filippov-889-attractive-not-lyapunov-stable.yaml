        "title": "Филиппов, задача 889",
        "text": "Траектории системы уравнений dx/dt=P(x,y), dy/dt=Q(x,y), где функции P, P'_x, P'_y, Q, Q'_x, Q'_y непрерывны, изображены на фазовой плоскости. Что можно сказать о поведении решений при t → +∞? Является ли нулевое решение асимптотически устойчивым? Является ли оно устойчивым по Ляпунову?",
