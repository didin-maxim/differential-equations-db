        "id": "stmt-original",
        "title": "Стандартный мотив фазовой плоскости",
        "text": "Пусть H(x,y) - первый интеграл автономной системы на плоскости, H имеет строгий локальный экстремум в изолированном равновесии O, а близкие уровни H=const являются замкнутыми кривыми вокруг O. Какой вывод об устойчивости и типе равновесия следует сделать?",
        "source_ids": [
          "src-romanko-problem-book"
        ],
        "status": "ai_checked",
        "self_contained": {
          "status": "ai_checked"
        },
