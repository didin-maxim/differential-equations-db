          "stability",
          "first_integral"
        ]
      }
    ]
  },
  "ideas": [
    {
      "id": "idea-main",
      "title": "Уровни первого интеграла служат барьерами",
      "text": "Траектория не может перейти с одного уровня H на другой. Замкнутые близкие уровни удерживают ее около равновесия, но сохранение H не заставляет приближаться к равновесию.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral"
      ]
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Вывод",
      "text": "Такое равновесие является центром в качественном смысле: достаточно близкие ненулевые траектории лежат на замкнутых уровнях первого интеграла и обходят O. Строгий экстремум H позволяет для любой малой окрестности O выбрать еще меньшую область, ограниченную уровнем H=const и содержащуюся внутри этой окрестности; траектории из нее не выходят, потому что H сохраняется. Значит O устойчиво по Ляпунову. Но если начальная точка не равна O и лежит на замкнутом уровне H=c != H(O), то H(z(t))=c для всех t, поэтому z(t) не может стремиться к O. Следовательно, центр не является асимптотически устойчивым.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral"
      ]
    }
