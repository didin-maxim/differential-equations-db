  "solutions": [
    {
      "id": "sol-main",
      "title": "Формулировка и применение",
      "text": "Если все собственные значения A имеют отрицательные вещественные части, то нулевое равновесие нелинейной системы локально асимптотически устойчиво. Если хотя бы одно собственное значение имеет положительную вещественную часть, равновесие неустойчиво. В гиперболическом случае локальный фазовый портрет качественно имеет тот же тип, что и линейная система z'=Az: узел, седло или фокус с теми же устойчивыми и неустойчивыми направлениями в топологическом смысле. Если у A есть собственные значения на мнимой оси, например центр или нулевое собственное значение, теорема не делает вывода; тогда нужны первые интегралы, функции Ляпунова, нормальные формы или прямой анализ нелинейных членов.",
