        "text": "Пусть f класса C^1, f(0)=0, и матрица A=Df(0) не имеет собственных значений с нулевой вещественной частью. Сформулировать, что линеаризация говорит об устойчивости и локальном фазовом портрете равновесия системы z'=f(z).",
