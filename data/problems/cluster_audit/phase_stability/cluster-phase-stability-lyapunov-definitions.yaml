  "ideas": [
    {
      "id": "idea-main",
      "title": "Разделить удержание в окрестности и предельное притяжение",
      "text": "Устойчивость по Ляпунову контролирует всю будущую траекторию внутри заданной окрестности. Асимптотическая устойчивость требует и такого контроля, и сходимости к равновесию.",
      "status": "ai_checked"
    }
  ],
  "solutions": [
    {
      "id": "sol-main",
      "title": "Формулировка",
      "text": "Нулевое решение устойчиво по Ляпунову, если для любого \\(\\epsilon>0\\) найдется \\(\\delta>0\\) такое, что из \\(|z(0)|<\\delta\\) следует \\(|z(t)|<\\epsilon\\) для всех t≥0. Оно асимптотически устойчиво, если оно устойчиво по Ляпунову и, кроме того, существует rho>0 такое, что при |z(0)|<rho выполнено z(t)→0 при t→+∞. Нулевое решение неустойчиво, если условие устойчивости по Ляпунову нарушается: найдется epsilon0>0 и сколь угодно малые начальные данные, для которых в некоторый момент |z(t)|≥epsilon0. Поэтому одно лишь свойство z(t)→0 для близких начальных данных не достаточно для асимптотической устойчивости: траектория может сначала выйти из фиксированной малой окрестности, а потом вернуться к нулю.",
      "status": "ai_checked"
    }
  ],
