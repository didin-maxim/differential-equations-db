        "title": "Определения для положения равновесия",
        "text": "Для автономной системы z'=f(z), f(0)=0, сформулировать определения устойчивости по Ляпунову, асимптотической устойчивости и неустойчивости нулевого решения. Пояснить, почему притяжение траекторий к нулю само по себе еще не является асимптотической устойчивостью.",
