      "title": "Решение",
      "text": "Нулевое равновесие устойчиво по Ляпунову: если взять достаточно маленькую начальную точку, вся ее дальнейшая траектория остается внутри заранее выбранной окрестности нуля, потому что спирали идут внутрь. Оно также асимптотически устойчиво: близкие траектории не просто остаются рядом, а стремятся к началу координат при t->+infty. Такой фазовый портрет соответствует устойчивому фокусу, или спиральному стоку, в линейной классификации.",
