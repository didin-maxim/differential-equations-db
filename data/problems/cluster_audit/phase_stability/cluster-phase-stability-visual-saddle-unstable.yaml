      "id": "sol-main",
      "title": "Решение",
      "text": "Нулевое равновесие неустойчиво по Ляпунову. Какой бы малой ни была начальная окрестность, в ней есть точки на выходящей сепаратрисе или рядом с ней; соответствующие траектории со временем выходят из фиксированной окрестности нуля. Поэтому условие epsilon-delta устойчивости нарушается. Асимптотической устойчивости тоже нет, поскольку она обязательно включает устойчивость по Ляпунову. Входящие сепаратрисы не спасают ситуацию: они показывают только существование отдельных траекторий, стремящихся к нулю, а устойчивость требует контроля всех достаточно близких траекторий.",
