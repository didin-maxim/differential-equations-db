  "solutions": [
    {
      "id": "sol-main",
      "title": "Классификация",
      "text": "Если det A<0, собственные значения вещественные разных знаков, и нуль является седлом; он неустойчив. Если собственные значения вещественные, одного знака и det A>0, получаем узел: при обоих отрицательных он асимптотически устойчив, при обоих положительных неустойчив. При кратном вещественном собственном значении lambda возможны три стандартных подтипа: дикритический, или звездный, узел при A=lambda I; собственный узел при двух независимых собственных векторах; вырожденный узел при одной жордановой клетке. Знак lambda решает устойчивость: lambda<0 дает асимптотическую устойчивость, lambda>0 - неустойчивость. Если собственные значения alpha+-i beta, beta ≠ 0, то при alpha<0 получаем устойчивый фокус, при alpha>0 неустойчивый фокус, а при alpha=0 центр. Центр устойчив по Ляпунову, но не асимптотически устойчив. Если хотя бы одно собственное значение равно нулю, гиперболическая классификация не применяется: для линейной системы det A=0 означает не изолированное равновесие или нейтральное направление, а для нелинейной системы нужны члены старшего порядка.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ]
    }
