  "ideas": [
    {
      "id": "idea-main",
      "title": "Тип читается по знакам и мнимым частям собственных значений",
      "text": "Вещественная часть отвечает за рост или затухание, разные знаки вещественных собственных значений дают седло, а чисто мнимые собственные значения в невырожденном линейном центре дают замкнутые эллипсы.",
