        "title": "Справочная классификация",
        "text": "Для системы z'=Az на плоскости перечислить стандартные типы изолированного равновесия z=0 по собственным значениям матрицы A: седло, устойчивый и неустойчивый узел, вырожденный и дикритический узел, устойчивый и неустойчивый фокус, центр, а также случаи кратных и нулевых собственных значений.",
