        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для задач кластера phase-line-stability сначала отделяют одномерную фазовую прямую y'=f(y) от фазовой плоскости z'=F(z). В одномерном случае равновесия находятся как нули f, а устойчивость читается по направлениям движения слева и справа. На плоскости сначала проверяют, является ли равновесие линейным или гиперболическим: спектр матрицы дает седло, узел, фокус или центр и решает устойчивость в гиперболических случаях. Если линейная часть не решает вопрос или требуется строгое доказательство, переходят к первому интегралу, функции Ляпунова, инвариантной области или прямой проверке определения устойчивости по Ляпунову.",
