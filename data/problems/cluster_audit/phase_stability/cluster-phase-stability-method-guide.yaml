      "title": "Сначала выбрать геометрический уровень задачи",
      "text": "Фазовая прямая решается таблицей знаков, линейная фазовая плоскость решается спектром, а нелинейная негиперболическая точка требует отдельного инварианта или функции Ляпунова. Ошибка часто начинается с того, что к центру или нулевому собственному значению применяют гиперболическое правило.",
