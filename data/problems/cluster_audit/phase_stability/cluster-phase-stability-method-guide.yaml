    {
      "id": "idea-definitions",
      "title": "Устойчивость и притяжение проверять раздельно",
      "text": "Асимптотическая устойчивость состоит из двух требований: траектории из малой окрестности остаются малыми и стремятся к равновесию. Поэтому центр устойчив, но не асимптотически устойчив, а притяжение без удержания в окрестности не дает асимптотической устойчивости.",
      "status": "ai_checked",
      "definition_ids": [
        "lyapunov_stability",
        "asymptotic_stability"
      ]
    },
    {
      "id": "idea-invariants",
      "title": "Интеграл и функция Ляпунова заменяют явное решение",
      "text": "Первый интеграл удерживает траектории на уровнях и обычно дает центр или неасимптотическую устойчивость. Функция Ляпунова с неположительной производной дает устойчивость, а с отрицательной производной в проколотой окрестности дает асимптотическую устойчивость.",
