  "solutions": [
    {
      "id": "guide-phase-line-route",
      "title": "Маршрут для фазовой прямой",
      "text": "1. Привести уравнение к автономному виду y'=f(y), если это возможно. 2. Найти равновесия f(a)=0 и упорядочить их на прямой. 3. На каждом промежутке между соседними равновесиями определить знак f. 4. Поставить стрелки: f>0 означает движение вправо, f<0 означает движение влево. 5. Если стрелки с обеих сторон направлены к равновесию, оно асимптотически устойчиво в одномерном смысле; если от него, оно неустойчиво; если с одной стороны к нему, а с другой от него, возникает полуустойчивость. 6. Для кратных корней не пользоваться одной только кратностью без знаков: важна реальная смена направления движения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "phase_line_signs"
      ],
      "definition_ids": [
        "phase_line",
        "equilibrium",
        "asymptotic_stability"
      ]
    },
    {
      "id": "guide-linear-plane-route",
      "title": "Маршрут для линейной и гиперболической фазовой плоскости",
      "text": "1. Для z'=Az найти след, определитель, дискриминант или собственные значения. 2. Если det A<0, получаем седло и неустойчивость. 3. Если собственные значения имеют отрицательные вещественные части, получаем асимптотически устойчивый узел или фокус; если есть положительная вещественная часть, равновесие неустойчиво. 4. Чисто мнимые собственные значения линейной невырожденной системы дают центр: устойчивость по Ляпунову есть, асимптотической устойчивости нет. 5. Для нелинейной системы z'=F(z) с F(0)=0 и гиперболической матрицей DF(0) использовать теорему линеаризации: знак вещественных частей сохраняет локальный вывод об устойчивости. 6. При нулевой вещественной части хотя бы одного собственного значения линеаризация не является ответом.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "matrix_exponential"
      ],
      "definition_ids": [
        "linear_system",
        "equilibrium",
        "lyapunov_stability",
        "asymptotic_stability"
      ]
    },
    {
      "id": "guide-lyapunov-integral-route",
      "title": "Маршрут для первого интеграла и функций Ляпунова",
      "text": "1. Если дана сохраняющаяся величина H, проверить, имеет ли H строгий локальный экстремум в равновесии и образуют ли близкие уровни замкнутые кривые. Тогда уровни работают как барьеры и дают устойчивость, но не сходимость к равновесию. 2. Если дана или подбирается V, проверить V(0)=0, V(z)>0 при z≠0 и знак Vdot=grad V dot F. 3. Условие Vdot≤0 дает устойчивость по Ляпунову через вложенные уровни. 4. Условие Vdot<0 вне равновесия дает асимптотическую устойчивость в стандартной локальной формулировке. 5. Если Vdot=0, нельзя автоматически писать асимптотическую устойчивость: это типичный источник центра.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral",
        "energy_monotonicity"
      ],
      "definition_ids": [
        "first_integral",
        "lyapunov_function",
        "lyapunov_stability",
        "asymptotic_stability"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не смешивать притяжение и устойчивость по Ляпунову: траектории могут стремиться к равновесию, но перед этим выходить из фиксированной малой окрестности. Не объявлять центр асимптотически устойчивым: ненулевые траектории на замкнутых уровнях не стремятся к центру. Не применять теорему линеаризации к негиперболическому равновесию без дополнительного анализа. Не добавлять в кластер новую вычислительную карточку только потому, что в матрице 2x2 поменялись числа: метод уже представлен классификационной карточкой.",
      "status": "ai_checked",
      "definition_ids": [
        "lyapunov_stability",
