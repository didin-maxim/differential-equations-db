    {
      "id": "guide-proof-route",
      "title": "Как доказывать базовые формулы",
      "text": "Равенство X'=AX следует из того, что каждый столбец X является решением. Если det X(t0) не равен нулю, столбцы X(t0) задают базис начальных данных; единственность задачи Коши показывает, что X(t)c описывает все решения. Для другой фундаментальной матрицы Y каждый ее столбец выражается через столбцы X с постоянными коэффициентами, значит Y=XC. Матрица Phi(t,s)=X(t)X(s)^{-1} нормирована в s и потому является единственным оператором переноса. Формула Лиувилля получается из (det X)'=det X tr(X'X^{-1})=det X tr A. Вариация постоянных следует из подстановки x=Xc: после сокращения X'=AX остается Xc'=b.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness",
        "wronskian_liouville",
        "variation_of_constants"
      ],
      "definition_ids": [
        "fundamental_matrix",
        "transition_matrix",
        "liouville_formula_linear_system",
        "variation_of_constants_system"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не путать произвольную X(t) с нормированной матрицей перехода: X(t0) обычно не равна I. Не считать, что X(t)X(s)^{-1} зависит от выбора базиса решений. Не выводить обратимость X(t) точечным вычислением det, когда формула Лиувилля уже показывает сохранение ненулевого определителя. Не заменять Phi(t,s) на e^{A(t-s)} при переменной A(t). Не относить любую задачу с e^{At} сюда: если основной труд - спектр A, жордановы цепочки или явная экспонента, это соседний постояннокоэффициентный блок.",
      "status": "ai_checked",
