  "ideas": [
    {
      "id": "idea-state-transfer",
      "title": "Сначала выбрать, что именно переносит матрица",
      "text": "Фундаментальная матрица X(t) зависит от базиса решений, а матрица перехода Phi(t,s)=X(t)X(s)^{-1} зависит только от системы и переносит состояние из момента s в момент t. В задачах на начальные и двухточечные условия почти всегда нужен именно Phi(t,s).",
