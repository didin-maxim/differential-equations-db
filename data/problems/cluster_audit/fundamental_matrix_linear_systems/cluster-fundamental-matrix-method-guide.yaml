      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Для однородной линейной системы x'=A(t)x на интервале непрерывности коэффициентов фундаментальная матрица X(t) - это матрица, столбцы которой образуют базис решений; эквивалентно X'=A(t)X и det X(t) не обращается в нуль. Если выбрана точка t0, нормированная фундаментальная матрица Phi(t,t0) задается условием Phi(t0,t0)=I и переводит начальное состояние x(t0)=x0 в x(t)=Phi(t,t0)x0. Для произвольной фундаментальной матрицы X(t) матрица перехода от s к t равна Phi(t,s)=X(t)X(s)^{-1}; она не зависит от выбора X, удовлетворяет Phi(t,s)Phi(s,r)=Phi(t,r), Phi(s,s)=I, Phi(t,s)^{-1}=Phi(s,t) и по первой переменной решает d_t Phi(t,s)=A(t)Phi(t,s). Все решения однородной системы имеют вид x(t)=X(t)c, а все фундаментальные матрицы имеют вид Y(t)=X(t)C с постоянной обратимой C. Обратимость X(t) сохраняется на всем интервале: формула Лиувилля дает det X(t)=det X(t0) exp(int_{t0}^t tr A(tau) d tau), поэтому ненулевой det в одной точке не может стать нулем. При постоянной матрице A нормированная матрица перехода равна e^{A(t-s)}, а det e^{A(t-s)}=e^{(t-s) tr A}. Для неоднородной системы x'=A(t)x+b(t) вариация постоянных дает x(t)=X(t)c(t), c'=X(t)^{-1}b(t), то есть формулу Коши x(t)=Phi(t,t0)x0+int_{t0}^t Phi(t,s)b(s) ds. В задачах этого кластера главный объект - свойства X(t) и Phi(t,s): смена базиса, обратимость, determinant/trace, двухточечные условия, перенос начальных данных и связь с вариационной системой; если главный ход - вычисление спектра постоянной A или интеграла правой части, задача уходит в соседние кластеры.",
