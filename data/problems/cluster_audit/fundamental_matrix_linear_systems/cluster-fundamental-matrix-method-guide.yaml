  "solutions": [
    {
      "id": "guide-diagnostic-route",
      "title": "Диагностический маршрут",
      "text": "1. Зафиксировать рабочий интервал, где A(t) непрерывна. 2. Понять, дана произвольная фундаментальная матрица X(t) или нормированная Phi(t,t0). 3. Если нужно перенести данные из s в t, записать Phi(t,s)=X(t)X(s)^{-1}. 4. Если нужно сравнить две фундаментальные матрицы, искать постоянную C в равенстве Y=XC. 5. Если нужен det X, площадь или объем, применять формулу Лиувилля, а не раскрывать определитель. 6. Если есть правая часть b(t), писать формулу Коши и только затем подставлять начальные или краевые условия. 7. Если A постоянна, заменить Phi(t,s) на e^{A(t-s)} и решить, является ли главным вопросом фундаментальная матрица или уже спектральный счет постоянной матрицы.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "state_vector_uniqueness",
        "wronskian_liouville",
        "variation_of_constants",
        "matrix_exponential"
      ],
