    {
      "id": "idea-forward-backward-direction",
      "title": "Направление оценки является частью идеи",
      "text": "Forward estimate использует начальные данные и знак производной на будущем хвосте. Backward estimate появляется, когда функция положительна на всей R: слишком большая производная в точке при движении назад создала бы запрещенный нуль или отрицательное значение.",
