  "solutions": [
    {
      "id": "guide-route",
      "title": "Маршрут решения",
      "text": "1. Определить, что требуется доказать: невозможность глобального решения, ограниченность, единственность пересечения, нижнюю оценку, асимптотику или точную константу. 2. Выбрать счетчик: энергия для ограниченности, угол или arctan для поворота и взрыва, логарифм или отношение для относительного роста, экспоненциальный множитель для линейного дрейфа, комбинация координат для скрытой монотонности. 3. Дифференцировать счетчик и получить знак, верхнюю или нижнюю оценку скорости. 4. Интегрировать в правильном направлении: вперед от начальных данных, назад от глобального условия или по всему хвосту, если производная мажорируется интегрируемой функцией. 5. Сравнить с диапазоном счетчика, границей области или примером равенства; если нужна точность оценки, построить модель, где все неравенства становятся равенствами.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "comparison_argument",
        "angle_comparison",
        "energy_monotonicity",
        "logarithmic_derivative",
        "integrating_factor_linear"
