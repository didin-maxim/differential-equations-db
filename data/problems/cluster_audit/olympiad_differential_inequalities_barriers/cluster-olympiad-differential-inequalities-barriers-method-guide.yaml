    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не применять локальную теорему существования как доказательство глобальности: она не запрещает конечный взрыв. Не интегрировать неравенство в неверном направлении: backward estimate требует глобального условия слева или на всей прямой. Не забывать первый момент выхода при барьере: знак надо проверять на границе, а не только внутри. Не терять область допустимости преобразования arctan, log или y/x. Не превращать задачу в тяжелую теорию, если достаточно одной вспомогательной величины и интегрирования ее производной.",
