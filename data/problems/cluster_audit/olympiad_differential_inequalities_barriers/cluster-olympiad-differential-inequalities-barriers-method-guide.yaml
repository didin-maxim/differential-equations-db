    {
      "id": "guide-recognition",
      "title": "Как распознать после нескольких задач",
      "text": "После трех-пяти примеров полезно спрашивать не 'как решить ОДУ', а 'какая величина почти монотонна'. Если в условии есть y^2, ищут arctan y или 1/y; если есть две функции и симметричные оценки производных, ищут угол; если есть f'>f, выносят \\(e^{x}\\); если правая часть мала на бесконечности, оценивают полный прирост; если функция положительна на всей прямой, пробуют смотреть назад; если появляется sin(x+y) или y/x, пробуют сложить переменные или перейти к отношению.",
