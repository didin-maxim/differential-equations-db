    {
      "id": "guide-course-links",
      "title": "Связь с курсом ДУ",
      "text": "Из стандартного курса здесь реально используются интегрирующий множитель для линейного неравенства, Гронуолл для запрета одновременного зануления или выхода положительной части, энергия для уравнений второго порядка, фазовая прямая после замены y/x и критерий продолжения как язык для слова 'взрыв'. Но в олимпиадной задаче эти инструменты не подменяют выбор барьера: теорема существования не угадывает arctan, x+y или \\(e^{-x}f\\).",
