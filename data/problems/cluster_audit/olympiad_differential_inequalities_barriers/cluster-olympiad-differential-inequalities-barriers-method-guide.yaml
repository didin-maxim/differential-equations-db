      "id": "idea-border-with-standard-theory",
      "title": "Это не замена теоремы существования",
      "text": "Пикара-Линделефа и теорема продолжения отвечают на вопрос, существует ли локальная траектория и когда она может оборваться. Олимпиадный барьер отвечает на другой вопрос: почему траектория не может попасть в область, выйти из нее, остаться глобальной или сохранить заданный знак.",
