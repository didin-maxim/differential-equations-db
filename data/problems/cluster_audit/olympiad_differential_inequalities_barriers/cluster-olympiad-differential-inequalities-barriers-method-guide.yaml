      "text": "Если на предполагаемой границе знак производной не позволяет выйти наружу, первый выход невозможен. В олимпиадных задачах граница часто скрыта в простой замене: x+y, x-f, y/x, \\(e^{-x}f\\) или выпуклая комбинация.",
