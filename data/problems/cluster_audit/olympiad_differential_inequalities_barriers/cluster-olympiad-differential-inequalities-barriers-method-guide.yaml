      "title": "Взрыв доказывается через ограниченный счетчик",
      "text": "Для роста типа y^2 удобно считать не y, а arctan y или -1/y. Если производная этого счетчика снизу отделена от нуля, а сам счетчик имеет конечный диапазон, глобальное продолжение на слишком длинный интервал невозможно.",
