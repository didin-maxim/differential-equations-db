      {
        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "В олимпиадных задачах на дифференциальные неравенства обычно не требуется тяжелая теория существования: локальная разрешимость чаще является фоном, а главный ход состоит в выборе величины, у которой производная имеет знак или ограниченную скорость. Такой величиной бывает энергия, угол, arctan y, логарифм, отношение, x+y, x-f, \\(e^{-x}f\\) или расстояние до границы области. После выбора барьера задача сводится к одному из четырех маршрутов: сравнить с явным уравнением, доказать первый выход из области невозможным, накопить конечный прирост на бесконечном промежутке или показать, что преобразованная величина за конечное время обязана выйти за допустимый диапазон. Взрыв здесь читается не как формальное применение теоремы Пикара-Линделефа, а как противоречие между bounded transform вроде arctan y < π/2 и нижней оценкой его роста. Forward estimates идут в сторону времени, где известен начальный знак или монотонность; backward estimates используют глобальное условие на всей прямой и смотрят назад, чтобы слишком большая производная не дала отрицательное значение. Инвариантная область появляется, когда на границе поле направлено внутрь или выбранная вспомогательная функция не может пересечь нулевой уровень. После трех-пяти задач шаблон распознается по вопросу: что здесь должно остаться в клетке, что должно слишком быстро повернуться или вырасти, и какая простая величина видит это без решения уравнения?",
