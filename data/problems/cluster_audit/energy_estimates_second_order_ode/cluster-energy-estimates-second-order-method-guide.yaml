  "solutions": [
    {
      "id": "guide-route-conserved",
      "title": "Маршрут для сохраняющейся энергии",
      "text": "1. Проверить, зависит ли сила только от y: y''+g(y)=0 или эквивалентная автономная форма. 2. Найти потенциал G(y)=int g(y) dy. 3. Записать E=(y')^2/2+G(y) и проверить E'=y'(y''+g(y))=0. 4. Использовать уровень E=C как фазовую кривую: компактный регулярный уровень без равновесий дает периодическое движение, а строгий минимум энергии около равновесия дает устойчивость без притяжения.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral"
      ],
      "definition_ids": [
        "first_integral",
        "phase_trajectory",
        "equilibrium",
        "lyapunov_stability"
      ]
    },
    {
      "id": "guide-route-monotone",
      "title": "Маршрут для монотонной энергии",
      "text": "1. Выбрать E так, чтобы после подстановки уравнения остались слагаемые известного знака. 2. Выписать E' и не терять коэффициенты, которые отвечают за знак. 3. Для периодического решения интегрировать E' по периоду и получить нулевую полную потерю энергии. 4. Для ограниченности использовать нижнюю положительность E и верхнюю оценку E(t)≤E(t_0) или обратную монотонность. 5. Если нулевая потеря заставляет y' или y занулиться на интервале, завершить через единственность задачи Коши.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity",
        "state_vector_uniqueness"
      ],
      "definition_ids": [
        "lyapunov_function",
        "solution"
      ]
    },
    {
      "id": "guide-route-boundary",
      "title": "Маршрут для краевого энергетического тождества",
      "text": "1. Выбрать множитель y, y' или весовую комбинацию так, чтобы главный член интегрировался по частям. 2. Проверить, какие краевые члены зануляются условиями задачи. 3. Свести утверждение к интегралу от неотрицательной суммы или к монотонности энергии между концами. 4. Если интеграл равен нулю, каждое неотрицательное слагаемое исчезает на нужном множестве; далее используется непрерывность и единственность.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity",
        "state_vector_uniqueness"
      ],
      "definition_ids": [
        "ordinary_differential_equation",
        "solution"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не выводить асимптотическую устойчивость из E'=0: сохранение энергии обычно дает центр, а не притяжение. Не объявлять любую положительную функцию энергией без проверки E' вдоль решения. Не путать bounded energy с bounded solution, если энергия не контролирует y и y'. Не добавлять новую карточку в кластер только из-за другой первообразной G(y), когда переносимый ход снова сводится к E'=0 или E'≤0.",
      "status": "ai_checked",
