        "id": "stmt-method-guide",
        "title": "Энергетический метод для второго порядка",
        "text": "Для уравнения второго порядка энергетический ход начинается с умножения на y' или на выражение, после которого левая часть становится производной квадратичной или механической энергии. В автономном случае y''+V'(y)=0 получают E=(y')^2/2+V(y) и E'=0; это первый интеграл фазовой системы y'=v, v'=-V'(y). При демпфировании, переменном коэффициенте или подобранном весе получают E'≤0, E'≥0 или интегральное тождество на отрезке. Знак производной энергии дает априорные оценки y и y', ограниченность, невозможность нетривиального периодического решения, запрет заданной краевой конфигурации или единственность нулевого решения. Если уровни E замкнуты и регулярны, они читаются как фазовые овалы и дают периодические движения; если E монотонна, она работает уже как функция Ляпунова и препятствует возврату на тот же уровень. Этот блок надо отличать от общей редукции порядка: замена p=p(y) ищет явное решение, а энергетическая оценка извлекает качественный вывод из знака E' без обязательного интегрирования уравнения.",
        "source_ids": [
          "src-mipt-ode-course",
          "src-arnold-ode",
          "src-teschl-ode-dynamical-systems",
          "src-waterloo-amath250-notes",
