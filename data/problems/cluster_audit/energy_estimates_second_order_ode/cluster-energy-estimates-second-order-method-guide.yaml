  "ideas": [
    {
      "id": "idea-multiply-by-velocity",
      "title": "Домножение на скорость превращает силу в производную потенциала",
      "text": "Если уравнение имеет вид y''+g(y)=0, то после умножения на y' получается ((y')^2/2+G(y))'=0, где G'=g. В задачах с коэффициентами или демпфированием тот же прием дает не ноль, а контролируемый знак.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral",
        "energy_monotonicity"
      ],
      "definition_ids": [
        "first_integral",
        "lyapunov_function"
      ]
    },
    {
      "id": "idea-sign-of-energy",
      "title": "Знак E' важнее явного решения",
      "text": "Когда E'≤0, траектория не может вернуться на больший уровень энергии; на периоде это заставляет полную потерю энергии быть нулевой. Когда E≥c((y')^2+y^2) или уровень E ограничивает фазовую точку, из него сразу следует априорная оценка.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ],
      "definition_ids": [
        "lyapunov_function",
        "solution"
      ]
    },
    {
      "id": "idea-first-integral-vs-lyapunov",
      "title": "Сохранение энергии и убывание энергии дают разные выводы",
      "text": "E'=0 удерживает решение на уровне и связывает задачу с первыми интегралами и фазовыми овалами. E'<0 или E'≤0 связывает задачу с функциями Ляпунова: это уже аргумент о невозможности возврата, устойчивости или затухании, а не о замкнутой траектории.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_first_integral",
        "energy_monotonicity"
      ],
      "definition_ids": [
        "first_integral",
        "phase_trajectory",
        "lyapunov_function",
        "lyapunov_stability",
        "asymptotic_stability"
      ]
    },
    {
      "id": "idea-boundary-integral",
      "title": "Интегральная энергия превращает краевые условия в знак",
      "text": "На отрезке часто выгодно интегрировать произведение уравнения на y или y' и перенести производные по частям. Если краевые члены исчезают, сумма неотрицательных интегралов может равняться нулю только для тривиального решения или невозможной конфигурации нулей.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "energy_monotonicity"
      ],
