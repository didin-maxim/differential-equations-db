      "text": "Если задача требует построить ФСР, вариацию параметров или обычную формулу Абеля, это linear-equations-variable-coefficients. Если речь о разделении нулей, сравнении или спектральной краевой задаче, это sturm-oscillation-comparison или boundary-spectral-problems. В этот кластер попадает только случай, где нелинейная комбинация решений является центральным объектом.",
