      "title": "Отношение решений связывает нули с Вронскианом",
      "text": "На промежутке без нулей \\(y_1\\) производная отношения равна \\((y_2/y_1)' = W/y_1^2\\). Поэтому экстремум отношения, общий нуль или слишком частое пересечение обычно означают W=0 либо конфликт с простотой нулей и единственностью задачи Коши.",
