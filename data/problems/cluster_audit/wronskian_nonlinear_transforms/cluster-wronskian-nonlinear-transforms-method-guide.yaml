      "id": "idea-transferable-linear-core",
      "title": "Переносить только инвариант, а не всю линейную теорию",
      "text": "В задачах кластера обычно достаточно знать, что W управляется формулой Абеля или постоянен в уравнении без первой производной. ФСР и общее решение важны как язык независимости, но не как приглашение решать уравнение полностью.",
