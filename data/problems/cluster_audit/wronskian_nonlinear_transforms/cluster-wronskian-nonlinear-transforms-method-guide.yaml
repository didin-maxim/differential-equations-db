        "id": "stmt-method-guide",
        "title": "Методический блок кластера",
        "text": "Кластер wronskian-nonlinear-transforms нужен для задач, где линейное уравнение используется не ради полного решения, а как источник инварианта для нелинейной величины: степени \\(y^m\\), отношения \\(y_2/y_1\\), произведения пары решений, корня из произведения или логарифмической производной. Из линейной теории реально переносится немного: формула Абеля-Лиувилля для W, дихотомия W=0 или W нигде не равен нулю на рабочем интервале, размерность пространства решений, простота нулей ненулевого решения и возможность читать \\((y_2/y_1)'\\) как \\(W/y_1^2\\) там, где \\(y_1\\) не обращается в нуль. Все остальное надо проверять заново: знак решения, отсутствие нулей в знаменателе, выбор ветви корня или степени, гладкость преобразования и исключительные случаи. Для уравнения y''+p(x)y'+q(x)y=0 Вронскиан связывает независимость и ФСР, а для формы без y' он постоянен и часто превращает длинную алгебру в один квадрат \\(W^2\\). В олимпиадных задачах главная ловушка - формально подставить нелинейное выражение и забыть, что оно может быть недопустимо в нулях; вторая ловушка - принять любой нелинейный прием за Риккати или Бернулли, хотя здесь исходная линейность пары решений и Вронскиан являются центральным объектом.",
        "source_ids": [
