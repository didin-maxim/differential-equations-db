  "solutions": [
    {
      "id": "guide-route",
      "title": "Маршрут решения",
      "text": "1. Выяснить, какая нелинейная величина задана:\\(y^m, y_2/y_1, y1y2, sqrt(y1y2), y'/y\\) или специальная комбинация пары решений. 2. Зафиксировать рабочий интервал без запрещенных нулей и с нужным знаком; если такого интервала нет, сначала разобрать нулевой или знаковый случай. 3. Выписать W и его закон: W'=-pW для y''+p(x)y'+q(x)y=0 или W=const для y''=f(x)y. 4. Дифференцировать не саму громоздкую формулу, а удобную величину: логарифмическую производную, квадрат корня, отношение решений или произведение. 5. Заменить возникающие выражения через исходное линейное уравнение и W. 6. Вернуться к исходной формулировке: выбрать константу, ветвь корня или знак, проверить независимость решений и исключительные случаи.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville",
        "wronskian_invariant",
        "logarithmic_derivative"
      ],
      "definition_ids": [
        "ordinary_differential_equation",
        "wronskian",
        "linear_independence_solutions"
      ]
    },
    {
      "id": "guide-pitfalls",
      "title": "Типовые ловушки",
      "text": "Не делить на решение и не брать логарифмическую производную до проверки, что решение не обращается в нуль на выбранном интервале. Не считать W постоянным для общего уравнения y''+p(x)y'+q(x)y=0: постоянство есть только при p=0, а в общем случае работает формула Абеля. Не выводить линейную независимость из того, что формулы выглядят разными; надо проверить W или непостоянство отношения. Не подставлять \\(y^m\\) или sqrt(y1y2) как гладкое решение через нуль или смену знака. Не переносить сюда обычные задачи на Риккати, Бернулли, вариацию параметров или Штурма, если нелинейное преобразование пары решений не является главным ходом.",
      "status": "ai_checked",
      "standard_idea_ids": [
        "wronskian_liouville",
        "wronskian_invariant",
        "logarithmic_derivative"
      ],
      "definition_ids": [
        "solution",
        "wronskian",
        "linear_independence_solutions"
      ]
    },
    {
      "id": "guide-proof-pattern",
      "title": "Шаблон короткого доказательства",
      "text": "Для степени одного решения обычно кладут r=y'/y: подстановка y и \\(y^m\\) дает две связи, из которых исключаются r' и p r. Для пары решений чаще начинают с \\(W=y1y2'-y_1'y_2\\): производная отношения дает \\(W/y_1^2\\), а в задаче типа Пинни дифференцируют \\(z^2=c^2 y1y2\\) и сводят остаток к \\(W^2\\). В задачах о нулях не надо сразу звать полную теорию Штурма: часто хватает единственности задачи Коши, простоты нулей и факта, что W не может занулиться в одной точке у независимой пары.",
      "status": "ai_checked",
