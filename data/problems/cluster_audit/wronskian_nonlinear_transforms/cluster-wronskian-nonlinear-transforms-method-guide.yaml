      ]
    },
    {
      "id": "idea-nonlinear-transform-domain",
      "title": "Сначала проверить область нелинейного преобразования",
      "text": "Деление на \\(y_1\\), переход к y'/y, степень \\(y^m\\), корень sqrt(y1y2) или отношение \\(y_2/y_1\\) допустимы только на интервалах, где выбранные функции не зануляются и сохраняется нужный знак. Поэтому нули и знаки являются частью метода, а не технической оговоркой в конце.",
      "status": "ai_checked",
