<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" role="img" aria-labelledby="title desc">
  <title id="title">Полоса продолжения для характеристик y-x=const</title>
  <desc id="desc">Нехарактеристический отрезок на оси x=0 и полоса характеристик, выходящих из него.</desc>
  <rect width="520" height="320" fill="#ffffff"/>
  <path d="M80 270 L330 20 L390 20 L140 270 Z" fill="#d8f0ff" stroke="#5aa6d6" stroke-width="2"/>
  <line x1="80" y1="270" x2="330" y2="20" stroke="#5aa6d6" stroke-width="2"/>
  <line x1="140" y1="270" x2="390" y2="20" stroke="#5aa6d6" stroke-width="2"/>
  <line x1="60" y1="160" x2="470" y2="160" stroke="#222" stroke-width="1.6"/>
  <line x1="160" y1="290" x2="160" y2="30" stroke="#222" stroke-width="1.6"/>
  <line x1="160" y1="230" x2="160" y2="90" stroke="#d14b3f" stroke-width="6" stroke-linecap="round"/>
  <g stroke="#6c7a89" stroke-width="1.4">
    <line x1="80" y1="250" x2="310" y2="20"/>
    <line x1="110" y1="270" x2="360" y2="20"/>
    <line x1="140" y1="270" x2="390" y2="20"/>
    <line x1="70" y1="220" x2="270" y2="20"/>
  </g>
  <text x="468" y="154" font-family="Arial, sans-serif" font-size="16" fill="#222">x</text>
  <text x="168" y="42" font-family="Arial, sans-serif" font-size="16" fill="#222">y</text>
  <text x="22" y="88" font-family="Arial, sans-serif" font-size="15" fill="#d14b3f">данные</text>
  <text x="275" y="252" font-family="Arial, sans-serif" font-size="15" fill="#2f6f95">|y-x|&lt;1</text>
</svg>
